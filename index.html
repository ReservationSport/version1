<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservation Sport - BBZO</title>

   <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

 

<style>



/* 1. GLOBALE EINSTELLUNGEN & FONTS */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Oswald:wght@300;400;700&display=swap');


/* Globale Basis für einen cleanen Icon-Look */
.material-symbols-outlined {
  font-variation-settings:
  'FILL' 0,
  'wght' 300,
  'GRAD' 0,
  'opsz' 24;
  vertical-align: middle;
  margin-right: 8px; /* Sorgt für den sauberen Abstand zum Text */
  font-size: 20px;
}


/* ============================================================
   1. BASIS & GRID-STRUKTUR (Bild 2 Look)
   ============================================================ */
body { 
    font-family: 'Segoe UI', 'Oswald', sans-serif; 
    background: #1a1a1a; 
    color: white; 
    padding: 20px; 
    margin: 0;
}

:root {
    --accent-color: #e67e22;
    --highlight-orange: #ff8c00;
    --bg-dark: #1a1a1a;
    --card-bg: #262626;
}

/* Das Haupt-Grid */
#plan-container, .grid { 
    display: grid; 
    grid-template-columns: 120px repeat(5, 1fr); 
    gap: 2px; 
    max-width: 1000px; 
    margin: auto; 
}


/* ============================================================
   2. NAVIGATION & STICKY CONTROLS (CLEAN LOOK - FINAL)
   ============================================================ */
.date-control {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 1000px;
    margin: 0 auto;
    padding: 10px 0;
    background: #1a1a1a;
    position: sticky;
    top: 0;
    z-index: 1100;
}

.nav-section { display: flex; align-items: center; gap: 10px; }
.nav-left { flex: 1; justify-content: flex-start; }
.nav-center { flex: 2; justify-content: center; gap: 8px; }
.nav-right { flex: 1; justify-content: flex-end; }
.nav-group { display: flex; gap: 5px; }

/* Buttons & Container - Clean & Uniform */
.nav-btn, .refresh-btn, .date-container { 
    height: 40px; 
    background: #262626; 
    border: 1px solid #333; 
    color: #e67e22;
    border-radius: 8px; 
    box-sizing: border-box;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    cursor: pointer;
}

.nav-btn, .refresh-btn { width: 40px; }
.nav-btn:hover, .refresh-btn:hover, .date-container:hover { 
    background: #2d2d2d; 
    border-color: #e67e22; 
}

/* Spezielles Styling für den neuen Datum-Button */
.date-container {
    padding: 0 15px;
    gap: 8px;
    font-family: inherit;
    font-size: 14px;
}

.date-container span:first-child {
    color: #eee; /* Datumstext in hellem Grau/Weiß */
    font-weight: 500;
}

/* Zentrierung aller Icons */
.nav-btn .material-symbols-outlined, 
.refresh-btn .material-symbols-outlined,
.date-container .material-symbols-outlined,
.news-btn-premium .material-symbols-outlined {
    font-size: 22px;
    color: #e67e22;
    margin: 0;
    transition: color 0.2s;
}

/* Der alte DatePicker-Indicator (versteckt, da Button jetzt alles macht) */
#datePicker { 
    display: none; 
    pointer-events: none; /* Verhindert Interaktion komplett */
}

/* News Button Premium Style */
.news-btn-premium {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #262626;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 0 15px;
    cursor: pointer;
    height: 40px;
    position: relative;
    transition: all 0.2s;
}
.news-btn-premium:hover { background: #2d2d2d; border-color: #e67e22; }

.news-btn-premium .btn-text {
    color: #eee; 
    font-size: 13px; 
    letter-spacing: 1px; 
    margin-right: 8px; 
    font-weight: 400;
}

.news-btn-premium .badge {
    position: absolute; top: -3px; right: -3px; width: 9px; height: 9px;
    background: #e67e22; border-radius: 50%; border: 2px solid #1a1a1a;
    box-shadow: 0 0 8px rgba(230, 126, 34, 0.6);
}


/* ============================================================
   KALENDER MODAL DESIGN (FINAL MIT NAVIGATION)
   ============================================================ */
.cal-modal-backdrop {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.9);
    display: flex; justify-content: center; align-items: center;
    z-index: 9999;
}
.cal-modal-container {
    background: #1a1a1a; border: 1px solid #333;
    border-radius: 12px; width: 90%; max-width: 400px; padding: 20px;
}
.cal-modal-title { color: #e67e22; text-align: center; margin: 0 0 15px 0; font-size: 16px; }

/* Monat Navigation */
.cal-month-nav {
    display: flex; justify-content: space-between; align-items: center;
    margin: 10px 0 20px 0;
}
.cal-month-nav button {
    background: #262626; border: 1px solid #333; color: #e67e22;
    border-radius: 6px; padding: 5px 12px; cursor: pointer; font-size: 16px;
    transition: 0.2s;
}
.cal-month-nav button:hover { background: #333; }
.cal-month-title { color: #eee; font-size: 14px; font-weight: bold; }

/* Layout für 7 Spalten (Mon-So) */
.calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-top: 15px;
}

.cal-weekday {
    text-align: center; color: #888; font-size: 11px;
    font-weight: bold; padding-bottom: 5px; text-transform: uppercase;
}

.cal-day {
    padding: 8px 0; background: #262626; color: #eee;
    border-radius: 4px; text-align: center; cursor: pointer; font-size: 13px;
    transition: 0.2s;
}

/* Wochenende ausgegraut */
.cal-day.weekend { color: #666; }

/* Markierung für das aktuell gewählte Datum */
.cal-day.selected {
    background: #e67e22 !important;
    color: #fff !important;
    border: 2px solid #fff; /* Zusätzlicher weißer Rahmen */
}

/* Heute-Markierung (nur Outline, falls es nicht gewählt ist) */
.cal-day.today {
    border: 1px solid #e67e22;
    color: #e67e22;
}

/* Heute-Markierung WENN es auch das gewählte Datum ist */
.cal-day.today.selected {
    border: 2px solid #fff;
    color: #fff;
}

.cal-day:hover { background: #e67e22; color: #fff; }
.cal-day.disabled { opacity: 0.1; cursor: not-allowed; pointer-events: none; }
.cal-day.empty { background: transparent; cursor: default; }

/* Dezenter Abbrechen Button */
.cal-modal-cancel {
    background: transparent; border: 1px solid #333;
    color: #666; padding: 8px; border-radius: 6px;
    cursor: pointer; width: 100%; margin-top: 20px; font-size: 12px;
    transition: 0.2s;
}
.cal-modal-cancel:hover { background: #333; color: #eee; }
    
/* ============================================================
   3. BOXEN & ZELLEN-DESIGN
   ============================================================ */
.box { 
    border: 1px solid #444; 
    padding: 5px; 
    background: #262626; 
    min-height: 50px; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    justify-content: center; 
    text-align: center; 
    font-size: 11px; 
    position: relative; /* Wichtig für die absolute Positionierung der Icons */
    cursor: default; 
    overflow: hidden;
    transition: none !important;
}

.box.empty { pointer-events: none; opacity: 0.5; }
    
.zeit-box {
    background: #333;      /* Dasselbe dunkle Grau wie dein Header */
    color: #ffffff;       /* Dein Akzent-Orange für die Lesbarkeit */
    font-weight: bold;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    border: 1px solid #444; /* Dezente Trennung zwischen den Zeit-Boxen */
}

.header-row { 
    grid-column: span 6; 
    background: #333; 
    font-size: 14px; 
    font-weight: bold; 
    position: sticky; 
    top: 60px; 
    z-index: 1090; 
    height: 50px;
}

/* Deine Boxen (.is-mine) */
.box.is-mine { 
    border: 1px solid #e67e22 !important; 
    z-index: 10; 
    cursor: pointer; 
}
.box.is-mine:hover {
    background-color: rgba(230, 126, 34, 0.2) !important;
    box-shadow: inset 0 0 15px rgba(255, 159, 67, 0.4), 0 0 20px rgba(230, 126, 34, 0.3);
    transition: transform 0.2s ease; /* NUR hier die Animation, nicht global */
    transform: scale(1.03);
    z-index: 100;
}

.material-indicator {
    transition: transform 0.2s ease; /* Macht den Übergang weich */
}

.material-indicator:hover {
    transform: scale(1.2); /* Vergrößert das Icon leicht */
}

    
/* 🔥 NEU: Das Notiz-Icon oben links in der Box (Gegenspieler zum Material-Paket) */
.box-notiz-icon {
    position: absolute;
    top: 4px;
    left: 4px;
    font-size: 1.35rem; /* 🔥 Deutlich größer (vorher 11px) */
    line-height: 1;
    z-index: 15;
    cursor: pointer; /* 🔥 Verwandelt das Fragezeichen in eine Klick-Hand */
    transition: transform 0.2s ease;
}

/* Wenn man direkt mit der Maus auf das Icon zeigt, wird es noch ein Stück größer */
.box-notiz-icon:hover {
    transform: scale(1.25) !important;
}

/* Lässt das Icon dezent mitreagieren, wenn die gesamte Box gehovertt wird */
.box.is-mine:hover .box-notiz-icon {
    transform: scale(1.1);
}

/* Inhalt der Boxen */
/* Klassenname */
.klasse-label { 
    font-weight: bold; 
    font-size: 14px; 
    color: #ffffff; 
}

/* Lehrer-Kürzel */
.lehrer-info { 
    font-size: 10px; 
    color: #bbbbbb; 
}

/* Hallen-Name */
.halle-label { 
    font-size: 10px; 
    color: #e67e22; 
    font-style: italic;
}

/* ============================================================
   4. TRENNLINIEN, LOADER & SPEZIAL-MODI
   ============================================================ */
.divider-thin { grid-column: 1 / span 6; height: 1px; background: #444; margin: 2px 0; }
.divider-thick { grid-column: 1 / span 6; height: 4px; background: #444; margin: 5px 0; }

.box.ausfall-mode { 
    background-color: #000 !important; 
    color: #777 !important; 
    background-image: linear-gradient(to top right, transparent calc(50% - 1px), #444, transparent calc(50% + 1px)), 
                      linear-gradient(to top left, transparent calc(50% - 1px), #444, transparent calc(50% + 1px)); 
}

.info-box {
    grid-column: span 6; font-size: 20px !important; padding: 40px !important;
    text-align: center; line-height: 1.5; color: #888; font-style: italic;
}

.global-loader { 
    position: fixed; left: 15px; top: 15px; width: 25px; height: 25px; 
    border: 3px solid #444; border-top: 3px solid #e67e22; border-radius: 50%; 
    animation: spin 1s linear infinite; display: none; z-index: 9999; 
}

/* ============================================================
   5. LOGIN-OVERLAY & CARD-DESIGN
   ============================================================ */
#loginOverlay { 
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
    background: radial-gradient(circle at center, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%), 
                url('https://raw.githubusercontent.com/ReservationSport/ReservationSport/refs/heads/main/Logo.png');
    background-size: cover; background-position: center; z-index: 20000; 
    display: flex; justify-content: center; align-items: center; 
    font-family: 'Inter', sans-serif; backdrop-filter: blur(18px); 
}

#loginOverlay.fade-out {
    opacity: 0;
    transition: opacity 0.5s ease;
    pointer-events: none;
}

.login-card {
    background: rgba(20, 20, 20, 0.7); padding: 50px 40px; border-radius: 28px;
    border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5); 
    width: 100%; max-width: 360px; text-align: center;
}

.login-card h2 { 
    color: #ffffff; font-size: 30px; margin-bottom: 35px; font-weight: 800; 
    letter-spacing: -1.5px; text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5); 
}

.login-card input { 
    padding: 16px 20px; margin: 10px 0; background: rgba(0, 0, 0, 0.4); 
    border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; border-radius: 14px; 
    width: 100%; font-size: 16px; outline: none; box-sizing: border-box; 
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.login-card input:focus { 
    border-color: #e67e22; background: rgba(0, 0, 0, 0.6); 
    box-shadow: 0 0 20px rgba(230, 126, 34, 0.2); 
}

/* ============================================================
   6. LOGIN-BUTTON (MORPHING-VERSION)
   ============================================================ */
.button-wrapper {
    height: 85px; 
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    margin-top: 25px;
}

#loginBtn { 
    padding: 18px; 
    background: linear-gradient(180deg, #ff9f43 0%, #e67e22 100%); 
    color: white; border: none; border-radius: 16px; cursor: pointer; width: 100%; 
    font-family: 'Oswald', sans-serif; font-size: 20px; font-weight: 700; 
    text-transform: uppercase; letter-spacing: 1.5px;
    box-shadow: 0 10px 20px -5px rgba(230, 126, 34, 0.5);
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    position: absolute; 
    z-index: 1;
    overflow: hidden;
}

#loginBtn:hover { transform: translateY(-3px); filter: brightness(1.1); }

/* Blitz-Effekt bleibt im Button */
#loginBtn::after {
    content: ''; position: absolute; top: 0; left: -150%; width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
    transform: skewX(-25deg); transition: 0.6s ease-in-out; z-index: 3;
}
#loginBtn:hover::after { left: 150%; }

/* DER MORPH-EFFEKT: Wird zum Spinner */
#loginBtn.is-loading {
    width: 60px !important;
    height: 60px;
    border-radius: 50% !important;
    color: transparent !important;
    pointer-events: none;
    background: #e67e22 !important;
    border: 4px solid rgba(255, 255, 255, 0.2);
    border-top: 4px solid #fff;
    animation: spin 0.8s linear infinite;
    box-shadow: none;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* Fehlertext Styling */
#loginError {
    color: #ff4757;
    font-size: 14px;
    margin-top: 15px;
    min-height: 20px;
    font-weight: 600;
}


/* ============================================================
   6. SIDEBAR & 8. NEWS-SIDEBAR (Von Links)
   ============================================================ */

#newsSidebar {
    position: fixed;
    top: 0;
    left: -350px;
    width: 320px;
    height: 100%;
    background: #111;
    border-right: 1px solid #333;
    z-index: 12000;
    box-shadow: 10px 0 30px rgba(0,0,0,0.5);
    padding: 20px;
    box-sizing: border-box;
    display: none;
    transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    overflow-y: auto; 
}

#newsSidebar.active { left: 0; }

/* Basis-Stile für die Karten */
.news-item {
    background: #1a1a1a;
    border: 1px solid #333;
    padding: 12px;
    border-radius: 6px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
}

/* 📥 UNGELESEN (news-unread) */
.news-item.news-unread {
    border-left: 4px solid #e67e22;
    background: #221a12;
}
.news-item.news-unread .status-icon { color: #e67e22; font-weight: bold; }

/* ⚪ GELESEN (news-gelesen) - Die graue Optik */
.news-item.news-gelesen {
    background: #151515 !important;
    border-left: 4px solid #444 !important;
    opacity: 0.7;
}
.news-item.news-gelesen .status-icon { color: #888; font-weight: normal; }

/* Hover-Effekt */
.news-item:hover { 
    border-color: #555;
    background: #222; 
}

.news-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 0.8em; }
.status-icon { font-size: 0.9em; text-transform: uppercase; letter-spacing: 0.5px; }
.news-text { margin: 6px 0; font-size: 0.95em; color: #eee; line-height: 1.4; }
    



/* ============================================================
   ANIMATIONEN & EFFEKTE
   ============================================================ */

/* Pulsieren des Benachrichtigungs-Punkts */
@keyframes pulseDot {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.4); opacity: 0.6; }
    100% { transform: scale(1); opacity: 1; }
}
.pulse-animation {
    animation: pulseDot 1.5s infinite ease-in-out;
}


    /* Blinken bei News-Sprung im Stundenplan */
@keyframes highlightBlink {
    0% { box-shadow: 0 0 0px #e67e22; border-color: transparent; }
    50% { box-shadow: 0 0 20px #e67e22; border-color: #e67e22; background-color: rgba(230, 126, 34, 0.2); }
    100% { box-shadow: 0 0 0px #e67e22; border-color: transparent; }
}

.blink-animation { 
    animation: highlightBlink 0.8s ease-in-out 4; 
}




/* ============================================================
   9. EIGENES MENÜ - ZENTRALES STYLING
   ============================================================ */

/* --- BACKDROP & CONTAINER --- */
.eigenesmenu-backdrop {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85); z-index: 10000;
    display: flex; justify-content: center; align-items: center;
    backdrop-filter: blur(8px); padding: 15px;
    opacity: 0; transition: opacity 0.3s ease;
}

.eigenesmenu-container {
    width: 100%; max-width: 380px; max-height: 90vh; 
    display: flex; flex-direction: column;
    background: #1a1a1a; border: 1px solid #333;
    border-radius: 16px; box-shadow: 0 25px 50px rgba(0,0,0,0.8);
    overflow: hidden; transform: translateY(20px); transition: transform 0.3s ease-out;
}

/* --- HEADER & ICON --- */
.eigenesmenu-header {
    position: relative;
    padding: 15px 60px 15px 15px; 
    background: #1a1a1a; border-bottom: 1px solid #333;
    flex-shrink: 0; /* Header soll nicht schrumpfen */
}

.header-icon {
    position: absolute !important;
    top: 10px !important; right: 15px !important;
    font-size: 50px !important; color: #e67e22 !important;
    opacity: 0.3; pointer-events: none;
}

.eigenesmenu-header h3 {
    color: #e67e22; margin: 0; font-size: 1.1em;
    text-transform: uppercase; letter-spacing: 1px; line-height: 1.2;
}

.eigenesmenu-header p {
    color: #999; font-size: 12px; margin: 8px 0 0 0; line-height: 1.4;
}

/* --- LISTE & SCROLLING --- */
.eigenesmenu-liste {
    padding: 15px; overflow-y: auto; 
    flex-grow: 1; /* Nimmt den restlichen Platz ein */
    display: flex; flex-direction: column; 
    gap: 10px; box-sizing: border-box;
}

/* --- BUTTONS: UNIVERSAL (Doppel-Btn & Taskmanager-Item) --- */
.doppel-btn, .eigenesmenu-item {
    display: flex; align-items: center; justify-content: center;
    padding: 0 20px; 
    width: 100%; 
    height: 60px; /* Fixe Höhe */
    min-height: 60px; /* WICHTIG: Verhindert Stauchung bei Platzmangel */
    flex-shrink: 0; /* Verhindert Stauchung */
    cursor: pointer; border-radius: 12px;
    background: #262626; color: #eee;
    border: 1px solid #333;
    font-size: 14px; 
    font-weight: 600;
    transition: all 0.3s ease;
    box-sizing: border-box;
}

/* Hover-Effekt */
.doppel-btn:hover, .eigenesmenu-item:hover {
    border-color: #e67e22;
    transform: scale(1.02);
    background: #2d2d2d;
}

/* Icon-Farbumschlag */
.doppel-btn .material-symbols-outlined,
.eigenesmenu-item .material-symbols-outlined {
    margin-right: 12px; transition: color 0.3s ease;
}
.doppel-btn:hover .material-symbols-outlined,
.eigenesmenu-item:hover .material-symbols-outlined {
    color: #e67e22;
}



/* --- HALLEN-OPTIONEN (70/30 Layout - Konsistent mit Taskmanager) --- */
.hallen-option-wrapper {
    width: 100%; 
    height: 60px;           /* Erhöht auf 60px wie Taskmanager */
    min-height: 60px;       /* WICHTIG: Verhindert Stauchung */
    flex-shrink: 0;         /* WICHTIG: Element darf nicht schrumpfen */
    display: flex;
    margin-bottom: 10px; 
    border-radius: 12px;    /* Etwas runder für Konsistenz */
    border: 1px solid #444;
    background: #333; 
    overflow: hidden;
    transition: all 0.25s ease;
    cursor: pointer;
    box-sizing: border-box;
}

/* Hover-Effekt nur für nicht-deaktivierte Zeilen */
.hallen-option-wrapper:not(.disabled):hover {
    transform: scale(1.02);
    border-color: #e67e22 !important;
}

/* Hallen-Icon im Locker-Bereich wird orange bei Wrapper-Hover */
.hallen-option-wrapper:not(.disabled):hover .opt-locker .material-symbols-outlined {
    color: #e67e22 !important;
}

.opt-locker {
    flex: 1; 
    display: flex; 
    align-items: center; 
    padding-left: 20px; /* Konsistentes Padding */
    cursor: pointer;
}

.opt-fix {
    width: 55px; 
    display: flex; 
    align-items: center; 
    justify-content: center; /* Perfekte Zentrierung */
    border-left: 1px solid #444; 
    background: #2a2a2a;
    transition: all 0.3s ease;
    cursor: pointer;
}

/* Schloss-Icon Basis-Style */
.opt-fix .material-symbols-outlined {
    font-size: 20px !important;
    font-weight: 300 !important;
    transition: color 0.3s ease;
    color: #eee;
    display: block;
    margin-right: 0 !important; 
    padding-left: 0 !important;
    margin-left: 0 !important;
}

/* Schloss wird NUR orange bei direktem Hover (wenn nicht disabled) */
.hallen-option-wrapper:not(.disabled) .opt-fix:hover .material-symbols-outlined {
    color: #e67e22 !important;
}

/* --- ZUSTÄNDE (Active/Selected) --- */
.opt-locker.active, .hallen-option-wrapper.selected .opt-locker { 
    background: #442d11 !important; 
    color: #ffca88 !important; 
}
.opt-fix.active, .hallen-option-wrapper.selected .opt-fix { 
    background: #66441a !important; 
}

.hallen-option-wrapper.selected .material-symbols-outlined {
    color: #ffca88 !important;
}

.hallen-option-wrapper.selected {
    cursor: default;

<script>



    /* ============================================================
       1. GLOBALE KONFIGURATION & VARIABLEN
       ============================================================ */
    const url = "https://script.google.com/macros/s/AKfycbxCHPxDHj0Eoj1NXOgGR85ETN1m-cpRdAC5D1H0Ck27nm--PetaqyUpSbUsWUFUv3dF/exec"; 
    
    // Status-Variablen
    let userPw = "", userKuerzel = "";
    let currentPlanData = [];      // Speichert die 60 Slots vom Server
    let configFarben = {};         // Farben für Klassen aus dem Sheet
    let allClassTeachers = {};     // Zuordnung Klasse -> Kürzel
    let verfügbareMaterialien = []; // Liste der Materialien aus dem Sheet
    
    // UI-Variablen
    let pendingNews = [];

/* ============================================================
   2. INITIALISIERUNG
   ============================================================ */
document.addEventListener('DOMContentLoaded', () => {
    // 1. Lokales Datum korrekt berechnen
    const now = new Date();
    const localDateStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
    
    const dp = document.getElementById('datePicker');
    
    // --- ÄNDERUNG HIER ---
    // Erzwinge heute beim PC, wenn kein expliziter Grund dagegen spricht.
    // Wir setzen das Datum immer auf HEUTE, egal was der Browser im Cache hat.
    dp.value = localDateStr;
    
    updateDateText(dp.value);
    updateNavButtons();
    changeDayAndLoad(dp.value); 
});

/* ============================================================
   3. LOGIN-LOGIK (Optimiert & Sicher)
   ============================================================ */

async function handleLogin() {
    const btn = document.getElementById('loginBtn');
    const errorDiv = document.getElementById('loginError');
    const dp = document.getElementById('datePicker');
    const loginOverlay = document.getElementById('loginOverlay');
    const loadingOverlay = document.getElementById('loadingOverlay');
    
    const kuerzelVal = document.getElementById('userKuerzel').value.trim().toLowerCase();
    const pwVal = document.getElementById('pw').value;

    if (!kuerzelVal) { 
        errorDiv.innerText = "Kürzel fehlt!"; 
        return; 
    }

    // 1. Button morpht zum Spinner
    btn.classList.add('is-loading');
    errorDiv.innerText = "";

    try {
        const response = await fetch(`${url}?mode=login&pw=${encodeURIComponent(pwVal)}&kuerzel=${encodeURIComponent(kuerzelVal)}`);
        const json = await response.json();

        if (json.status !== "success") {
            errorDiv.innerText = json.msg || "Login fehlgeschlagen!";
            btn.classList.remove('is-loading');
            return;
        }

        // ZUTRITT GEWÄHRT
        userPw = pwVal;
        userKuerzel = kuerzelVal;
        
        // 2. Overlay zeigen
        loadingOverlay.classList.add('is-visible');
        
        // 3. Login-Karte ausblenden
        loginOverlay.classList.add('fade-out');
        await new Promise(resolve => setTimeout(resolve, 500));
        loginOverlay.style.display = 'none';
        
        // 4. UI-Elemente vorbereiten
        const newsContainer = document.getElementById('news-btn-container');
        if(newsContainer) newsContainer.style.display = 'block';
        
        await initNewsSystem();
        await changeDayAndLoad(dp.value);

            if (window.lastPlanResponse) {
                window.hallenConfig = window.lastPlanResponse.hallenConfig;
            }
        
        // Fertig: Loading-Overlay entfernen
        loadingOverlay.classList.remove('is-visible');

        // 5. Hintergrund-Sync (alle 30s)
        // 5. Hintergrund-Sync (alle 30s)
setInterval(async () => {
    if (document.visibilityState === 'visible') {
        await syncPlan();
        await initNewsSystem(); 
    }
}, 5000); 

// 6. Automatischer Tageswechsel-Check (nur wenn der User "Heute" betrachtet)
setInterval(async () => {
    const jetzt = new Date();
    const localToday = `${jetzt.getFullYear()}-${String(jetzt.getMonth() + 1).padStart(2, '0')}-${String(jetzt.getDate()).padStart(2, '0')}`;
    const dp = document.getElementById('datePicker');
    
    // Wir speichern den Zustand, ob der User "Heute" aktiv hat
    // Wenn dp.value dem heutigen Tag entspricht, ist alles gut.
    // Wenn er NICHT dem heutigen Tag entspricht, lassen wir ihn in Ruhe!
    
    // Aber: Wenn wir BEIM LADEN oder BEIM LOGIN "Heute" gewählt hatten
    // und nun ein Tag vergangen ist, WOLLEN wir das Update.
    
    // Neue Logik: Springe nur, wenn der Tag tatsächlich gewechselt hat 
    // UND der User nicht aktiv an einem anderen Tag arbeitet.

    if (dp && dp.value !== localToday) {

        // Wenn der User aktiv den 5. Juni gewählt hat, ist dp.value > localToday.

        dp.value = localToday;

        updateNavButtons();
        await changeDayAndLoad(localToday);

function getDataBySlotIndex(index) {
    // Wir ziehen 1 ab, damit wir intern mit 0-basiertem Index rechnen (1 -> 0)
    const korrigierterIndex = index - 1;

    // Da wir nur die 5 Wochentage zählen (ohne die Zeitspalte):
    const spaltenProWoche = 5; 
    
    // Berechne die Zeile (Stunde)
    // Wir addieren 1 bei der Zeile, falls currentPlanData[0] der Header ist
    const zeile = Math.floor(korrigierterIndex / spaltenProWoche) + 1;
    
    // Berechne die Spalte (Tag)
    // Wir addieren 1, um die Zeitspalte (Index 0) zu überspringen
    const spalte = (korrigierterIndex % spaltenProWoche) + 1;

    console.log(`Slot ${index} -> Suche in currentPlanData[Zeile ${zeile}][Spalte ${spalte}]`);

    if (currentPlanData[zeile] && currentPlanData[zeile][spalte]) {
        return currentPlanData[zeile][spalte];
    }
    return null;

   window.openCalendar = function(offset = 0) {
    const modal = document.getElementById('calendar-modal');
    const nav = document.getElementById('calendar-nav');
    const grid = document.getElementById('calendar-grid');
    const dp = document.getElementById('datePicker');
    
    if (!modal || !nav || !grid) return;
    
    modal.style.display = 'flex';
    nav.innerHTML = '';
    grid.innerHTML = ''; 

    // 1. Basis-Datum (LOKAL statt UTC)
    const now = new Date();
    // Hilfsfunktion für lokales YYYY-MM-DD
    const getLocalStr = (d) => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    
    const heuteStr = getLocalStr(now);
    const gewähltesDatumStr = dp.value;
    
    let baseDate = dp.value ? new Date(dp.value + 'T12:00:00') : now;
    let d = new Date(baseDate.getFullYear(), baseDate.getMonth() + offset, 1);
    
    const monatsName = d.toLocaleString('de-DE', { month: 'long', year: 'numeric' });
    
    // ... (Navigation & Header bleiben gleich)
    nav.innerHTML = `
        <button onclick="openCalendar(${offset - 1})">❮</button>
        <span class="cal-month-title">${monatsName}</span>
        <button onclick="openCalendar(${offset + 1})">❯</button>
    `;
    const tage = ['Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa', 'So'];
    tage.forEach(t => grid.insertAdjacentHTML('beforeend', `<div class="cal-weekday">${t}</div>`));

    // 4. Tage berechnen
    const lastDay = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
    let startDay = (d.getDay() === 0 ? 6 : d.getDay() - 1);

    for (let i = 0; i < startDay; i++) {
        grid.insertAdjacentHTML('beforeend', `<div class="cal-day empty"></div>`);
    }

    // 5. Schleife
    for (let i = 1; i <= lastDay; i++) {
        let dateObj = new Date(d.getFullYear(), d.getMonth(), i, 12, 0, 0);
        let dateStr = getLocalStr(dateObj); // LOKAL
        
        const dayBtn = document.createElement('div');
        dayBtn.className = 'cal-day';
        dayBtn.innerText = i;
        
        if (dateStr === heuteStr) dayBtn.classList.add('today');
        if (dateStr === gewähltesDatumStr) dayBtn.classList.add('selected');
        if (dateObj.getDay() === 0 || dateObj.getDay() === 6) dayBtn.classList.add('weekend');

        if (dateStr < heuteStr) {
            dayBtn.classList.add('disabled');
        } else {
            dayBtn.onclick = () => {
                dp.value = dateStr;
                updateDateText(dateStr);
                updateNavButtons();
                changeDayAndLoad(dateStr);
                window.closeCalendar();
            };
        }
        grid.appendChild(dayBtn);
    }
};

window.loadPlan = async function() {
    const dp = document.getElementById('datePicker');
    const container = document.getElementById('plan-container'); 
    
    // 1. Lokale/Online-Weiche: Nutzt data.json, wenn du lokal arbeitest
    const isLocal = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost';
    const dateVal = dp.value;
    const fetchUrl = isLocal ? 'data.json' : `${url}?date=${dateVal}&pw=${userPw}&kuerzel=${userKuerzel}`;

    if (!isLocal && (!userPw || !dateVal)) return;

    container.innerHTML = ""; 
    if (typeof updateNavButtons === 'function') updateNavButtons();

    // Wochenende-Check
    const dateObj = new Date(dateVal.replace(/-/g, "/")); 
    if (dateObj.getDay() === 0 || dateObj.getDay() === 6) { 
        container.innerHTML = `<div class="box info-box" style="grid-column: span 6; background: #333; color: #e67e22; padding: 40px; font-size: 1.2rem;">Mach mal Pause! Es ist Wochenende...</div>`; 
        return; 
    }

    try {
        const res = await fetch(fetchUrl);
        const json = await res.json();
        
        if (json.sperrMsg) {
            container.innerHTML = `<div class="box info-box" style="grid-column: span 6; background: #333; color: #e67e22; padding: 40px; font-size: 1.2rem;">${json.sperrMsg}</div>`;
            return; 
        }
        
        // Zuweisungen
        if (json.verfügbareMaterialien) verfügbareMaterialien = json.verfügbareMaterialien;
        window.hallenConfig = json.hallenConfig || {}; 
        const plan = json.plan || {}; 
        window.lastPlanData = plan; 
        myClasses = json.userClasses || [];
        allClassTeachers = json.allClassTeachers || {};
        
        const wtArr = ["Sonntag", "Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag", "Samstag"];
        const [y, m, d] = dateVal.split('-').map(Number);
        const zeiten = ["07:15 - 08:00", "08:05 - 08:50", "08:55 - 09:40", "10:00 - 10:45", "10:50 - 11:35", "11:40 - 12:25", "12:50 - 13:35", "13:40 - 14:25", "14:30 - 15:15", "15:35 - 16:20", "16:25 - 17:10", "17:15 - 18:00"];

        let html = `<div class="box header-row" style="grid-column: span 6;"><span>${wtArr[dateObj.getDay()]}, ${d}.${m}.${y}</span></div>`;

        zeiten.forEach((zeitStr, rowIndex) => {
            if (rowIndex + 1 === 4 || rowIndex + 1 === 10) html += `<div class="divider-thin" style="grid-column: span 6;"></div>`;
            if (rowIndex + 1 === 7) html += `<div class="divider-thick" style="grid-column: span 6;"></div>`;
            html += `<div class="box zeit-box">${zeitStr}</div>`;
            
            for(let i = 1; i <= 5; i++) {
                const absoluteSlot = (rowIndex * 5) + i; 
                const slotData = plan[absoluteSlot] || {};
                const klasse = slotData.klasse || "";
                const halle = slotData.halle || "";
                const typ = slotData.typ || ""; 
                const lehrer = slotData.lehrer || allClassTeachers[klasse] || "";
                const isAusfall = (halle === "Ausfall");
                const canEdit = myClasses.some(c => klasse.trim().toLowerCase() === c.trim().toLowerCase() && klasse.trim() !== "");
                
                const bgFarbe = (window.hallenConfig[halle] && !isAusfall) ? window.hallenConfig[halle].color : '';
                
                html += `
                <div class="box ${klasse.trim() === "" ? 'empty' : ''} ${!canEdit ? 'not-mine' : 'is-mine'} ${isAusfall ? 'ausfall-mode' : ''}" 
                        data-slot="${absoluteSlot}" data-time="${zeitStr}" 
                        style="background-color: ${bgFarbe}; cursor: ${canEdit ? 'pointer' : 'default'}">
                        <div class="klasse-label">${klasse}</div>
                        <div class="lehrer-info">${lehrer}</div>
                        <div class="halle-label">${halle}</div>
                        <div class="lock-icon-container" style="position:absolute; right:-3px; bottom:5px; display:flex; align-items:center;">
                            ${typ === 'fix' ? '<span class="material-symbols-outlined" style="font-size:14px; color:#ff9800;">lock</span>' : ''}
                        </div>
                </div>`;
            }
        });
        container.innerHTML = html;

        // Icons nachladen (Notizen & Materialien)
        Object.keys(plan).forEach(slot => {
            const slotData = plan[slot] || {};
            const box = container.querySelector(`[data-slot="${slot}"]`);
            if (!box) return;

            if (slotData.material && slotData.material.trim() !== "") markBoxWithMaterialIcon(box, slotData.material, slotData.kommentar || "");

            if (slotData.kommentar && slotData.kommentar.trim() !== "") {
                const notizElement = document.createElement('span');
                notizElement.className = 'box-notiz-icon';
                notizElement.innerHTML = '<span class="material-symbols-outlined" style="color: #ff9800; font-size: 22px; line-height: 1;">stylus_note</span>';
                notizElement.title = slotData.kommentar;
                Object.assign(notizElement.style, { position: 'absolute', top: '-2px', left: '4px', cursor: 'pointer', zIndex: '5' });
                notizElement.onclick = (e) => { 
                    e.stopPropagation(); 
                    if (typeof showNotizDetailPopup === "function") showNotizDetailPopup(slotData.klasse || "", slotData.kommentar); 
                };
                box.appendChild(notizElement);
            }
        });
    } catch(e) { 
        console.error("Ladefehler:", e); 
        container.innerHTML = `<div class="box info-box" style="color:red; grid-column: span 6;">Fehler: Daten konnten nicht geladen werden.</div>`;
    }
};

window.syncPlan = async function() {
    if (isSaving) return; 

    const dp = document.getElementById('datePicker');
    const container = document.getElementById('plan-container'); 
    
    // Wir nutzen die gleiche Weiche wie in loadPlan
    const isLocal = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost';
    const fetchUrl = isLocal ? 'data.json' : `${url}?date=${dp.value}&pw=${userPw}&kuerzel=${userKuerzel}`;
    
    try {
        const res = await fetch(fetchUrl);
        const json = await res.json();
        
        if (json.sperrMsg || !json.plan) return;
        
        window.lastPlanData = json.plan; 
        if (json.hallenConfig) window.hallenConfig = json.hallenConfig;
        
        Object.keys(json.plan).forEach(slot => {
            if (window.syncBlockierteSlots && window.syncBlockierteSlots[slot]) return;

            const box = container.querySelector(`[data-slot="${slot}"]`);
            if (box) {
                const data = json.plan[slot] || {};
                const klasse = data.klasse || "";
                const halle = data.halle || "";
                const lehrer = data.lehrer || allClassTeachers[klasse] || "";
                const material = data.material || "";   
                const kommentar = data.kommentar || ""; 
                const typ = data.typ || ""; 

                // Labels aktualisieren
                const hLabel = box.querySelector('.halle-label');
                if (hLabel) hLabel.innerText = halle;
                
                const kLabel = box.querySelector('.klasse-label');
                if (kLabel) kLabel.innerText = klasse;
                
                const lLabel = box.querySelector('.lehrer-info');
                if (lLabel) lLabel.innerText = lehrer;
                
                box.setAttribute('data-notiz', kommentar);

                // Farb-Logik
                if (halle === "Ausfall") {
                    box.classList.add('ausfall-mode');
                    box.style.backgroundColor = ""; 
                } else {
                    box.classList.remove('ausfall-mode');
                    const farbe = (window.hallenConfig && window.hallenConfig[halle]) 
                                  ? window.hallenConfig[halle].color 
                                  : "";
                    box.style.backgroundColor = farbe;
                }

                // Material-Icons
                markBoxWithMaterialIcon(box, material, kommentar);

                // Lock-Icon
                let lockIcon = box.querySelector('.lock-icon-container');
                if (!lockIcon) {
                    lockIcon = document.createElement('div');
                    lockIcon.className = 'lock-icon-container';
                    Object.assign(lockIcon.style, { position: 'absolute', right: '-3px', bottom: '5px', display: 'flex', alignItems: 'center' });
                    box.appendChild(lockIcon);
                }
                lockIcon.innerHTML = (typ === 'fix') ? '<span class="material-symbols-outlined" style="font-size:14px; color:#ff9800;">lock</span>' : '';

                // Notiz-Icon
                const altesNotizIcon = box.querySelector('.box-notiz-icon');
                if (altesNotizIcon) altesNotizIcon.remove();

                if (kommentar.trim() !== "") {
                    const neuesNotizIcon = document.createElement('span');
                    neuesNotizIcon.className = 'box-notiz-icon';
                    neuesNotizIcon.innerHTML = '<span class="material-symbols-outlined" style="color: #ff9800; font-size: 22px; line-height: 1;">stylus_note</span>';
                    neuesNotizIcon.title = kommentar;
                    Object.assign(neuesNotizIcon.style, { position: 'absolute', top: '-2px', left: '4px', cursor: 'pointer', zIndex: '5' });
                    neuesNotizIcon.onclick = function(event) {
                        event.stopPropagation();
                        if (typeof showNotizDetailPopup === "function") showNotizDetailPopup(klasse, kommentar);
                    };
                    box.appendChild(neuesNotizIcon);
                }
            }
        });
        
    } catch(e) {
        console.error("Sync fehlgeschlagen:", e);
    }
};

async function changeDayAndLoad(zielDatum) {
    // 1. Schutz gegen Doppel-Klicks
    if (window.isNavigating) return;
    window.isNavigating = true;

    // UI-Elemente finden
    const dp = document.getElementById('datePicker');
    const overlay = document.getElementById('loadingOverlay');
    
    // Datum setzen
    if (dp) {
        dp.value = zielDatum;
    }
    
    // Button-Text synchronisieren
    if (typeof window.updateDateText === 'function') {
        window.updateDateText(zielDatum);
    }
    
    // UI Feedback
    document.body.style.opacity = "0.7"; 
    
    // 2. Timer: Overlay erst nach 300ms zeigen
    const timer = setTimeout(() => {
        if (overlay) overlay.classList.add('is-visible');
    }, 300); 

    try {
        // Sicherstellen, dass loadPlan existiert
        if (typeof loadPlan === 'function') {
            await loadPlan(); 
        } else {
            console.error("loadPlan ist keine Funktion!");
        }
    } catch (e) {
        console.error("Fehler beim Laden:", e);
        alert("Der Plan konnte nicht geladen werden. Bitte versuche es erneut.");
    } finally {
        // 3. Immer aufräumen
        clearTimeout(timer);
        if (overlay) overlay.classList.remove('is-visible');
        document.body.style.opacity = "1";
        
        // WICHTIG: Sperre IMMER aufheben, egal was passiert
        window.isNavigating = false;

        if (typeof updateNavButtons === 'function') {

function prepareUpdateData(slotId, neueHalle, neueKlasse, neuesMaterial, neuerKommentar) {
    // Wir holen uns die Basis-Daten des Slots, falls vorhanden
    // 'plan' ist das Objekt, das wir beim Laden vom Server erhalten haben
    const aktuellerSlot = (window.currentPlan && window.currentPlan[slotId]) ? window.currentPlan[slotId] : {};

    // Logik: Nutze den neuen Wert, falls vorhanden, sonst den alten aus dem Speicher
    const updateObj = {
        slot: slotId,
        klasse: (neueKlasse !== undefined) ? neueKlasse : (aktuellerSlot.klasse || ""),
        halle: (neueHalle !== undefined) ? neueHalle : (aktuellerSlot.halle || ""),
        material: (neuesMaterial !== undefined) ? neuesMaterial : (aktuellerSlot.material || ""),
        kommentar: (neuerKommentar !== undefined) ? neuerKommentar : (aktuellerSlot.kommentar || "")
    };

    console.log(`🛠 Update-Daten für Slot ${slotId} vorbereitet:`, updateObj);
    return updateObj;
}

window.starteAbklebenWorkflow = function(time, slot, klasse) {
    const modalContainer = document.querySelector('.eigenesmenu-container');
    if (!modalContainer) return;

    const currentSlot = parseInt(slot);
    const aktuelleHalle = (window.lastPlanData && window.lastPlanData[currentSlot]?.halle) || "";

    const nextSlot = currentSlot + 5;
    const prevSlot = currentSlot - 5;
    const nextSlotData = (window.lastPlanData && window.lastPlanData[nextSlot]) || {};
    const prevSlotData = (window.lastPlanData && window.lastPlanData[prevSlot]) || {};

    let partnerSlot = null;
    if (nextSlotData.klasse === klasse && nextSlotData.halle === aktuelleHalle) partnerSlot = nextSlot;
    else if (prevSlotData.klasse === klasse && prevSlotData.halle === aktuelleHalle) partnerSlot = prevSlot;

    // 1. Direkt zum Security Check, wenn keine Doppellektion
    if (!partnerSlot) {
        window.slotsToClear = [currentSlot];
        window.zeigePasswortFuerAbkleben(klasse, time, slot, false);
        return;
    }

    // 2. Header im orangenen "Zielflaggen"-Design

window.fuehreAbklebenAus = async function(klasse) {
    const pwFeld = document.getElementById('abkleben-pw-field');
    const deleteBtn = document.getElementById('btn-final-perma-delete');
    
    if (!pwFeld?.value.trim()) { alert("Bitte Passwort eingeben!"); return; }
    if (pwFeld.value.trim() !== userPw) {
        pwFeld.style.borderColor = "#c0392b";
        pwFeld.value = "";
        pwFeld.placeholder = "Falsches Passwort!";
        return;
    }

    if (deleteBtn) {
        deleteBtn.innerHTML = '<div class="eigenesmenu-loader" style="margin: 0 auto;"></div>';
        deleteBtn.style.pointerEvents = "none";
    }
    
    const gridContainer = document.querySelector('.stundentafel-container') || document.body;
    gridContainer.style.opacity = "0.6";
    gridContainer.style.pointerEvents = "none";

    const payload = {
        action: "permaDelete",
        pw: pwFeld.value.trim(),
        kuerzel: userKuerzel,
        klasse: klasse,
        slot: window.slotsToClear.join(","), 
        startDate: document.getElementById('datePicker').value
    };

    try {
        const response = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify(payload)
        });
        const result = await response.json();

        if (result.status === "success") {
            // SOFORT-FIX: Boxen über den Selektor .box mit dem passenden data-slot leeren
            window.slotsToClear.forEach(slot => {
                const box = document.querySelector(`.box[data-slot="${slot}"]`);
                if (box) {
                    box.innerHTML = "";            // Inhalt löschen
                    box.className = "box empty";   // CSS auf "leer" setzen (macht sie unklickbar)
                }
            });

            for (const s of window.slotsToClear) await window.triggerNewsWrapper("Abkleben", s, klasse);
            
            closeEditor();
            if (typeof syncPlan === 'function') syncPlan();
        } else {
            throw new Error(result.msg || "Fehler.");
        }
    } catch (e) {
        alert("Löschvorgang fehlgeschlagen: " + e.message);
        if (deleteBtn) {
            deleteBtn.innerHTML = '<span class="material-symbols-outlined">lock_open</span> JA, PERMANENT ABKLEBEN';
            deleteBtn.style.pointerEvents = "auto";
        }
    } finally {
        gridContainer.style.opacity = "1";
        gridContainer.style.pointerEvents = "auto";
    }
};

let meineRelevanteNews = []; 

/**
 * Initialisiert das News-System.
 */
async function initNewsSystem() {
    console.log("🚀 News-System wird initialisiert...");
    const aktuellerUser = typeof userKuerzel !== 'undefined' ? userKuerzel.toUpperCase().trim() : "";
    if (!aktuellerUser) return;

    try {
        const zielUrl = typeof url !== 'undefined' ? url : "";
        const pw = typeof userPw !== 'undefined' ? userPw : "";
        
        const response = await fetch(`${zielUrl}?action=getNews&pw=${encodeURIComponent(pw)}&t=${Date.now()}`);
        const data = await response.json();
        
        const allNews = data.news || (Array.isArray(data) ? data : []);

        meineRelevanteNews = allNews.filter(n => {
            const empfaenger = (n.empfaenger || "").toUpperCase();
            return empfaenger.split(',').map(e => e.trim()).includes(aktuellerUser);
        });

        updateNewsDot();
        
    } catch (e) { console.error("Fehler beim Init:", e); }
}

/**
 * Aktualisiert den roten Punkt (Badge).
 */
function updateNewsDot() {
    const aktuellerUser = typeof userKuerzel !== 'undefined' ? userKuerzel.toUpperCase().trim() : "";
    const dot = document.getElementById('news-dot');
    if (!dot) return;

    // Sicherstellen, dass wir die aktuellsten Daten aus dem Speicher oder der globalen Variable prüfen
    // Wenn 'meineRelevanteNews' eine globale Variable ist, wird sie hier verwendet:
    const hatUngelesene = meineRelevanteNews.some(n => {
        const gelesenListe = (n.gelesen || "").toUpperCase().split(',').map(s => s.trim());
        return !gelesenListe.includes(aktuellerUser);
    });

    dot.style.display = hatUngelesene ? 'block' : 'none';
}

/**
 * Zeigt die Sidebar sofort an, berechnet die Uhrzeit basierend auf dem Slot.
 */
window.showNews = function() {
    const sidebar = document.getElementById('newsSidebar');
    const newsContainer = document.getElementById('newsContent');
    const aktuellerUser = typeof userKuerzel !== 'undefined' ? userKuerzel.toUpperCase().trim() : "";
    const zeiten = ["07:15 - 08:00", "08:05 - 08:50", "08:55 - 09:40", "10:00 - 10:45", "10:50 - 11:35", "11:40 - 12:25", "12:50 - 13:35", "13:40 - 14:25", "14:30 - 15:15", "15:35 - 16:20", "16:25 - 17:10", "17:15 - 18:00"];

    sidebar.style.display = 'block';
    newsContainer.innerHTML = "";
    
    meineRelevanteNews.forEach(news => {
        const gelesenListe = (news.gelesen || "").toUpperCase().split(',').map(s => s.trim());
        const istGelesen = gelesenListe.includes(aktuellerUser);
        const rowIndex = Math.floor((parseInt(news.slot) - 1) / 5);
        const uhrzeit = zeiten[rowIndex] || "";

        let formatiertesDatum = news.datum || '';
        if (formatiertesDatum.includes('-')) {
            const parts = formatiertesDatum.split('-');
            if (parts.length === 3) formatiertesDatum = `${parts[2]}.${parts[1]}.${parts[0]}`;
        }

        const newsTextLower = (news.text || "").toLowerCase();
        let displayText = "";
        
        if (newsTextLower.includes("ausfall")) {
            displayText = `<b>${news.verfasser || ''}</b> hat einen <b>Ausfall</b> für die Klasse <b>${news.klasse || ''}</b> eingetragen!`;
        } else if (newsTextLower.includes("outdoor")) {
            displayText = `<b>${news.verfasser || ''}</b> ist mit der Klasse <b>${news.klasse || ''}</b> "outdoor"!`;
        } else if (newsTextLower.includes("badi")) { // <-- NEUE LOGIK
            displayText = `<b>${news.verfasser || ''}</b> ist mit der Klasse <b>${news.klasse || ''}</b> in der <b>Badi</b>!`;
        } else if (newsTextLower.includes("beendet") || newsTextLower.includes("abgeklebt")) {
            displayText = `<b>${news.verfasser || ''}</b> hat die Klasse <b>${news.klasse || ''}</b> abgeklebt!`;
        } else {
            displayText = news.text || '';
        }

        // --- ICON LOGIK ---
        const statusHtml = istGelesen 
            ? `<span class="material-symbols-outlined" style="vertical-align: middle; margin-right: 5px; color: #27ae60;">mark_email_read</span> Gelesen` 
            : `<span class="material-symbols-outlined" style="vertical-align: middle; margin-right: 5px; color: #e67e22;">mail</span> Neu`;

        const card = document.createElement('div');
        card.className = `news-item ${istGelesen ? 'news-gelesen' : 'news-unread'}`;
        card.innerHTML = `
            <div class="news-header">
                <span class="status-icon">${statusHtml}</span>
            </div>
            <div style="color: #ff9800; font-weight: bold; margin-bottom: 5px; font-size: 1.05em;">Halle frei!</div>
            <div class="news-text" style="font-size: 0.95em;">${displayText}</div>
            <div style="font-size: 0.75rem; color: #888; margin-top: 10px; border-top: 1px solid #333; padding-top: 5px;">
                ${formatiertesDatum} | ${uhrzeit}
            </div>
        `;
        card.onclick = () => markAsReadAndJump(news);
        newsContainer.appendChild(card);
    });

    setTimeout(() => sidebar.classList.add('active'), 10);
    updateNewsDot();
};


    
/**
 * Öffnet die Zentrale und aktualisiert im Hintergrund die Daten.
 */
window.refreshAndShowNews = function() {
    // A: Sofort anzeigen
    showNews();
    
    // B: Hintergrund-Sync
    fetch(`${url}?action=getNews&pw=${encodeURIComponent(userPw)}&t=${Date.now()}`)
        .then(res => res.json())
        .then(data => {
            const allNews = data.news || (Array.isArray(data) ? data : []);
            const aktuellerUser = userKuerzel.toUpperCase().trim();
            meineRelevanteNews = allNews.filter(n => {
                const empfaenger = (n.empfaenger || "").toUpperCase();
                return empfaenger.split(',').map(e => e.trim()).includes(aktuellerUser);
            });
            
            // Falls Sidebar noch offen ist, neu rendern
            if(document.getElementById('newsSidebar').classList.contains('active')) {
                showNews();
            }
            updateNewsDot();
        })
        .catch(e => console.error("Hintergrund-Update fehlgeschlagen:", e));
};

async function markAsReadAndJump(news) {
    const user = typeof userKuerzel !== 'undefined' ? userKuerzel.toUpperCase().trim() : "";
    
    // 1. LOKALES DATEN-UPDATE
    const newsInListe = meineRelevanteNews.find(n => n.id === news.id);
    if (newsInListe) {
        if (!newsInListe.gelesen) newsInListe.gelesen = "";
        if (!newsInListe.gelesen.includes(user)) {
            newsInListe.gelesen = newsInListe.gelesen ? `${newsInListe.gelesen},${user}` : user;
        }
    }
    
    // 2. Sofortige UI-Reaktion
    const clickedCard = event.currentTarget;
    clickedCard.style.opacity = "0.4";
    clickedCard.style.pointerEvents = "none";
    clickedCard.querySelector('.status-icon').innerHTML = 
        `<span class="material-symbols-outlined" style="vertical-align: middle; margin-right: 5px; color: #27ae60;">mark_email_read</span> Gelesen`;

    // 3. UI-Badge sofort aktualisieren
    updateNewsDot(); 

    // 4. Server-Update im Hintergrund
    fetch(url, {
        method: "POST",
        body: JSON.stringify({ action: "markAsRead", id: news.id, user: user, pw: userPw })
    }).catch(e => console.error("Fehler beim Markieren:", e));

    window.closeNews();

    // 5. Bedingte Navigation (Hier wird das Datum frisch aus dem DOM geholt)
    if (news.datum) {
        const pickerValue = document.getElementById('datePicker').value;
        if (pickerValue !== news.datum) {
            await changeDayAndLoad(news.datum);
        }
    }

    // 6. Scrollen & Blinken
    setTimeout(() => {
        const box = document.querySelector(`[data-slot="${news.slot}"]`); 
        if (box) {
            box.scrollIntoView({ behavior: 'smooth', block: 'center' });
            box.classList.add('blink-animation');
            setTimeout(() => box.classList.remove('blink-animation'), 4000);
        }
    }, 200); 
}

    
window.closeNews = () => {
    const sidebar = document.getElementById('newsSidebar');
    sidebar.classList.remove('active');
    setTimeout(() => {
        sidebar.style.display = 'none';
        updateNewsDot();
    }, 300);
};

/**
 * Wrapper für den News-Trigger
 * Nimmt nun optional das kuerzel entgegen, um es an triggerNews weiterzureichen.
 */
window.triggerNewsWrapper = async function(aktion, slot, klasse, kuerzel) {
    if (typeof triggerNews !== "function") return;
    
    try {
        const aktionLower = aktion.toLowerCase();
        let newsTyp = "";

        if (aktionLower.includes("outdoor")) {
            newsTyp = "outdoor";
        } else if (aktionLower.includes("badi")) {
            newsTyp = "badi";
        } else if (aktionLower === "beendet" || aktionLower === "abgeklebt") {
            newsTyp = "beendet";
        }

        // Wir übergeben das Kürzel als 4. Argument an die Funktion triggerNews
        await triggerNews(newsTyp, parseInt(slot), klasse, kuerzel);
    } catch (error) { 
        console.error("Fehler im News-Ablauf:", error); 
    }
};

window.lastCustomMaterial = ""; 

function handleCustomMaterialInput(val) {
    const wrapper = document.getElementById('custom-material-wrapper');
    const check = document.getElementById('custom-check');
    const footer = document.getElementById('material-fixed-footer');

    // 1. Entferne altes eigenes Material aus der Auswahl-Liste

        wrapper.style.borderColor = "#444";
        check.innerText = "○";
        check.style.color = "#666";

/**
 * Logik für Standard-Button-Auswahl
 * Steuert die Markierung der Materialien und die Sichtbarkeit des dynamischen Footers
 */
function toggleMaterialSelection(mat, btn) {
    // 1. Kontext finden: Suche das Modal sicher
    const modal = btn.closest('#eigenesmenu-modal');
    const footer = modal ? modal.querySelector('#material-fixed-footer') : document.getElementById('material-fixed-footer');
    const customInput = modal ? modal.querySelector('#customMaterialInput') : document.getElementById('customMaterialInput');
    
    // 2. Button-Element und Check-Indikator
    const check = btn.querySelector('.check-indicator');
    
    // 3. Klasse "selected" umschalten
    const isSelected = btn.classList.toggle('selected');
    
    // 4. Auswahl-Array aktualisieren
    if (isSelected) {
        // Hinzufügen (mit Duplikat-Schutz)
        if (!window.selectedMaterials.includes(mat)) {
            window.selectedMaterials.push(mat);
        }
        if (check) {
            check.innerText = "●";
            check.style.color = "#e67e22";
        }
        btn.style.borderColor = "#e67e22";
        btn.style.backgroundColor = "#2d2015"; // Optional: Leichtes Highlight für den Button
    } else {
        // Entfernen
        window.selectedMaterials = window.selectedMaterials.filter(m => m !== mat);
        if (check) {
            check.innerText = "○";
            check.style.color = "#666";
        }
        btn.style.borderColor = "#444";
        btn.style.backgroundColor = "#222"; // Zurück auf Standard
    }

    // 5. Footer Steuerung
    // Wir prüfen explizit die Längen und den Input-Wert
    if (footer) {
        const hasCustomInput = customInput && customInput.value.trim().length > 0;
        const shouldShow = (window.selectedMaterials.length > 0 || hasCustomInput);
        
        // Toggle der Klasse für die CSS-Sichtbarkeit
        footer.classList.toggle('is-visible', shouldShow);
        
        // Debug
        console.log("Toggle Status - Sichtbar:", shouldShow, "Materialien:", window.selectedMaterials);
    }
}

async function saveMaterialSelection(mat, detail, time, slot, klasse, btn) {
    // 1. Gezielte Button-Blockierung statt Fenster-Blockierung
    if (btn) {
        btn.style.pointerEvents = "none";
        btn.style.opacity = "0.6";
        btn.innerHTML = `<span class="material-symbols-outlined">trolley</span> Speichere...`;
    }

    // 2. Hole den aktuellen Stand des Slots
    const currentSlotData = (window.lastPlanData && window.lastPlanData[slot]) ? window.lastPlanData[slot] : {};

    // 3. Erstelle das Payload
    const payload = {
        action: "saveBooking",
        pw: typeof userPw !== 'undefined' ? userPw : "",
        id: `${document.getElementById('datePicker')?.value}_${slot}`,
        date: document.getElementById('datePicker')?.value,
        slot: slot,
        klasse: klasse || "",
        ...currentSlotData, 
        material: mat,
        materialDetail: detail || "",
        halle: currentSlotData.halle || ""
    };

    const onCompleteVisuals = (p) => {
        // Button wieder freigeben
        if (btn) {
            btn.style.pointerEvents = "auto";
            btn.style.opacity = "1";
        }

        const s = p.slot;
        
        // Lokale Datenstruktur aktualisieren
        if (window.lastPlanData) {
            if (!window.lastPlanData[s]) window.lastPlanData[s] = {};
            window.lastPlanData[s] = {
                ...window.lastPlanData[s],
                material: p.material,
                materialDetail: p.materialDetail
            };
        }

        const box = document.querySelector(`[data-slot="${s}"]`);
        if (box) markBoxWithMaterialIcon(box, p.material, p.materialDetail);
        
        if (s === slot && typeof closeEditor === 'function') closeEditor();
    };

    if (typeof window.prozessiereAktion === 'function') {
        window.prozessiereAktion(payload, onCompleteVisuals);
    } else {
        onCompleteVisuals(payload);
    }
}

window.handleMenuChoice = function(action, time, slot, klasse) {
    console.log("Aktion gewählt:", action); 

    switch(action) {
        case 'reservation':
            // Öffnet die Hallenauswahl direkt im bestehenden Menü-Container
            handleReservationUI(time, slot, klasse);
            break;
            
        case 'material':
            const activeModal = document.getElementById('eigenesmenu-modal');
            if (typeof handleMaterialUI === 'function') {
                handleMaterialUI(time, slot, klasse, activeModal);
            }
            break;

        case 'ausfall':
            // Wir prüfen den aktuellen Status direkt an der Box
            const istBereitsAusfall = window.currentEditBox ? window.currentEditBox.classList.contains('ausfall-mode') : false;
            // Wir nutzen den Button-Trigger aus dem DOM für den Loader
            const btn = document.querySelector('.eigenesmenu-item:nth-child(3)'); 
            if (typeof handleAusfallClick === 'function') {
                handleAusfallClick(istBereitsAusfall ? 'LOESCHEN' : 'SETZEN', time, slot, klasse, btn);
            }
            break;

       case 'beendet':
            // 🔥 NEU: Kein separates Modal mehr aufwerfen!
            // Wir starten direkt den einheitlichen Dynamic-Workflow im selben Taskmanager-Modal
            window.starteAbklebenWorkflow(time, slot, klasse);
            break;

        case 'nachricht':
            // 🔥 NEU: Kein prompt() mehr! Wir laden das UI direkt ins Modal
            window.handleNotizUI(time, slot, klasse);
            break;
            
        default:
            console.warn("Unbekannte Aktion im Task Manager:", action);
    }
};
    

window.handleAusfallClick = function(mode, time, slot, klasse, btn) {

    const zielHalle = (mode === 'LOESCHEN') ? "" : "Ausfall";

        action: "saveBooking",

        kuerzel: userKuerzel,

        halle: zielHalle

    // Callback: Wird aufgerufen, wenn der Server die Änderung bestätigt hat

                    targetBox.style.backgroundColor = "";
                }
            }

    };

    // UI-Loader & Button-Blockierung statt Fenster-Blockierung
    if (btn) {

const rowIndex = Math.floor((currentSlot - 1) / 5);
const startSlot = (rowIndex * 5) + 1;

/**

 */
window.speichereNotizVomModal = async function(slot, klasse) {
    const textFeld = document.getElementById('notiz-text-feld');
    const saveBtn = document.getElementById('btn-save-notiz');
    if (!textFeld) return;

    const notizText = textFeld.value.trim();
    const dateVal = document.getElementById('datePicker').value;

    if (saveBtn) {
        saveBtn.innerHTML = '<div class="eigenesmenu-loader" style="margin: 0 auto;"></div>';
        saveBtn.style.pointerEvents = "none";
    }

    // 1. Hole das existierende Datenobjekt des Slots, um existierende Felder (wie "fix") zu erhalten
    const currentSlotData = (window.lastPlanData && window.lastPlanData[slot]) ? window.lastPlanData[slot] : {};

    // 2. Erstelle das Payload als Merge aus bestehenden Daten und den neuen Änderungen
    const payload = {
        action: "saveBooking",
        pw: userPw,
        kuerzel: userKuerzel,
        date: dateVal,
        slot: slot.toString(),
        klasse: klasse,
        ...currentSlotData,    // <--- WICHTIG: Erhält existierende Felder wie 'fix' (Spalte J)
        kommentar: notizText   // <--- Überschreibt/setzt nur den Kommentar neu
    };

    const onCompleteVisuals = function(p) {
        const n = p.kommentar;
        const s = p.slot;
        
        console.log("Triggere Sofort-Update für Notiz in Slot:", s);
        
        const box = document.querySelector(`[data-slot="${s}"]`);
        if (box) {
            box.setAttribute('data-notiz', n);

            const altesIcon = box.querySelector('.box-notiz-icon');
            if (altesIcon) altesIcon.remove();

            if (n !== "") {
                const neuesNotizIcon = document.createElement('span');
                neuesNotizIcon.className = 'box-notiz-icon';
                neuesNotizIcon.innerHTML = '<span class="material-symbols-outlined" style="color: #ff9800; font-size: 22px; line-height: 1;">stylus_note</span>';
                neuesNotizIcon.title = n;
                
                Object.assign(neuesNotizIcon.style, {
                    position: 'absolute',
                    top: '-2px',
                    left: '4px',
                    cursor: 'pointer',
                    zIndex: '5'
                });
                
                neuesNotizIcon.onclick = function(event) {
                    event.stopPropagation();
                    if (typeof showNotizDetailPopup === "function") {
                        showNotizDetailPopup(box.querySelector('.klasse-label')?.innerText || "", n);
                    }
                };
                box.appendChild(neuesNotizIcon);
            }
        }

        // Update der lokalen Datenstruktur unter Erhalt anderer Felder
        if (window.lastPlanData) {
            if (!window.lastPlanData[s]) window.lastPlanData[s] = {};
            // Auch hier nutzen wir den Merge für das lokale Objekt
            window.lastPlanData[s] = {
                ...window.lastPlanData[s],
                kommentar: n
            };
        }

        if (s === slot.toString() && typeof closeEditor === 'function') {
            closeEditor();
        }
    };

    if (typeof window.prozessiereAktion === "function") {
        window.prozessiereAktion(payload, onCompleteVisuals);
    }
};

/**
 * Der "Postbote": Sendet Daten an das Google Apps Script
 * Inklusive lokaler Entwicklungs-Weiche für VS Code (localhost)
 */
window.saveImmediately = async function(payload, options = {}) {
    const isLocal = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost';

    // 1. LOKALER MODUS (Simuliert den Erfolg ohne Server-Call)
    if (isLocal) {
        console.log("🎯 LOKALER MODUS: Speicherbefehl simuliert:", payload);
        
        // Führe News-Trigger lokal aus, damit das UI sofort reagiert
        runNewsTriggerLogic(payload);
        
        return { status: "success", msg: "Lokal erfolgreich simuliert" };
    }

    // 2. ONLINE-MODUS (Dein bestehender Produktions-Code)
    if (typeof url === 'undefined') {
        console.error("❌ saveImmediately abgebrochen: Die Variable 'url' ist nicht definiert!");
        return { status: "error", msg: "Skript-URL fehlt" };
    }

    if (!payload) {
        console.error("❌ saveImmediately abgebrochen: Kein Payload übergeben!");
        return { status: "error", msg: "Keine Daten übergeben" };
    }

    try {
        const response = await fetch(url, {
            method: "POST",
            body: JSON.stringify(payload),
            signal: options.signal
        });

        if (!response.ok) throw new Error(`HTTP-Fehler! Status: ${response.status}`);

        const result = await response.json();

        if (result.status === "success") {
            console.log("🎯 Speicherbefehl erfolgreich ausgeführt:", payload);
            runNewsTriggerLogic(payload);
            return result;
        } else {
            console.error("❌ Server meldete einen Fehler:", result.msg);
            return result;
        }
    } catch (e) {
        if (e.name === 'AbortError') throw e;
        console.error("❌ Kritischer Fehler:", e);
        return { status: "error", msg: e.toString() };
    }
};
   


/**
 * Mischt bestehende Daten mit neuen Änderungen
 * @param {string} slotID - Der Slot, der geändert wird
 * @param {object} newData - Nur die Felder, die sich ändern (z.B. { material: "..." })
 */
window.getMergedPayload = function(slotID, newData) {
    // 1. Hole das existierende Objekt (oder leeres Objekt als Fallback)
    const currentData = window.lastPlanData[slotID] || {};
    
    // 2. Mische alt und neu
    const mergedData = {
        ...currentData, // Nimmt alles, was schon da war (auch fix, klasse, time, etc.)
        ...newData      // Überschreibt nur die spezifischen neuen Felder
    };
    
    // 3. Gib das komplette Objekt zurück
    return {
        slot: slotID,
        data: mergedData
    };
};

    

/**
 * Interne Hilfsfunktion: Hält die News-Logik sauber
 */
function runNewsTriggerLogic(payload) {
    const action = payload.action || payload.mode;
    
    if (action === "saveBooking" && typeof triggerNews === "function") {
        const slotIndex = parseInt(payload.slot);
        const klasseName = payload.klasse || "";
        const halleWert = payload.halle ? payload.halle.toString().trim() : "";
        const userKuerzelInput = payload.kuerzel || (typeof userKuerzel !== 'undefined' ? userKuerzel : "System");

        if (halleWert === "") {
            triggerNews("", slotIndex, klasseName);
        } 
        else if (halleWert.includes("Outdoor")) {
            triggerNews("outdoor", slotIndex, klasseName);
        }
        else if (halleWert === "Beendet" || halleWert === "beendet") {
            console.log(`📢 AUTOMATISCHER NEWS-TRIGGER: Beendet durch ${userKuerzelInput} erkannt.`);
            triggerNews("beendet", slotIndex, klasseName, userKuerzelInput);
        }
    }
}








// Hilfsfunktion: Erkennt, ob der Partner-Slot dieselbe Klasse hat (JETZT ALS ECHTE ZAHLEN)
function getDoppellektionPartnerSlot(currentSlot) {
    const slot = parseInt(currentSlot, 10);
    if (isNaN(slot) || !window.lastPlanData) {
        console.warn("❌ Doppellektion-Abbruch: lastPlanData fehlt oder Slot ist NaN");
        return null;
    }
    
    // Tippfehler korrigiert: Variable heißt jetzt durchgehend "aktuellerDatenSatz"
    const aktuellerDatenSatz = window.lastPlanData[slot] || window.lastPlanData[slot.toString()];
    if (!aktuellerDatenSatz) {
        console.warn(`❌ Doppellektion-Abbruch: Keine Daten für Slot ${slot} in lastPlanData gefunden.`);
        return null;
    }
    
    const aktuelleKlasse = aktuellerDatenSatz.klasse ? aktuellerDatenSatz.klasse.toString().trim() : "";
    if (aktuelleKlasse === "" || aktuelleKlasse === "---") return null;

    const slotDanach = slot + 5;
    const slotDavor = slot - 5;

    const datenDanach = window.lastPlanData[slotDanach] || window.lastPlanData[slotDanach.toString()];
    const datenDavor = window.lastPlanData[slotDavor] || window.lastPlanData[slotDavor.toString()];

    const klasseDanach = (datenDanach && datenDanach.klasse) ? datenDanach.klasse.toString().trim() : "";
    const klasseDavor = (datenDavor && datenDavor.klasse) ? datenDavor.klasse.toString().trim() : "";

    console.group(`📊 Doppellektions-Analyse für Slot ${slot} (${aktuelleKlasse})`);
    console.log(`Prüfe Slot danach (+5 = ${slotDanach}): Gefundene Klasse: "${klasseDanach}"`);
    console.log(`Prüfe Slot davor (-5 = ${slotDavor}): Gefundene Klasse: "${klasseDavor}"`);
    console.groupEnd();

    if (klasseDanach === aktuelleKlasse) {
        console.log(`🎯 MATCH! Slot ${slotDanach} ist der Partner (Stunde danach).`);
        return slotDanach;
    }
    if (klasseDavor === aktuelleKlasse) {
        console.log(`🎯 MATCH! Slot ${slotDavor} ist der Partner (Stunde davor).`);
        return slotDavor;
    }

    return null;
}




/* ============================================================
   11. DOPPELLEKTIONS-ABFRAGE (Bereinigt, CSS-basiert & Echtzeit-Sync)
   ============================================================ */

window.prozessiereAktion = function(payload, onCompleteVisuals) {
    const partnerSlot = getDoppellektionPartnerSlot(payload.slot);
    const modalContainer = document.querySelector('.eigenesmenu-container');
    const subtitle = document.getElementById('dynamic-header-subtitle');

    // 1. Wenn kein Partner-Slot existiert oder Modal fehlt, direkt ausführen
    if (!partnerSlot || !modalContainer) {
        executePayloads([payload], (p) => {
            if (onCompleteVisuals) onCompleteVisuals(p);
            if (typeof syncPlan === 'function') syncPlan();
        });
        if (typeof closeEditor === "function") closeEditor();
        return;
    }

    // 2. Konflikt-Logik
    let partnerKonfliktKlasse = null;
    if (payload.halle && payload.halle.trim() !== "") {
        const rowIndex = Math.floor((partnerSlot - 1) / 5);
        const startSlot = (rowIndex * 5) + 1;
        const endSlot = startSlot + 4;

        for (let s = startSlot; s <= endSlot; s++) {
            if (s === partnerSlot) continue;
            const data = window.lastPlanData ? window.lastPlanData[s] : null;
            if (data && data.halle && data.halle.trim() !== "") {
                const belegte = data.halle.toLowerCase();
                const wunsch = payload.halle.toLowerCase();
                if (wunsch !== "" && (belegte.includes(wunsch) || wunsch.includes(belegte))) {
                    partnerKonfliktKlasse = data.klasse || "andere Belegung";
                    break;
                }
            }
        }
    }

    // 3. Untertitel aktualisieren
    if (subtitle) {
        subtitle.innerHTML = `Willst du die Aktion für die <b>gesamte Doppellektion</b> durchführen?`;
    }

    // 4. DOM-Säuberung & UI Aufbau
    const header = modalContainer.querySelector('.eigenesmenu-header');
    modalContainer.innerHTML = '';
    modalContainer.appendChild(header);

    let html = `
        <div class="eigenesmenu-liste" id="menu-options-list">
            <div class="doppel-abfrage-container">
                ${partnerKonfliktKlasse ? `
                    <div class="doppel-konflikt-box">
                        <span class="material-symbols-outlined">exclamation</span>
                        <div><strong>Auswahl für Doppellektion nicht möglich!</strong></div>
                    </div>
                ` : `
                    <button id="btn-doppel-beide" class="doppel-btn">
                        <span class="material-symbols-outlined">group</span> Für beide Lektionen
                    </button>
                `}
                <button id="btn-doppel-einzel" class="doppel-btn">
                    <span class="material-symbols-outlined">person</span> Nur für eine Lektion
                </button>
            </div>
        </div>
    `;

    const backFn = (payload.origin === 'handleReservationUI') 
        ? `window.handleReservationUI('${payload.time}', '${payload.slot}', '${payload.klasse}')` 
        : `window.openEditor(window.currentEditBox, '${payload.time}', '${payload.slot}', '${payload.klasse}')`;

    html += renderFooter([
        { text: 'ZURÜCK', class: 'back', icon: 'arrow_back', onclick: backFn },
        { text: 'ABBRECHEN', class: 'cancel', icon: 'close', onclick: 'closeEditor()' }
    ]);

    modalContainer.insertAdjacentHTML('beforeend', html);

    // 5. Wrapper für die Ausführung inkl. Echtzeit-Sync
    const executeMitSync = (payloads) => {
        executePayloads(payloads, (p) => {
            // Erst lokales UI-Update für den geklickten Slot
            if (onCompleteVisuals) onCompleteVisuals(p);
            // Danach Sofort-Sync für alle Nutzer im Plan
            if (typeof syncPlan === 'function') syncPlan();
        });
        if (typeof closeEditor === "function") closeEditor();
    };

    // 6. Event Listener
    const btnBeide = document.getElementById('btn-doppel-beide');
    if (btnBeide) {
        btnBeide.onclick = () => executeMitSync([payload, { ...payload, slot: partnerSlot.toString() }]);
    }
    
    const btnEinzel = document.getElementById('btn-doppel-einzel');
    if (btnEinzel) {
        btnEinzel.onclick = () => executeMitSync([payload]);
    }
};



    
    
// Interne Hilfsfunktion, die die Payloads nacheinander an saveImmediately übergibt
function executePayloads(payloadArray, onCompleteVisuals) {
    payloadArray.forEach(p => {
        // Sync-Schutz
        if (window.syncBlockierteSlots) {
            window.syncBlockierteSlots[p.slot] = true;
        }

        // Visuelles UI-Update sofort triggern
        if (typeof onCompleteVisuals === "function") {
            onCompleteVisuals(p); 
        }

        // 3. Abschicken
        saveImmediately(p)
            .then(result => {
                if (result && result.status === "success") {
                    // --- HIER: NEWS NUR BEI ERFOLG AUSLÖSEN ---
                    // Wir prüfen, ob im Payload eine Hallen-Info steckt, die News auslöst
                    if (p.halle === "Ausfall" || (p.halle && p.halle.includes("Outdoor"))) {
                        window.triggerNewsWrapper(p.halle, p.slot, p.klasse);
                    }
                    
                    setTimeout(() => {
                        if (window.syncBlockierteSlots) delete window.syncBlockierteSlots[p.slot];
                    }, 2500);
                } else {
                    if (window.syncBlockierteSlots) delete window.syncBlockierteSlots[p.slot];
                    if (typeof syncPlan === "function") syncPlan();
                }
            })
            .catch(() => {
                if (window.syncBlockierteSlots) delete window.syncBlockierteSlots[p.slot];
                if (typeof syncPlan === "function") syncPlan();
            });
    });
}
