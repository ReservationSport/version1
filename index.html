<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservation Sport - BBZO1234</title>

   <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

 

<style>



/* 1. GLOBALE EINSTELLUNGEN & FONTS */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Oswald:wght@300;400;700&display=swap');


/* Globale Basis für einen cleanen Icon-Look */
.material-symbols-outlined {
  font-variation-settings:
  'FILL' 0,
  'wght' 300,
  'GRAD' 0,
  'opsz' 24;
  vertical-align: middle;
  margin-right: 8px; /* Sorgt für den sauberen Abstand zum Text */
  font-size: 20px;
}


/* ============================================================
   1. BASIS & GRID-STRUKTUR (Bild 2 Look)
   ============================================================ */
body { 
    font-family: 'Segoe UI', 'Oswald', sans-serif; 
    background: #1a1a1a; 
    color: white; 
    padding: 20px; 
    margin: 0;
}

:root {
    --accent-color: #e67e22;
    --highlight-orange: #ff8c00;
    --bg-dark: #1a1a1a;
    --card-bg: #262626;
}

/* Das Haupt-Grid */
#plan-container, .grid { 
    display: grid; 
    grid-template-columns: 120px repeat(5, 1fr); 
    gap: 2px; 
    max-width: 1000px; 
    margin: auto; 
}


/* ============================================================
   2. NAVIGATION & STICKY CONTROLS
   ============================================================ */
.date-control {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 1000px;
    margin: 0 auto;
    padding: 10px 0;
    background: #1a1a1a;
    position: sticky;
    top: 0;
    z-index: 1100;
}

.nav-section { display: flex; align-items: center; gap: 10px; }
.nav-left { flex: 1; justify-content: flex-start; }
.nav-center { flex: 2; justify-content: center; gap: 8px; }
.nav-right { flex: 1; justify-content: flex-end; }

.nav-group { display: flex; gap: 5px; }

/* Buttons & Picker */
.nav-btn, .refresh-btn, #datePicker { 
    height: 40px; 
    background: #333; 
    border: 1px solid #444; 
    color: white; 
    border-radius: 4px; 
    box-sizing: border-box;
    display: flex;
    align-items: center;
    justify-content: center;
}

.nav-btn { width: 40px; cursor: pointer; }
.nav-btn:hover { background: #444; }
.nav-btn-hidden { visibility: hidden !important; pointer-events: none; }

#datePicker { padding: 0 10px; cursor: pointer; font-family: inherit; }

.refresh-btn { color: #e67e22; width: 40px; font-size: 18px; cursor: pointer; }
.refresh-btn:hover { color: #ff9f43; background: #444; }
.refresh-btn:active i { animation: spin-once 0.5s ease-in-out; }

/* News Button Premium Style */
.news-btn-premium {
    position: relative;
    display: flex;
    align-items: center;
    background: #2a2a2a;
    border: 1px solid #444;
    border-radius: 6px;
    padding: 6px 15px;
    cursor: pointer;
    height: 40px;
}
.news-btn-premium:hover { background: #333; border-color: #e67e22; }
.news-btn-premium .btn-text {
    color: #fff; font-size: 13px; letter-spacing: 2px; margin-right: 10px; font-weight: 300;
}
.news-btn-premium .badge {
    position: absolute; top: -3px; right: -3px; width: 9px; height: 9px;
    background: #e67e22; border-radius: 50%; border: 1px solid #1a1a1a;
    box-shadow: 0 0 8px rgba(230, 126, 34, 0.6);
}

/* ============================================================
   3. BOXEN & ZELLEN-DESIGN
   ============================================================ */
.box { 
    border: 1px solid #444; 
    padding: 5px; 
    background: #262626; 
    min-height: 50px; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    justify-content: center; 
    text-align: center; 
    font-size: 11px; 
    position: relative; /* Wichtig für die absolute Positionierung der Icons */
    cursor: default; 
    overflow: hidden;
    transition: none !important;
}

.box.empty { pointer-events: none; opacity: 0.5; }
    
.zeit-box {
    background: #333;      /* Dasselbe dunkle Grau wie dein Header */
    color: #e67e22;       /* Dein Akzent-Orange für die Lesbarkeit */
    font-weight: bold;
    font-size: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    border: 1px solid #444; /* Dezente Trennung zwischen den Zeit-Boxen */
}

.header-row { 
    grid-column: span 6; 
    background: #333; 
    font-size: 14px; 
    font-weight: bold; 
    position: sticky; 
    top: 60px; 
    z-index: 1090; 
    height: 50px;
}

/* Deine Boxen (.is-mine) */
.box.is-mine { 
    border: 1px solid #e67e22 !important; 
    z-index: 10; 
    cursor: pointer; 
}
.box.is-mine:hover {
    background-color: rgba(230, 126, 34, 0.2) !important;
    box-shadow: inset 0 0 15px rgba(255, 159, 67, 0.4), 0 0 20px rgba(230, 126, 34, 0.3);
    transition: transform 0.2s ease; /* NUR hier die Animation, nicht global */
    transform: scale(1.03);
    z-index: 100;
}

/* 🔥 NEU: Das Notiz-Icon oben links in der Box (Gegenspieler zum Material-Paket) */
.box-notiz-icon {
    position: absolute;
    top: 4px;
    left: 4px;
    font-size: 1.35rem; /* 🔥 Deutlich größer (vorher 11px) */
    line-height: 1;
    z-index: 15;
    cursor: pointer; /* 🔥 Verwandelt das Fragezeichen in eine Klick-Hand */
    transition: transform 0.2s ease;
}

/* Wenn man direkt mit der Maus auf das Icon zeigt, wird es noch ein Stück größer */
.box-notiz-icon:hover {
    transform: scale(1.25) !important;
}

/* Lässt das Icon dezent mitreagieren, wenn die gesamte Box gehovertt wird */
.box.is-mine:hover .box-notiz-icon {
    transform: scale(1.1);
}

/* Inhalt der Boxen */
/* Klassenname */
.klasse-label { 
    font-weight: bold; 
    font-size: 14px; 
    color: #ffffff; 
}

/* Lehrer-Kürzel */
.lehrer-info { 
    font-size: 10px; 
    color: #bbbbbb; 
}

/* Hallen-Name */
.halle-label { 
    font-size: 10px; 
    color: #e67e22; 
    font-style: italic;
}

/* ============================================================
   4. TRENNLINIEN, LOADER & SPEZIAL-MODI
   ============================================================ */
.divider-thin { grid-column: 1 / span 6; height: 1px; background: #444; margin: 2px 0; }
.divider-thick { grid-column: 1 / span 6; height: 4px; background: #444; margin: 5px 0; }

.box.ausfall-mode { 
    background-color: #000 !important; 
    color: #777 !important; 
    background-image: linear-gradient(to top right, transparent calc(50% - 1px), #444, transparent calc(50% + 1px)), 
                      linear-gradient(to top left, transparent calc(50% - 1px), #444, transparent calc(50% + 1px)); 
}

.info-box {
    grid-column: span 6; font-size: 20px !important; padding: 40px !important;
    text-align: center; line-height: 1.5; color: #888; font-style: italic;
}

.global-loader { 
    position: fixed; left: 15px; top: 15px; width: 25px; height: 25px; 
    border: 3px solid #444; border-top: 3px solid #e67e22; border-radius: 50%; 
    animation: spin 1s linear infinite; display: none; z-index: 9999; 
}

/* ============================================================
   5. LOGIN-OVERLAY & CARD-DESIGN
   ============================================================ */
#loginOverlay { 
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
    background: radial-gradient(circle at center, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%), 
                url('https://raw.githubusercontent.com/ReservationSport/ReservationSport/refs/heads/main/Logo.png');
    background-size: cover; background-position: center; z-index: 20000; 
    display: flex; justify-content: center; align-items: center; 
    font-family: 'Inter', sans-serif; backdrop-filter: blur(18px); 
}

#loginOverlay.fade-out {
    opacity: 0;
    transition: opacity 0.5s ease;
    pointer-events: none;
}

.login-card {
    background: rgba(20, 20, 20, 0.7); padding: 50px 40px; border-radius: 28px;
    border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5); 
    width: 100%; max-width: 360px; text-align: center;
}

.login-card h2 { 
    color: #ffffff; font-size: 30px; margin-bottom: 35px; font-weight: 800; 
    letter-spacing: -1.5px; text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5); 
}

.login-card input { 
    padding: 16px 20px; margin: 10px 0; background: rgba(0, 0, 0, 0.4); 
    border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; border-radius: 14px; 
    width: 100%; font-size: 16px; outline: none; box-sizing: border-box; 
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.login-card input:focus { 
    border-color: #e67e22; background: rgba(0, 0, 0, 0.6); 
    box-shadow: 0 0 20px rgba(230, 126, 34, 0.2); 
}

/* ============================================================
   6. LOGIN-BUTTON (MORPHING-VERSION)
   ============================================================ */
.button-wrapper {
    height: 85px; 
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    margin-top: 25px;
}

#loginBtn { 
    padding: 18px; 
    background: linear-gradient(180deg, #ff9f43 0%, #e67e22 100%); 
    color: white; border: none; border-radius: 16px; cursor: pointer; width: 100%; 
    font-family: 'Oswald', sans-serif; font-size: 20px; font-weight: 700; 
    text-transform: uppercase; letter-spacing: 1.5px;
    box-shadow: 0 10px 20px -5px rgba(230, 126, 34, 0.5);
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    position: absolute; 
    z-index: 1;
    overflow: hidden;
}

#loginBtn:hover { transform: translateY(-3px); filter: brightness(1.1); }

/* Blitz-Effekt bleibt im Button */
#loginBtn::after {
    content: ''; position: absolute; top: 0; left: -150%; width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
    transform: skewX(-25deg); transition: 0.6s ease-in-out; z-index: 3;
}
#loginBtn:hover::after { left: 150%; }

/* DER MORPH-EFFEKT: Wird zum Spinner */
#loginBtn.is-loading {
    width: 60px !important;
    height: 60px;
    border-radius: 50% !important;
    color: transparent !important;
    pointer-events: none;
    background: #e67e22 !important;
    border: 4px solid rgba(255, 255, 255, 0.2);
    border-top: 4px solid #fff;
    animation: spin 0.8s linear infinite;
    box-shadow: none;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* Fehlertext Styling */
#loginError {
    color: #ff4757;
    font-size: 14px;
    margin-top: 15px;
    min-height: 20px;
    font-weight: 600;
}


/* ============================================================
   6. SIDEBAR & 8. NEWS-SIDEBAR (Von Links)
   ============================================================ */

#newsSidebar {
    position: fixed;
    top: 0;
    left: -350px;
    width: 320px;
    height: 100%;
    background: #111;
    border-right: 1px solid #333;
    z-index: 12000;
    box-shadow: 10px 0 30px rgba(0,0,0,0.5);
    padding: 20px;
    box-sizing: border-box;
    display: none;
    transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    overflow-y: auto; 
}

#newsSidebar.active { left: 0; }

/* Basis-Stile für die Karten */
.news-item {
    background: #1a1a1a;
    border: 1px solid #333;
    padding: 12px;
    border-radius: 6px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
}

/* 📥 UNGELESEN (news-unread) */
.news-item.news-unread {
    border-left: 4px solid #e67e22;
    background: #221a12;
}
.news-item.news-unread .status-icon { color: #e67e22; font-weight: bold; }

/* ⚪ GELESEN (news-gelesen) - Die graue Optik */
.news-item.news-gelesen {
    background: #151515 !important;
    border-left: 4px solid #444 !important;
    opacity: 0.7;
}
.news-item.news-gelesen .status-icon { color: #888; font-weight: normal; }

/* Hover-Effekt */
.news-item:hover { 
    border-color: #555;
    background: #222; 
}

.news-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 0.8em; }
.status-icon { font-size: 0.9em; text-transform: uppercase; letter-spacing: 0.5px; }
.news-text { margin: 6px 0; font-size: 0.95em; color: #eee; line-height: 1.4; }
    



/* ============================================================
   ANIMATIONEN & EFFEKTE
   ============================================================ */

/* Pulsieren des Benachrichtigungs-Punkts */
@keyframes pulseDot {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.4); opacity: 0.6; }
    100% { transform: scale(1); opacity: 1; }
}
.pulse-animation {
    animation: pulseDot 1.5s infinite ease-in-out;
}


    /* Blinken bei News-Sprung im Stundenplan */
@keyframes highlightBlink {
    0% { box-shadow: 0 0 0px #e67e22; border-color: transparent; }
    50% { box-shadow: 0 0 20px #e67e22; border-color: #e67e22; background-color: rgba(230, 126, 34, 0.2); }
    100% { box-shadow: 0 0 0px #e67e22; border-color: transparent; }
}

.blink-animation { 
    animation: highlightBlink 0.8s ease-in-out 4; 
}

    


/* ============================================================
   9. EIGENES KONTEXT-MENÜ (MATERIAL SYMBOLS OPTIMIZED)
   ============================================================ */

.eigenesmenu-backdrop {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    z-index: 10000;
    display: flex;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(8px);
    padding: 15px;
    opacity: 0;
    transition: opacity 0.3s ease;
}

.eigenesmenu-container {
    width: 100%;
    max-width: 380px;
    max-height: 90vh; 
    display: flex;
    flex-direction: column;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 16px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.8);
    overflow: hidden;
    transform: translateY(20px);
    transition: transform 0.3s ease-out;
}

.eigenesmenu-header {
    padding: 20px;
    background: #1a1a1a;
    border-bottom: 1px solid #333;
}

.eigenesmenu-header h3 {
    color: #e67e22;
    margin: 0;
    font-size: 1.1em;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.eigenesmenu-header p {
    color: #999;
    font-size: 12px;
    margin: 8px 0 0 0;
}

.eigenesmenu-liste {
    padding: 15px;
    overflow-y: auto;
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* --- OPTIMIERTER BUTTON MIT MATERIAL ICONS --- */
.eigenesmenu-item {
    position: relative;
    width: 100%;
    min-height: 52px;
    background: #262626;
    color: #eee;
    border: 1px solid #333;
    padding: 12px 50px 12px 18px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    text-align: left;
    transition: all 0.3s ease;
}

.eigenesmenu-item:hover:not(:disabled) {
    border-color: #e67e22;
    background: #2d2d2d;
    transform: translateX(5px);
}

/* Material Icon Styling im Menü */
.eigenesmenu-item .material-symbols-outlined {
    color: #e67e22;
    margin-right: 15px;
    font-size: 24px;
    flex-shrink: 0;
    transition: color 0.3s ease;
}

/* --- INLINE LOADER --- */
.eigenesmenu-loader {
    position: absolute;
    right: 18px;
    width: 18px;
    height: 18px;
    border: 2px solid rgba(230, 126, 34, 0.2);
    border-top: 2px solid #e67e22;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.eigenesmenu-cancel {
    width: 100%;
    background: #111;
    color: #555;
    border: none;
    border-top: 1px solid #222;
    padding: 15px;
    cursor: pointer;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: color 0.2s ease;
}

.eigenesmenu-cancel:hover {
    color: #888;
}

.btn-success-state {
    background: #1b4332 !important;
    border-color: #2d6a4f !important;
    color: #fff !important;
}


    
/* 10. MATERIAL-VISUALS & TOOLTIPS */
.material-icon {
    position: absolute; /* Absolut innerhalb der .box */
    top: 5px;
    right: 5px;
    color: #e67e22;
    font-size: 14px;
    z-index: 10;
    cursor: pointer !important;    /* FIX 1: Ändert das Fragezeichen zur Klick-Hand */
    pointer-events: auto !important; /* FIX 2: Garantiert, dass Klicks abgefangen werden */
    padding: 4px;                  /* Erleichtert das Treffen auf mobilen Geräten */
}

.material-icon::after {
    content: attr(data-tooltip);
    position: absolute;
    bottom: 125%;
    right: 0; /* Rechtsbündig mit dem Icon, damit es nicht links rausragt */
    background: rgba(40, 40, 40, 0.95);
    color: #fff;
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 11px;
    white-space: pre-wrap; /* Erlaubt Zeilenumbrüche bei langen Kommentaren */
    width: max-content;
    max-width: 150px;
    display: none;
    z-index: 1000;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    border: 1px solid #e67e22;
    pointer-events: none; /* Verhindert Flackern beim Drüberfahren */
}

@media (hover: hover) {
    .material-icon:hover::after { 
        display: block; 
    }
}

/* Material Info-Fenster (für Mobile-Klick) */
.material-info-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    display: flex; justify-content: center; align-items: center;
    z-index: 15000;
    backdrop-filter: blur(5px);
}

.material-info-content {
    background: #1a1a1a;
    border: 1px solid #444;
    border-radius: 12px;
    padding: 25px;
    width: 85%; max-width: 320px;
    text-align: center;
}


/* --- CONTAINER FÜR DIE MITTIGE AUSRICHTUNG --- */
.details-mengen-content {
    display: flex;
    flex-direction: column;
    align-items: center; /* Zentriert alle inneren Elemente horizontal */
    width: 100%;
    box-sizing: border-box;
    padding: 10px 0;
}

/* --- DAS TEXTAREA-KOMMENTARFELD (JETZT MITTIG) --- */
.details-mengen-content textarea {
    width: 100%;
    max-width: 290px; /* Perfekte Breite für ein kompaktes Modal */
    height: 120px;
    background: #151515;
    border: 1px solid #333;
    color: #fff;
    border-radius: 8px;
    padding: 12px;
    box-sizing: border-box;
    resize: none;
    outline: none;
    font-family: sans-serif;
    margin: 0 auto 20px auto; /* Zentriert sich selbst im Fluss + Abstand unten */
    transition: border-color 0.2s ease;
}

.details-mengen-content textarea:focus {
    border-color: #d35400; /* Edles, mattes Orange beim Tippen */
}

/* --- DER SPEICHER-BUTTON (MATT & DEZENT, RECHTS PLATZ FÜR LOADER) --- */
#btn-save-reservation,
.btn-save-reservation {
    width: 100%;
    max-width: 290px;
    padding: 14px 18px; /* Standard-Polsterung */
    background: #b84a00; /* Sattes, mattes Ziegel-Orange (nicht grell) */
    color: #fff;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    letter-spacing: 0.5px;
    font-size: 0.95rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative; /* Wichtig für die absolute Positionierung des Loaders */
    transition: all 0.2s ease;
    margin: 0 auto;
}

#btn-save-reservation:hover,
.btn-save-reservation:hover {
    background: #a04000; /* Etwas dunkler beim Draufzeigen */
}

/* --- INLINE-LOADER AUS DEINER FUNKTION RECHTS POSITIONIEREN --- */
.inline-loader-container {
    position: absolute;
    right: 18px; /* Fixiert den Loader am rechten Rand des Buttons */
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    align-items: center;
}

/* --- DER ZURÜCK-BUTTON --- */
.btn-back-link {
    background: none;
    border: none;
    color: #666;
    text-transform: uppercase;
    font-weight: bold;
    font-size: 0.85rem;
    letter-spacing: 1px;
    cursor: pointer;
    margin-top: 15px;
    transition: color 0.2s ease;
}

.btn-back-link:hover {
    color: #aaa;
}


    

  /* ============================================================
   11. SPEZIAL-MODAL: MODERNES ORANGE-DESIGN FOR RESET
   ============================================================ */

/* Das Eingabefeld für das Passwort */
#modal-reset-password {
    width: 100%;
    padding: 12px;
    background: #000 !important;
    border: 1px solid #ff9800 !important; /* Unser neues Orange */
    color: #fff !important;
    border-radius: 8px !important;
    text-align: center;
    font-size: 1.1rem !important;
    letter-spacing: 4px;
    outline: none;
    box-sizing: border-box;
    box-shadow: inset 0 0 10px rgba(255, 152, 0, 0.1);
    transition: all 0.2s ease-in-out;
}

#modal-reset-password:focus {
    border-color: #f57c00 !important;
    box-shadow: 0 0 12px rgba(255, 152, 0, 0.4), inset 0 0 10px rgba(255, 152, 0, 0.2) !important;
}

/* Gemeinsame Basis für die Knöpfe im Modal */
.reset-modal-btn {
    padding: 12px 20px;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 1;
    margin: 0;
    transition: all 0.2s ease-in-out;
}

/* ORANGE LOOK: JA, ABKLEBEN */
#btn-confirm-reset {

<script>

/* ============================================================
   3. LOGIN-LOGIK (Optimiert & Sicher)
   ============================================================ */

async function handleLogin() {
    const btn = document.getElementById('loginBtn');
    const errorDiv = document.getElementById('loginError');
    const dp = document.getElementById('datePicker');
    const loginOverlay = document.getElementById('loginOverlay');
    const loadingOverlay = document.getElementById('loadingOverlay');
    
    const kuerzelVal = document.getElementById('userKuerzel').value.trim().toLowerCase();
    const pwVal = document.getElementById('pw').value;

    if (!kuerzelVal) { 
        errorDiv.innerText = "Kürzel fehlt!"; 
        return; 
    }

    // 1. Button morpht zum Spinner
    btn.classList.add('is-loading');
    errorDiv.innerText = "";

    try {
        const response = await fetch(`${url}?mode=login&pw=${encodeURIComponent(pwVal)}&kuerzel=${encodeURIComponent(kuerzelVal)}`);
        const json = await response.json();

        // SICHERHEITSPRÜFUNG: Basierend auf deiner Server-Antwort
        // Wir prüfen, ob status NICHT "success" ist.
        if (json.status !== "success") {
            errorDiv.innerText = json.msg || "Login fehlgeschlagen!";
            btn.classList.remove('is-loading');
            return; // HIER WIRD JEDER ZUGRIFF GESTOPPT
        }

        // ZUTRITT GEWÄHRT
        userPw = pwVal;
        userKuerzel = kuerzelVal;
        
        // 2. Overlay zeigen
        loadingOverlay.classList.add('is-visible');
        
        // 3. Login-Karte ausblenden
        loginOverlay.classList.add('fade-out');
        await new Promise(resolve => setTimeout(resolve, 500));
        loginOverlay.style.display = 'none';
        
        // 4. UI-Elemente vorbereiten
        const newsContainer = document.getElementById('news-btn-container');
        if(newsContainer) newsContainer.style.display = 'block';
        
        await initNewsSystem();
        await changeDayAndLoad(dp.value);

        // Fertig: Loading-Overlay entfernen
        loadingOverlay.classList.remove('is-visible');

        // 5. Hintergrund-Sync
        setInterval(async () => {
            if (document.visibilityState === 'visible') {
                await syncPlan();
                await initNewsSystem(); 
            }
        }, 30000); 

    } catch (e) {
        errorDiv.innerText = "Verbindung fehlgeschlagen.";
        btn.classList.remove('is-loading');
        
        // Sicherstellen, dass das Overlay bei Fehler nicht hängen bleibt
        loadingOverlay.classList.remove('is-visible');
        loginOverlay.classList.remove('fade-out');
        loginOverlay.style.display = 'flex';
        console.error("Login Error:", e);
    }
}

/* ============================================================
   HILFSFUNKTION: Slot-Index zu Daten-Mapping
   ============================================================ */
function getDataBySlotIndex(index) {
    // Wir ziehen 1 ab, damit wir intern mit 0-basiertem Index rechnen (1 -> 0)
    const korrigierterIndex = index - 1;

    // Da wir nur die 5 Wochentage zählen (ohne die Zeitspalte):
    const spaltenProWoche = 5; 
    
    // Berechne die Zeile (Stunde)
    // Wir addieren 1 bei der Zeile, falls currentPlanData[0] der Header ist
    const zeile = Math.floor(korrigierterIndex / spaltenProWoche) + 1;
    
    // Berechne die Spalte (Tag)
    // Wir addieren 1, um die Zeitspalte (Index 0) zu überspringen
    const spalte = (korrigierterIndex % spaltenProWoche) + 1;

    console.log(`Slot ${index} -> Suche in currentPlanData[Zeile ${zeile}][Spalte ${spalte}]`);

    if (currentPlanData[zeile] && currentPlanData[zeile][spalte]) {
        return currentPlanData[zeile][spalte];
    }
    return null;
}
    
    /* ============================================================
       4. SICHERHEITSABFRAGE (Falls doch mal was hängt)
       ============================================================ */
    
    window.addEventListener('beforeunload', (e) => {
        if (isSaving) { 
            e.preventDefault(); 
            e.returnValue = 'Änderungen werden noch gespeichert...'; 
        }
    });

    // Hilfsfunktion: Loader anzeigen/verstecken
    function toggleLoader(show) {
        isSaving = show;
        document.getElementById('global-loader').style.display = show ? 'block' : 'none';
    }


/* ============================================================
   5. DATUMSSTEUERUNG & NAVIGATION

    /**
     * Ändert das Datum im Picker und lädt den Plan neu
     */
   /**
     * Ändert das Datum im Picker und lädt den Plan neu
     */
    window.changeDate = (days) => {
        const dp = document.getElementById('datePicker');
        
        // 1. Datum lokal aus dem String parsen
        const [year, month, day] = dp.value.split('-').map(Number);
        let d = new Date(year, month - 1, day);
        
        // 2. Berechnung
        d.setDate(d.getDate() + days);
        
        // 3. Verhindert das Navigieren vor das heutige Datum
        const heute = new Date();
        heute.setHours(0, 0, 0, 0);
        if (d < heute) d = heute;

        // 4. Lokal korrekt zurückformatieren (YYYY-MM-DD)
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const dayStr = String(d.getDate()).padStart(2, '0');
        const newDateStr = `${y}-${m}-${dayStr}`;
        
        // 5. UI aktualisieren
        dp.value = newDateStr;
        updateNavButtons();
        
        // 6. Zentralen Wrapper aufrufen
        changeDayAndLoad(newDateStr); 
    };


    
    /**
     * Setzt den Picker auf den heutigen Tag zurück
     */
   /**
     * Setzt den Picker auf den heutigen Tag zurück
     */
    window.goToToday = () => {
        const d = new Date();
        
        // Lokal das heutige Datum extrahieren
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const dayStr = String(d.getDate()).padStart(2, '0');
        const dateStr = `${y}-${m}-${dayStr}`;
        
        // Navigation-Buttons visuell aktualisieren
        updateNavButtons();
        
        // Zentralen Wrapper nutzen, um das Laden und das Overlay zu starten
        changeDayAndLoad(dateStr);
    };
    

    /**
     * Steuert die Sichtbarkeit der Buttons
     */
    function updateNavButtons() {
        // Dieser Bereich kann so bleiben, er ist logisch unabhängig vom Ladevorgang
        const dp = document.getElementById('datePicker');
        if (!dp || !dp.value) return;

        const pickerDate = new Date(dp.value.replace(/-/g, "/"));
        pickerDate.setHours(0, 0, 0, 0);

        const heute = new Date();
        heute.setHours(0, 0, 0, 0);

        const prevDayBtn = document.getElementById('prev-day');
        const allPrevBtns = document.querySelectorAll('.nav-group:first-child .nav-btn');

        if (prevDayBtn) {
            prevDayBtn.style.visibility = (pickerDate <= heute) ? 'hidden' : 'visible';
        }

        allPrevBtns.forEach(btn => {
            const onclickAttr = btn.getAttribute('onclick') || "";
            const isWeekBtn = onclickAttr.includes('-7');
            if (isWeekBtn) {
                const limitWoche = new Date(heute);
                limitWoche.setDate(heute.getDate() + 7);
                btn.style.visibility = (pickerDate < limitWoche) ? 'hidden' : 'visible';
            }
        });
    }


    
    /* ============================================================
       6. INITIALISIERUNG BEIM LADEN
       ============================================================ */

   document.addEventListener('DOMContentLoaded', () => { 
    // Heute-Einstellung
    const today = new Date(); 
    const offset = today.getTimezoneOffset(); 
    today.setMinutes(today.getMinutes() - offset); 
    const dateStr = today.toISOString().split('T')[0];
    
    const dp = document.getElementById('datePicker');
    dp.value = dateStr;
    dp.min = dateStr; 
    
    updateNavButtons();
    
    // HIER DIE ANPASSUNG:
    // Nutze den Wrapper, damit das Overlay auch beim ersten Start korrekt arbeitet
    changeDayAndLoad(dateStr); 
});


/* ============================================================
   7. STUNDENPLAN LADEN & GRID-GENERIERUNG (DB-Version)
   ============================================================ */

window.loadPlan = async function() {
    const dp = document.getElementById('datePicker');
    const container = document.getElementById('plan-container'); 
    
    // global-loader Aufrufe entfernt, da jetzt changeDayAndLoad das Overlay steuert
    const dateVal = dp.value;
    if (!userPw || !dateVal) return;

    container.innerHTML = ""; 
    
    if (typeof updateNavButtons === 'function') updateNavButtons();

    const dateObj = new Date(dateVal.replace(/-/g, "/")); 
    
    // Wochenende prüfen
    if (dateObj.getDay() === 0 || dateObj.getDay() === 6) { 
        container.innerHTML = `<div class="box info-box" style="grid-column: span 6; background: #333; color: #e67e22; padding: 40px; font-size: 1.2rem;">Mach mal Pause! Es ist Wochenende...</div>`; 
        return; 
    }

    try {
        const res = await fetch(`${url}?date=${dateVal}&pw=${userPw}&kuerzel=${userKuerzel}`);
        const json = await res.json();
        
        if (json.sperrMsg) {
            container.innerHTML = `<div class="box info-box" style="grid-column: span 6; background: #333; color: #e67e22; padding: 40px; font-size: 1.2rem;">${json.sperrMsg}</div>`;
            return; 
        }
        
        if (json.verfügbareMaterialien) {
            verfügbareMaterialien = json.verfügbareMaterialien;
        }
        
        const plan = json.plan; 
        window.lastPlanData = plan; 
        myClasses = json.userClasses || [];
        allClassTeachers = json.allClassTeachers || {};
        configFarben = {}; 
        if (json.options) json.options.forEach(opt => configFarben[opt[0]] = opt[1]);
        
        const wtArr = ["Sonntag", "Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag", "Samstag"];
        const [y, m, d] = dateVal.split('-').map(Number);
        const zeiten = ["07:15 - 08:00", "08:05 - 08:50", "08:55 - 09:40", "10:00 - 10:45", "10:50 - 11:35", "11:40 - 12:25", "12:50 - 13:35", "13:40 - 14:25", "14:30 - 15:15", "15:35 - 16:20", "16:25 - 17:10", "17:15 - 18:00"];

        let html = `<div class="box header-row" style="grid-column: span 6;"><span>${wtArr[dateObj.getDay()]}, ${d}.${m}.${y}</span></div>`;

        zeiten.forEach((zeitStr, rowIndex) => {
            if (rowIndex + 1 === 4 || rowIndex + 1 === 10) html += `<div class="divider-thin" style="grid-column: span 6;"></div>`;
            if (rowIndex + 1 === 7) html += `<div class="divider-thick" style="grid-column: span 6;"></div>`;
            html += `<div class="box zeit-box">${zeitStr}</div>`;
            
            for(let i = 1; i <= 5; i++) {
                const absoluteSlot = (rowIndex * 5) + i; 
                const slotData = plan[absoluteSlot] || {};
                const klasse = slotData.klasse || "";
                const halle = slotData.halle || "";
                const lehrer = slotData.lehrer || allClassTeachers[klasse] || "";
                const kommentar = slotData.kommentar || ""; 
                const isAusfall = (halle === "Ausfall");
                const canEdit = myClasses.some(c => klasse.trim().toLowerCase() === c.trim().toLowerCase() && klasse.trim() !== "");
                
                html += `
                <div class="box ${klasse.trim() === "" ? 'empty' : ''} ${!canEdit ? 'not-mine' : 'is-mine'} ${isAusfall ? 'ausfall-mode' : ''}" 
                        data-slot="${absoluteSlot}" data-time="${zeitStr}" data-notiz="${kommentar.replace(/"/g, '&quot;')}" 
                        style="background-color: ${isAusfall ? '' : (configFarben[halle] || '')}; cursor: ${canEdit ? 'pointer' : 'default'}">
                        <div class="klasse-label">${klasse}</div>
                        <div class="lehrer-info">${lehrer}</div>
                        <div class="halle-label">${halle}</div>
                </div>`;
            }
        });

        container.innerHTML = html;

        // Icons hinzufügen... (dein bestehender Code bleibt hier identisch)
        Object.keys(plan).forEach(slot => {
            const slotData = plan[slot] || {};
            const box = container.querySelector(`[data-slot="${slot}"]`);
            if (!box) return;

            if (slotData.material && slotData.material.trim() !== "") markBoxWithMaterialIcon(box, slotData.material, slotData.kommentar || "");

            if (slotData.kommentar && slotData.kommentar.trim() !== "") {
                const notizElement = document.createElement('span');
                notizElement.className = 'box-notiz-icon';
                notizElement.innerText = '📝';
                notizElement.title = slotData.kommentar; 
                notizElement.style.cursor = 'pointer';
                notizElement.onclick = (e) => { e.stopPropagation(); if (typeof showNotizDetailPopup === "function") showNotizDetailPopup(slotData.klasse || "", slotData.kommentar); };
                box.appendChild(notizElement);
            }
        });

    } catch(e) { 
        console.error("Fehler:", e); 
        container.innerHTML = `<div class="box info-box" style="color:red; grid-column: span 6;">Verbindungsfehler.</div>`;
    }
};


window.syncPlan = async function() {
    if (isSaving) return; 

    const dp = document.getElementById('datePicker');
    const container = document.getElementById('plan-container'); 
    
    try {
        const res = await fetch(`${url}?date=${dp.value}&pw=${userPw}&kuerzel=${userKuerzel}`);
        const json = await res.json();
        
        if (json.sperrMsg || !json.plan) return;
        
        if (json.verfügbareMaterialien) {
            verfügbareMaterialien = json.verfügbareMaterialien;
        }
        
        window.lastPlanData = json.plan; 
        
        Object.keys(json.plan).forEach(slot => {
            if (window.syncBlockierteSlots && window.syncBlockierteSlots[slot]) {
                console.log(`Sync blockiert: Slot ${slot} wird vom User editiert.`);
                return; 
            }

            const box = container.querySelector(`[data-slot="${slot}"]`);
            if (box) {
                const data = json.plan[slot] || {};
                const klasse = data.klasse || "";
                const halle = data.halle || "";
                const lehrer = data.lehrer || allClassTeachers[klasse] || "";
                const material = data.material || "";   
                const kommentar = data.kommentar || ""; 
                
                const hLabel = box.querySelector('.halle-label');
                if (hLabel) hLabel.innerText = halle;
                
                const kLabel = box.querySelector('.klasse-label');
                if (kLabel) kLabel.innerText = klasse;
                
                const lLabel = box.querySelector('.lehrer-info');
                if (lLabel) lLabel.innerText = lehrer;
                
                // data-notiz Attribut aktuell halten
                box.setAttribute('data-notiz', kommentar);

                if (halle === "Ausfall") {
                    box.classList.add('ausfall-mode');
                    box.style.backgroundColor = ""; 
                } else {
                    box.classList.remove('ausfall-mode');
                    box.style.backgroundColor = configFarben[halle] || "";
                }

                markBoxWithMaterialIcon(box, material, kommentar);

                // 🔥 REPARIERT IM BACKGROUND-SYNC: Altes Icon weg, neues dynamisches Popup-Icon her
                const altesNotizIcon = box.querySelector('.box-notiz-icon');
                if (altesNotizIcon) altesNotizIcon.remove();

                if (kommentar.trim() !== "") {
                    const neuesNotizIcon = document.createElement('span');
                    neuesNotizIcon.className = 'box-notiz-icon';
                    neuesNotizIcon.innerText = '📝';
                    neuesNotizIcon.title = kommentar;
                    neuesNotizIcon.style.cursor = 'pointer';
                    
                    neuesNotizIcon.onclick = function(event) {
                        event.stopPropagation();
                        if (typeof showNotizDetailPopup === "function") {
                            showNotizDetailPopup(klasse, kommentar);
                        }
                    };
                    
                    box.appendChild(neuesNotizIcon);
                }
            }
        });
    } catch(e) {
        console.error("Sync im Hintergrund fehlgeschlagen - Plan bleibt stabil:", e);
    }
};



// Variable außerhalb der Funktion definieren
let isNavigating = false; 

async function changeDayAndLoad(zielDatum) {
    // 1. Schutz gegen Doppel-Klicks
    if (isNavigating) return;
    isNavigating = true;

    const dp = document.getElementById('datePicker');
    const overlay = document.getElementById('loadingOverlay');
    
    // UI vorbereiten
    dp.value = zielDatum;
    document.body.style.opacity = "0.7"; 
    
    // 2. Timer: Overlay erst nach 300ms zeigen, um Flackern bei schnellen Servern zu vermeiden
    const timer = setTimeout(() => {
        overlay.classList.add('is-visible');
    }, 300); 

    try {
        await loadPlan(); 
    } catch (e) {
        console.error("Fehler beim Laden:", e);
        // Optional: Benutzer informieren
        alert("Der Plan konnte nicht geladen werden. Bitte versuche es erneut.");
    } finally {
        // 3. Immer aufräumen
        clearTimeout(timer);
        overlay.classList.remove('is-visible');

/**
 * Baut das Daten-Objekt für das Google Sheet Update.
 * WICHTIG: In der DB-Version schicken wir kein "Klasse | Halle" mehr,
 * sondern die reinen Werte, die das Backend dann in die richtigen Spalten schreibt.
 */
function prepareUpdateData(slotId, neueHalle, neueKlasse, neuesMaterial, neuerKommentar) {
    // Wir holen uns die Basis-Daten des Slots, falls vorhanden
    // 'plan' ist das Objekt, das wir beim Laden vom Server erhalten haben
    const aktuellerSlot = (window.currentPlan && window.currentPlan[slotId]) ? window.currentPlan[slotId] : {};

    // Logik: Nutze den neuen Wert, falls vorhanden, sonst den alten aus dem Speicher
    const updateObj = {
        slot: slotId,
        klasse: (neueKlasse !== undefined) ? neueKlasse : (aktuellerSlot.klasse || ""),
        halle: (neueHalle !== undefined) ? neueHalle : (aktuellerSlot.halle || ""),
        material: (neuesMaterial !== undefined) ? neuesMaterial : (aktuellerSlot.material || ""),
        kommentar: (neuerKommentar !== undefined) ? neuerKommentar : (aktuellerSlot.kommentar || "")
    };

    console.log(`🛠 Update-Daten für Slot ${slotId} vorbereitet:`, updateObj);
    return updateObj;
}

/**
 * PHASE 1: Schaltet den bestehenden Taskmanager dynamisch auf "Doppellektion" um,
 * falls eine solche in der Master-Matrix existiert.
 */
window.starteAbklebenWorkflow = function(time, slot, klasse) {
    console.log("Abkleben Workflow gestartet für:", klasse);
    
    const root = document.getElementById('eigenesmenu-modal');
    if (!root) return;

    const currentSlot = parseInt(slot);
    const aktuelleHalle = (window.lastPlanData && window.lastPlanData[currentSlot]?.halle) || "";
    
    // Globale Variable für die Ziel-Slots zurücksetzen und initialisieren
    window.slotsToClear = [currentSlot];

    // Doppellektion prüfen (+5 für Folgestunde oder -5 für Vorherige)
    const nextSlot = currentSlot + 5;
    const nextSlotData = (window.lastPlanData && window.lastPlanData[nextSlot]) || {};
    const prevSlot = currentSlot - 5;
    const prevSlotData = (window.lastPlanData && window.lastPlanData[prevSlot]) || {};

    let targetSlot = null;
    if (nextSlotData.klasse === klasse && nextSlotData.halle === aktuelleHalle && klasse && klasse.trim() !== "") {
        targetSlot = nextSlot;
    } else if (prevSlotData.klasse === klasse && prevSlotData.halle === aktuelleHalle && klasse && klasse.trim() !== "") {
        targetSlot = prevSlot;
    }

    // FALLS EINE DOPPELLEKTION EXISTIERT: UI im bestehenden Modal umbauen
    if (targetSlot) {
        const liste = root.querySelector('#menu-options-list');
        const title = root.querySelector('.eigenesmenu-title');
        const subtitle = root.querySelector('#menu-subtitle');

        if (title) title.innerText = "⚠️ DOPPELLEKTION ERKANNT";
        if (subtitle) subtitle.innerHTML = `Die Klasse <span style="color:#ff9800; font-weight:bold;">${klasse}</span> hat eine Doppellektion.`;

        let html = `
            <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 10px; width:100%;">
                <button class="eigenesmenu-item" style="background: #e67e22; justify-content: center; width:100%; border:none; border-radius:6px;" 
                        onclick="window.slotsToClear.push(${targetSlot}); window.zeigePasswortFuerAbkleben('${klasse}', '${time}', '${slot}');">
                    <span class="btn-text" style="font-weight: bold; color:#fff;">🔥 BEIDE STUNDEN LÖSCHEN</span>
                </button>
                
                <button class="eigenesmenu-item" style="background: #222; justify-content: center; width:100%; border: 1px solid #444; border-radius:6px;" 
                        onclick="window.zeigePasswortFuerAbkleben('${klasse}', '${time}', '${slot}');">
                    <span class="btn-text" style="color:#eee;">Nur diese eine Lektion löschen</span>
                </button>
            </div>
        `;
        
        if (liste) liste.innerHTML = html;

        // Abbrechen-Button temporär zu "Zurück" verbiegen
        const cancelBtn = root.querySelector('.eigenesmenu-cancel');
        if (cancelBtn) {
            cancelBtn.innerText = "← ZURÜCK";
            cancelBtn.onclick = () => openEditor(window.currentEditBox, time, slot, klasse);
        }
    } else {
        // KEINE Doppellektion: Direkt im selben Container die Passwortmaske laden
        window.zeigePasswortFuerAbkleben(klasse, time, slot);
    }
};

/**
 * 🔥 PHASE 3: SENDER KOMPLETT GEÄNDERT! Absenden via POST als strukturiertes JSON an die doPost
 */
window.fuehreAbklebenAus = async function(klasse) {
    const pwFeld = document.getElementById('abkleben-pw-field');
    const deleteBtn = document.getElementById('btn-final-perma-delete');
    
    if (!pwFeld || !pwFeld.value.trim()) {
        alert("Bitte Passwort eingeben!");
        return;
    }

    const eingegebenesPw = pwFeld.value.trim();

    // 1. Passwort-Check im Frontend
    if (eingegebenesPw !== userPw) {
        pwFeld.style.borderColor = "#c0392b";
        pwFeld.value = "";
        pwFeld.placeholder = "Falsches Passwort!";
        pwFeld.focus();
        return;
    }

    // 2. Button in Ladezustand versetzen
    if (deleteBtn) {
        deleteBtn.innerHTML = '<div class="eigenesmenu-loader" style="margin: 0 auto;"></div>';
        deleteBtn.style.pointerEvents = "none";
    }
    
    // Grid sperren (visueller Schutz während der Server arbeitet)
    const gridContainer = document.querySelector('.stundentafel-container') || document.body;
    gridContainer.style.opacity = "0.6";
    gridContainer.style.pointerEvents = "none";

    // 3. Payload für POST-Anfrage als sauberes JavaScript-Objekt vorbereiten
    const dateVal = document.getElementById('datePicker').value;
    const slotsParamString = window.slotsToClear.join(","); // Erzeugt z.B. "13" oder "13,18"
    
    const payload = {
        action: "permaDelete",
        pw: eingegebenesPw,
        kuerzel: userKuerzel,
        klasse: klasse,
        slot: slotsParamString, 
        startDate: dateVal
    };

    try {
        console.log("Sende Löschbefehl via POST an Google Script für Slots:", slotsParamString);

        // Anfrage umschalten auf Methode POST mit JSON-Body
        const response = await fetch(url, {
            method: "POST",
            mode: "cors",
            headers: {
                "Content-Type": "text/plain;charset=utf-8" // Verhindert CORS-Preflight-Fehler bei Apps Script
            },
            body: JSON.stringify(payload)
        });

        const result = await response.json();
        console.log("Server-Antwort erhalten:", result);

        if (result.status === "success") {
            console.log(`Klasse ${klasse} erfolgreich aus DB entfernt.`);
            
            // --- NEU: News triggern, da die Klasse nun abgeklebt/gelöscht wurde ---
            // Da 'slotsParamString' eine Liste wie "13,18" sein kann, 
            // müssen wir die News für jeden Slot einzeln auslösen:
            const betroffeneSlots = slotsParamString.split(",");
            for (const s of betroffeneSlots) {
                await window.triggerNewsWrapper("Abkleben", s, klasse);
            }

            closeEditor(); 
            await loadPlan(); 
        } else {
            // Greift jetzt sauber auf result.msg aus deiner doPost zurück
            throw new Error(result.msg || "Fehler von der Datenbank.");
        }

    } catch (e) {
        console.error("PermaDelete Error:", e);
        alert("Löschvorgang fehlgeschlagen: " + e.message);
        
        // Bei Fehler: Button wieder reaktivieren
        if (deleteBtn) {
            deleteBtn.innerHTML = '<span class="btn-text" style="font-weight: bold; color:#fff;">JA, PERMANENT ABKLEBEN</span>';
            deleteBtn.style.pointerEvents = "auto";
        }
    } finally {
        // Grid wieder freigeben
        gridContainer.style.opacity = "1";
        gridContainer.style.pointerEvents = "auto";
    }
};

let meineRelevanteNews = []; 

/**
 * Initialisiert das News-System.
 */
async function initNewsSystem() {
    console.log("🚀 News-System wird initialisiert...");
    const aktuellerUser = typeof userKuerzel !== 'undefined' ? userKuerzel.toUpperCase().trim() : "";
    if (!aktuellerUser) return;

    try {
        const zielUrl = typeof url !== 'undefined' ? url : "";
        const pw = typeof userPw !== 'undefined' ? userPw : "";
        
        const response = await fetch(`${zielUrl}?action=getNews&pw=${encodeURIComponent(pw)}&t=${Date.now()}`);
        const data = await response.json();
        
        const allNews = data.news || (Array.isArray(data) ? data : []);

        meineRelevanteNews = allNews.filter(n => {
            const empfaenger = (n.empfaenger || "").toUpperCase();
            return empfaenger.split(',').map(e => e.trim()).includes(aktuellerUser);
        });

        updateNewsDot();
        
    } catch (e) { console.error("Fehler beim Init:", e); }
}

/**
 * Aktualisiert den roten Punkt (Badge).
 */
function updateNewsDot() {
    const aktuellerUser = typeof userKuerzel !== 'undefined' ? userKuerzel.toUpperCase().trim() : "";
    const dot = document.getElementById('news-dot');
    if (!dot) return;

    const hatUngelesene = meineRelevanteNews.some(n => {
        const gelesenListe = (n.gelesen || "").toUpperCase().split(',').map(s => s.trim());
        return !gelesenListe.includes(aktuellerUser);
    });

    dot.style.display = hatUngelesene ? 'block' : 'none';
}

/**
 * Zeigt die Sidebar sofort an, ohne auf den Server zu warten.
 */
window.showNews = function() {
    const sidebar = document.getElementById('newsSidebar');
    const newsContainer = document.getElementById('newsContent');
    const aktuellerUser = typeof userKuerzel !== 'undefined' ? userKuerzel.toUpperCase().trim() : "";

    // 1. Sofort anzeigen
    sidebar.style.display = 'block';
    
    // 2. Rendern mit bestehenden Daten
    newsContainer.innerHTML = "";
    meineRelevanteNews.forEach(news => {
        const gelesenListe = (news.gelesen || "").toUpperCase().split(',').map(s => s.trim());
        const istGelesen = gelesenListe.includes(aktuellerUser);
        
        const card = document.createElement('div');
        card.className = `news-item ${istGelesen ? 'news-gelesen' : 'news-unread'}`;
        card.innerHTML = `
            <div class="news-header">
                <span class="status-icon">${istGelesen ? '⚪ Gelesen' : '📥 Neu'}</span>
                <span>${news.datum || ''} - Slot ${news.slot || ''}</span>
            </div>
            <div class="news-text">${news.text || ''}</div>
        `;
        card.onclick = () => markAsReadAndJump(news);
        newsContainer.appendChild(card);
    });

    // 3. Animation starten
    setTimeout(() => sidebar.classList.add('active'), 10);
    updateNewsDot();
};

/**
 * Öffnet die Zentrale und aktualisiert im Hintergrund die Daten.
 */
window.refreshAndShowNews = function() {
    // A: Sofort anzeigen
    showNews();
    
    // B: Hintergrund-Sync
    fetch(`${url}?action=getNews&pw=${encodeURIComponent(userPw)}&t=${Date.now()}`)
        .then(res => res.json())
        .then(data => {
            const allNews = data.news || (Array.isArray(data) ? data : []);
            const aktuellerUser = userKuerzel.toUpperCase().trim();
            meineRelevanteNews = allNews.filter(n => {
                const empfaenger = (n.empfaenger || "").toUpperCase();
                return empfaenger.split(',').map(e => e.trim()).includes(aktuellerUser);
            });
            
            // Falls Sidebar noch offen ist, neu rendern
            if(document.getElementById('newsSidebar').classList.contains('active')) {
                showNews();
            }
            updateNewsDot();
        })
        .catch(e => console.error("Hintergrund-Update fehlgeschlagen:", e));
};

async function markAsReadAndJump(news) {
    const user = typeof userKuerzel !== 'undefined' ? userKuerzel.toUpperCase().trim() : "";
    const currentPickerValue = document.getElementById('datePicker').value; // Dein aktuelles Datum
    
    // 1. Sofortige UI-Reaktion
    const clickedCard = event.currentTarget;
    clickedCard.style.opacity = "0.4";
    clickedCard.style.pointerEvents = "none";
    clickedCard.querySelector('.status-icon').innerText = '⚪ Gelesen';

    // 2. Lokales Update für sofortigen Badge-Verschwinden-Effekt
    if (!news.gelesen) news.gelesen = "";
    if (!news.gelesen.includes(user)) {
        news.gelesen = news.gelesen ? `${news.gelesen},${user}` : user;
    }
    updateNewsDot(); 

    // 3. Server-Update im Hintergrund
    fetch(url, {
        method: "POST",
        body: JSON.stringify({ action: "markAsRead", id: news.id, user: user, pw: userPw })
    }).catch(e => console.error("Fehler beim Markieren:", e));

    // 4. Zentrale schließen
    window.closeNews();

    // 5. Bedingte Navigation (Hier passiert die Magie)
    if (news.datum) {
        // Prüfen, ob wir bereits am richtigen Tag sind
        if (currentPickerValue !== news.datum) {
            document.getElementById('datePicker').value = news.datum;
            await loadPlan(); // Nur wenn Tag anders, muss geladen werden
        }
    }

    // 6. Scrollen & Blinken (Jetzt absolut performant)
    // Wir nutzen hier ein sehr kurzes Timeout, da das DOM jetzt nicht mehr "zappelt"
    setTimeout(() => {
        const box = document.querySelector(`[data-slot="${news.slot}"]`); 
        if (box) {
            box.scrollIntoView({ behavior: 'smooth', block: 'center' });
            setTimeout(() => box.classList.add('blink-animation'), 300);
            setTimeout(() => box.classList.remove('blink-animation'), 4300);
        }
    }, 100); // 100ms reicht völlig, wenn kein loadPlan() läuft
}

window.closeNews = () => {
    const sidebar = document.getElementById('newsSidebar');
    sidebar.classList.remove('active');
    setTimeout(() => {
        sidebar.style.display = 'none';
        updateNewsDot();
    }, 300);
};

window.triggerNewsWrapper = async function(aktion, slot, klasse) {
    if (typeof triggerNews !== "function") return;
    try {
        let newsTyp = aktion.toLowerCase().includes("outdoor") ? "outdoor" : (aktion.toLowerCase() === "beendet" ? "beendet" : "");
        await triggerNews(newsTyp, parseInt(slot), klasse);
    } catch (error) { console.error("Fehler im News-Ablauf:", error); }
};

async function saveMaterialSelection(mat, detail, time, slot, klasse, btn) {
    const modal = document.getElementById('eigenesmenu-modal');
    if (modal) modal.style.pointerEvents = "none";

    const payload = {
        action: "saveBooking",
        pw: typeof userPw !== 'undefined' ? userPw : "",
        id: `${document.getElementById('datePicker')?.value}_${slot}`,
        date: document.getElementById('datePicker')?.value,
        slot: slot,
        klasse: klasse || "",
        material: mat,           
        materialDetail: detail || "" 
    };

    // Callback erhält nun das gesamte Payload-Objekt 'p'
    const onCompleteVisuals = (p) => {
        const s = p.slot;
        if (window.lastPlanData?.[s]) {
            window.lastPlanData[s].material = p.material;
            window.lastPlanData[s].materialDetail = p.materialDetail;
        }
        const box = document.querySelector(`[data-slot="${s}"]`);
        if (box) markBoxWithMaterialIcon(box, p.material, p.materialDetail);
        
        // Editor nur schließen, wenn wir den ursprünglichen Slot bearbeiten
        if (s === slot && typeof closeEditor === 'function') closeEditor();
    };

    if (typeof window.prozessiereAktion === 'function') {
        window.prozessiereAktion(payload, onCompleteVisuals);
    }
}

/** * 5. Helper (Toggles & Badges)

function toggleMaterialSelection(mat, btn) {
    const root = document.getElementById('eigenesmenu-modal');
    const nextStep = root.querySelector('#materialNextStep');
    const check = btn.querySelector('.check-indicator');

    if (window.selectedMaterials.includes(mat)) {
        window.selectedMaterials = window.selectedMaterials.filter(m => m !== mat);
        btn.style.background = "transparent";
        if (check) check.innerText = "○";
    } else {
        window.selectedMaterials.push(mat);
        btn.style.background = "rgba(255, 140, 0, 0.1)";
        if (check) check.innerText = "●";
    }
    if (nextStep) nextStep.style.display = window.selectedMaterials.length > 0 ? 'block' : 'none';
}

    
function markBoxWithMaterialIcon(box, material, detail) {
    if (!box) return;
    
    // Altes Icon entfernen
    const oldIcon = box.querySelector('.material-indicator');
    if (oldIcon) oldIcon.remove();

    if (!material || material.trim() === "") return;

    const badge = document.createElement('div');
    badge.className = 'material-indicator';
    badge.innerHTML = '📦';

    // Dezente Optik
    Object.assign(badge.style, {
        position: 'absolute',
        top: '4px',
        right: '4px',
        background: 'rgba(51, 51, 51, 0.8)', // Dezent Grau
        color: '#fff',
        padding: '1px 5px',
        borderRadius: '4px',
        fontSize: '14px', // Kleiner und passender
        fontWeight: 'bold',
        zIndex: '10',
        cursor: 'pointer'
    });

    badge.onclick = (e) => {
        e.stopPropagation();
        showMaterialDetailPopup(material, detail);
    };

    box.appendChild(badge);
}

function showMaterialDetailPopup(material, detail) {
    const overlay = document.createElement('div');
    overlay.className = 'material-info-overlay';
    overlay.onclick = () => overlay.remove();
    overlay.innerHTML = `<div class="material-info-content" onclick="event.stopPropagation()" style="max-width: 300px; padding: 20px; background: #222; border: 1px solid #ff8c00;">
                            <div style="color: #ff8c00; font-weight: bold;">📦 Reservierung</div>
                            <div style="margin: 10px 0;">${material.split(', ').join('<br>')}</div>
                            <div style="font-size: 0.85em; color: #aaa;">Details: ${detail || "Keine"}</div>
                        </div>`;
    document.body.appendChild(overlay);
}

/**
 * Verarbeitet die Wahl aus dem Task Manager (Haupt-Weiche)
 */
window.handleMenuChoice = function(action, time, slot, klasse) {
    console.log("Aktion gewählt:", action); 

    switch(action) {
        case 'reservation':
            // Öffnet die Hallenauswahl direkt im bestehenden Menü-Container
            handleReservationUI(time, slot, klasse);
            break;
            
        case 'material':
            const activeModal = document.getElementById('eigenesmenu-modal');
            if (typeof handleMaterialUI === 'function') {
                handleMaterialUI(time, slot, klasse, activeModal);
            }
            break;

        case 'ausfall':
            // Wir prüfen den aktuellen Status direkt an der Box
            const istBereitsAusfall = window.currentEditBox ? window.currentEditBox.classList.contains('ausfall-mode') : false;
            // Wir nutzen den Button-Trigger aus dem DOM für den Loader
            const btn = document.querySelector('.eigenesmenu-item:nth-child(3)'); 
            if (typeof handleAusfallClick === 'function') {
                handleAusfallClick(istBereitsAusfall ? 'LOESCHEN' : 'SETZEN', time, slot, klasse, btn);
            }
            break;

       case 'beendet':
            // 🔥 NEU: Kein separates Modal mehr aufwerfen!
            // Wir starten direkt den einheitlichen Dynamic-Workflow im selben Taskmanager-Modal
            window.starteAbklebenWorkflow(time, slot, klasse);
            break;

        case 'nachricht':
            // 🔥 NEU: Kein prompt() mehr! Wir laden das UI direkt ins Modal
            window.handleNotizUI(time, slot, klasse);
            break;
            
        default:
            console.warn("Unbekannte Aktion im Task Manager:", action);
    }
};
    

window.handleAusfallClick = function(mode, time, slot, klasse, btn) {
    console.log("handleAusfallClick (Weichenmodus) getriggert. Modus:", mode);

    const zielHalle = (mode === 'LOESCHEN') ? "" : "Ausfall";
    
    const payload = {
        action: "saveBooking",
        pw: userPw,
        kuerzel: userKuerzel,
        date: document.getElementById('datePicker').value,
        slot: slot,
        klasse: klasse,
        halle: zielHalle
    };

    // Callback bekommt nun das komplette Payload-Objekt 'p'
    const visuelleAktualisierung = function(p) {
        const s = p.slot;
        const h = p.halle; // Wert sicher aus dem Payload p
        
        const targetBox = document.querySelector(`[data-slot="${s}"]`);
        
        // 1. Lokalen Datenspeicher synchron halten
        if (window.lastPlanData && window.lastPlanData[s]) {
            window.lastPlanData[s].halle = h;
        }

        // 2. UI sofort aktualisieren
        if (targetBox) {
            const label = targetBox.querySelector('.halle-label');

            if (h === "Ausfall") {

   function handleReservationUI(time, slot, klasse) {
    const container = document.getElementById('menu-options-list');
    const subtitle = document.getElementById('menu-subtitle');
    
    // --- NEU: Den Titel des Modals greifen ---
    const root = document.getElementById('eigenesmenu-modal');
    const titleEl = root ? root.querySelector('.eigenesmenu-title') : null;
    
    if (!container) return;

    const aktuelleHalleInBox = window.currentEditBox?.querySelector('.halle-label')?.innerText.trim() || "";

    // --- NEU: Titel dynamisch anpassen ---
    if (titleEl) {
        titleEl.innerText = "HALLE/RAUM WÄHLEN";
        titleEl.style.color = "#ff9800"; // Passt zum restlichen edlen Orange
    }

   if (subtitle) {
        subtitle.innerHTML = `Welche Räumlichkeit möchtest du für die <span style="color: #ff8c00; font-weight: bold;">${klasse}</span> reservieren?`;
    }

    const currentSlot = parseInt(slot);
    const rowIndex = Math.floor((currentSlot - 1) / 5);
    const startSlot = (rowIndex * 5) + 1;
    const endSlot = startSlot + 4;

    let besetzteHallen = [];
    for (let s = startSlot; s <= endSlot; s++) {
        if (s === currentSlot) continue;
        const data = window.lastPlanData ? window.lastPlanData[s] : null;
        if (data && data.halle && data.halle !== "Ausfall") {
            const hName = data.halle.trim();
            if (hName.toLowerCase().includes("aussenplatz") || hName.toLowerCase().includes("outdoor")) continue; 
            if (hName.includes('+')) {
                besetzteHallen.push(...hName.split('+').map(t => t.trim()));
            }
            besetzteHallen.push(hName);
        }
    }

    let html = "";

    // --- LÖSCHEN AN ERSTER STELLE ---
    if (aktuelleHalleInBox !== "" && aktuelleHalleInBox !== "---") {
        html += `
            <button class="eigenesmenu-item" 
                    style="justify-content: center; background: #442222; border: 1px solid #663333; margin-bottom: 15px;" 
                    onclick="applyHalleSelection('', '${time}', '${slot}', '${klasse}', this)">
                <span class="btn-text" style="color: #ffaaaa; font-weight: bold;">❌ RESERVIERUNG LÖSCHEN</span>
            </button>`;
    }

    const hallen = (typeof configFarben !== 'undefined' && Object.keys(configFarben).length > 0) 
                   ? Object.keys(configFarben) 
                   : ["Halle 1", "Halle 2", "Halle 3", "Halle 4", "Halle 5", "U21", "Aussenplatz"];
    
    hallen.forEach(h => {
        const hClean = h.trim();
        const isOutdoor = hClean.toLowerCase().includes("aussenplatz") || hClean.toLowerCase().includes("outdoor");
        
        let istGesperrt = false;
        if (!isOutdoor) {
            if (hClean.includes('+')) {
                const hTeile = hClean.split('+').map(t => t.trim());
                istGesperrt = hTeile.some(teil => besetzteHallen.includes(teil));
            } else {
                istGesperrt = besetzteHallen.includes(hClean);
            }
        }

        if (istGesperrt) {
            html += `
                <button class="eigenesmenu-item" style="justify-content: center; opacity: 0.2; cursor: not-allowed; background: #222;" disabled>
                    <span class="btn-text" style="text-decoration: line-through; color: #666;">${h}</span>
                </button>`;
        } else {
            const istAktuelleWahl = hClean.toLowerCase() === aktuelleHalleInBox.toLowerCase();
            const configBorderColor = configFarben[h] || "#444";
            
            let buttonStyle = "";
            let iconHtml = "";

            if (istAktuelleWahl) {
                buttonStyle = `justify-content: flex-start; background: #442d11 !important; color: #ffca88 !important; font-weight: bold !important; border: 1px solid #774c11 !important; margin-bottom: 8px;`;
                iconHtml = `<span class="eigenesmenu-icon" style="margin-right: 10px; color: #ff8c00;">🔸</span>`;
            } else {
                // Standard-Button Style mit orangefarbenem SVG-Icon statt Emoji
                buttonStyle = `justify-content: flex-start; background: #333; margin-bottom: 8px; border-left: 5px solid ${configBorderColor}; border-top: 1px solid #444; border-right: 1px solid #444; border-bottom: 1px solid #444;`;
                
                // Ein sauberes, oranges Haus-Icon (Farbe: #ff9800)
                iconHtml = `
                    <svg class="eigenesmenu-icon" style="margin-right: 10px; width: 16px; height: 16px; fill: #ff9800; vertical-align: middle;" viewBox="0 0 24 24">
                        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                    </svg>`;
            }

            html += `
                <button class="eigenesmenu-item" style="${buttonStyle}" 
                        onclick="applyHalleSelection('${h}', '${time}', '${slot}', '${klasse}', this)">
                    ${iconHtml}
                    <span class="btn-text">${h}</span>
                    ${istAktuelleWahl ? '<span style="margin-left: auto; font-size: 0.7rem; background: rgba(0,0,0,0.4); padding: 2px 6px; border-radius: 4px; color: #ff8c00; border: 1px solid rgba(255,140,0,0.2); font-weight: normal;">AKTUELL</span>' : ''}
                </button>`;
        }
    });

    container.innerHTML = html;
}

/**

 * Leert das Textfeld im DOM und schickt es durch deine saveBooking- & Doppellektionslogik
 */
window.loescheNotizVomModal = function(slot, klasse) {
    const textFeld = document.getElementById('notiz-text-feld');
    if (textFeld) {
        textFeld.value = ""; // Leerer String triggert das Löschen auf dem Server & lokal
    }

    window.speichereNotizVomModal(slot, klasse);
};

    

/**
 * 🔥 Phase 2: SENDER GEÄNDERT! Perfektes Optimistic-UI-Verhalten.
 * Das Icon ploppt sofort auf und bleibt stabil stehen, ohne störenden Nachlade-Effekt.
 */
window.speichereNotizVomModal = async function(slot, klasse) {
    const textFeld = document.getElementById('notiz-text-feld');
    const saveBtn = document.getElementById('btn-save-notiz');
    if (!textFeld) return;

    const notizText = textFeld.value.trim();
    const dateVal = document.getElementById('datePicker').value;

    if (saveBtn) {
        saveBtn.innerHTML = '<div class="eigenesmenu-loader" style="margin: 0 auto;"></div>';
        saveBtn.style.pointerEvents = "none";
    }

    const payload = {
        action: "saveBooking",
        pw: userPw,
        kuerzel: userKuerzel,
        date: dateVal,
        slot: slot.toString(),
        klasse: klasse,
        kommentar: notizText // WICHTIG: Das ist unser Datenfeld
    };

    // Callback erhält nun das gesamte Payload-Objekt 'p'
    const onCompleteVisuals = function(p) {
        const n = p.kommentar; // Notiz direkt aus dem Payload
        const s = p.slot;      // Slot direkt aus dem Payload
        
        console.log("Triggere Sofort-Update für Notiz in Slot:", s);
        
        const box = document.querySelector(`[data-slot="${s}"]`);
        if (box) {
            box.setAttribute('data-notiz', n);

            // Altes Icon entfernen
            const altesIcon = box.querySelector('.box-notiz-icon');
            if (altesIcon) altesIcon.remove();

            // Wenn Text da ist -> Icon neu zeichnen
            if (n !== "") {
                const neuesNotizIcon = document.createElement('span');
                neuesNotizIcon.className = 'box-notiz-icon';
                neuesNotizIcon.innerText = '📝';
                neuesNotizIcon.title = n;
                neuesNotizIcon.style.cursor = 'pointer';
                
                neuesNotizIcon.onclick = function(event) {
                    event.stopPropagation();
                    if (typeof showNotizDetailPopup === "function") {
                        showNotizDetailPopup(box.querySelector('.klasse-label')?.innerText || "", n);
                    }
                };
                box.appendChild(neuesNotizIcon);
            }
        }

        // Cache aktualisieren
        if (window.lastPlanData) {
            if (!window.lastPlanData[s]) window.lastPlanData[s] = {};
            window.lastPlanData[s].kommentar = n;
        }

        // Editor schließen (nur wenn wir den ursprünglichen Slot bearbeiten)
        if (s === slot.toString() && typeof closeEditor === 'function') {
            closeEditor();
        }
    };

    if (typeof window.prozessiereAktion === "function") {
        window.prozessiereAktion(payload, onCompleteVisuals);
    }
};

/**
 * Der "Postbote": Sendet Daten an das Google Apps Script
 * JETZT NEU: Unterstützt ein Abbruch-Signal (options.signal) gegen Race Conditions!
 */
window.saveImmediately = async function(payload, options = {}) {
    // Falls die URL nicht global definiert ist, hier prüfen
    if (typeof url === 'undefined') {
        console.error("❌ saveImmediately abgebrochen: Die Variable 'url' (Web-App URL) ist nicht definiert!");
        return { status: "error", msg: "Skript-URL fehlt" };
    }

    if (!payload) {
        console.error("❌ saveImmediately abgebrochen: Kein Payload übergeben!");
        return { status: "error", msg: "Keine Daten übergeben" };
    }

    try {
        console.log("⏳ Postbote: Sende Speicherbefehl...", payload);

        // KORREKTUR: Wir nutzen das normale Fetch ohne 'no-cors' UND reichen das Abbruch-Signal weiter!
        const response = await fetch(url, {
            method: "POST",
            body: JSON.stringify(payload),
            signal: options.signal // <-- NEU: Hier wird die alte Anfrage im Netzwerk sofort gekillt, falls abgebrochen
        });

        if (!response.ok) {
            throw new Error(`HTTP-Fehler! Status: ${response.status}`);
        }

        const result = await response.json();
        console.log("📥 Postbote: Antwort vom Server erhalten:", result);

        // Wenn das Google Sheet die Buchung erfolgreich eingetragen hat
        if (result.status === "success") {
            console.log("🎯 Speicherbefehl erfolgreich ausgeführt:", payload);

            // ============================================================
            // INTERNE NEWS-ZÜNDUNG
            // ============================================================
            const action = payload.action || payload.mode;
            
            if (action === "saveBooking" && typeof triggerNews === "function") {
                const slotIndex = parseInt(payload.slot);
                const klasseName = payload.klasse || "";
                const halleWert = payload.halle ? payload.halle.toString().trim() : "";

                if (halleWert === "") {
                    console.log(`📢 AUTOMATISCHER NEWS-TRIGGER:  für Slot ${slotIndex} erkannt.`);
                    triggerNews("", slotIndex, klasseName);
                } 
                else if (halleWert.includes("Outdoor")) {
                    console.log(`📢 AUTOMATISCHER NEWS-TRIGGER: Outdoor für Slot ${slotIndex} erkannt.`);
                    triggerNews("outdoor", slotIndex, klasseName);
                }
                else if (halleWert === "Beendet" || halleWert === "beendet") {
                    console.log(`📢 AUTOMATISCHER NEWS-TRIGGER: Beendet für Slot ${slotIndex} erkannt.`);
                    triggerNews("beendet", slotIndex, klasseName);
                }
            }
            // ============================================================

            return result; // Gibt { status: "success" } zurück
        } else {
            console.error("❌ Server meldete einen Fehler beim Speichern:", result.msg);
            return result;
        }

    } catch (e) {
        // Wenn der Fehler durch das absichtliche Abbrechen (AbortController) kam, werfen wir ihn weiter,
        // damit applyHalleSelection ihn im .catch() mit 'AbortError' sauber abfangen kann.
        if (e.name === 'AbortError') {
            throw e; 
        }

        console.error("❌ Kritischer Fehler beim Speichern im Fetch-Verlauf:", e);
        alert("Verbindung zum Server fehlgeschlagen! Die Änderung wurde eventuell nicht gespeichert.");
        return { status: "error", msg: e.toString() };
    }
};
    

// Hilfsfunktion: Erkennt, ob der Partner-Slot dieselbe Klasse hat (JETZT ALS ECHTE ZAHLEN)
function getDoppellektionPartnerSlot(currentSlot) {
    const slot = parseInt(currentSlot, 10);
    if (isNaN(slot) || !window.lastPlanData) {
        console.warn("❌ Doppellektion-Abbruch: lastPlanData fehlt oder Slot ist NaN");
        return null;
    }
    
    // Tippfehler korrigiert: Variable heißt jetzt durchgehend "aktuellerDatenSatz"
    const aktuellerDatenSatz = window.lastPlanData[slot] || window.lastPlanData[slot.toString()];
    if (!aktuellerDatenSatz) {
        console.warn(`❌ Doppellektion-Abbruch: Keine Daten für Slot ${slot} in lastPlanData gefunden.`);
        return null;
    }
    
    const aktuelleKlasse = aktuellerDatenSatz.klasse ? aktuellerDatenSatz.klasse.toString().trim() : "";
    if (aktuelleKlasse === "" || aktuelleKlasse === "---") return null;

    const slotDanach = slot + 5;
    const slotDavor = slot - 5;

    const datenDanach = window.lastPlanData[slotDanach] || window.lastPlanData[slotDanach.toString()];
    const datenDavor = window.lastPlanData[slotDavor] || window.lastPlanData[slotDavor.toString()];

    const klasseDanach = (datenDanach && datenDanach.klasse) ? datenDanach.klasse.toString().trim() : "";
    const klasseDavor = (datenDavor && datenDavor.klasse) ? datenDavor.klasse.toString().trim() : "";

    console.group(`📊 Doppellektions-Analyse für Slot ${slot} (${aktuelleKlasse})`);
    console.log(`Prüfe Slot danach (+5 = ${slotDanach}): Gefundene Klasse: "${klasseDanach}"`);
    console.log(`Prüfe Slot davor (-5 = ${slotDavor}): Gefundene Klasse: "${klasseDavor}"`);
    console.groupEnd();

    if (klasseDanach === aktuelleKlasse) {
        console.log(`🎯 MATCH! Slot ${slotDanach} ist der Partner (Stunde danach).`);
        return slotDanach;
    }
    if (klasseDavor === aktuelleKlasse) {
        console.log(`🎯 MATCH! Slot ${slotDavor} ist der Partner (Stunde davor).`);
        return slotDavor;
    }

    return null;
}

    

// DIE UNIVERSELLE WEICHE (Mit Absicherung für den Container)
window.prozessiereAktion = function(payload, onCompleteVisuals) {
    // Sicherstellen, dass der Slot im Payload für die Prüfung bereit ist
    const partnerSlot = getDoppellektionPartnerSlot(payload.slot);
    
    // Wir greifen uns das Menü-Listen-Feld aus deinem Modal
    const container = document.getElementById('menu-options-list');

    console.log(`🔍 Doppellektions-Prüfung für Slot ${payload.slot}. Partner gefunden: ${partnerSlot}`);

    // Falls keine Doppellektion vorliegt oder das Menüfeld nicht da ist -> Sofort normal feuern!
    if (!partnerSlot || !container) {
        executePayloads([payload], onCompleteVisuals);
        if (typeof closeEditor === "function") closeEditor();
        return;
    }

    // --- VARIANTE B: INHALT IM MODAL ERSETZEN ---
    container.innerHTML = `
        <div class="doppel-abfrage-container" style="text-align: center; padding: 20px 10px;">
            <p style="color: #ff9800; font-weight: bold; margin-bottom: 15px; font-size: 1.2rem;">
                🔗 Doppellektion erkannt!
            </p>
            <p style="color: #ccc; margin-bottom: 25px; font-size: 0.95rem; line-height: 1.4;">
                Möchtest du diese Änderung für die <span style="color: #ff9800; font-weight: bold;">gesamte Doppellektion</span> übernehmen oder nur für diese Stunde?
            </p>
            
            <button id="btn-doppel-beide" class="eigenesmenu-item" style="justify-content: center; background: #ff9800; color: #111; font-weight: bold; margin-bottom: 12px; border: none; width: 100%; padding: 12px;">
                👥 Für beide Stunden übernehmen
            </button>
            
            <button id="btn-doppel-einzel" class="eigenesmenu-item" style="justify-content: center; background: #333; border: 1px solid #555; color: #fff; margin-bottom: 12px; width: 100%; padding: 12px;">
                👤 Nur für diese Stunde
            </button>
        </div>
    `;

// 🔥 DIESE ZEILE JETZT HIER EINFÜGEN:
    // Falls das Modal durch den -Klick gesperrt wurde, geben wir es jetzt für die Buttons frei!
    const modal = document.getElementById('eigenesmenu-modal');
    if (modal) modal.style.pointerEvents = "auto";
    
    // Klick-Handler für "Für beide Stunden"
    document.getElementById('btn-doppel-beide').onclick = function() {
        console.log(`🚀 Sende Doppellektion: Slot ${payload.slot} und Partner ${partnerSlot}`);
        const partnerPayload = { ...payload, slot: partnerSlot.toString() }; // Partner als String mitschicken
        
        executePayloads([payload, partnerPayload], onCompleteVisuals);
        if (typeof closeEditor === "function") closeEditor();
    };

    // Klick-Handler für "Nur für diese Stunde"
    document.getElementById('btn-doppel-einzel').onclick = function() {
        console.log(`🚀 Sende nur Einzelstunde: Slot ${payload.slot}`);
        executePayloads([payload], onCompleteVisuals);
        if (typeof closeEditor === "function") closeEditor();
    };
};

// Interne Hilfsfunktion, die die Payloads nacheinander an saveImmediately übergibt
function executePayloads(payloadArray, onCompleteVisuals) {
    payloadArray.forEach(p => {
        // Sync-Schutz
        if (window.syncBlockierteSlots) {
            window.syncBlockierteSlots[p.slot] = true;
        }

        // Visuelles UI-Update sofort triggern
        if (typeof onCompleteVisuals === "function") {
            onCompleteVisuals(p); 
        }

        // 3. Abschicken
        saveImmediately(p)
            .then(result => {
                if (result && result.status === "success") {
                    // --- HIER: NEWS NUR BEI ERFOLG AUSLÖSEN ---
                    // Wir prüfen, ob im Payload eine Hallen-Info steckt, die News auslöst
                    if (p.halle === "Ausfall" || (p.halle && p.halle.includes("Outdoor"))) {
                        window.triggerNewsWrapper(p.halle, p.slot, p.klasse);
                    }
                    
                    setTimeout(() => {
                        if (window.syncBlockierteSlots) delete window.syncBlockierteSlots[p.slot];
                    }, 2500);
                } else {
                    if (window.syncBlockierteSlots) delete window.syncBlockierteSlots[p.slot];
                    if (typeof syncPlan === "function") syncPlan();
                }
            })
            .catch(() => {
                if (window.syncBlockierteSlots) delete window.syncBlockierteSlots[p.slot];
                if (typeof syncPlan === "function") syncPlan();
            });
    });
}
