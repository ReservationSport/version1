<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservation Sport - BBZO</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&display=swap" rel="stylesheet">

 

<style>



/* 1. GLOBALE EINSTELLUNGEN & FONTS */
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;700&display=swap');

/* ============================================================
   1. BASIS & GRID-STRUKTUR (Bild 2 Look)
   ============================================================ */
body { 
    font-family: 'Segoe UI', 'Oswald', sans-serif; 
    background: #1a1a1a; 
    color: white; 
    padding: 20px; 
    margin: 0;
}

:root {
    --accent-color: #e67e22;
    --highlight-orange: #ff8c00;
    --bg-dark: #1a1a1a;
    --card-bg: #262626;
}

/* Das Haupt-Grid */
#plan-container, .grid { 
    display: grid; 
    grid-template-columns: 120px repeat(5, 1fr); 
    gap: 2px; 
    max-width: 1000px; 
    margin: auto; 
}

/* ============================================================
   2. NAVIGATION & STICKY CONTROLS
   ============================================================ */
.date-control {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 1000px;
    margin: 0 auto;
    padding: 10px 0;
    background: #1a1a1a;
    position: sticky;
    top: 0;
    z-index: 1100;
}

.nav-section { display: flex; align-items: center; gap: 10px; }
.nav-left { flex: 1; justify-content: flex-start; }
.nav-center { flex: 2; justify-content: center; gap: 8px; }
.nav-right { flex: 1; justify-content: flex-end; }

.nav-group { display: flex; gap: 5px; }

/* Buttons & Picker */
.nav-btn, .refresh-btn, #datePicker { 
    height: 40px; 
    background: #333; 
    border: 1px solid #444; 
    color: white; 
    border-radius: 4px; 
    box-sizing: border-box;
    display: flex;
    align-items: center;
    justify-content: center;
}

.nav-btn { width: 40px; cursor: pointer; }
.nav-btn:hover { background: #444; }
.nav-btn-hidden { visibility: hidden !important; pointer-events: none; }

#datePicker { padding: 0 10px; cursor: pointer; font-family: inherit; }

.refresh-btn { color: #e67e22; width: 40px; font-size: 18px; cursor: pointer; }
.refresh-btn:hover { color: #ff9f43; background: #444; }
.refresh-btn:active i { animation: spin-once 0.5s ease-in-out; }

/* News Button Premium Style */
.news-btn-premium {
    position: relative;
    display: flex;
    align-items: center;
    background: #2a2a2a;
    border: 1px solid #444;
    border-radius: 6px;
    padding: 6px 15px;
    cursor: pointer;
    height: 40px;
}
.news-btn-premium:hover { background: #333; border-color: #e67e22; }
.news-btn-premium .btn-text {
    color: #fff; font-size: 13px; letter-spacing: 2px; margin-right: 10px; font-weight: 300;
}
.news-btn-premium .badge {
    position: absolute; top: -3px; right: -3px; width: 9px; height: 9px;
    background: #e67e22; border-radius: 50%; border: 1px solid #1a1a1a;
    box-shadow: 0 0 8px rgba(230, 126, 34, 0.6);
}

/* ============================================================
   3. BOXEN & ZELLEN-DESIGN
   ============================================================ */
.box { 
    border: 1px solid #444; 
    padding: 5px; 
    background: #262626; 
    min-height: 50px; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    justify-content: center; 
    text-align: center; 
    font-size: 11px; 
    position: relative; 
    cursor: default; 
    overflow: hidden; 
}

.box.empty { pointer-events: none; opacity: 0.5; }
    
.zeit-box {
    background: #333;      /* Dasselbe dunkle Grau wie dein Header */
    color: #e67e22;       /* Dein Akzent-Orange für die Lesbarkeit */
    font-weight: bold;
    font-size: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    border: 1px solid #444; /* Dezente Trennung zwischen den Zeit-Boxen */
}

.header-row { 
    grid-column: span 6; 
    background: #333; 
    font-size: 14px; 
    font-weight: bold; 
    position: sticky; 
    top: 60px; 
    z-index: 1090; 
    height: 50px;
}

/* Deine Boxen (.is-mine) */
.box.is-mine { 
    border: 1px solid #e67e22 !important; 
    z-index: 10; 
    cursor: pointer; 
}
.box.is-mine:hover {
    background-color: rgba(230, 126, 34, 0.2) !important;
    box-shadow: inset 0 0 15px rgba(255, 159, 67, 0.4), 0 0 20px rgba(230, 126, 34, 0.3);
    transform: scale(1.03);
    z-index: 100;
}

/* Inhalt der Boxen */
/* Klassenname */
.klasse-label { 
    font-weight: bold; 
    font-size: 14px; 
    color: #ffffff; 
}

/* Lehrer-Kürzel */
.lehrer-info { 
    font-size: 10px; 
    color: #bbbbbb; 
}

/* Hallen-Name */
.halle-label { 
    font-size: 10px; 
    color: #e67e22; 
    font-style: italic;
}

/* ============================================================
   4. TRENNLINIEN, LOADER & SPEZIAL-MODI
   ============================================================ */
.divider-thin { grid-column: 1 / span 6; height: 1px; background: #444; margin: 2px 0; }
.divider-thick { grid-column: 1 / span 6; height: 4px; background: #444; margin: 5px 0; }

.box.ausfall-mode { 
    background-color: #000 !important; 
    color: #777 !important; 
    background-image: linear-gradient(to top right, transparent calc(50% - 1px), #444, transparent calc(50% + 1px)), 
                      linear-gradient(to top left, transparent calc(50% - 1px), #444, transparent calc(50% + 1px)); 
}

.info-box {
    grid-column: span 6; font-size: 20px !important; padding: 40px !important;
    text-align: center; line-height: 1.5; color: #888; font-style: italic;
}

.global-loader { 
    position: fixed; left: 15px; top: 15px; width: 25px; height: 25px; 
    border: 3px solid #444; border-top: 3px solid #e67e22; border-radius: 50%; 
    animation: spin 1s linear infinite; display: none; z-index: 9999; 
}

/* ============================================================
   5. LOGIN-OVERLAY & CARD-DESIGN (DEIN ORIGINAL)
   ============================================================ */
#loginOverlay { 
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
    background: radial-gradient(circle at center, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%), 
                url('https://raw.githubusercontent.com/ReservationSport/ReservationSport/refs/heads/main/Logo.png');
    background-size: cover; background-position: center; z-index: 20000; 
    display: flex; justify-content: center; align-items: center; 
    font-family: 'Inter', sans-serif; backdrop-filter: blur(18px); 
}

#loginOverlay.fade-out {
    opacity: 0;
    transition: opacity 0.5s ease;
    pointer-events: none;
}

.login-card {
    background: rgba(20, 20, 20, 0.7); padding: 50px 40px; border-radius: 28px;
    border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5); 
    width: 100%; max-width: 360px; text-align: center;
}

.login-card h2 { 
    color: #ffffff; font-size: 30px; margin-bottom: 35px; font-weight: 800; 
    letter-spacing: -1.5px; text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5); 
}

.login-card input { 
    padding: 16px 20px; margin: 10px 0; background: rgba(0, 0, 0, 0.4); 
    border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; border-radius: 14px; 
    width: 100%; font-size: 16px; outline: none; box-sizing: border-box; 
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.login-card input:focus { 
    border-color: #e67e22; background: rgba(0, 0, 0, 0.6); 
    box-shadow: 0 0 20px rgba(230, 126, 34, 0.2); 
}

/* ============================================================
   6. LOGIN-BUTTON MIT BLITZ-EFFEKT
   ============================================================ */
#loginBtn { 
    padding: 18px; margin-top: 25px; 
    background: linear-gradient(180deg, #ff9f43 0%, #e67e22 100%); 
    color: white; border: none; border-radius: 16px; cursor: pointer; width: 100%; 
    font-family: 'Oswald', sans-serif; font-size: 20px; font-weight: 700; 
    text-transform: uppercase; letter-spacing: 1.5px;
    box-shadow: 0 10px 20px -5px rgba(230, 126, 34, 0.5);
    transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
    position: relative; overflow: hidden; z-index: 1;
}

#loginBtn:hover { transform: translateY(-3px); filter: brightness(1.1); }

/* Verstecken wenn aktiv geladen wird */
#loginBtn.loading { display: none !important; }

/* Dynamischer Blitz */
#loginBtn::after {
    content: ''; position: absolute; top: 0; left: -150%; width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
    transform: skewX(-25deg); transition: 0.6s ease-in-out; z-index: 3;
}
#loginBtn:hover::after { left: 150%; }

/* ============================================================
   7. HÜPFENDER BASKETBALL (LOADER-EDITION)
   ============================================================ */
#loginBall {
    display: none; /* Erst beim Klick sichtbar */
    margin-top: 30px;
    font-size: 50px; /* Schön groß */
    filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
}

/* Wird von handleLogin() hinzugefügt */
#loginBall.active {
    display: inline-block !important;
    animation: bounceAndGrow 0.8s infinite alternate ease-in-out;
}

@keyframes bounceAndGrow {
    0% { 
        transform: translateY(0) scale(1); 
        animation-timing-function: ease-out;
    }
    100% { 
        transform: translateY(-45px) scale(1.5); /* Springt hoch und wird massiv größer */
        animation-timing-function: ease-in;
    }
}

/* Fehlertext Styling */
#loginError {
    color: #ff4757;
    font-size: 14px;
    margin-top: 15px;
    min-height: 20px;
    font-weight: 600;
}

/* ============================================================
   6. MODALS & SIDEBAR
   ============================================================ */
.modal-content {
    background: #111; border: 1px solid #333; padding: 24px; border-radius: 12px;
    width: 320px; text-align: center; color: #eee;
}

#newsSidebar {
    position: fixed; top: 0; left: 0; height: 100%; width: 300px;
    background: #1a1a1a; z-index: 12000; border-right: 1px solid #333;
    transform: translateX(-100%); transition: transform 0.3s ease-out;
}
.sidebar-open #newsSidebar { transform: translateX(0); }

/* Animationen */
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes spin-once { to { transform: rotate(360deg); } }

/* 8. NEWS-SIDEBAR (Von Links) */
#newsSidebar {
    position: fixed;
    top: 0;
    left: -350px; /* Startet außerhalb */
    width: 320px;
    height: 100%;
    background: #111;
    border-right: 1px solid #333;
    z-index: 12000;
    transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    padding: 20px;
    box-shadow: 10px 0 30px rgba(0,0,0,0.5);
}

#newsSidebar.active { left: 0; }

.news-item {
    background: #1a1a1a;
    border: 1px solid #333;
    padding: 12px;
    border-radius: 6px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.2s;
}
.news-item:hover { border-color: #e67e22; background: #222; }

/* Blinken bei News-Sprung */
@keyframes highlightBlink {
    0% { box-shadow: 0 0 0px #e67e22; border-color: #333; }
    50% { box-shadow: 0 0 20px #e67e22; border-color: #e67e22; }
    100% { box-shadow: 0 0 0px #e67e22; border-color: #333; }
}
.blink-active { animation: highlightBlink 0.6s ease-in-out 3; }




/* ============================================================
   9. EIGENES KONTEXT-MENÜ (OPTIMIERT FÜR INLINE-FEEDBACK)
   ============================================================ */

.eigenesmenu-backdrop {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    z-index: 10000;
    display: flex;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(8px);
    padding: 15px;
    opacity: 0; /* Wird per JS auf 1 gesetzt */
    transition: opacity 0.3s ease;
}

.eigenesmenu-container {
    width: 100%;
    max-width: 380px;
    max-height: 90vh; 
    display: flex;
    flex-direction: column;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 16px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.8);
    overflow: hidden;
    transform: translateY(20px); /* Startposition für Animation */
    transition: transform 0.3s ease-out;
}

.eigenesmenu-header {
    padding: 20px;
    background: #1a1a1a;
    border-bottom: 1px solid #333;
}

.eigenesmenu-header h3 {
    color: #e67e22;
    margin: 0;
    font-size: 1.1em;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.eigenesmenu-header p {
    color: #666;
    font-size: 12px;
    margin: 5px 0 0 0;
    line-height: 1.4;
}

.eigenesmenu-liste {
    padding: 15px;
    overflow-y: auto;
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* --- OPTIMIERTER BUTTON --- */
.eigenesmenu-item {
    position: relative; /* Wichtig für absoluten Loader rechts */
    width: 100%;
    min-height: 52px; /* Fixiert die Höhe, damit nichts springt */
    background: #262626;
    color: #eee;
    border: 1px solid #333;
    padding: 12px 50px 12px 18px; /* Mehr Platz rechts für den Loader */
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    text-align: left;
    transition: background 0.3s ease, border-color 0.2s ease, transform 0.2s ease;
}

.eigenesmenu-item:hover:not(:disabled) {
    border-color: #e67e22;
    background: #2d2d2d;
    transform: translateX(5px);
}

/* Wenn das Menü gesperrt ist (während Speichern) */
#eigenesmenu-modal[style*="pointer-events: none"] .eigenesmenu-item {
    cursor: wait;
    transform: none !important; /* Kein Verschieben beim Speichern */
}

.eigenesmenu-icon {
    margin-right: 15px;
    font-size: 1.2em;
    color: #e67e22;
    width: 20px;
    text-align: center;
    flex-shrink: 0;
}

/* --- INLINE LOADER & SUCCESS RECHTS --- */
.inline-loader-container {
    position: absolute;
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
}

.eigenesmenu-loader {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(230, 126, 34, 0.2);
    border-top: 2px solid #e67e22; /* Dein Orange */
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.eigenesmenu-cancel {
    width: 100%;
    background: #111;
    color: #555;
    border: none;
    border-top: 1px solid #222;
    padding: 15px;
    cursor: pointer;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: color 0.2s ease;
}

.eigenesmenu-cancel:hover {
    color: #888;
}

/* Hilfsklasse für den Erfolg (wird via JS gesetzt) */
.btn-success-state {
    background: #1b4332 !important; /* Dunkelgrün */
    border-color: #2d6a4f !important;
    color: #fff !important;
}
    



    
/* 10. MATERIAL-VISUALS & TOOLTIPS */
.material-icon {
    position: absolute; /* Absolut innerhalb der .box */
    top: 5px;
    right: 5px;
    color: #e67e22;
    font-size: 14px;
    z-index: 10;
    cursor: pointer !important;    /* FIX 1: Ändert das Fragezeichen zur Klick-Hand */
    pointer-events: auto !important; /* FIX 2: Garantiert, dass Klicks abgefangen werden */
    padding: 4px;                  /* Erleichtert das Treffen auf mobilen Geräten */
}

.material-icon::after {
    content: attr(data-tooltip);
    position: absolute;
    bottom: 125%;
    right: 0; /* Rechtsbündig mit dem Icon, damit es nicht links rausragt */
    background: rgba(40, 40, 40, 0.95);
    color: #fff;
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 11px;
    white-space: pre-wrap; /* Erlaubt Zeilenumbrüche bei langen Kommentaren */
    width: max-content;
    max-width: 150px;
    display: none;
    z-index: 1000;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    border: 1px solid #e67e22;
    pointer-events: none; /* Verhindert Flackern beim Drüberfahren */
}

@media (hover: hover) {
    .material-icon:hover::after { 
        display: block; 
    }
}

/* Material Info-Fenster (für Mobile-Klick) */
.material-info-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    display: flex; justify-content: center; align-items: center;
    z-index: 15000;
    backdrop-filter: blur(5px);
}

.material-info-content {
    background: #1a1a1a;
    border: 1px solid #444;
    border-radius: 12px;
    padding: 25px;
    width: 85%; max-width: 320px;
    text-align: center;
}

/* 11. SPEZIAL-MODAL: ABKLEBEN / UNIVERSAL-PASSWORT */
#uniPwInput {
    width: 100%;
    max-width: 250px;
    padding: 12px;
    background: #000;
    border: 1px solid #e67e22;
    color: #fff;
    border-radius: 8px;
    text-align: center;
    font-size: 1.2rem;
    letter-spacing: 5px;
    margin: 20px 0;
    outline: none;
    box-shadow: inset 0 0 10px rgba(230, 126, 34, 0.2);
}

.mini-loader {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
}



</style>


</head>


<body>

    <div id="global-loader" class="global-loader" style="display:none;"></div>

<div id="loginOverlay">
    <div class="login-card">
        <h2>BBZO <span>Sport</span></h2>
        
        <input type="text" id="userKuerzel" placeholder="Kürzel" autocomplete="username"
               onfocus="document.getElementById('loginError').innerText=''"
               oninput="document.getElementById('loginError').innerText=''">
        
        <input type="password" id="pw" placeholder="Passwort" autocomplete="current-password"
               onfocus="document.getElementById('loginError').innerText=''"
               oninput="document.getElementById('loginError').innerText=''"
               onkeydown="if(event.key === 'Enter') { event.preventDefault(); handleLogin(); }">

        <button id="loginBtn" onclick="handleLogin()">ON YOUR MARKS...</button>
        
        <div id="loginBall" class="basketball-bounce">🏀</div>
        
        <p id="loginError"></p>
    </div>
</div>

   <div class="date-control">
    <div class="nav-section nav-left">
        <div id="news-btn-container" style="display: none;">
            <div class="news-btn-premium" onclick="showNews()">
                <span class="btn-text">NEWS</span>
                <i class="fas fa-bell bell-icon"></i>
                <div id="news-dot" class="badge" style="display: none;"></div>
            </div>
        </div>
    </div>

    <div class="nav-section nav-center">
        <div class="nav-group">
            <button class="nav-btn" onclick="changeDate(-7)" title="1 Woche zurück"><i class="fas fa-angle-double-left"></i></button>
            <button id="prev-day" class="nav-btn" onclick="changeDate(-1)" title="1 Tag zürück"><i class="fas fa-angle-left"></i></button>
        </div>
        
        <button class="nav-btn" onclick="goToToday()" title="Heute"><i class="fas fa-home"></i></button>
        
        <input type="date" id="datePicker" onchange="loadPlan()">
        
        <div class="nav-group">
            <button id="next-day" class="nav-btn" onclick="changeDate(1)" title="1 Tag vor"><i class="fas fa-angle-right"></i></button>
            <button class="nav-btn" onclick="changeDate(7)" title="1 Woche vor"><i class="fas fa-angle-double-right"></i></button>
        </div>
    </div>

    <div class="nav-section nav-right">
        <button class="refresh-btn" onclick="loadPlan()" title="Aktualisieren">
            <i class="fas fa-sync-alt"></i>
        </button>
    </div>
</div>

    <div id="plan-container"></div>

    <div id="newsSidebar" style="display:none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding: 10px;">
            <h2 style="margin: 0; font-size: 1.2em; color: #e67e22;">NEUIGKEITEN</h2>
            <button onclick="closeNews()" style="background: none; border: none; color: #666; cursor: pointer; font-size: 1.5em;">&times;</button>
        </div>
        <div id="newsContent" style="padding: 0 15px;">
            </div>
    </div>

    <div id="customMenuBackdrop" class="eigenesmenu-backdrop" style="display: none;" onclick="closeCustomMenu()">
        <div class="eigenesmenu-container" onclick="event.stopPropagation()">
            <div class="eigenesmenu-header">
                <h3 id="menuTitle">Aktionen wählen</h3>
                <p id="menuSubtitle">Slot bearbeiten</p>
            </div>
            <div id="menuOptions" class="eigenesmenu-liste">
                </div>
            <button class="eigenesmenu-cancel" onclick="closeCustomMenu()">Abbrechen</button>
        </div>
    </div>

    <div id="materialInfoOverlay" class="material-info-overlay" style="display: none;" onclick="this.style.display='none'">
        <div class="material-info-content" onclick="event.stopPropagation()">
            <div id="materialInfoTitle" class="material-info-title">Gebuchtes Material</div>
            <div id="materialInfoText" class="material-info-text"></div>
            <button class="btn-cancel" onclick="document.getElementById('materialInfoOverlay').style.display='none'" style="width:100%; padding: 10px; margin-top: 10px; background: #333; border: none; border-radius: 4px; color: #fff;">Schliessen</button>
        </div>
    </div>

    <div id="universalModal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <div id="uniIcon" class="modal-header">⚠️</div>
            <h3 id="uniTitle">Bestätigung</h3>
            <p id="uniMessage">Möchtest du fortfahren?</p>
            
            <div id="uniPwContainer" style="display:none; margin-bottom: 20px;">
                <input type="password" id="uniPwInput" placeholder="Passwort"

function getDataBySlotIndex(index) {
    // Wir ziehen 1 ab, damit wir intern mit 0-basiertem Index rechnen (1 -> 0)
    const korrigierterIndex = index - 1;

    // Da wir nur die 5 Wochentage zählen (ohne die Zeitspalte):
    const spaltenProWoche = 5; 
    
    // Berechne die Zeile (Stunde)
    // Wir addieren 1 bei der Zeile, falls currentPlanData[0] der Header ist
    const zeile = Math.floor(korrigierterIndex / spaltenProWoche) + 1;
    
    // Berechne die Spalte (Tag)
    // Wir addieren 1, um die Zeitspalte (Index 0) zu überspringen
    const spalte = (korrigierterIndex % spaltenProWoche) + 1;

    console.log(`Slot ${index} -> Suche in currentPlanData[Zeile ${zeile}][Spalte ${spalte}]`);

    if (currentPlanData[zeile] && currentPlanData[zeile][spalte]) {
        return currentPlanData[zeile][spalte];
    }
    return null;
}

window.loadPlan = async function() {

        if (json.status === "error" && json.error !== "SPERRE") {

            return;

        // Sperrzeit / Feiertag

        allClassTeachers = json.allClassTeachers || {};

        }
        
        const wtArr = ["Sonntag", "Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag", "Samstag"];
        const [y, m, d] = dateVal.split('-').map(Number);
        
        const zeiten = [
            "07:15 - 08:00", "08:05 - 08:50", "08:55 - 09:40", 
            "10:00 - 10:45", "10:50 - 11:35", "11:40 - 12:25", 
            "12:50 - 13:35", "13:40 - 14:25", "14:30 - 15:15", 
            "15:35 - 16:20", "16:25 - 17:10", "17:15 - 18:00" 
        ];

        let html = ""; 
        html += `<div class="box header-row" style="grid-column: span 6;">
                    <span>${wtArr[dateObj.getDay()]}, ${d}.${m}.${y}</span>
                 </div>`;

        zeiten.forEach((zeitStr, rowIndex) => {
            const lektionNum = rowIndex + 1;

            if (lektionNum === 4 || lektionNum === 10) html += `<div class="divider-thin"></div>`;
            if (lektionNum === 7) html += `<div class="divider-thick"></div>`;

            html += `<div class="box zeit-box">${zeitStr}</div>`;
            
            for(let i = 1; i <= 5; i++) {
                const absoluteSlot = (rowIndex * 5) + i; 
                const slotData = plan[absoluteSlot] || {};

                const klasse = slotData.klasse || "";
                const halle = slotData.halle || "";
                const material = slotData.material || "";
                const matKommentar = slotData.kommentar || "";
                const lehrer = slotData.lehrer || allClassTeachers[klasse] || "";
                
                const isAusfall = (halle === "Ausfall");
                const canEdit = myClasses.some(c => 
                    klasse.trim().toLowerCase() === c.trim().toLowerCase() && 
                    klasse.trim() !== ""
                );
                
                // --- INTEGRATION DEINES CUSTOM POPUPS MIT BASE64-SCHUTZ ---
                let materialHtml = "";
                if (material) {
                    // Verwandelt Texte in sichere Zeichenketten, damit Zeilenumbrüche/Anführungszeichen das HTML nicht brechen
                    const b64Material = btoa(unescape(encodeURIComponent(material)));
                    const b64Kommentar = btoa(unescape(encodeURIComponent(matKommentar || "")));
                    const tooltipText = matKommentar ? `${material}: ${matKommentar}` : material;

                    materialHtml = `
                        <span class="material-icon" 
                              data-tooltip="${tooltipText.replace(/"/g, '&quot;')}" 
                              style="position: absolute; top: 5px; right: 5px; z-index: 9999; pointer-events: auto !important; cursor: pointer !important; display: inline-block; padding: 4px;"
                              onclick="event.stopPropagation(); event.preventDefault(); if(typeof showMaterialDetailPopup === 'function') { 
                                  const mat = decodeURIComponent(escape(atob('${b64Material}')));
                                  const kom = decodeURIComponent(escape(atob('${b64Kommentar}')));
                                  showMaterialDetailPopup(mat, kom);

                        <div class="lehrer-info">${lehrer}</div>
                        <div class="halle-label">${halle}</div>
                </div>`;
            }
        });

        container.innerHTML = html;

    } catch(e) { 
        console.error("Fehler in loadPlan:", e); 
        container.innerHTML = `<div class="box info-box" style="color:red; grid-column: span 6;">Server-Verbindung unterbrochen!</div>`;
    } finally {
        if (loader) loader.style.display = 'none';
        updateNavButtons();
    }
};

/**

 * WICHTIG: In der DB-Version schicken wir kein "Klasse | Halle" mehr,
 * sondern die reinen Werte, die das Backend dann in die richtigen Spalten schreibt.
 */
function prepareUpdateData(slotId, neueHalle, neueKlasse, neuesMaterial, neuerKommentar) {
    // Wir holen uns die Basis-Daten des Slots, falls vorhanden
    // 'plan' ist das Objekt, das wir beim Laden vom Server erhalten haben
    const aktuellerSlot = (window.currentPlan && window.currentPlan[slotId]) ? window.currentPlan[slotId] : {};

    // Logik: Nutze den neuen Wert, falls vorhanden, sonst den alten aus dem Speicher
    const updateObj = {
        slot: slotId,
        klasse: (neueKlasse !== undefined) ? neueKlasse : (aktuellerSlot.klasse || ""),
        halle: (neueHalle !== undefined) ? neueHalle : (aktuellerSlot.halle || ""),
        material: (neuesMaterial !== undefined) ? neuesMaterial : (aktuellerSlot.material || ""),
        kommentar: (neuerKommentar !== undefined) ? neuerKommentar : (aktuellerSlot.kommentar || "")
    };

    console.log(`🛠 Update-Daten für Slot ${slotId} vorbereitet:`, updateObj);
    return updateObj;
}

/**
 * Sucht alle Kollegen (Kürzel), die im gleichen Zeit-Slot 
 * in anderen Hallen unterrichten.
 * @param {number} slotIndex - Die Spalte der Halle (1-5)
 */
function getAffectedColleagues(slotIndex) {
    const colleagues = [];
    if (!currentPlanData) return "";
    
    // Wir prüfen alle 5 Hallen-Spalten
    for (let s = 1; s <= 5; s++) {
        if (parseInt(s) === parseInt(slotIndex)) continue; // Eigener Slot wird ignoriert

        // Wir gehen durch alle Zeit-Zeilen
        currentPlanData.forEach((row, rowIndex) => {
            if (rowIndex === 0) return; // Header ignorieren
            
            let cellContent = row[s] ? row[s].toString().trim() : "";
            
            if (cellContent !== "" && !cellContent.includes("U21")) {
                // Extrahiert die Klasse (erster Teil vor Leerzeichen oder Pipe)
                let klasse = cellContent.split(/[ |]/)[0].trim();
                let lehrerKuerzel = allClassTeachers[klasse];
                
                if (lehrerKuerzel && !colleagues.includes(lehrerKuerzel)) {
                    colleagues.push(lehrerKuerzel);
                }
            }
        });
    }
    return colleagues.join(",");
}

/**
 * Erzeugt eine News-Meldung und sendet sie SOFORT an das Google Sheet (news_db)
 */
async function triggerNews(type, slotIndex, klasse) {
    const datePicker = document.getElementById('datePicker');
    if (!datePicker) return;
    const dateVal = datePicker.value;
    
    let newsText = "";
    if (type === "ausfall") newsText = `Halle frei: ${klasse} fällt aus.`;
    if (type === "outdoor") newsText = `Halle frei: ${klasse} ist Outdoor.`;
    if (type === "beendet") newsText = `Halle dauerhaft frei: ${klasse} hat Schuljahr beendet.`;

    if (!newsText) return;

    // Payload für die news_db
    const payload = {
        mode: "saveNews",
        id: "ID_" + Date.now() + "_" + Math.floor(Math.random() * 1000), 
        datum: dateVal,
        slot: slotIndex,
        tagIndex: new Date(dateVal).getDay(),
        klasse: klasse,
        verfasser: userKuerzel,
        empfaenger: getAffectedColleagues(slotIndex), 
        text: newsText,
        pw: userPw
    };

    // Globaler Loader an (Auto-Save Feedback)
    if (typeof toggleLoader === 'function') toggleLoader(true);

    try {
        const response = await fetch(url, {
            method: "POST",
            body: JSON.stringify(payload)
        });

        const result = await response.json();
        
        if (result.status === "success") {
            console.log("News-Flash gesendet:", newsText);
            // Optional: Kleiner Toast oder Hinweis, dass Kollegen informiert wurden
        }
    } catch (error) {
        console.error("News-Fehler:", error);
        alert("Kollegen konnten nicht automatisch informiert werden (Verbindung?).");
    } finally {
        if (typeof toggleLoader === 'function') toggleLoader(false);
    }
}

/**
 * Erlaubt das An- und Abwählen mehrerer Materialien im Menü
 */
function toggleMaterialSelection(mat, btn) {
    // Da das Menü dynamisch ist, suchen wir den Button innerhalb des Modals
    const root = document.getElementById('eigenesmenu-modal');
    const nextStep = root ? root.querySelector('#materialNextStep') : document.getElementById('materialNextStep');
    const check = btn.querySelector('.check-indicator');

    if (selectedMaterials.includes(mat)) {
        // Entfernen
        selectedMaterials = selectedMaterials.filter(m => m !== mat);
        btn.style.borderColor = "#333";
        btn.style.background = "transparent";
        if (check) check.innerText = "○";
    } else {
        // Hinzufügen
        selectedMaterials.push(mat);
        btn.style.borderColor = "#ff8c00";
        btn.style.background = "rgba(255, 140, 0, 0.1)";
        if (check) check.innerText = "●";
    }

    // "Weiter"-Button nur zeigen, wenn etwas gewählt wurde
    if (nextStep) {
        nextStep.style.display = selectedMaterials.length > 0 ? 'block' : 'none';
    }
}

    

/**
 * Finales Speichern im Backend
 */
async function saveMaterialSelection(mat, detail, time, slot, klasse, btn) {
    // 1. UI Feedback: Loader zeigen & Button sperren
    let loader, btnText;
    if (btn) {
        loader = btn.querySelector('.eigenesmenu-loader');
        btnText = btn.querySelector('.btn-text');
        if (loader) loader.style.display = 'block';
        if (btnText) btnText.style.opacity = '0.3';
        btn.disabled = true;
    }

    // 2. DATEN-AKQUISE: Absolute Slot-ID (1-60) sicherstellen
    // Wir nehmen den übergebenen Slot ODER den globalen Sicherheits-Anker
    const finalSlot = slot || window.currentEditSlot; 
    
    const datePicker = document.getElementById('datePicker');
    const dateVal = datePicker ? datePicker.value : "";

    // 3. VALIDIERUNG: Verhindert "undefined"-Einträge im Sheet
    if (!finalSlot || finalSlot === "undefined" || !dateVal) {
        console.error("Speichern abgebrochen: Fehlende Daten", { finalSlot, dateVal });
        alert("Fehler: Die Slot-ID (1-60) konnte nicht ermittelt werden. Bitte schließen und erneut versuchen.");
        
        // UI Reset im Fehlerfall
        if (btn) {
            btn.disabled = false;
            if (loader) loader.style.display = 'none';
            if (btnText) btnText.style.opacity = '1';
        }
        return;
    }

    // Eindeutige ID für das Sheet (z.B. 2026-05-12_42)
    const uniqueId = `${dateVal}_${finalSlot}`;

    const payload = {
        mode: "saveMaterial",
        id: uniqueId,
        date: dateVal,
        time: time || "",
        slot: finalSlot,
        klasse: klasse || "",
        material: mat,
        kommentar: detail || "",
        pw: typeof userPw !== 'undefined' ? userPw : "",
        kuerzel: typeof userKuerzel !== 'undefined' ? userKuerzel : ""
    };

    console.log("📤 Sende Material-Daten:", payload);

    try {
        // 'url' muss global definiert sein
        const response = await fetch(url, {
            method: "POST",
            body: JSON.stringify(payload)
        });

        if (!response.ok) throw new Error("Netzwerk-Antwort war nicht ok");

        const result = await response.json();

        if (result.status === "success") {
            console.log("✅ Speichern erfolgreich");
            if (typeof closeEditor === 'function') closeEditor();
            if (typeof loadPlan === 'function') await loadPlan();
        } else {
            throw new Error(result.msg || "Server hat einen Fehler gemeldet");
        }
    } catch (e) {
        console.error("❌ Material Save Error:", e);
        alert("Verbindung zum Google Sheet fehlgeschlagen: " + e.message);
        
        // Button wieder benutzbar machen
        if (btn) {
            btn.disabled = false;
            if (loader) loader.style.display = 'none';
            if (btnText) btnText.style.opacity = '1';
        }
    }
}

window.addChange = async function(el, time, slot, klasse) {

    if (!parent) return;

    const absoluteSlot = parent.getAttribute('data-slot'); 
    const dateVal = document.getElementById('datePicker').value;

    if (val === "Ausfall") {
        parent.classList.add('ausfall-mode');

        parent.classList.remove('ausfall-mode');
    }

    // Wir senden genau das, was die Tabellen-Spalten erwarten
    const payload = {
        // 'action' ist nur für das Script-Handling (doPost) wichtig
        action: "saveBooking", 
        pw: userPw,
        kuerzel: userKuerzel,
        
        // Diese Felder landen in der Tabelle:
        date: dateVal,
        slot: absoluteSlot,
        klasse: klasse,
        halle: (val === "---" ? "" : val),
        material: "", 
        kommentar: ""
    };

};

/**
 * Schließt das Menü und bereinigt den Status
 */
function closeEditor() {
    const modal = document.getElementById('eigenesmenu-modal');
    if (modal) {
        modal.remove();
    }
    // Wichtig: Auswahl-Array für Materialien leeren, wenn das Menü schließt
    if (typeof selectedMaterials !== 'undefined') {
        selectedMaterials = [];
    }
}



/**
 * Verarbeitet die Wahl aus dem Task Manager (Haupt-Weiche)
 */
window.handleMenuChoice = function(action, time, slot, klasse) {
    console.log("Aktion gewählt:", action); 

    switch(action) {
        case 'reservation':
            // Öffnet die Hallenauswahl direkt im bestehenden Menü-Container
            handleReservationUI(time, slot, klasse);
            break;
            
        case 'material':
            const activeModal = document.getElementById('eigenesmenu-modal');
            if (typeof handleMaterialUI === 'function') {
                handleMaterialUI(time, slot, klasse, activeModal);
            }
            break;

        case 'ausfall':
            // Wir prüfen den aktuellen Status direkt an der Box
            const istBereitsAusfall = window.currentEditBox ? window.currentEditBox.classList.contains('ausfall-mode') : false;
            // Wir nutzen den Button-Trigger aus dem DOM für den Loader
            const btn = document.querySelector('.eigenesmenu-item:nth-child(3)'); 
            if (typeof handleAusfallClick === 'function') {
                handleAusfallClick(istBereitsAusfall ? 'LOESCHEN' : 'SETZEN', time, slot, klasse, btn);
            }
            break;

        case 'beendet':
            if (confirm(`Möchtest du die Klasse ${klasse} wirklich für das restliche Schuljahr abkleben?`)) {
                closeEditor();
                if (typeof startYearReset === 'function') startYearReset(klasse);
            }
            break;

        case 'nachricht':
            const note = prompt("Notiz für " + klasse + " erfassen:", "");
            if (note !== null) {
                // Wir senden ein Payload mit dem Kommentar an die DB
                const payload = {
                    action: "saveBooking",
                    pw: userPw,
                    kuerzel: userKuerzel,
                    date: document.getElementById('datePicker').value,
                    slot: slot,
                    klasse: klasse,
                    kommentar: note
                };
                saveImmediately(payload).then(() => {
                    closeEditor();
                    loadPlan();
                });
            }
            break;
            
        default:
            console.warn("Unbekannte Aktion im Task Manager:", action);
    }
};

    

/**
 * Verarbeitet das Setzen oder Löschen des Ausfalls (Blitz-Version ohne Popup)
 */
window.handleAusfallClick = function(mode, time, slot, klasse, btn) {
    console.log("handleAusfallClick (Direktmodus) getriggert. Modus:", mode);

    // 1. Klick-Blocker & Loader aktivieren
    const modal = document.getElementById('eigenesmenu-modal');
    if (modal) modal.style.pointerEvents = "none";

    let originalText = "Ausfall markieren";
    if (btn) {
        // Wir holen uns den echten Text direkt aus dem Button, damit es für beide Modi passt
        originalText = btn.querySelector('.btn-text')?.innerText || btn.innerText;
        btn.style.position = "relative";
        btn.innerHTML = `
            <span class="btn-text">${originalText}</span>
            <div class="inline-loader-container">
                <div class="eigenesmenu-loader" style="width:14px; height:14px; border-width:2px;"></div>
            </div>
        `;
    }

    // Modus-Weiche: 'LOESCHEN' setzt die Halle auf leer, 'SETZEN' bucht "Ausfall"
    const zielHalle = (mode === 'LOESCHEN') ? "" : "Ausfall";
    
    // Payload für dein Google Script zusammenbauen
    const payload = {
        action: "saveBooking",
        pw: userPw,
        kuerzel: userKuerzel,
        date: document.getElementById('datePicker').value,
        slot: slot,
        klasse: klasse,
        halle: zielHalle
    };

    // 2. Daten ohne Verzögerung direkt absenden
    saveImmediately(payload)
        .then((result) => {
            if (result && result.status === "success") {
                // Erfolg: Loader durch grünen Haken ersetzen
                const loaderContainer = btn?.querySelector('.inline-loader-container');
                if (loaderContainer) {
                    loaderContainer.innerHTML = `<span style="color: #2ecc71; font-weight: bold; font-size: 1.2em; margin-left: 8px;">✓</span>`;
                }

                if (btn) {
                    // Der Button leuchtet genau wie die Hallen-Auswahl wunderschön grün auf
                    btn.style.transition = "background 0.3s ease";
                    btn.style.background = "rgba(39, 174, 96, 0.4)"; 
                }

                // Grid im Hintergrund neu laden und Editor zeitnah schließen
                loadPlan().then(() => {
                    setTimeout(closeEditor, 400);
                });
            } else {
                throw new Error("Server-Fehler beim Speichern");
            }
        })
        .catch((err) => {
            console.error("Fehler beim Ausfall-Speichern:", err);
            
            // Fehler-Animation für den Button
            if (btn) {
                btn.style.background = "rgba(192, 57, 43, 0.5)";
                btn.innerHTML = `<span class="btn-text">${originalText}</span> <span style="margin-left:10px;">❌</span>`;
            }
            
            // Nach 1.5 Sekunden UI wieder freigeben bei Fehler
            setTimeout(() => {
                if (modal) modal.style.pointerEvents = "auto";
                if (btn) {
                    btn.style.background = "";
                    btn.innerHTML = `<span class="btn-text">${originalText}</span>`;
                }
            }, 1500);
        });
};

    


    function handleReservationUI(time, slot, klasse) {
    const container = document.getElementById('menu-options-list');
    const subtitle = document.getElementById('menu-subtitle');
    if (!container) return;

    const aktuelleHalleInBox = window.currentEditBox?.querySelector('.halle-label')?.innerText.trim() || "";

    if (subtitle) {
        subtitle.innerHTML = `Wähle die Räumlichkeiten für die <span style="color: #ff8c00; font-weight: bold;">${klasse}</span>`;
    }

    const currentSlot = parseInt(slot);
    const rowIndex = Math.floor((currentSlot - 1) / 5);
    const startSlot = (rowIndex * 5) + 1;
    const endSlot = startSlot + 4;

    let besetzteHallen = [];
    for (let s = startSlot; s <= endSlot; s++) {
        if (s === currentSlot) continue;
        const data = window.lastPlanData ? window.lastPlanData[s] : null;
        if (data && data.halle && data.halle !== "Ausfall") {
            const hName = data.halle.trim();
            if (hName.toLowerCase().includes("aussenplatz") || hName.toLowerCase().includes("outdoor")) continue; 
            if (hName.includes('+')) {
                besetzteHallen.push(...hName.split('+').map(t => t.trim()));
            }
            besetzteHallen.push(hName);
        }
    }

    let html = "";

    // --- LÖSCHEN AN ERSTER STELLE ---
    if (aktuelleHalleInBox !== "" && aktuelleHalleInBox !== "---") {
        html += `
            <button class="eigenesmenu-item" 
                    style="justify-content: center; background: #442222; border: 1px solid #663333; margin-bottom: 15px;" 
                    onclick="applyHalleSelection('', '${time}', '${slot}', '${klasse}', this)">
                <span class="btn-text" style="color: #ffaaaa; font-weight: bold;">❌ RESERVIERUNG LÖSCHEN</span>
            </button>`;
    }

    const hallen = (typeof configFarben !== 'undefined' && Object.keys(configFarben).length > 0) 
                   ? Object.keys(configFarben) 
                   : ["Halle 1", "Halle 2", "Halle 3", "Halle 4", "Halle 5", "U21", "Aussenplatz"];
    
    hallen.forEach(h => {
        const hClean = h.trim();
        const isOutdoor = hClean.toLowerCase().includes("aussenplatz") || hClean.toLowerCase().includes("outdoor");
        
        let istGesperrt = false;
        if (!isOutdoor) {
            if (hClean.includes('+')) {
                const hTeile = hClean.split('+').map(t => t.trim());
                istGesperrt = hTeile.some(teil => besetzteHallen.includes(teil));
            } else {
                istGesperrt = besetzteHallen.includes(hClean);
            }
        }

        if (istGesperrt) {
            html += `
                <button class="eigenesmenu-item" style="justify-content: center; opacity: 0.2; cursor: not-allowed; background: #222;" disabled>
                    <span class="btn-text" style="text-decoration: line-through; color: #666;">${h}</span>
                </button>`;
        } else {
            // Abgleich mit der aktuell gebuchten Halle
            const istAktuelleWahl = hClean.toLowerCase() === aktuelleHalleInBox.toLowerCase();
            const configBorderColor = configFarben[h] || "#444";
            
            let buttonStyle = "";
            let iconHtml = "";

            if (istAktuelleWahl) {
                // ANPASSUNG: Dezent analog zum Löschen-Button (Dunkles Orange-Braun #442d11)
                buttonStyle = `justify-content: flex-start; background: #442d11 !important; color: #ffca88 !important; font-weight: bold !important; border: 1px solid #774c11 !important; margin-bottom: 8px;`;
                iconHtml = `<span class="eigenesmenu-icon" style="margin-right: 10px; color: #ff8c00;">🔸</span>`;
            } else {
                // Standard-Button Style
                buttonStyle = `justify-content: flex-start; background: #333; margin-bottom: 8px; border-left: 5px solid ${configBorderColor}; border-top: 1px solid #444; border-right: 1px solid #444; border-bottom: 1px solid #444;`;
                iconHtml = `<span class="eigenesmenu-icon" style="margin-right: 10px;">🏠</span>`;
            }

            html += `
                <button class="eigenesmenu-item" style="${buttonStyle}" 
                        onclick="applyHalleSelection('${h}', '${time}', '${slot}', '${klasse}', this)">
                    ${iconHtml}
                    <span class="btn-text">${h}</span>
                    ${istAktuelleWahl ? '<span style="margin-left: auto; font-size: 0.7rem; background: rgba(0,0,0,0.4); padding: 2px 6px; border-radius: 4px; color: #ff8c00; border: 1px solid rgba(255,140,0,0.2); font-weight: normal;">AKTUELL</span>' : ''}
                </button>`;
        }
    });

    container.innerHTML = html;
}

    

window.applyHalleSelection = async function(neueHalle, time, slot, klasse, btn) {
    if (!btn) return;

    // 1. Klick-Blocker aktivieren
    // Wir verhindern Klicks auf das gesamte Menü UND das Backdrop (Schließen durch Klick daneben)
    const modal = document.getElementById('eigenesmenu-modal');
    if (modal) {
        modal.style.pointerEvents = "none"; 
    }

    // 2. Button-Styling vorbereiten
    // Wir behalten den Text und fügen rechts den Loader hinzu
    const originalText = btn.querySelector('.btn-text').innerText;
    btn.style.position = "relative";
    btn.innerHTML = `
        <span class="btn-text">${originalText}</span>
        <div class="inline-loader-container">
            <div class="eigenesmenu-loader" style="width:14px; height:14px; border-width:2px;"></div>
        </div>
    `;

    const payload = {
        action: "saveBooking",
        pw: userPw,
        kuerzel: userKuerzel,
        date: document.getElementById('datePicker').value,
        slot: slot,
        klasse: klasse,
        halle: neueHalle
    };

    // Sicherheits-Timeout (8 Sek)
    const safetyTimeout = setTimeout(() => {
        alert("Verbindung zu langsam. Bitte Seite neu laden.");
        if (modal) modal.style.pointerEvents = "auto";
        handleReservationUI(time, slot, klasse); // Menü zurücksetzen
    }, 8000);

    try {
        const result = await saveImmediately(payload);
        
        if (result && result.status === "success") {
            // 3. Erfolg: Loader durch grünen Haken ersetzen
            const loaderContainer = btn.querySelector('.inline-loader-container');
            if (loaderContainer) {
                loaderContainer.innerHTML = `<span style="color: #2ecc71; font-weight: bold; font-size: 1.2em;">✓</span>`;
            }
            
            // Ganzer Button leuchtet kurz grün auf
            btn.style.transition = "background 0.3s ease";
            btn.style.background = "rgba(39, 174, 96, 0.4)"; 

            clearTimeout(safetyTimeout);

            // Warten bis der Plan im Hintergrund geladen ist
            await loadPlan(); 
            
            // Sanft ausblenden
            setTimeout(closeEditor, 400);
        } else {
            throw new Error("Fehler beim Speichern");
        }
    } catch (e) {
        clearTimeout(safetyTimeout);
        btn.style.background = "rgba(192, 57, 43, 0.5)";
        btn.innerHTML = `<span class="btn-text">${originalText}</span> <span style="margin-left:10px;">❌</span>`;
        
        setTimeout(() => {
            if (modal) modal.style.pointerEvents = "auto";
            handleReservationUI(time, slot, klasse); // Zurück zur Auswahl
        }, 1500);
    }
};

            </button>

            if (root.style.pointerEvents === "none") return;
            
            // Bringt den User sauber zurück in die Hauptansicht des Task-Managers
            if (typeof openEditor === 'function' && aktuelleBox) {
                openEditor(aktuelleBox, time, slot, klasse);
            } else if (typeof closeEditor === 'function') {
                closeEditor();
            }
        };
    }
}
/* ============================================================
   15. DATEN-SYNCHRONISATION (addChange)
   ============================================================ */

window.addChange = async (el, time, slot, klasse) => { 
    let res = el.value; 
    
    // Parent Box finden
    const parent = el.closest('.box') || window.currentEditBox; 
    if (!parent) return;

    const r = parent.getAttribute('data-row');
    const c = slot; // Wir nutzen den übergebenen slot-Index

    // 1. VISUELLES UPDATE DER BOX
    if (res === "Ausfall") {
        parent.classList.add('ausfall-mode');
    } else {
        parent.classList.remove('ausfall-mode');
    }

    // Text in der Box aktualisieren (.res ist das Feld für die Halle)
    const resDisplay = parent.querySelector('.res');
    if (resDisplay) {
        resDisplay.innerText = (res === "" || res === "---") ? "" : res; 
    }
    
    // Farbe setzen (falls in configFarben definiert)
    parent.style.backgroundColor = (typeof configFarben !== 'undefined' && configFarben[res]) ? configFarben[res] : ""; 

    // 2. STRING FÜR GOOGLE SHEETS BAUEN
    // Formatiert den Wert zu "Klasse | Halle | Kommentar"
    let finalVal = buildFinalValue(r, c, (res === "---" ? "" : res), undefined);

    // 3. NEWS-LOGIK (Outdoor / Freigabe)
    if (typeof pendingNews !== "undefined") {
        pendingNews = pendingNews.filter(n => n.slot !== parseInt(slot));
    }

    if (res && res.toString().includes("Outdoor")) {
        if (typeof triggerNews === "function") {
            const newsKlasse = klasse || res.split('|')[0].trim();
            triggerNews("outdoor", parseInt(slot), newsKlasse);
        }
    }

    // 4. LOKALEN DATENSTAND AKTUALISIEREN
    if (!currentPlanData[r]) currentPlanData[r] = [];
    currentPlanData[r][c] = finalVal;
    
    // 5. IN DIE SPEICHERLISTE (Warteschlange)
    // Wir entfernen alte Änderungen für diesen Slot in der Warteschlange
    pendingChanges = pendingChanges.filter(ch => !(ch.slotIndex === slot)); 
    pendingChanges.push({ 
        row: parseInt(r), 
        col: parseInt(c), 
        time: time, 
        slotIndex: slot, 
        val: finalVal 
    }); 

    // 6. SOFORTIGER VERSAND (WICHTIG: await!)
    // Hier wartet das Skript, bis die Antwort vom Google Script kommt
    try {
        await saveImmediately();
    } catch (error) {
        console.error("Fehler beim Auto-Save in addChange:", error);
        throw error; // Re-throw damit updateSelection den Fehler merkt
    }
};

async function saveMaterialSelection(mat, detail, time, slot, klasse, btn) {
    // 1. Klick-Sperre für das gesamte Modal & Backdrop aktivieren
    const modal = document.getElementById('eigenesmenu-modal');
    if (modal) {
        modal.style.pointerEvents = "none"; 
    }

    // 2. UI Feedback direkt im Button initialisieren
    let originalText = "RESERVIERUNG SPEICHERN";
    if (btn) {
        const btnTextEl = btn.querySelector('.btn-text');
        if (btnTextEl) originalText = btnTextEl.innerText;
        
        btn.style.position = "relative";
        btn.style.paddingRight = "50px"; // Platz für den Loader rechts schaffen
        btn.innerHTML = `
            <span class="btn-text">${originalText}</span>
            <div class="inline-loader-container">
                <div class="eigenesmenu-loader" style="width:14px; height:14px; border-width:2px;"></div>
            </div>
        `;
    }

    // 3. Daten-Validierung (deine originale Logik)
    const finalSlot = slot || window.currentEditSlot; 
    const datePicker = document.getElementById('datePicker');
    const dateVal = datePicker ? datePicker.value : "";

    if (!finalSlot || finalSlot === "undefined" || !dateVal) {
        alert("Fehler: Slot-ID oder Datum fehlt.");
        // Im Fehlerfall sofort zurücksetzen
        if (modal) modal.style.pointerEvents = "auto";
        if (btn) {
            btn.style.paddingRight = "18px";
            btn.innerHTML = `<span class="btn-text">${originalText}</span>`;
        }
        return;
    }

    // Die neue zentrale ID (z.B. 2026-05-12_42)
    const uniqueId = `${dateVal}_${finalSlot}`;

    const payload = {
        pw: typeof userPw !== 'undefined' ? userPw : "",
        id: uniqueId,
        date: dateVal,
        slot: finalSlot,
        klasse: klasse || "",
        material: mat,            // Feld für Spalte F
        kommentar: detail || ""   // Feld für Spalte G
    };

    // 4. Sicherheits-Timeout (Falls die Internetverbindung laggt)
    const safetyTimeout = setTimeout(() => {
        alert("Zeitüberschreitung beim Speichern. Bitte Seite neu laden.");
        if (modal) modal.style.pointerEvents = "auto";
        if (btn) {
            btn.style.paddingRight = "18px";
            btn.innerHTML = `<span class="btn-text">${originalText}</span>`;
        }
    }, 8000);

    try {
        // 5. Daten an das Apps Script Web App senden
        const response = await fetch(url, {
            method: "POST",
            body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (result.status === "success") {
            clearTimeout(safetyTimeout);

            // 6. Erfolg: Loader durch grünen Haken ersetzen
            if (btn) {
                const loaderContainer = btn.querySelector('.inline-loader-container');
                if (loaderContainer) {
                    loaderContainer.innerHTML = `<span style="color: #2ecc71; font-weight: bold; font-size: 1.2em;">✓</span>`;
                }
                // Ganzer Button leuchtet kurz grün auf
                btn.style.transition = "background 0.3s ease";
                btn.style.background = "rgba(39, 174, 96, 0.4)"; 
            }

            // 7. Plan im Hintergrund neu laden, bevor das Menü zugeht
            if (typeof loadPlan === 'function') {
                await loadPlan();
            }
            
            // Erst jetzt sanft schließen
            setTimeout(() => {
                if (typeof closeEditor === 'function') closeEditor();
            }, 400);

        } else {
            throw new Error(result.msg || "Server-Fehler");
        }
    } catch (e) {
        clearTimeout(safetyTimeout);
        alert("Fehler beim Speichern: " + e.message);
        
        // 8. Fehler-Zustand für das Interface
        if (modal) modal.style.pointerEvents = "auto";
        if (btn) {
            btn.style.background = "rgba(192, 57, 43, 0.5)";
            btn.innerHTML = `<span class="btn-text">${originalText}</span> <span style="margin-left:10px;">❌</span>`;
            
            // Nach 2 Sekunden den Button wieder normal schalten
            setTimeout(() => {
                btn.style.background = "";
                btn.style.paddingRight = "18px";
                btn.innerHTML = `<span class="btn-text">${originalText}</span>`;
            }, 2000);
        }
    }
}

};

    const badge = document.createElement('div');
    badge.className = 'material-indicator';

    Object.assign(badge.style, {

        top: '2px',
        right: '2px',

        color: 'white',

    /**
 * Der "Postbote": Sendet Daten an das Google Apps Script
 */
window.saveImmediately = async function(payload) {
    // Falls die URL nicht global definiert ist, hier prüfen
    if (typeof url === 'undefined') {
        console.error("Die Variable 'url' (Web-App URL) ist nicht definiert!");
        return;
    }

    try {
        const response = await fetch(url, {
            method: "POST",
            mode: "no-cors", // Wichtig für Google Apps Script
            cache: "no-cache",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify(payload)
        });

        // Hinweis: Bei mode: 'no-cors' kann die Antwort nicht gelesen werden, 
        // aber die Daten kommen trotzdem an. 
        // Wenn du eine Bestätigung brauchst, nutze das normale fetch:
        
        /* const res = await fetch(url, {
            method: "POST",
            body: JSON.stringify(payload)
        });
        const result = await res.json();
        return result; 
        */

        console.log("Speicherbefehl gesendet:", payload);
        return { status: "success" }; 

    } catch (e) {
        console.error("Kritischer Fehler beim Speichern:", e);
        alert("Verbindung zum Server fehlgeschlagen!");
    }
};
