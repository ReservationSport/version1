<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservation Sport - BBZO1234</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&display=swap" rel="stylesheet">

 

<style>



/* 1. GLOBALE EINSTELLUNGEN & FONTS */
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;700&display=swap');

/* ============================================================
   1. BASIS & GRID-STRUKTUR (Bild 2 Look)
   ============================================================ */
body { 
    font-family: 'Segoe UI', 'Oswald', sans-serif; 
    background: #1a1a1a; 
    color: white; 
    padding: 20px; 
    margin: 0;
}

:root {
    --accent-color: #e67e22;
    --highlight-orange: #ff8c00;
    --bg-dark: #1a1a1a;
    --card-bg: #262626;
}

/* Das Haupt-Grid */
#plan-container, .grid { 
    display: grid; 
    grid-template-columns: 120px repeat(5, 1fr); 
    gap: 2px; 
    max-width: 1000px; 
    margin: auto; 
}


/* ============================================================
   2. NAVIGATION & STICKY CONTROLS
   ============================================================ */
.date-control {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 1000px;
    margin: 0 auto;
    padding: 10px 0;
    background: #1a1a1a;
    position: sticky;
    top: 0;
    z-index: 1100;
}

.nav-section { display: flex; align-items: center; gap: 10px; }
.nav-left { flex: 1; justify-content: flex-start; }
.nav-center { flex: 2; justify-content: center; gap: 8px; }
.nav-right { flex: 1; justify-content: flex-end; }

.nav-group { display: flex; gap: 5px; }

/* Buttons & Picker */
.nav-btn, .refresh-btn, #datePicker { 
    height: 40px; 
    background: #333; 
    border: 1px solid #444; 
    color: white; 
    border-radius: 4px; 
    box-sizing: border-box;
    display: flex;
    align-items: center;
    justify-content: center;
}

.nav-btn { width: 40px; cursor: pointer; }
.nav-btn:hover { background: #444; }
.nav-btn-hidden { visibility: hidden !important; pointer-events: none; }

#datePicker { padding: 0 10px; cursor: pointer; font-family: inherit; }

.refresh-btn { color: #e67e22; width: 40px; font-size: 18px; cursor: pointer; }
.refresh-btn:hover { color: #ff9f43; background: #444; }
.refresh-btn:active i { animation: spin-once 0.5s ease-in-out; }

/* News Button Premium Style */
.news-btn-premium {
    position: relative;
    display: flex;
    align-items: center;
    background: #2a2a2a;
    border: 1px solid #444;
    border-radius: 6px;
    padding: 6px 15px;
    cursor: pointer;
    height: 40px;
}
.news-btn-premium:hover { background: #333; border-color: #e67e22; }
.news-btn-premium .btn-text {
    color: #fff; font-size: 13px; letter-spacing: 2px; margin-right: 10px; font-weight: 300;
}
.news-btn-premium .badge {
    position: absolute; top: -3px; right: -3px; width: 9px; height: 9px;
    background: #e67e22; border-radius: 50%; border: 1px solid #1a1a1a;
    box-shadow: 0 0 8px rgba(230, 126, 34, 0.6);
}

/* ============================================================
   3. BOXEN & ZELLEN-DESIGN
   ============================================================ */
.box { 
    border: 1px solid #444; 
    padding: 5px; 
    background: #262626; 
    min-height: 50px; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    justify-content: center; 
    text-align: center; 
    font-size: 11px; 
    position: relative; 
    cursor: default; 
    overflow: hidden;
    transition: none !important;
}

.box.empty { pointer-events: none; opacity: 0.5; }
    
.zeit-box {
    background: #333;      /* Dasselbe dunkle Grau wie dein Header */
    color: #e67e22;       /* Dein Akzent-Orange für die Lesbarkeit */
    font-weight: bold;
    font-size: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    border: 1px solid #444; /* Dezente Trennung zwischen den Zeit-Boxen */
}

.header-row { 
    grid-column: span 6; 
    background: #333; 
    font-size: 14px; 
    font-weight: bold; 
    position: sticky; 
    top: 60px; 
    z-index: 1090; 
    height: 50px;
}

/* Deine Boxen (.is-mine) */
.box.is-mine { 
    border: 1px solid #e67e22 !important; 
    z-index: 10; 
    cursor: pointer; 
}
.box.is-mine:hover {
    background-color: rgba(230, 126, 34, 0.2) !important;
    box-shadow: inset 0 0 15px rgba(255, 159, 67, 0.4), 0 0 20px rgba(230, 126, 34, 0.3);
    transition: transform 0.2s ease; /* NUR hier die Animation, nicht global */
    transform: scale(1.03);
    z-index: 100;
}

/* Inhalt der Boxen */
/* Klassenname */
.klasse-label { 
    font-weight: bold; 
    font-size: 14px; 
    color: #ffffff; 
}

/* Lehrer-Kürzel */
.lehrer-info { 
    font-size: 10px; 
    color: #bbbbbb; 
}

/* Hallen-Name */
.halle-label { 
    font-size: 10px; 
    color: #e67e22; 
    font-style: italic;
}

/* ============================================================
   4. TRENNLINIEN, LOADER & SPEZIAL-MODI
   ============================================================ */
.divider-thin { grid-column: 1 / span 6; height: 1px; background: #444; margin: 2px 0; }
.divider-thick { grid-column: 1 / span 6; height: 4px; background: #444; margin: 5px 0; }

.box.ausfall-mode { 
    background-color: #000 !important; 
    color: #777 !important; 
    background-image: linear-gradient(to top right, transparent calc(50% - 1px), #444, transparent calc(50% + 1px)), 
                      linear-gradient(to top left, transparent calc(50% - 1px), #444, transparent calc(50% + 1px)); 
}

.info-box {
    grid-column: span 6; font-size: 20px !important; padding: 40px !important;
    text-align: center; line-height: 1.5; color: #888; font-style: italic;
}

.global-loader { 
    position: fixed; left: 15px; top: 15px; width: 25px; height: 25px; 
    border: 3px solid #444; border-top: 3px solid #e67e22; border-radius: 50%; 
    animation: spin 1s linear infinite; display: none; z-index: 9999; 
}

/* ============================================================
   5. LOGIN-OVERLAY & CARD-DESIGN (DEIN ORIGINAL)
   ============================================================ */
#loginOverlay { 
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
    background: radial-gradient(circle at center, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%), 
                url('https://raw.githubusercontent.com/ReservationSport/ReservationSport/refs/heads/main/Logo.png');
    background-size: cover; background-position: center; z-index: 20000; 
    display: flex; justify-content: center; align-items: center; 
    font-family: 'Inter', sans-serif; backdrop-filter: blur(18px); 
}

#loginOverlay.fade-out {
    opacity: 0;
    transition: opacity 0.5s ease;
    pointer-events: none;
}

.login-card {
    background: rgba(20, 20, 20, 0.7); padding: 50px 40px; border-radius: 28px;
    border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5); 
    width: 100%; max-width: 360px; text-align: center;
}

.login-card h2 { 
    color: #ffffff; font-size: 30px; margin-bottom: 35px; font-weight: 800; 
    letter-spacing: -1.5px; text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5); 
}

.login-card input { 
    padding: 16px 20px; margin: 10px 0; background: rgba(0, 0, 0, 0.4); 
    border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; border-radius: 14px; 
    width: 100%; font-size: 16px; outline: none; box-sizing: border-box; 
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.login-card input:focus { 
    border-color: #e67e22; background: rgba(0, 0, 0, 0.6); 
    box-shadow: 0 0 20px rgba(230, 126, 34, 0.2); 
}

/* ============================================================
   6. LOGIN-BUTTON MIT BLITZ-EFFEKT
   ============================================================ */
#loginBtn { 
    padding: 18px; margin-top: 25px; 
    background: linear-gradient(180deg, #ff9f43 0%, #e67e22 100%); 
    color: white; border: none; border-radius: 16px; cursor: pointer; width: 100%; 
    font-family: 'Oswald', sans-serif; font-size: 20px; font-weight: 700; 
    text-transform: uppercase; letter-spacing: 1.5px;
    box-shadow: 0 10px 20px -5px rgba(230, 126, 34, 0.5);
    transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
    position: relative; overflow: hidden; z-index: 1;
}

#loginBtn:hover { transform: translateY(-3px); filter: brightness(1.1); }

/* Verstecken wenn aktiv geladen wird */
#loginBtn.loading { display: none !important; }

/* Dynamischer Blitz */
#loginBtn::after {
    content: ''; position: absolute; top: 0; left: -150%; width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
    transform: skewX(-25deg); transition: 0.6s ease-in-out; z-index: 3;
}
#loginBtn:hover::after { left: 150%; }

/* ============================================================
   7. HÜPFENDER BASKETBALL (LOADER-EDITION)
   ============================================================ */
#loginBall {
    display: none; /* Erst beim Klick sichtbar */
    margin-top: 30px;
    font-size: 50px; /* Schön groß */
    filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
}

/* Wird von handleLogin() hinzugefügt */
#loginBall.active {
    display: inline-block !important;
    animation: bounceAndGrow 0.8s infinite alternate ease-in-out;
}

@keyframes bounceAndGrow {
    0% { 
        transform: translateY(0) scale(1); 
        animation-timing-function: ease-out;
    }
    100% { 
        transform: translateY(-45px) scale(1.5); /* Springt hoch und wird massiv größer */
        animation-timing-function: ease-in;
    }
}

/* Fehlertext Styling */
#loginError {
    color: #ff4757;
    font-size: 14px;
    margin-top: 15px;
    min-height: 20px;
    font-weight: 600;
}


/* ============================================================
   6. SIDEBAR & 8. NEWS-SIDEBAR (Von Links)
   ============================================================ */

#newsSidebar {
    position: fixed;
    top: 0;
    left: -350px;
    width: 320px;
    height: 100%;
    background: #111;
    border-right: 1px solid #333;
    z-index: 12000;
    box-shadow: 10px 0 30px rgba(0,0,0,0.5);
    padding: 20px;
    box-sizing: border-box;
    display: none;
    transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    overflow-y: auto; 
}

#newsSidebar.active { left: 0; }

/* Basis-Stile für die Karten */
.news-item {
    background: #1a1a1a;
    border: 1px solid #333;
    padding: 12px;
    border-radius: 6px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
}

/* 📥 UNGELESEN (news-unread) */
.news-item.news-unread {
    border-left: 4px solid #e67e22;
    background: #221a12;
}
.news-item.news-unread .status-icon { color: #e67e22; font-weight: bold; }

/* ⚪ GELESEN (news-gelesen) - Die graue Optik */
.news-item.news-gelesen {
    background: #151515 !important;
    border-left: 4px solid #444 !important;
    opacity: 0.7;
}
.news-item.news-gelesen .status-icon { color: #888; font-weight: normal; }

/* Hover-Effekt */
.news-item:hover { 
    border-color: #555;
    background: #222; 
}

.news-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 0.8em; }
.status-icon { font-size: 0.9em; text-transform: uppercase; letter-spacing: 0.5px; }
.news-text { margin: 6px 0; font-size: 0.95em; color: #eee; line-height: 1.4; }
    



/* ============================================================
   ANIMATIONEN & EFFEKTE
   ============================================================ */

/* Pulsieren des Benachrichtigungs-Punkts */
@keyframes pulseDot {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.4); opacity: 0.6; }
    100% { transform: scale(1); opacity: 1; }
}
.pulse-animation {
    animation: pulseDot 1.5s infinite ease-in-out;
}


    /* Blinken bei News-Sprung im Stundenplan */
@keyframes highlightBlink {
    0% { box-shadow: 0 0 0px #e67e22; border-color: transparent; }
    50% { box-shadow: 0 0 20px #e67e22; border-color: #e67e22; background-color: rgba(230, 126, 34, 0.2); }
    100% { box-shadow: 0 0 0px #e67e22; border-color: transparent; }
}

.blink-animation { 
    animation: highlightBlink 0.8s ease-in-out 4; 
}

    


/* ============================================================
   9. EIGENES KONTEXT-MENÜ (OPTIMIERT FÜR INLINE-FEEDBACK)
   ============================================================ */

.eigenesmenu-backdrop {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    z-index: 10000;
    display: flex;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(8px);
    padding: 15px;
    opacity: 0; /* Wird per JS auf 1 gesetzt */
    transition: opacity 0.3s ease;
}

.eigenesmenu-container {
    width: 100%;
    max-width: 380px;
    max-height: 90vh; 
    display: flex;
    flex-direction: column;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 16px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.8);
    overflow: hidden;
    transform: translateY(20px); /* Startposition für Animation */
    transition: transform 0.3s ease-out;
}

.eigenesmenu-header {
    padding: 20px;
    background: #1a1a1a;
    border-bottom: 1px solid #333;
}

.eigenesmenu-header h3 {
    color: #e67e22;
    margin: 0;
    font-size: 1.1em;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.eigenesmenu-header p {
    color: #666;
    font-size: 12px;
    margin: 5px 0 0 0;
    line-height: 1.4;
}

.eigenesmenu-liste {
    padding: 15px;
    overflow-y: auto;
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* --- OPTIMIERTER BUTTON --- */
.eigenesmenu-item {
    position: relative; /* Wichtig für absoluten Loader rechts */
    width: 100%;
    min-height: 52px; /* Fixiert die Höhe, damit nichts springt */
    background: #262626;
    color: #eee;
    border: 1px solid #333;
    padding: 12px 50px 12px 18px; /* Mehr Platz rechts für den Loader */
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    text-align: left;
    transition: background 0.3s ease, border-color 0.2s ease, transform 0.2s ease;
}

.eigenesmenu-item:hover:not(:disabled) {
    border-color: #e67e22;
    background: #2d2d2d;
    transform: translateX(5px);
}

/* Wenn das Menü gesperrt ist (während Speichern) */
#eigenesmenu-modal[style*="pointer-events: none"] .eigenesmenu-item {
    cursor: wait;
    transform: none !important; /* Kein Verschieben beim Speichern */
}

.eigenesmenu-icon {
    margin-right: 15px;
    font-size: 1.2em;
    color: #e67e22;
    width: 20px;
    text-align: center;
    flex-shrink: 0;
}

/* --- INLINE LOADER & SUCCESS RECHTS --- */
.inline-loader-container {
    position: absolute;
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
}

.eigenesmenu-loader {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(230, 126, 34, 0.2);
    border-top: 2px solid #e67e22; /* Dein Orange */
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.eigenesmenu-cancel {
    width: 100%;
    background: #111;
    color: #555;
    border: none;
    border-top: 1px solid #222;
    padding: 15px;
    cursor: pointer;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: color 0.2s ease;
}

.eigenesmenu-cancel:hover {
    color: #888;
}

/* Hilfsklasse für den Erfolg (wird via JS gesetzt) */
.btn-success-state {
    background: #1b4332 !important; /* Dunkelgrün */
    border-color: #2d6a4f !important;
    color: #fff !important;
}
    



    
/* 10. MATERIAL-VISUALS & TOOLTIPS */
.material-icon {
    position: absolute; /* Absolut innerhalb der .box */
    top: 5px;
    right: 5px;
    color: #e67e22;
    font-size: 14px;
    z-index: 10;
    cursor: pointer !important;    /* FIX 1: Ändert das Fragezeichen zur Klick-Hand */
    pointer-events: auto !important; /* FIX 2: Garantiert, dass Klicks abgefangen werden */
    padding: 4px;                  /* Erleichtert das Treffen auf mobilen Geräten */
}

.material-icon::after {
    content: attr(data-tooltip);
    position: absolute;
    bottom: 125%;
    right: 0; /* Rechtsbündig mit dem Icon, damit es nicht links rausragt */
    background: rgba(40, 40, 40, 0.95);
    color: #fff;
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 11px;
    white-space: pre-wrap; /* Erlaubt Zeilenumbrüche bei langen Kommentaren */
    width: max-content;
    max-width: 150px;
    display: none;
    z-index: 1000;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    border: 1px solid #e67e22;
    pointer-events: none; /* Verhindert Flackern beim Drüberfahren */
}

@media (hover: hover) {
    .material-icon:hover::after { 
        display: block; 
    }
}

/* Material Info-Fenster (für Mobile-Klick) */
.material-info-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    display: flex; justify-content: center; align-items: center;
    z-index: 15000;
    backdrop-filter: blur(5px);
}

.material-info-content {
    background: #1a1a1a;
    border: 1px solid #444;
    border-radius: 12px;
    padding: 25px;
    width: 85%; max-width: 320px;
    text-align: center;
}


/* --- CONTAINER FÜR DIE MITTIGE AUSRICHTUNG --- */
.details-mengen-content {
    display: flex;
    flex-direction: column;
    align-items: center; /* Zentriert alle inneren Elemente horizontal */
    width: 100%;
    box-sizing: border-box;
    padding: 10px 0;
}

/* --- DAS TEXTAREA-KOMMENTARFELD (JETZT MITTIG) --- */
.details-mengen-content textarea {
    width: 100%;
    max-width: 290px; /* Perfekte Breite für ein kompaktes Modal */
    height: 120px;
    background: #151515;
    border: 1px solid #333;
    color: #fff;
    border-radius: 8px;
    padding: 12px;
    box-sizing: border-box;
    resize: none;
    outline: none;
    font-family: sans-serif;
    margin: 0 auto 20px auto; /* Zentriert sich selbst im Fluss + Abstand unten */
    transition: border-color 0.2s ease;
}

.details-mengen-content textarea:focus {
    border-color: #d35400; /* Edles, mattes Orange beim Tippen */
}

/* --- DER SPEICHER-BUTTON (MATT & DEZENT, RECHTS PLATZ FÜR LOADER) --- */
#btn-save-reservation,
.btn-save-reservation {
    width: 100%;
    max-width: 290px;
    padding: 14px 18px; /* Standard-Polsterung */
    background: #b84a00; /* Sattes, mattes Ziegel-Orange (nicht grell) */
    color: #fff;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    letter-spacing: 0.5px;
    font-size: 0.95rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative; /* Wichtig für die absolute Positionierung des Loaders */
    transition: all 0.2s ease;
    margin: 0 auto;
}

#btn-save-reservation:hover,
.btn-save-reservation:hover {
    background: #a04000; /* Etwas dunkler beim Draufzeigen */
}

/* --- INLINE-LOADER AUS DEINER FUNKTION RECHTS POSITIONIEREN --- */
.inline-loader-container {
    position: absolute;
    right: 18px; /* Fixiert den Loader am rechten Rand des Buttons */
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    align-items: center;
}

/* --- DER ZURÜCK-BUTTON --- */
.btn-back-link {
    background: none;
    border: none;
    color: #666;
    text-transform: uppercase;
    font-weight: bold;
    font-size: 0.85rem;
    letter-spacing: 1px;
    cursor: pointer;
    margin-top: 15px;
    transition: color 0.2s ease;
}

.btn-back-link:hover {
    color: #aaa;
}


    

  /* ============================================================
   11. SPEZIAL-MODAL: MODERNES ORANGE-DESIGN FOR RESET
   ============================================================ */

/* Das Eingabefeld für das Passwort */
#modal-reset-password {
    width: 100%;
    padding: 12px;
    background: #000 !important;
    border: 1px solid #ff9800 !important; /* Unser neues Orange */
    color: #fff !important;
    border-radius: 8px !important;
    text-align: center;
    font-size: 1.1rem !important;
    letter-spacing: 4px;
    outline: none;
    box-sizing: border-box;
    box-shadow: inset 0 0 10px rgba(255, 152, 0, 0.1);
    transition: all 0.2s ease-in-out;
}

#modal-reset-password:focus {
    border-color: #f57c00 !important;
    box-shadow: 0 0 12px rgba(255, 152, 0, 0.4), inset 0 0 10px rgba(255, 152, 0, 0.2) !important;
}

/* Gemeinsame Basis für die Knöpfe im Modal */
.reset-modal-btn {
    padding: 12px 20px;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 1;
    margin: 0;
    transition: all 0.2s ease-in-out;
}

/* ORANGE LOOK: JA, ABKLEBEN */
#btn-confirm-reset {
    background: #ff9800;
    color: #121212;
}

<script>



    /* ============================================================
       1. GLOBALE KONFIGURATION & VARIABLEN
       ============================================================ */
    const url = "https://script.google.com/macros/s/AKfycbxCHPxDHj0Eoj1NXOgGR85ETN1m-cpRdAC5D1H0Ck27nm--PetaqyUpSbUsWUFUv3dF/exec"; 
    
    // Status-Variablen
    let userPw = "", userKuerzel = "";
    let currentPlanData = [];      // Speichert die 60 Slots vom Server
    let configFarben = {};         // Farben für Klassen aus dem Sheet
    let allClassTeachers = {};     // Zuordnung Klasse -> Kürzel
    let verfügbareMaterialien = []; // Liste der Materialien aus dem Sheet
    
    // UI-Variablen
    let pendingNews = [];
    let isSaving = false;          // Status für den Global Loader

    /* ============================================================
       2. INITIALISIERUNG
       ============================================================ */
    
    // Setzt das heutige Datum in den Picker beim Start
    document.addEventListener('DOMContentLoaded', () => {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('datePicker').value = today;
    });


/* ============================================================
   3. LOGIN-LOGIK (Optimiert für getrennten Sync)
   ============================================================ */

async function handleLogin() {
    const btn = document.getElementById('loginBtn');
    const ball = document.getElementById('loginBall');
    const errorDiv = document.getElementById('loginError');
    
    const kuerzelVal = document.getElementById('userKuerzel').value.trim().toLowerCase();
    const pwVal = document.getElementById('pw').value;

    if (!kuerzelVal) { 
        errorDiv.innerText = "Kürzel fehlt!"; 
        return; 
    }

    // Visuelles Feedback
    btn.style.visibility = 'hidden'; 
    ball.classList.add('active'); 
    errorDiv.innerText = "";

    try {
        const response = await fetch(`${url}?mode=login&pw=${encodeURIComponent(pwVal)}&kuerzel=${encodeURIComponent(kuerzelVal)}`);
        const json = await response.json();

        if (json.error) {
            errorDiv.innerText = json.error === "Falsches Passwort" ? "Passwort inkorrekt!" : "Fehler: " + json.error;
            btn.style.visibility = 'visible';
            ball.classList.remove('active');
        } else {
            // Erfolg: Daten lokal speichern
            userPw = pwVal;
            userKuerzel = kuerzelVal;
            
            // Login-Maske ausblenden
            document.getElementById('loginOverlay').classList.add('fade-out');
            
            setTimeout(async () => {
                document.getElementById('loginOverlay').style.display = 'none';
                
                // News-Button & Interface einblenden
                const newsContainer = document.getElementById('news-btn-container');
                if(newsContainer) newsContainer.style.display = 'block';
                
                // News sofort laden
                await initNewsSystem();
                
                // Erster Aufbau des Plans
                await loadPlan();

                // --- SCHRITT 1: Hintergrund-Sync starten (NUR syncPlan) ---
                setInterval(async () => {
                    if (document.visibilityState === 'visible') {
                        // Ruft jetzt die sichere "Pfleger-Funktion" auf
                        await syncPlan(); 
                    }
                }, 30000); // 30 Sekunden Intervall
                
            }, 500);
        }
    } catch (e) {
        errorDiv.innerText = "Verbindung fehlgeschlagen.";
        btn.style.visibility = 'visible';
        ball.classList.remove('active');
        console.error("Login Error:", e);
    }
}

});   


/* ============================================================
   HILFSFUNKTION: Slot-Index zu Daten-Mapping
   ============================================================ */
function getDataBySlotIndex(index) {
    // Wir ziehen 1 ab, damit wir intern mit 0-basiertem Index rechnen (1 -> 0)
    const korrigierterIndex = index - 1;

    // Da wir nur die 5 Wochentage zählen (ohne die Zeitspalte):
    const spaltenProWoche = 5; 
    
    // Berechne die Zeile (Stunde)
    // Wir addieren 1 bei der Zeile, falls currentPlanData[0] der Header ist
    const zeile = Math.floor(korrigierterIndex / spaltenProWoche) + 1;
    
    // Berechne die Spalte (Tag)
    // Wir addieren 1, um die Zeitspalte (Index 0) zu überspringen
    const spalte = (korrigierterIndex % spaltenProWoche) + 1;

    console.log(`Slot ${index} -> Suche in currentPlanData[Zeile ${zeile}][Spalte ${spalte}]`);

    if (currentPlanData[zeile] && currentPlanData[zeile][spalte]) {
        return currentPlanData[zeile][spalte];
    }
    return null;
}
    
    /* ============================================================
       4. SICHERHEITSABFRAGE (Falls doch mal was hängt)
       ============================================================ */
    
    window.addEventListener('beforeunload', (e) => {
        if (isSaving) { 
            e.preventDefault(); 
            e.returnValue = 'Änderungen werden noch gespeichert...'; 
        }
    });

    // Hilfsfunktion: Loader anzeigen/verstecken
    function toggleLoader(show) {
        isSaving = show;
        document.getElementById('global-loader').style.display = show ? 'block' : 'none';
    }


/* ============================================================
       5. DATUMSSTEUERUNG & NAVIGATION
       ============================================================ */

    /**
     * Ändert das Datum im Picker und lädt den Plan neu
     * @param {number} days - Anzahl der Tage (+/-)
     */
    window.changeDate = (days) => {
        const dp = document.getElementById('datePicker');
        let d = new Date(dp.value);
        
        // Berechnung des neuen Datums
        d.setDate(d.getDate() + days);
        
        // Verhindert das Navigieren vor das heutige Datum
        const heute = new Date();
        heute.setHours(0,0,0,0);
        if (d < heute) d = heute;

        dp.valueAsDate = d;
        updateNavButtons(); // UI anpassen
        loadPlan();         // Daten neu laden
    };

    /**
     * Setzt den Picker auf den heutigen Tag zurück
     */
    window.goToToday = () => {
        const dp = document.getElementById('datePicker');
        const today = new Date();
        // Lokale Zeitkorrektur für ISO-String
        const offset = today.getTimezoneOffset();
        today.setMinutes(today.getMinutes() - offset);
        
        const dateStr = today.toISOString().split('T')[0];
        dp.value = dateStr;
        
        updateNavButtons();
        loadPlan();
    };

    /**
     * Steuert die Sichtbarkeit der Buttons (Vergangenheit ausblenden)
     */
    function updateNavButtons() {
        const dp = document.getElementById('datePicker');
        if (!dp || !dp.value) return;

        const pickerDate = new Date(dp.value);
        pickerDate.setHours(0, 0, 0, 0);

        const heute = new Date();
        heute.setHours(0, 0, 0, 0);

        // IDs aus deinem HTML: prev-day und die Buttons für Wochen
        const prevDayBtn = document.getElementById('prev-day');
        // Falls du die Wochen-Buttons auch dynamisch verstecken willst:
        const allPrevBtns = document.querySelectorAll('.nav-group:first-child .nav-btn');

        // GESTERN-Button: Verstecken, wenn wir heute sind
        if (prevDayBtn) {
            if (pickerDate <= heute) {
                prevDayBtn.style.visibility = 'hidden';
            } else {
                prevDayBtn.style.visibility = 'visible';
            }
        }

        // Alle "Zurück"-Buttons (Woche & Tag) verstecken, wenn Limit erreicht
        allPrevBtns.forEach(btn => {
            const isWeekBtn = btn.getAttribute('onclick').includes('-7');
            if (isWeekBtn) {
                // Woche zurück nur erlauben, wenn wir min. 7 Tage in der Zukunft sind
                const limitWoche = new Date(heute);
                limitWoche.setDate(heute.getDate() + 7);
                btn.style.visibility = (pickerDate < limitWoche) ? 'hidden' : 'visible';
            }
        });
    }

    /* ============================================================
       6. INITIALISIERUNG BEIM LADEN
       ============================================================ */

    document.addEventListener('DOMContentLoaded', () => { 
        // Heute-Einstellung
        const today = new Date(); 
        const offset = today.getTimezoneOffset(); 
        today.setMinutes(today.getMinutes() - offset); 
        const dateStr = today.toISOString().split('T')[0];
        
        const dp = document.getElementById('datePicker');
        dp.value = dateStr;
        dp.min = dateStr; // Verhindert manuelle Datumswahl in der Vergangenheit
        
        updateNavButtons();
    });


/* ============================================================
   7. STUNDENPLAN LADEN & GRID-GENERIERUNG (DB-Version)
   ============================================================ */

window.loadPlan = async function() {
    const dp = document.getElementById('datePicker');
    const container = document.getElementById('plan-container'); 
    const loader = document.getElementById('global-loader'); 

    const dateVal = dp.value;
    if (!userPw || !dateVal) return;

    container.innerHTML = ""; 
    if (loader) loader.style.display = 'block'; 
    
    if (typeof updateNavButtons === 'function') updateNavButtons();

    const dateObj = new Date(dateVal.replace(/-/g, "/")); 
    
    // --- 1. NORMALE WOCHENEND-PRÜFUNG (LOKAL) ---
    if (dateObj.getDay() === 0 || dateObj.getDay() === 6) { 
        container.innerHTML = `<div class="box info-box" style="grid-column: span 6; background: #333; color: #e67e22; padding: 40px; font-size: 1.2rem;">Mach mal Pause! Es ist Wochenende...</div>`; 
        if (loader) loader.style.display = 'none'; 
        return; 
    }

    try {
        const res = await fetch(`${url}?date=${dateVal}&pw=${userPw}&kuerzel=${userKuerzel}`);
        const json = await res.json();
        
        // --- 2. SPERRZEITEN/FEIERTAGS-PRÜFUNG VOM SERVER ---
        if (json.sperrMsg) {
            container.innerHTML = `<div class="box info-box" style="grid-column: span 6; background: #333; color: #e67e22; padding: 40px; font-size: 1.2rem;">${json.sperrMsg}</div>`;
            if (loader) loader.style.display = 'none';
            return; // Beendet die Funktion, damit KEIN leeres Gitter gezeichnet wird!
        }
        
        // --- 🔥 MATERIALIEN AUS DEM SERVER-PAKET IM FRONTEND AUSPACKEN ---
        if (json.verfügbareMaterialien) {
            verfügbareMaterialien = json.verfügbareMaterialien;
            console.log("Materialien erfolgreich im Frontend-Array geladen:", verfügbareMaterialien);
        }
        
        const plan = json.plan; 
        window.lastPlanData = plan; 
        myClasses = json.userClasses || [];
        allClassTeachers = json.allClassTeachers || {};
        configFarben = {}; 
        if (json.options) json.options.forEach(opt => configFarben[opt[0]] = opt[1]);
        
        const wtArr = ["Sonntag", "Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag", "Samstag"];
        const [y, m, d] = dateVal.split('-').map(Number);
        const zeiten = ["07:15 - 08:00", "08:05 - 08:50", "08:55 - 09:40", "10:00 - 10:45", "10:50 - 11:35", "11:40 - 12:25", "12:50 - 13:35", "13:40 - 14:25", "14:30 - 15:15", "15:35 - 16:20", "16:25 - 17:10", "17:15 - 18:00"];

        let html = `<div class="box header-row" style="grid-column: span 6;"><span>${wtArr[dateObj.getDay()]}, ${d}.${m}.${y}</span></div>`;

        zeiten.forEach((zeitStr, rowIndex) => {
            if (rowIndex + 1 === 4 || rowIndex + 1 === 10) html += `<div class="divider-thin" style="grid-column: span 6;"></div>`;
            if (rowIndex + 1 === 7) html += `<div class="divider-thick" style="grid-column: span 6;"></div>`;
            html += `<div class="box zeit-box">${zeitStr}</div>`;
            
            for(let i = 1; i <= 5; i++) {
                const absoluteSlot = (rowIndex * 5) + i; 
                const slotData = plan[absoluteSlot] || {};
                const klasse = slotData.klasse || "";
                const halle = slotData.halle || "";
                const lehrer = slotData.lehrer || allClassTeachers[klasse] || "";
                const isAusfall = (halle === "Ausfall");
                const canEdit = myClasses.some(c => klasse.trim().toLowerCase() === c.trim().toLowerCase() && klasse.trim() !== "");
                
                html += `
                <div class="box ${klasse.trim() === "" ? 'empty' : ''} ${!canEdit ? 'not-mine' : 'is-mine'} ${isAusfall ? 'ausfall-mode' : ''}" 
                        data-slot="${absoluteSlot}" data-time="${zeitStr}" 
                        style="background-color: ${isAusfall ? '' : (configFarben[halle] || '')}; cursor: ${canEdit ? 'pointer' : 'default'}">
                        <div class="klasse-label">${klasse}</div>
                        <div class="lehrer-info">${lehrer}</div>
                        <div class="halle-label">${halle}</div>
                </div>`;
            }
        });

        container.innerHTML = html;

        // 🔥 NEU: LIVE-RENDERING DER MATERIAL-ICONS DIREKT NACH DEM ZEICHNEN DES GITTERS
        Object.keys(plan).forEach(slot => {
            const slotData = plan[slot] || {};
            if (slotData.material && slotData.material.trim() !== "") {
                const box = container.querySelector(`[data-slot="${slot}"]`);
                if (box) {
                    markBoxWithMaterialIcon(box, slotData.material, slotData.kommentar || "");
                }
            }
        });

    } catch(e) { 
        console.error("Fehler:", e); 
        container.innerHTML = `<div class="box info-box" style="color:red; grid-column: span 6;">Verbindungsfehler.</div>`;
    } finally {
        if (loader) loader.style.display = 'none';
    }
};


window.syncPlan = async function() {
    // --- NEU: Wenn das System gerade speichert, den Hintergrund-Sync sofort abbrechen ---
    if (isSaving) return; 

    const dp = document.getElementById('datePicker');
    const container = document.getElementById('plan-container'); 
    
    try {
        const res = await fetch(`${url}?date=${dp.value}&pw=${userPw}&kuerzel=${userKuerzel}`);
        const json = await res.json();
        
        // Falls im Hintergrund ein Sperrtag erkannt wird, nicht weitersynchronisieren
        if (json.sperrMsg || !json.plan) return;
        
        // --- 🔥 AUCH IM BACKGROUND-SYNC DIE MATERIALIEN AKTUALISIEREN ---
        if (json.verfügbareMaterialien) {
            verfügbareMaterialien = json.verfügbareMaterialien;
        }
        
        window.lastPlanData = json.plan; 
        
        Object.keys(json.plan).forEach(slot => {
            // --- NEU: Wenn dieser Slot gerade manuell geändert wird, NIEMALS ANFASSEN ---
            if (window.syncBlockierteSlots && window.syncBlockierteSlots[slot]) {
                console.log(`Sync blockiert: Slot ${slot} wird vom User editiert.`);
                return; 
            }

            const box = container.querySelector(`[data-slot="${slot}"]`);
            if (box) {
                const data = json.plan[slot] || {};
                const klasse = data.klasse || "";
                const halle = data.halle || "";
                const lehrer = data.lehrer || allClassTeachers[klasse] || "";
                const material = data.material || "";   // 🔥 Material auslesen
                const kommentar = data.kommentar || ""; // 🔥 Kommentar auslesen
                
                const hLabel = box.querySelector('.halle-label');
                if (hLabel) hLabel.innerText = halle;
                
                const kLabel = box.querySelector('.klasse-label');
                if (kLabel) kLabel.innerText = klasse;
                
                const lLabel = box.querySelector('.lehrer-info');
                if (lLabel) lLabel.innerText = lehrer;
                
                // --- Steuerung der Ausfall-Klasse im Sync ---
                if (halle === "Ausfall") {
                    box.classList.add('ausfall-mode');
                    box.style.backgroundColor = ""; // Damit das CSS !important greift
                } else {
                    box.classList.remove('ausfall-mode');
                    box.style.backgroundColor = configFarben[halle] || "";
                }

                // 🔥 NEU: MATERIAL-ICON LIVE IM HINTERGRUND SYNCHRONISIEREN (Hinzufügen oder Entfernen)
                markBoxWithMaterialIcon(box, material, kommentar);
            }
        });
    } catch(e) {
        console.error("Sync im Hintergrund fehlgeschlagen - Plan bleibt stabil:", e);
    }
};

    

/* ============================================================
   8. HILFSFUNKTIONEN FÜR DATEN-STRINGS & FINDER

/**
 * Findet die HTML-Box im Grid basierend auf dem absoluten Slot (1-60).
 * Der Zeit-String dient als zusätzlicher Sicherheitscheck.
 */
function findBoxByTimeAndSlot(time, slot) {
    // Da die Slot-ID (1-60) eindeutig ist, reicht diese eigentlich aus
    return document.querySelector(`.box[data-slot="${slot}"]`);
}

/**
 * Baut das Daten-Objekt für das Google Sheet Update.
 * WICHTIG: In der DB-Version schicken wir kein "Klasse | Halle" mehr,
 * sondern die reinen Werte, die das Backend dann in die richtigen Spalten schreibt.
 */
function prepareUpdateData(slotId, neueHalle, neueKlasse, neuesMaterial, neuerKommentar) {
    // Wir holen uns die Basis-Daten des Slots, falls vorhanden
    // 'plan' ist das Objekt, das wir beim Laden vom Server erhalten haben
    const aktuellerSlot = (window.currentPlan && window.currentPlan[slotId]) ? window.currentPlan[slotId] : {};

    // Logik: Nutze den neuen Wert, falls vorhanden, sonst den alten aus dem Speicher
    const updateObj = {
        slot: slotId,
        klasse: (neueKlasse !== undefined) ? neueKlasse : (aktuellerSlot.klasse || ""),
        halle: (neueHalle !== undefined) ? neueHalle : (aktuellerSlot.halle || ""),
        material: (neuesMaterial !== undefined) ? neuesMaterial : (aktuellerSlot.material || ""),
        kommentar: (neuerKommentar !== undefined) ? neuerKommentar : (aktuellerSlot.kommentar || "")
    };

    console.log(`🛠 Update-Daten für Slot ${slotId} vorbereitet:`, updateObj);
    return updateObj;
}


/* ============================================================
   9. KLASSE ABKLEBEN (PERMANENT LÖSCHEN) - BOMBENSICHERE GET-VERSION
   ============================================================ */

async function startYearReset(klasse, validiertesPw) {
    console.log("startYearReset (GET-Modus) gestartet für Klasse:", klasse);

    const gridContainer = document.querySelector('.stundentafel-container') || document.body;
    gridContainer.style.opacity = "0.6";
    gridContainer.style.pointerEvents = "none";

    const slotVal = window.currentEditBox ? window.currentEditBox.getAttribute('data-slot') : window.currentEditSlot;
    const dateVal = document.getElementById('datePicker').value;
    const finalesPw = validiertesPw || userPw;

    // Wir bauen die Parameter direkt in die URL ein (GET-Request)
    const params = new URLSearchParams({
        action: "permaDelete",
        klasse: klasse,
        slot: slotVal,
        startDate: dateVal,
        pw: finalesPw,
        kuerzel: userKuerzel
    });

    const targetUrl = `${url}?${params.toString()}`;

    try {
        console.log("Sende Löschbefehl via GET an Google Script...");

        const response = await fetch(targetUrl, {
            method: "GET",
            mode: "cors"
        });

        const result = await response.json();
        console.log("Server-Antwort erhalten:", result);

        if (result.status === "success") {
            console.log(`Klasse ${klasse} erfolgreich aus Master_DB gelöscht.`);
            // Jetzt, wo CORS nicht mehr blockiert, läuft loadPlan garantiert sauber an!
            await loadPlan(); 
        } else {
            throw new Error(result.error || result.msg || "Das Google Script meldete einen Fehler.");
        }

    } catch (e) {
        console.error("PermaDelete Error:", e);
        alert("Löschvorgang fehlgeschlagen: " + e.message);
        // Falls irgendwas hängen bleibt, zur Sicherheit neu laden
        await loadPlan();

/**

 * Lädt die News sofort beim Start im Hintergrund.
 */
let meineRelevanteNews = []; 

async function initNewsSystem() {
    console.log("🚀 News-System wird initialisiert...");
    const aktuellerUser = typeof userKuerzel !== 'undefined' ? userKuerzel.toUpperCase().trim() : "";
    if (!aktuellerUser) {
        console.warn("⚠️ Kein User-Kürzel gefunden, News-System pausiert.");
        return;
    }

    try {
        const zielUrl = typeof url !== 'undefined' ? url : "";
        const pw = typeof userPw !== 'undefined' ? userPw : (typeof SECRET_PASSWORD !== 'undefined' ? SECRET_PASSWORD : "");
        
        const response = await fetch(`${zielUrl}?action=getNews&pw=${encodeURIComponent(pw)}`);
        const data = await response.json();

        // Debug: Zeige uns, was genau vom Server kommt (Array oder Objekt?)
        console.log("DEBUG: Rohdaten vom Server:", data);
        
        // Flexibles Mapping: Egal ob Array oder Objekt mit {news: []}
        const allNews = data.news || (Array.isArray(data) ? data : []);

        // Radikaler Filter: Nur News anzeigen, wo mein Kürzel in Spalte G steht
        meineRelevanteNews = allNews.filter(n => {
            const empfaenger = (n.empfaenger || "").toUpperCase();
            return empfaenger.split(',').map(e => e.trim()).includes(aktuellerUser);
        });

        console.log("✅ Gefilterte News für die Sidebar:", meineRelevanteNews);

        // Badge aktualisieren
        const ungelesen = meineRelevanteNews.filter(n => !(n.gelesen || "").toUpperCase().includes(aktuellerUser));
        const dot = document.getElementById('news-dot');
        if (dot) dot.style.display = ungelesen.length > 0 ? 'block' : 'none';
        
    } catch (e) { console.error("Fehler beim Init:", e); }
}

window.showNews = function() {
    const sidebar = document.getElementById('newsSidebar');
    const newsContainer = document.getElementById('newsContent');
    const aktuellerUser = typeof userKuerzel !== 'undefined' ? userKuerzel.toUpperCase().trim() : "";

    sidebar.style.display = 'block';
    setTimeout(() => sidebar.classList.add('active'), 10);

    // NEU: Punkt NICHT mehr hier ausblenden, sondern erst prüfen!
    
    newsContainer.innerHTML = "";
    
    // Prüfen, ob überhaupt ungelesene Nachrichten da sind
    let hatUngelesene = false;

    meineRelevanteNews.forEach(news => {
        const gelesenListe = (news.gelesen || "").toUpperCase().split(',').map(s => s.trim());
        const istGelesen = gelesenListe.includes(aktuellerUser);
        
        if (!istGelesen) hatUngelesene = true;

        const card = document.createElement('div');
        card.className = `news-item ${istGelesen ? 'news-gelesen' : 'news-unread'}`;
        card.innerHTML = `
            <div class="news-header">
                <span class="status-icon">${istGelesen ? '⚪ Gelesen' : '📥 Neu'}</span>
                <span>${news.datum || ''} - Slot ${news.slot || ''}</span>
            </div>
            <div class="news-text">${news.text || ''}</div>
        `;
        card.onclick = () => markAsReadAndJump(news);
        newsContainer.appendChild(card);
    });

    // Erst HIER den Punkt ausblenden, wenn wirklich alle gelesen sind
    const dot = document.getElementById('news-dot');
    if (dot) {
        dot.style.display = hatUngelesene ? 'block' : 'none';
    }
};



window.refreshAndShowNews = function() {
    // 1. Sidebar sofort öffnen (mit existierenden Daten aus der Variable)
    showNews(); 
    
    // 2. Im Hintergrund den Server fragen, ob es NEUE Nachrichten gibt
    // Wir nutzen hier 'await' NICHT, damit der Rest des Browsers nicht blockiert wird
    fetch(`${url}?action=getNews&pw=${encodeURIComponent(userPw)}&t=${Date.now()}`)
        .then(response => response.json())
        .then(data => {
            // Falls data ein Objekt mit .news ist, sonst direkt das Array
            const allNews = data.news || (Array.isArray(data) ? data : []);
            
            // Filter anwenden
            const aktuellerUser = userKuerzel.toUpperCase().trim();
            meineRelevanteNews = allNews.filter(n => {
                const empfaenger = (n.empfaenger || "").toUpperCase();
                return empfaenger.split(',').map(e => e.trim()).includes(aktuellerUser);
            });
            
            // 3. Wenn neue Daten geladen wurden, Liste kurz aktualisieren
            // Wir prüfen, ob die Sidebar noch offen ist, bevor wir neu zeichnen
            if(document.getElementById('newsSidebar').classList.contains('active')) {
                showNews();
            }
        })
        .catch(e => console.error("Hintergrund-Update fehlgeschlagen:", e));
};
    
    

/**
 * Markiert News als gelesen, springt zum Datum und zum Slot.
 */
async function markAsReadAndJump(news) {
    const user = typeof userKuerzel !== 'undefined' ? userKuerzel.toUpperCase().trim() : "";
    
    // 1. Visuelle sofort-Reaktion (UI bleibt direkt im Sidebar-Element)
    const clickedCard = event.currentTarget;
    clickedCard.style.opacity = "0.4";
    clickedCard.style.filter = "grayscale(1)";
    clickedCard.style.pointerEvents = "none";
    clickedCard.querySelector('.news-header span').innerText = '⚪ Gelesen';

    // 2. Server informieren
    fetch(url, {
        method: "POST",
        body: JSON.stringify({ action: "markAsRead", id: news.id, user: user, pw: userPw })
    });

    // 3. Zentrale schließen
    window.closeNews();

    // 4. Navigation & Warten auf DOM-Update
    if (news.datum) {
        document.getElementById('datePicker').value = news.datum;
        await loadPlan(); // Hier wird der Plan komplett neu aufgebaut
    }

    // 5. Scrollen & Blinken mit absolutem Timing
    // Wir warten kurz, bis das neue DOM "gerendert" wurde
    setTimeout(() => {
        const box = document.querySelector(`[data-slot="${news.slot}"]`); 
        if (box) {
            // Erst scrollen, dann blinken
            box.scrollIntoView({ behavior: 'smooth', block: 'center' });
            
            setTimeout(() => {
                box.classList.add('blink-animation');
            }, 300); // Kleine Verzögerung, damit das Scrollen nicht das Blinken unterbricht
            
            // Blink-Animation entfernen nach 4 Sekunden
            setTimeout(() => box.classList.remove('blink-animation'), 4300);
        }
    }, 300); // 300ms warten, damit loadPlan garantiert fertig ist
}

/**
 * Erlaubt das An- und Abwählen mehrerer Materialien im Menü
 */
function toggleMaterialSelection(mat, btn) {
    // Da das Menü dynamisch ist, suchen wir den Button innerhalb des Modals
    const root = document.getElementById('eigenesmenu-modal');
    const nextStep = root ? root.querySelector('#materialNextStep') : document.getElementById('materialNextStep');
    const check = btn.querySelector('.check-indicator');

    if (selectedMaterials.includes(mat)) {
        // Entfernen
        selectedMaterials = selectedMaterials.filter(m => m !== mat);
        btn.style.borderColor = "#333";
        btn.style.background = "transparent";
        if (check) check.innerText = "○";
    } else {
        // Hinzufügen
        selectedMaterials.push(mat);
        btn.style.borderColor = "#ff8c00";
        btn.style.background = "rgba(255, 140, 0, 0.1)";
        if (check) check.innerText = "●";
    }

    // "Weiter"-Button nur zeigen, wenn etwas gewählt wurde
    if (nextStep) {
        nextStep.style.display = selectedMaterials.length > 0 ? 'block' : 'none';
    }
}

    

/**
 * Finales Speichern im Backend
 */
async function saveMaterialSelection(mat, detail, time, slot, klasse, btn) {
    // 1. UI Feedback: Loader zeigen & Button sperren
    let loader, btnText;
    if (btn) {
        loader = btn.querySelector('.eigenesmenu-loader');
        btnText = btn.querySelector('.btn-text');
        if (loader) loader.style.display = 'block';
        if (btnText) btnText.style.opacity = '0.3';
        btn.disabled = true;
    }

    // 2. DATEN-AKQUISE: Absolute Slot-ID (1-60) sicherstellen
    // Wir nehmen den übergebenen Slot ODER den globalen Sicherheits-Anker
    const finalSlot = slot || window.currentEditSlot; 
    
    const datePicker = document.getElementById('datePicker');
    const dateVal = datePicker ? datePicker.value : "";

    // 3. VALIDIERUNG: Verhindert "undefined"-Einträge im Sheet
    if (!finalSlot || finalSlot === "undefined" || !dateVal) {
        console.error("Speichern abgebrochen: Fehlende Daten", { finalSlot, dateVal });
        alert("Fehler: Die Slot-ID (1-60) konnte nicht ermittelt werden. Bitte schließen und erneut versuchen.");
        
        // UI Reset im Fehlerfall
        if (btn) {
            btn.disabled = false;
            if (loader) loader.style.display = 'none';
            if (btnText) btnText.style.opacity = '1';
        }
        return;
    }

    // Eindeutige ID für das Sheet (z.B. 2026-05-12_42)
    const uniqueId = `${dateVal}_${finalSlot}`;

    const payload = {
        mode: "saveMaterial",
        id: uniqueId,
        date: dateVal,
        time: time || "",
        slot: finalSlot,
        klasse: klasse || "",
        material: mat,
        kommentar: detail || "",
        pw: typeof userPw !== 'undefined' ? userPw : "",
        kuerzel: typeof userKuerzel !== 'undefined' ? userKuerzel : ""
    };

    console.log("📤 Sende Material-Daten:", payload);

    try {
        // 'url' muss global definiert sein
        const response = await fetch(url, {
            method: "POST",
            body: JSON.stringify(payload)
        });

        if (!response.ok) throw new Error("Netzwerk-Antwort war nicht ok");

        const result = await response.json();

        if (result.status === "success") {
            console.log("✅ Speichern erfolgreich");
            if (typeof closeEditor === 'function') closeEditor();
            if (typeof loadPlan === 'function') await loadPlan();
        } else {
            throw new Error(result.msg || "Server hat einen Fehler gemeldet");
        }
    } catch (e) {
        console.error("❌ Material Save Error:", e);
        alert("Verbindung zum Google Sheet fehlgeschlagen: " + e.message);
        
        // Button wieder benutzbar machen
        if (btn) {
            btn.disabled = false;
            if (loader) loader.style.display = 'none';
            if (btnText) btnText.style.opacity = '1';
        }
    }
}

/**
 * Verarbeitet die Wahl aus dem Task Manager (Haupt-Weiche)
 */
window.handleMenuChoice = function(action, time, slot, klasse) {
    console.log("Aktion gewählt:", action); 

    switch(action) {
        case 'reservation':
            // Öffnet die Hallenauswahl direkt im bestehenden Menü-Container
            handleReservationUI(time, slot, klasse);
            break;
            
        case 'material':
            const activeModal = document.getElementById('eigenesmenu-modal');
            if (typeof handleMaterialUI === 'function') {
                handleMaterialUI(time, slot, klasse, activeModal);
            }
            break;

        case 'ausfall':
            // Wir prüfen den aktuellen Status direkt an der Box
            const istBereitsAusfall = window.currentEditBox ? window.currentEditBox.classList.contains('ausfall-mode') : false;
            // Wir nutzen den Button-Trigger aus dem DOM für den Loader
            const btn = document.querySelector('.eigenesmenu-item:nth-child(3)'); 
            if (typeof handleAusfallClick === 'function') {
                handleAusfallClick(istBereitsAusfall ? 'LOESCHEN' : 'SETZEN', time, slot, klasse, btn);
            }
            break;

       case 'beendet':
            // Kein Browser-Confirm! Wir öffnen direkt das eigene Passwort-Modal drüber.
            openPasswordModalForReset(time, slot, klasse);
            break;

        case 'nachricht':
            const note = prompt("Notiz für " + klasse + " erfassen:", "");
            if (note !== null) {
                // Wir senden ein Payload mit dem Kommentar an die DB
                const payload = {
                    action: "saveBooking",
                    pw: userPw,
                    kuerzel: userKuerzel,
                    date: document.getElementById('datePicker').value,
                    slot: slot,
                    klasse: klasse,
                    kommentar: note
                };
                saveImmediately(payload).then(() => {
                    closeEditor();
                    loadPlan();
                });
            }
            break;
            
        default:
            console.warn("Unbekannte Aktion im Task Manager:", action);
    }
};

                if (typeof configFarben !== 'undefined' && configFarben[halleZuSetzen]) {

                } else {
                    targetBox.style.backgroundColor = "";

window.addChange = async (el, time, slot, klasse) => { 
    let res = el.value; 
    console.log(`\n=== 🔄 addChange ausgelöst für Slot ${slot} ===`);
    console.log(`Eingegebener Wert (res): "${res}"`, klasse ? `| Übergebene Klasse: ${klasse}` : "");
    
    // Parent Box finden
    const parent = el.closest('.box') || window.currentEditBox; 
    if (!parent) {
        console.error("❌ addChange abgebrochen: Keine Parent-Box (.box) gefunden!");
        return;
    }

    const r = parent.getAttribute('data-row');
    const c = slot; // Wir nutzen den übergebenen slot-Index

    // 1. VISUELLES UPDATE DER BOX
    if (res === "Ausfall") {
        parent.classList.add('ausfall-mode');
    } else {
        parent.classList.remove('ausfall-mode');
    }

    // Text in der Box aktualisieren (.res ist das Feld für die Halle)
    const resDisplay = parent.querySelector('.res');
    if (resDisplay) {
        resDisplay.innerText = (res === "" || res === "---") ? "" : res; 
    }
    
    // Farbe setzen (falls in configFarben definiert)
    parent.style.backgroundColor = (typeof configFarben !== 'undefined' && configFarben[res]) ? configFarben[res] : ""; 

    // 2. STRING FÜR GOOGLE SHEETS BAUEN
    // Formatiert den Wert zu "Klasse | Halle | Kommentar"
    let finalVal = buildFinalValue(r, c, (res === "---" ? "" : res), undefined);

    // Errechnen/Bestimmen der Klasse für die Newsmeldung (Fehlerschutz!)
    let newsKlasse = klasse;
    if (!newsKlasse) {
        // Fallback 1: Versuchen aus dem Box-Titel (.title) zu lesen
        const titleEl = parent.querySelector('.title');
        if (titleEl && titleEl.innerText.trim() !== "") {
            newsKlasse = titleEl.innerText.split(/[ |]/)[0].trim();
        } 
        // Fallback 2: Versuchen aus dem bestehenden lokalen Daten-String zu parsen
        else if (currentPlanData && currentPlanData[r] && currentPlanData[r][c]) {
            newsKlasse = currentPlanData[r][c].toString().split(/[ |]/)[0].trim();
        } else {
            newsKlasse = "Unbekannt";
        }
    }

    // 3. NEWS-LOGIK (Erweitert & Abgesichert)
    if (typeof pendingNews !== "undefined") {
        pendingNews = pendingNews.filter(n => n.slot !== parseInt(slot));
    }

    if (typeof triggerNews === "function") {
        try {
            if (res === "Ausfall") {
                console.log(`📢 [MELDUNG] Typ: Ausfall für Klasse: ${newsKlasse}`);
                await triggerNews("ausfall", parseInt(slot), newsKlasse);
            } 
            else if (res && res.toString().includes("Outdoor")) {
                console.log(`📢 [MELDUNG] Typ: Outdoor für Klasse: ${newsKlasse}`);
                await triggerNews("outdoor", parseInt(slot), newsKlasse);
            }
            else if (res === "Beendet" || res === "beendet" || (res && res.toString().includes("beendet"))) {
                console.log(`📢 [MELDUNG] Typ: Beendet für Klasse: ${newsKlasse}`);
                await triggerNews("beendet", parseInt(slot), newsKlasse);
            } else {
                console.log(`ℹ️ Keine News-Bedingung erfüllt für Wert: "${res}".`);
            }
        } catch (newsError) {
            console.error("⚠️ Fehler im triggerNews-Ablauf (wird übersprungen, damit Auto-Save läuft):", newsError);
        }
    } else {
        console.warn("⚠️ Funktion 'triggerNews' existiert im globalen Scope nicht!");
    }

    // 4. LOKALEN DATENSTAND AKTUALISIEREN
    if (!currentPlanData[r]) currentPlanData[r] = [];
    currentPlanData[r][c] = finalVal;
    
    // 5. IN DIE SPEICHERLISTE (Warteschlange)
    pendingChanges = pendingChanges.filter(ch => !(ch.slotIndex === slot)); 
    pendingChanges.push({ 
        row: parseInt(r), 
        col: parseInt(c), 
        time: time, 
        slotIndex: slot, 
        val: finalVal 
    }); 

    // 6. SOFORTIGER VERSAND (WICHTIG: await!)
    try {
        console.log("⏳ Starte saveImmediately()...");
        await saveImmediately();
        console.log("=== 🏁 addChange erfolgreich beendet ===");
    } catch (error) {
        console.error("❌ Fehler beim Auto-Save in addChange:", error);
        throw error; // Re-throw damit updateSelection den Fehler merkt
    }
};

async function saveMaterialSelection(mat, detail, time, slot, klasse, btn) {
    // 1. Klick-Sperre für das gesamte Modal & Backdrop aktivieren
    const modal = document.getElementById('eigenesmenu-modal');
    if (modal) {
        modal.style.pointerEvents = "none"; 
    }

    // 2. UI Feedback direkt im Button initialisieren
    let originalText = "RESERVIERUNG SPEICHERN";
    if (btn) {
        const btnTextEl = btn.querySelector('.btn-text');
        if (btnTextEl) originalText = btnTextEl.innerText;
        
        btn.innerHTML = `
            <span class="btn-text">${originalText}</span>
            <div class="inline-loader-container" style="position: absolute; right: 18px; top: 50%; transform: translateY(-50%); display: flex; align-items: center;">
                <div class="eigenesmenu-loader" style="width:14px; height:14px; border-width:2px; border: 2px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite;"></div>
            </div>
        `;
    }

    // 3. Daten-Validierung
    const finalSlot = slot || window.currentEditSlot; 
    const datePicker = document.getElementById('datePicker');
    const dateVal = datePicker ? datePicker.value : "";

    if (!finalSlot || finalSlot === "undefined" || !dateVal) {
        alert("Fehler: Slot-ID oder Datum fehlt.");
        if (modal) modal.style.pointerEvents = "auto";
        if (btn) {
            btn.innerHTML = `<span class="btn-text">${originalText}</span>`;
        }
        return;
    }

    const uniqueId = `${dateVal}_${finalSlot}`;

    // Payload für die Weiche vorbereiten (Entspricht exakt deiner Struktur)
    const payload = {
        action: "saveBooking", // Verwendet den standardmäßigen Speicher-Endpoint
        pw: typeof userPw !== 'undefined' ? userPw : "",
        id: uniqueId,
        date: dateVal,
        slot: finalSlot,
        klasse: klasse || "",
        material: mat,            
        kommentar: detail || ""   
    };

    // 4. Visuelle Update-Logik für das Frontend (Optimistic UI Callback)
    const visuelleAktualisierung = function(aktuellesMaterial, targetSlot) {
        // Lokalen Cache synchronisieren
        if (window.lastPlanData && window.lastPlanData[targetSlot]) {
            window.lastPlanData[targetSlot].material = payload.material;
            window.lastPlanData[targetSlot].kommentar = payload.kommentar;
        }

        // Icon direkt an die Box heften oder entfernen
        const targetBox = document.querySelector(`[data-slot="${targetSlot}"]`);
        if (targetBox) {
            markBoxWithMaterialIcon(targetBox, payload.material, payload.kommentar);
        }
    };

    console.log("Material-Speicherprozess an Weiche übergeben:", payload);

    // 5. Übergabe an die universelle Doppellektions-Weiche
    if (typeof window.prozessiereAktion === 'function') {
        window.prozessiereAktion(payload, visuelleAktualisierung);
    } else {
        // Fallback, falls die Weiche temporär nicht erreichbar sein sollte
        console.warn("window.prozessiereAktion nicht gefunden! Verwende direkten POST.");
        executeDirectMaterialPost(payload, visuelleAktualisierung, btn, originalText, modal);
    }
}

        if (targetBox) {
            markBoxWithMaterialIcon(targetBox, "", ""); // Entfernt die Badge rückstandslos
        }
    };

    console.log("Material-Löschprozess an Weiche übergeben:", payload);

    // 5. Übergabe an die universelle Doppellektions-Weiche
    if (typeof window.prozessiereAktion === 'function') {
        window.prozessiereAktion(payload, visuelleAktualisierung);
    } else {
        executeDirectMaterialPost(payload, visuelleAktualisierung, btn, originalText, modal);
    }
};


/* ============================================================
   FALLBACK: DIREKTER POST-REQUEST (Falls Weiche nicht greift)
   ============================================================ */
async function executeDirectMaterialPost(payload, updateCallback, btn, originalText, modal) {
    try {
        const response = await fetch(url, {
            method: "POST",
            body: JSON.stringify(payload)
        });
        const result = await response.json();

        if (result.status === "success") {
            if (btn) {
                const loaderContainer = btn.querySelector('.inline-loader-container');
                if (loaderContainer) loaderContainer.innerHTML = `<span style="color: #2ecc71; font-weight: bold; font-size: 1.2em;">✓</span>`;
                btn.style.background = "rgba(39, 174, 96, 0.4)"; 
            }
            updateCallback(payload.material, payload.slot);
            if (typeof loadPlan === 'function') await loadPlan();
            setTimeout(() => { if (typeof closeEditor === 'function') closeEditor(); }, 400);
        } else {
            throw new Error(result.msg || "Server-Fehler");
        }
    } catch (e) {
        alert("Fehler verarbeitet: " + e.message);
        if (modal) modal.style.pointerEvents = "auto";
        if (btn) {
            btn.innerHTML = `<span class="btn-text">${originalText}</span>`;
            btn.style.background = "";
        }
    }
}


/* ============================================================
   HILFSFUNKTIONEN: HELPER FÜR DIE BADGES IM STUNDENPLAN
   ============================================================ */
function markBoxWithMaterialIcon(box, material, kommentar) {
    if (!box) return;
    const oldIcon = box.querySelector('.material-indicator');
    if (oldIcon) oldIcon.remove();

    if (!material || material.trim() === "") return;

    const badge = document.createElement('div');
    badge.className = 'material-indicator';
    badge.innerHTML = '📦';

    Object.assign(badge.style, {
        position: 'absolute',
        top: '2px',
        right: '2px',
        background: 'rgba(51, 51, 51, 0.9)',
        color: 'white',
        padding: '2px 4px',
        borderRadius: '4px',
        fontSize: '16px',
        zIndex: '10',
        cursor: 'pointer'
    });

    // WICHTIG: Das Klick-Event für die Info-Anzeige
    badge.onclick = (e) => {
        e.stopPropagation();
        showMaterialDetailPopup(material, kommentar);
    };

    box.appendChild(badge);
}

function showMaterialDetailPopup(material, kommentar) {
    const overlay = document.createElement('div');
    overlay.className = 'material-info-overlay'; 
    overlay.onclick = () => overlay.remove(); 

    const materialList = material.split(', ').map(item => `• ${item}`).join('<br>');

    overlay.innerHTML = `
        <div class="material-info-content" onclick="event.stopPropagation()" style="max-width: 350px; border: 1px solid #ff8c00;">
            <div class="material-info-title" style="color: #ff8c00; font-weight: bold; margin-bottom: 15px;">
                📦 Material-Reservierung
            </div>
            
            <div style="margin-bottom: 15px; text-align: left; font-size: 0.95rem;">
                ${materialList}
            </div>

            <div style="background: #111; padding: 10px; border-radius: 6px; border-left: 3px solid #ff8c00; text-align: left; font-style: italic; font-size: 0.85rem;">
                <span style="color: #666; font-size: 0.7rem; font-style: normal; display: block; margin-bottom: 4px;">NOTIZEN:</span>
                ${kommentar ? kommentar : "Keine Details vorhanden."}
            </div>

            <button class="eigenesmenu-cancel" style="width:100%; margin-top: 20px;" onclick="this.closest('.material-info-overlay').remove()">Schließen</button>
        </div>
    `;
    document.body.appendChild(overlay);
}


/**
 * Der "Postbote": Sendet Daten an das Google Apps Script
 * JETZT NEU: Unterstützt ein Abbruch-Signal (options.signal) gegen Race Conditions!
 */
window.saveImmediately = async function(payload, options = {}) {
    // Falls die URL nicht global definiert ist, hier prüfen
    if (typeof url === 'undefined') {
        console.error("❌ saveImmediately abgebrochen: Die Variable 'url' (Web-App URL) ist nicht definiert!");
        return { status: "error", msg: "Skript-URL fehlt" };
    }

    if (!payload) {
        console.error("❌ saveImmediately abgebrochen: Kein Payload übergeben!");
        return { status: "error", msg: "Keine Daten übergeben" };
    }

    try {
        console.log("⏳ Postbote: Sende Speicherbefehl...", payload);

        // KORREKTUR: Wir nutzen das normale Fetch ohne 'no-cors' UND reichen das Abbruch-Signal weiter!
        const response = await fetch(url, {
            method: "POST",
            body: JSON.stringify(payload),
            signal: options.signal // <-- NEU: Hier wird die alte Anfrage im Netzwerk sofort gekillt, falls abgebrochen
        });

        if (!response.ok) {
            throw new Error(`HTTP-Fehler! Status: ${response.status}`);
        }

        const result = await response.json();
        console.log("📥 Postbote: Antwort vom Server erhalten:", result);

        // Wenn das Google Sheet die Buchung erfolgreich eingetragen hat
        if (result.status === "success") {
            console.log("🎯 Speicherbefehl erfolgreich ausgeführt:", payload);

            // ============================================================
            // INTERNE NEWS-ZÜNDUNG
            // ============================================================
            const action = payload.action || payload.mode;
            
            if (action === "saveBooking" && typeof triggerNews === "function") {
                const slotIndex = parseInt(payload.slot);
                const klasseName = payload.klasse || "";
                const halleWert = payload.halle ? payload.halle.toString().trim() : "";

                if (halleWert === "Ausfall") {
                    console.log(`📢 AUTOMATISCHER NEWS-TRIGGER: Ausfall für Slot ${slotIndex} erkannt.`);
                    triggerNews("ausfall", slotIndex, klasseName);
                } 
                else if (halleWert.includes("Outdoor")) {
                    console.log(`📢 AUTOMATISCHER NEWS-TRIGGER: Outdoor für Slot ${slotIndex} erkannt.`);
                    triggerNews("outdoor", slotIndex, klasseName);
                }
                else if (halleWert === "Beendet" || halleWert === "beendet") {
                    console.log(`📢 AUTOMATISCHER NEWS-TRIGGER: Beendet für Slot ${slotIndex} erkannt.`);
                    triggerNews("beendet", slotIndex, klasseName);
                }
            }
            // ============================================================

            return result; // Gibt { status: "success" } zurück
        } else {
            console.error("❌ Server meldete einen Fehler beim Speichern:", result.msg);
            return result;
        }

    } catch (e) {
        // Wenn der Fehler durch das absichtliche Abbrechen (AbortController) kam, werfen wir ihn weiter,
        // damit applyHalleSelection ihn im .catch() mit 'AbortError' sauber abfangen kann.
        if (e.name === 'AbortError') {
            throw e; 
        }

        console.error("❌ Kritischer Fehler beim Speichern im Fetch-Verlauf:", e);
        alert("Verbindung zum Server fehlgeschlagen! Die Änderung wurde eventuell nicht gespeichert.");
        return { status: "error", msg: e.toString() };
    }
};
    

// Hilfsfunktion: Erkennt, ob der Partner-Slot dieselbe Klasse hat (JETZT ALS ECHTE ZAHLEN)
function getDoppellektionPartnerSlot(currentSlot) {
    const slot = parseInt(currentSlot, 10);
    if (isNaN(slot) || !window.lastPlanData) {
        console.warn("❌ Doppellektion-Abbruch: lastPlanData fehlt oder Slot ist NaN");
        return null;
    }
    
    // Tippfehler korrigiert: Variable heißt jetzt durchgehend "aktuellerDatenSatz"
    const aktuellerDatenSatz = window.lastPlanData[slot] || window.lastPlanData[slot.toString()];
    if (!aktuellerDatenSatz) {
        console.warn(`❌ Doppellektion-Abbruch: Keine Daten für Slot ${slot} in lastPlanData gefunden.`);
        return null;
    }
    
    const aktuelleKlasse = aktuellerDatenSatz.klasse ? aktuellerDatenSatz.klasse.toString().trim() : "";
    if (aktuelleKlasse === "" || aktuelleKlasse === "---") return null;

    const slotDanach = slot + 5;
    const slotDavor = slot - 5;

    const datenDanach = window.lastPlanData[slotDanach] || window.lastPlanData[slotDanach.toString()];
    const datenDavor = window.lastPlanData[slotDavor] || window.lastPlanData[slotDavor.toString()];

    const klasseDanach = (datenDanach && datenDanach.klasse) ? datenDanach.klasse.toString().trim() : "";
    const klasseDavor = (datenDavor && datenDavor.klasse) ? datenDavor.klasse.toString().trim() : "";

    console.group(`📊 Doppellektions-Analyse für Slot ${slot} (${aktuelleKlasse})`);
    console.log(`Prüfe Slot danach (+5 = ${slotDanach}): Gefundene Klasse: "${klasseDanach}"`);
    console.log(`Prüfe Slot davor (-5 = ${slotDavor}): Gefundene Klasse: "${klasseDavor}"`);
    console.groupEnd();

    if (klasseDanach === aktuelleKlasse) {
        console.log(`🎯 MATCH! Slot ${slotDanach} ist der Partner (Stunde danach).`);
        return slotDanach;
    }
    if (klasseDavor === aktuelleKlasse) {
        console.log(`🎯 MATCH! Slot ${slotDavor} ist der Partner (Stunde davor).`);
        return slotDavor;
    }

    return null;
}

    

// DIE UNIVERSELLE WEICHE (Mit Absicherung für den Container)
window.prozessiereAktion = function(payload, onCompleteVisuals) {
    // Sicherstellen, dass der Slot im Payload für die Prüfung bereit ist
    const partnerSlot = getDoppellektionPartnerSlot(payload.slot);
    
    // Wir greifen uns das Menü-Listen-Feld aus deinem Modal
    const container = document.getElementById('menu-options-list');

    console.log(`🔍 Doppellektions-Prüfung für Slot ${payload.slot}. Partner gefunden: ${partnerSlot}`);

    // Falls keine Doppellektion vorliegt oder das Menüfeld nicht da ist -> Sofort normal feuern!
    if (!partnerSlot || !container) {
        executePayloads([payload], onCompleteVisuals);
        if (typeof closeEditor === "function") closeEditor();
        return;
    }

    // --- VARIANTE B: INHALT IM MODAL ERSETZEN ---
    container.innerHTML = `
        <div class="doppel-abfrage-container" style="text-align: center; padding: 20px 10px;">
            <p style="color: #ff9800; font-weight: bold; margin-bottom: 15px; font-size: 1.2rem;">
                🔗 Doppellektion erkannt!
            </p>
            <p style="color: #ccc; margin-bottom: 25px; font-size: 0.95rem; line-height: 1.4;">
                Möchtest du diese Änderung für die <span style="color: #ff9800; font-weight: bold;">gesamte Doppellektion</span> übernehmen oder nur für diese Stunde?
            </p>
            
            <button id="btn-doppel-beide" class="eigenesmenu-item" style="justify-content: center; background: #ff9800; color: #111; font-weight: bold; margin-bottom: 12px; border: none; width: 100%; padding: 12px;">
                👥 Für beide Stunden übernehmen
            </button>
            
            <button id="btn-doppel-einzel" class="eigenesmenu-item" style="justify-content: center; background: #333; border: 1px solid #555; color: #fff; margin-bottom: 12px; width: 100%; padding: 12px;">
                👤 Nur für diese Stunde
            </button>
        </div>
    `;

// 🔥 DIESE ZEILE JETZT HIER EINFÜGEN:
    // Falls das Modal durch den Ausfall-Klick gesperrt wurde, geben wir es jetzt für die Buttons frei!
    const modal = document.getElementById('eigenesmenu-modal');
    if (modal) modal.style.pointerEvents = "auto";
    
    // Klick-Handler für "Für beide Stunden"
    document.getElementById('btn-doppel-beide').onclick = function() {
        console.log(`🚀 Sende Doppellektion: Slot ${payload.slot} und Partner ${partnerSlot}`);
        const partnerPayload = { ...payload, slot: partnerSlot.toString() }; // Partner als String mitschicken
        
        executePayloads([payload, partnerPayload], onCompleteVisuals);
        if (typeof closeEditor === "function") closeEditor();
    };

    // Klick-Handler für "Nur für diese Stunde"
    document.getElementById('btn-doppel-einzel').onclick = function() {
        console.log(`🚀 Sende nur Einzelstunde: Slot ${payload.slot}`);
        executePayloads([payload], onCompleteVisuals);
        if (typeof closeEditor === "function") closeEditor();
    };
};

// Interne Hilfsfunktion, die die Payloads nacheinander an saveImmediately übergibt
function executePayloads(payloadArray, onCompleteVisuals) {
    payloadArray.forEach(p => {
        // 1. Lokalen Sync-Schutz aktivieren, damit das UI stabil bleibt
        if (window.syncBlockierteSlots) {
            window.syncBlockierteSlots[p.slot] = true;
        }

        // 2. Visuelles Update im Frontend sofort triggern (Optimistic UI)
        if (typeof onCompleteVisuals === "function") {
            onCompleteVisuals(p.halle, p.slot); 
        }

        // 3. Abschicken
        saveImmediately(p)
            .then(result => {
                if (result && result.status === "success") {
                    setTimeout(() => {
                        if (window.syncBlockierteSlots) delete window.syncBlockierteSlots[p.slot];
                    }, 2500);
                } else {
                    if (window.syncBlockierteSlots) delete window.syncBlockierteSlots[p.slot];
                    if (typeof syncPlan === "function") syncPlan();
                }
            })
            .catch(() => {
                if (window.syncBlockierteSlots) delete window.syncBlockierteSlots[p.slot];
                if (typeof syncPlan === "function") syncPlan();
            });
    });
}
