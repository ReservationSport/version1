<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
     <title>Reservation Sport 2026asda</title>
<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<!-- Schriftart -->
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&display=swap" rel="stylesheet">



<style>
    /* ============================================================
       1. BASIS-STYLING & LAYOUT
       ============================================================ */
    body { 
        font-family: 'Segoe UI', sans-serif; 
        background: #1a1a1a; 
        color: white; 
        padding: 20px; 
    }

    /* 2. Das Grid/Die Tabelle wieder schmaler machen */
.grid { 
    display: grid; 
    grid-template-columns: 120px repeat(5, 1fr); 
    gap: 2px; 
    max-width: 1000px; /* Hier ebenfalls wieder 1000px */
    margin: auto; 
}

     .info-box {
    grid-column: span 6;
    font-size: 20px !important; /* Hier die gewünschte Größe */
    padding: 40px !important;   /* Mehr Abstand für eine bessere Optik */
    text-align: center;
    line-height: 1.5;           /* Angenehmerer Zeilenabstand */
    color: #888;                /* Dezentes Grau wie im Screenshot */
    font-style: italic;         /* Kursiv wie gewünscht */
}



    /* ============================================================
       2. NAVIGATION & DATUMSKONTROLLE & News
       ============================================================ */

    
 /* 1. Die Navigationsleiste wieder schmaler machen */
.date-control {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 1000px; /* Zurück auf den Originalwert deiner Tabelle */
    margin: 0 auto;
    padding: 10px 0;
    background: #1a1a1a;
    position: sticky;
    top: 0;
    z-index: 1100;
}

.nav-section {
    display: flex;
    align-items: center;
    gap: 10px;
}

/* Linke Sektion (News) */
.nav-left {
    flex: 1;
    justify-content: flex-start;
}

/* Mittlere Sektion (Datum & alle Pfeile) */
.nav-center {
    flex: 2; /* Nimmt mehr Platz ein, um sich perfekt zu zentrieren */
    justify-content: center;
    gap: 8px;
}

/* Rechte Sektion (Save & Refresh) */
.nav-right {
    flex: 1;
    justify-content: flex-end;
}

/* Spezifisches Styling für das Datum im Zentrum */
#datePicker {
    padding: 8px;
    background: #2a2a2a;
    border: 1px solid #444;
    color: white;
    border-radius: 4px;
    font-family: sans-serif;
}
    
/* Der News-Button bleibt im Premium-Style */
.news-btn-premium {
    position: relative;
    display: flex;
    align-items: center;
    background: #2a2a2a;
    border: 1px solid #444;
    border-radius: 6px;
    padding: 6px 15px;
    cursor: pointer;
    height: 40px;
}

.news-btn-premium:hover {
    background: #333;
    border-color: #e67e22;
}

.news-btn-premium .btn-text {
    color: #fff;
    font-family: 'Segoe UI', sans-serif;
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 2px;
    margin-right: 10px;
}

    
.news-btn-premium .bell-icon {
    font-size: 14px; opacity: 0.7;
}

/* Badge Punkt (Orange) */
.news-btn-premium .badge {
    position: absolute;
    top: -3px;
    right: -3px;
    width: 9px;
    height: 9px;
    background: #e67e22;
    border-radius: 50%;
    border: 1px solid #1a1a1a;
    box-shadow: 0 0 8px rgba(230, 126, 34, 0.6);
}



    
    .nav-group { display: flex; gap: 5px; }

   #datePicker { padding: 0 10px; /* Oben/Unten 0, damit die 40px fix bleiben */ background: #333; color: white; border: 1px solid #444; height: 40px; border-radius: 4px; cursor: pointer; box-sizing: border-box; /* Erzwingt, dass Rahmen/Padding in den 40px enthalten sind */ font-family: inherit; /* Verhindert Schrift-Größen-Sprünge */ } 

   .nav-btn, .refresh-btn { height: 40px; width: 40px; background: #333; border: 1px solid #444; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 4px; box-sizing: border-box; /* Auch hier für absolute Symmetrie */ } 

     .nav-btn:hover { background: #444; }


    .refresh-btn { color: #e67e22; margin-left: 10px; font-size: 18px; }
    .refresh-btn:hover { color: #ff9f43; background: #444; }
 .refresh-btn:active i { animation: spin-once 0.5s ease-in-out; }
        @keyframes spin-once { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }


    /* Diese Klasse blendet die Buttons radikal aus */
.nav-btn-hidden {
    /* Sichtbarkeit auf hidden statt display auf none */
    visibility: hidden !important;
    /* optional: verhindert, dass man den unsichtbaren Button noch klicken kann */
    pointer-events: none; 
}

    /* ============================================================
       3. ZELLEN-STYLING (BOXES)
       ============================================================ */
    /* Grundzustand: Kein Zeigefinger für alle Boxen */
.box { 
    border: 1px solid #444; 
    padding: 5px; 
    background: #262626; 
    min-height: 50px; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    justify-content: center; 
    text-align: center; 
    font-size: 11px; 
    position: relative; 
    cursor: default; /* Zeigefinger entfernt */
    overflow: hidden; 
}

/* Leere Zellen: Keine Interaktion möglich */
.box.empty { 
    pointer-events: none; 
    opacity: 0.5; 
    cursor: default; 
}

/* Zeit-Spalte und Header: Neutraler Cursor */
.zeit-box { 
    background: #333; 
    font-weight: bold; 
    cursor: default; 
}

.header-row { 
    grid-column: span 6; 
    background: #333; 
    font-size: 14px; 
    font-weight: bold; 
    position: sticky; 
    top: 60px; 
    z-index: 1090; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    height: 50px; 
    cursor: default;
}

/* NUR DEINE ZELLEN: Hier erscheint der Zeigefinger */
.box.is-mine { 
    border: 2px solid #e67e22 !important; 
    z-index: 10; 
    cursor: pointer; /* Zeigefinger nur hier */
}

.box.is-mine:hover {
    background-color: rgba(230, 126, 34, 0.2) !important;
    box-shadow: inset 0 0 15px rgba(255, 159, 67, 0.4), 0 0 20px rgba(230, 126, 34, 0.3);
    transform: scale(1.03);
    z-index: 100;
}

/* Fremde Zellen: Sicherstellen, dass kein Finger erscheint */
.box.not-mine {
    cursor: default !important;
}

    /* ============================================================
       4. SPEZIAL-MODI (AUSFALL)
       ============================================================ */
    .box.ausfall-mode { 
        background-color: #000000 !important; 
        color: #777777 !important; 
        background-image: linear-gradient(to top right, transparent calc(50% - 1px), #444, transparent calc(50% + 1px)), 
                          linear-gradient(to top left, transparent calc(50% - 1px), #444, transparent calc(50% + 1px)); 
    }
    
    /* ============================================================
       5. LOGIN-OVERLAY & CARD-DESIGN (PROFI-LOOK)
       ============================================================ */
    #loginOverlay { 
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
        background: radial-gradient(circle at center, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%), 
                    url('https://raw.githubusercontent.com/ReservationSport/ReservationSport/refs/heads/main/Logo.png');
        background-size: cover; background-position: center; z-index: 20000; 
        display: flex; justify-content: center; align-items: center; font-family: 'Inter', sans-serif; backdrop-filter: blur(18px); 
    }

    .login-card {
        background: rgba(20, 20, 20, 0.7); padding: 50px 40px; border-radius: 28px;
        border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5); 
        width: 100%; max-width: 360px; text-align: center;
    }

    .login-card h2 { color: #ffffff; font-size: 30px; margin-bottom: 35px; font-weight: 800; letter-spacing: -1.5px; text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5); }

.login-card h2 span {
    background: none;
    -webkit-text-fill-color: #ffffff;
    color: #ffffff;
}

    .login-card input { 
        padding: 16px 20px; margin: 10px 0; background: rgba(0, 0, 0, 0.4); 
        border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; border-radius: 14px; 
        width: 100%; font-size: 16px; outline: none; box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .login-card input:focus { border-color: #e67e22; background: rgba(0, 0, 0, 0.6); box-shadow: 0 0 20px rgba(230, 126, 34, 0.2); }

    /* ============================================================
       6. BUTTONS (LOGIN & SPEICHERN) MIT BLITZ-EFFEKT
       ============================================================ */
  
  #loginBtn { 
    padding: 18px; 
    margin-top: 25px; 
    background: linear-gradient(180deg, #ff9f43 0%, #e67e22 100%); 
    color: white; 
    border: none; 
    border-radius: 16px; 
    cursor: pointer; 
    width: 100%; 
    
    /* Schrift-Styling: Oswald & Sport-Vibe */
    font-family: 'Oswald', sans-serif;
    font-size: 20px; 
    font-weight: 700;
    text-transform: uppercase; 
    letter-spacing: 1.5px;
    
    /* Tiefe & Interaktion */
    box-shadow: 0 10px 20px -5px rgba(230, 126, 34, 0.5);
    transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
    
    /* Der "Käfig" für die Effekte */
    position: relative;
    overflow: hidden; 
    z-index: 1;
}

#loginBtn:hover { 
    transform: translateY(-3px);
    box-shadow: 0 15px 30px -5px rgba(230, 126, 34, 0.6);
    filter: brightness(1.1);
}

#loginBtn:active { 
    transform: translateY(-1px);
    box-shadow: 0 5px 10px -2px rgba(230, 126, 34, 0.5);
}

/* 1. Statischer Glanz-Effekt (Obere Hälfte des Buttons) */
#loginBtn::before {
    content: '';
    position: absolute;
    top: 0; 
    left: 0; 
    width: 100%; 
    height: 50%;
    background: linear-gradient(rgba(255,255,255,0.2), rgba(255,255,255,0));
    pointer-events: none;
    z-index: 2;
}

/* 2. Dynamischer Blitz (Speed-Line) */
#loginBtn::after {
    content: '';
    position: absolute;
    top: 0;
    left: -150%; /* Start weit links außen */
    width: 60%;
    height: 100%;
    background: linear-gradient(
        90deg, 
        transparent, 
        rgba(255, 255, 255, 0.4), 
        transparent
    );
    transform: skewX(-25deg); 
    transition: 0.6s ease-in-out;
    z-index: 3;
}

/* Blitz-Animation bei Hover */
#loginBtn:hover::after {
    left: 150%; /* Jagt durch den Button nach rechts außen */
}

/* Wir nutzen die ID zur Sicherheit für die Layout-Stabilität */
#saveBtn {
    display: none; /* Steuerung via JS (style.display) */
    position: relative;
    padding: 0 15px !important;
    background: #333 !important;
    color: #e67e22 !important;
    border: 1px solid transparent; 
    border-radius: 4px;
    font-family: 'Oswald', sans-serif;
    font-size: 12px !important;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    
    /* FIX: Feste Dimensionen verhindern das Springen */
    height: 34px !important; 
    min-width: 85px; /* Breite fixiert auf den "SAVE"-Text */
    
    /* Zentrierung für den Inhalt (Spinner & Haken) */
    display: inline-flex; 
    align-items: center;
    justify-content: center;
    
    transition: all 0.2s ease;
    overflow: hidden;
}

#saveBtn:disabled {
    cursor: default !important; /* Entfernt das "Gesperrt"-Zeichen */
}

/* Optional: Wenn du willst, dass er im Erfolg-Zustand 
   auch keinen "Klick-Finger" mehr zeigt */
#saveBtn.success {
    cursor: default !important;
    border: 2px solid #27ae60 !important;
}
    
/* Hover-Effekt */
#saveBtn:hover:not(:disabled) {
    background: #3d3d3d !important;
    color: #ff9f43 !important;
}

/* Aktives Leuchten bei Änderungen */
#saveBtn.needs-save {
    display: inline-flex !important;
    animation: pulse-glow 1.5s infinite ease-in-out !important;
    border: 1px solid #e67e22 !important;
}

/* Lade-Zustand (während fetch läuft) */
#saveBtn.is-loading {
    display: inline-flex !important;
    color: transparent !important; /* Versteckt Text, hält Platz */
    cursor: wait;
    animation: none !important;
}

#saveBtn.is-loading::after {
    content: "";
    position: absolute;
    width: 16px; height: 16px;
    border: 2px solid rgba(230, 126, 34, 0.3);
    border-top-color: #e67e22;
    border-radius: 50%;
    animation: button-spin 0.6s linear infinite;
}

#saveBtn.success {
    background-color: transparent !important; /* Hintergrund weg für den Haken-Effekt */
    border: 2px solid #27ae60 !important;    /* Kräftiger grüner Rand */
    box-shadow: none !important;             /* Glühen entfernen */
    cursor: default;
}

/* Der Haken selbst (falls noch nicht so definiert) */
#saveBtn.success::before {
    content: '✔';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 18px;
    color: #27ae60;
    font-weight: bold;
}

/* Animationen */
@keyframes button-spin {
    to { transform: rotate(360deg); }
}

@keyframes pulse-glow {
    0% {
        box-shadow: inset 0 0 2px rgba(230, 126, 34, 0.4);
    }
    50% {
        box-shadow: inset 0 0 20px rgba(230, 126, 34, 1);
        border-color: #ff9f43 !important;
    }
    100% {
        box-shadow: inset 0 0 2px rgba(230, 126, 34, 0.4);
    }
}

#saveBtn:disabled {
    animation: none !important;
    cursor: not-allowed;
}

    
#loginError {
    color: #ff4757;
    margin-top: 15px;
    font-size: 14px;
    font-weight: 600;
    min-height: 20px;
    transition: opacity 0.3s ease; /* Macht das Verschwinden geschmeidiger */
}

    /* ============================================================
       7. ELEMENTE INNERHALB DER BOXEN & LOADER
       ============================================================ */
    .klasse { font-weight: bold; }
    .lehrer-info { font-size: 9px; color: #aaa; margin-top: 1px; }
    .res { font-style: italic; font-size: 9px; margin-top: 2px; position: relative; z-index: 10; }
    
select { width: 100%; height: 100%; position: absolute; top: 0; left: 0; opacity: 0; cursor: pointer; z-index: 5; }

        .save-container { position: absolute; right: 10px; z-index: 10; display: flex; align-items: center; height: 40px; }
        
    .stift { 
        position: absolute; top: 2px; right: 4px; z-index: 50; color: #e67e22; 
        font-size: 22px; transition: transform 0.2s ease; 
    }
    .stift:hover { transform: scale(1.2); color: #ff9f43; }

   .global-loader { 
    position: fixed; /* WICHTIG: Bezieht sich auf den Bildschirm, nicht auf die Leiste */
    left: 15px;      /* Abstand vom linken Rand */
    top: 15px;       /* Abstand vom oberen Rand */
    width: 25px; 
    height: 25px; 
    border: 3px solid #444; 
    border-top: 3px solid #e67e22; 
    border-radius: 50%; 
    animation: spin 1s linear infinite; 
    display: none;   /* Standardmäßig aus */
    z-index: 9999;   /* Höchster Wert, damit er über ALLEM liegt */
}

@keyframes spin { 
    0% { transform: rotate(0deg); } 
    100% { transform: rotate(360deg); } 
}
    
.sport-loader { font-size: 20px; visibility: hidden; animation: bounce 0.6s infinite alternate; }
        .sport-loader.active { visibility: visible; }
        @keyframes bounce { 0% { transform: translateY(0); } 100% { transform: translateY(-10px); } }


    .divider-thin { grid-column: 1 / span 6; height: 1px; background: #444; margin: 2px 0; }
    .divider-thick { grid-column: 1 / span 6; height: 4px; background: #444; margin: 5px 0; }

.extra-select { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; z-index: -1; pointer-events: none; }


  /* ============================================================
       8. Sidebar mit Nachrichtenzentrale
       ============================================================ */
    

#newsSidebar {
    left: 0 !important;
    right: auto !important;
    animation: slideIn 0.3s ease-out !important; /* slideIn von links */
}

@keyframes slideIn {
    from { transform: translateX(-100%); }
    to { transform: translateX(0); }
}

    
</style>


</head>


<body onclick="closeAllExtraMenus()">
    <div id="loginOverlay">
    <div class="login-card">
        <h2>Reservation <span>Sport</span></h2>
        
    <!-- Kürzel Feld -->
<input type="text" id="kuerzelInput" placeholder="Kürzel" autocomplete="off"
       onfocus="document.getElementById('loginError').innerText=''"
       oninput="document.getElementById('loginError').innerText=''">

<!-- Passwort Feld -->
<input type="password" id="passwordInput" placeholder="Passwort" 
       onfocus="document.getElementById('loginError').innerText=''"
       oninput="document.getElementById('loginError').innerText=''"
       onkeydown="if(event.key === 'Enter') { event.preventDefault(); document.getElementById('loginBtn').click(); }">

<button id="loginBtn" onclick="checkLogin()">
    On your marks...    
</button>
        
        <!-- Basketball als dezenter, moderner Loader -->
        <div id="loginBall" class="sport-loader" style="margin-top: 30px; font-size: 28px; filter: grayscale(0.2);">🏀</div>
        <p id="loginError" style="color: #ff4757; margin-top: 15px; font-size: 14px; font-weight: 600; min-height: 20px;"></p>
    </div>
</div>

    
<div class="date-control">
    <!-- Der Global Loader ist wieder da -->
    <div id="globalLoader" class="global-loader" style="display:none;"></div>

    <div class="nav-section nav-left">
        <button onclick="openNews()" class="news-btn-premium">
            <span class="btn-text">News</span>
            <span class="bell-icon">🔔</span>
            <span id="newsBadge" class="badge" style="display:none;"></span>
        </button>
    </div>

    <div class="nav-section nav-center">
    <!-- Hier wurden die IDs hinzugefügt -->
    <button id="btnPrevWeek" class="nav-btn" onclick="changeDate(-7)">⏮</button>
    <button id="btnPrevDay" class="nav-btn" onclick="changeDate(-1)">◀</button>
    
    <button class="nav-btn" onclick="goToToday()"><i class="fas fa-house"></i></button>
    <input type="date" id="datePicker" onchange="loadPlan()">
    
    <button class="nav-btn" onclick="changeDate(1)">▶</button>
    <button class="nav-btn" onclick="changeDate(7)">⏭</button>
</div>

    <div class="nav-section nav-right">
        <!-- Save-Button mit kleinerer Schrift -->
        <button id="saveBtn" class="save-btn" style="display:none;" onclick="saveChanges()">
            SAVE
        </button>
        <button class="refresh-btn" onclick="loadPlan()"><i class="fas fa-sync-alt"></i></button>
    </div>
</div>

    
    <div class="grid" id="plan"></div>





    <script>
        const url = "https://script.google.com/macros/s/AKfycbyfGP5INmJYbo2pl2JufKMmiGmiYh0D3R7BntykusTw8oOlpcXY27tJ9h9uc1kzKFtj/exec"; 
        let pendingChanges = [], configFarben = {}, userPw = "", userKuerzel = "", pressTimer;
        let currentPlanData = [], lastStableDate = "", myClasses = [], allClassTeachers = {};

    let pendingNotifications = [];
        
        window.addEventListener('beforeunload', (e) => {
            if (pendingChanges.length > 0) { e.preventDefault(); e.returnValue = ''; }
        });

        function updateNavButtons() {
    const dp = document.getElementById('datePicker');
    if (!dp || !dp.value) return;

    const pickerDate = new Date(dp.value);
    pickerDate.setHours(0, 0, 0, 0);

    const heute = new Date();
    heute.setHours(0, 0, 0, 0);

    const prevDayBtn = document.getElementById('btnPrevDay');
    const prevWeekBtn = document.getElementById('btnPrevWeek');

    // TAG ZURÜCK: Verstecken, wenn wir am heutigen Tag sind
    if (prevDayBtn) {
        if (pickerDate <= heute) {
            prevDayBtn.classList.add('nav-btn-hidden');
        } else {
            prevDayBtn.classList.remove('nav-btn-hidden');
        }
    }

    // WOCHE ZURÜCK: Verstecken, wenn ein Sprung zurück in die Vergangenheit führen würde
    if (prevWeekBtn) {
        const limitWoche = new Date(heute);
        limitWoche.setDate(heute.getDate() + 7); // Erst ab Tag 7 in der Zukunft sichtbar

        if (pickerDate < limitWoche) {
            prevWeekBtn.classList.add('nav-btn-hidden');
        } else {
            prevWeekBtn.classList.remove('nav-btn-hidden');
        }
    }
}
        function closeAllExtraMenus() {
            document.querySelectorAll('.extra-select').forEach(sel => {
                sel.style.zIndex = "-1";
                sel.style.pointerEvents = "none";
                sel.style.opacity = "0";
            });
        }

        async function checkLogin() {
            const btn = document.getElementById('loginBtn'), ball = document.getElementById('loginBall');
            const pwVal = document.getElementById('passwordInput').value;
            const kuerzelVal = document.getElementById('kuerzelInput').value.trim().toLowerCase();
            if(!kuerzelVal) { document.getElementById('loginError').innerText = "Kürzel fehlt!"; return; }
            btn.style.display = 'none'; ball.classList.add('active');
            try {
                const res = await fetch(`${url}?mode=login&pw=${pwVal}&kuerzel=${kuerzelVal}`);
                const json = await res.json();
                if (json.error === "Falsches Passwort") {
                    document.getElementById('loginError').innerText = "Falsches Passwort!";
                    btn.style.display = 'block'; ball.classList.remove('active');
                } else {
                    userPw = pwVal;
                    userKuerzel = kuerzelVal;
                    document.getElementById('loginOverlay').style.display = 'none';
                    loadPlan();
                }
            } catch(e) { document.getElementById('loginError').innerText = "Fehler."; btn.style.display = 'block'; ball.classList.remove('active'); }
        }




        async function loadPlan() {
    const dp = document.getElementById('datePicker');
    
    // 1. Prüfung auf ungespeicherte Änderungen
    if (pendingChanges.length > 0) {
        if (!confirm("Du hast ungespeicherte Änderungen. Diese gehen beim Aktualisieren verloren! Trotzdem fortfahren?")) {
            dp.value = lastStableDate; 
            return;
        }
    }

    const dateVal = dp.value;
    if (!userPw || !dateVal) return;

    // 2. RESET: Save-Button verstecken und Liste leeren
    const sBtn = document.getElementById('saveBtn');
    if (sBtn) {
        sBtn.style.display = 'none';
        sBtn.classList.remove('needs-save', 'success', 'is-loading');
        sBtn.innerText = "SAVE"; 
    }
    pendingChanges = []; 

    lastStableDate = dateVal; 
    updateNavButtons();
    
    const container = document.getElementById('plan');
    container.innerHTML = ""; // Tabelle leeren
    document.getElementById('globalLoader').style.display = 'block'; // Loader an
            
    const dateObj = new Date(dateVal); dateObj.setHours(12,0,0,0);
    const heute = new Date(); heute.setHours(12,0,0,0);
    const vierWochen = new Date(); vierWochen.setDate(heute.getDate() + 28);
    
    // Validierung der Daten
    if (dateObj < heute) { 
        container.innerHTML = `<div class="box info-box">Lebst du in der Vergangenheit?</div>`; 
        document.getElementById('globalLoader').style.display = 'none'; 
        return; 
    }
    if (dateObj > vierWochen) { 
        container.innerHTML = `<div class="box info-box">Die Zukunft ist noch nicht bereit...</div>`; 
        document.getElementById('globalLoader').style.display = 'none'; 
        return; 
    }
    if (dateObj.getDay() === 0 || dateObj.getDay() === 6) { 
        container.innerHTML = `<div class="box info-box">Mach mal Pause! Es ist Wochenende...</div>`; 
        document.getElementById('globalLoader').style.display = 'none'; 
        return; 
    }
    
    try {
        const res = await fetch(`${url}?date=${dateVal}&pw=${userPw}&kuerzel=${userKuerzel}`);
        const json = await res.json();
        
        if (json.error === "SPERRE") {
            container.innerHTML = `<div class="box info-box">${json.msg}</div>`;
            document.getElementById('globalLoader').style.display = 'none';
            return;
        }

        container.innerHTML = ""; 
        currentPlanData = json.data; 
        myClasses = json.userClasses || [];
        allClassTeachers = json.allClassTeachers || {};
        const data = json.data, options = json.options;
        configFarben = {}; 
        options.forEach(opt => configFarben[opt[0]] = opt[1]);
        
        const wtArr = ["Sonntag", "Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag", "Samstag"];
        const [y, m, d] = dateVal.split('-').map(Number);
        
        data.forEach((row, rowIndex) => {
            if (rowIndex === 0) {
                container.innerHTML += `<div class="box header-row"><span>${wtArr[dateObj.getDay()]}, ${d}.${m}.${y}</span></div>`;
            } else {
                if (rowIndex === 4 || rowIndex === 10) container.innerHTML += `<div class="divider-thin"></div>`;
                if (rowIndex === 7) container.innerHTML += `<div class="divider-thick"></div>`;
                container.innerHTML += `<div class="box zeit-box">${row[0]}</div>`;
                
                for(let i = 1; i <= 5; i++) {
                    let belegteHallenInZeileOhneMich = [];
                    for (let k = 1; k <= 5; k++) {
                        if (k === i) continue; 
                        let otherVal = String(row[k] || "").trim();
                        if (otherVal !== "") {
                            let resPart = otherVal.split(' | ')[1] || "";
                            if (resPart && resPart !== "Ausfall") {
                                belegteHallenInZeileOhneMich.push(resPart);
                            }
                        }
                    }

                    let val = row[i] || "", teile = val.split(' | '), klasse = teile[0], res = teile[1] || "", kommentar = teile[2] || "";
                    let isAusfall = (res === "Ausfall");
                    let canEdit = myClasses.some(c => klasse.trim() === c.trim());
                    let stiftHtml = (kommentar.startsWith("KOMMENTAR:")) ? `<span class="stift" onclick="event.stopPropagation(); alert('Notiz: ${kommentar.replace('KOMMENTAR:', '')}')"><i class="fas fa-comment-dots"></i></span>` : "";
                    let teacher = klasse.split('/').map(k => allClassTeachers[k.trim()] || "").filter(t => t !== "").join(" / ");

                    container.innerHTML += `
                    <div class="box ${klasse.trim() === "" ? 'empty' : ''} ${!canEdit ? 'not-mine' : 'is-mine'} ${isAusfall ? 'ausfall-mode' : ''}" 
                            data-row="${rowIndex}" data-col="${i}"
                            oncontextmenu="${canEdit ? 'handleContextMenu(event, this)' : ''}" ontouchstart="${canEdit ? 'startTimer(this)' : ''}" ontouchend="clearTimer()" style="background-color: ${ (isAusfall) ? '' : configFarben[res] || ''}">
                            ${stiftHtml}
                            <div class="klasse">${klasse}</div>
                            <div class="lehrer-info">${teacher}</div>
                            <div class="res">${res}</div>
                            ${canEdit ? `
                            <select onclick="event.stopPropagation()" onchange="addChange(this, '${row[0]}', ${i}, '${klasse}');">
                                <option value="">---</option>
                                ${options.filter(o => {
                                    const optName = o[0];
                                    if (res === optName) return true;
                                    let istGesperrt = belegteHallenInZeileOhneMich.some(belegt => {
                                        let belegtParts = belegt.split(/[\s+]+/).filter(p => p.length > 0 && p !== "Halle");
                                        let optParts = optName.split(/[\s+]+/).filter(p => p.length > 0 && p !== "Halle");
                                        return optParts.some(p => belegtParts.includes(p));
                                    });
                                    return !istGesperrt;
                                }).map(o => `<option value="${o[0]}" ${res === o[0] ? 'selected' : ''}>${o[0]}</option>`).join('')}
                            </select>

                            <select class="extra-select" onclick="event.stopPropagation()" onchange="handleExtraAction(this, '${row[0]}', ${i})">
                                 <option value="">---</option>
                                 <option value="ausfall">❌ Ausfall</option>
                                 <option value="perma_delete">🏆 Schuljahr beendet</option>
                                 <option value="kommentar">📝 Notiz hinzufügen</option>
                                 <option value="delete_comment" class="del-opt">🗑️ Notiz löschen</option>
                            </select>` : ''}
                    </div>`;
                }
            }
        });
    } catch(e) { 
        console.error(e); 
        // ERGÄNZT: Fehlermeldung für den User, falls der Server streikt
        container.innerHTML = `<div class="box info-box" style="color:red;">Server-Fehler beim Laden!</div>`;
    } finally {
        // ERGÄNZT: Der Loader wird IMMER ausgeschaltet, egal ob Erfolg oder Fehler
        document.getElementById('globalLoader').style.display = 'none';
        updateNavButtons();
    }
}


async function saveChanges() {
    const btn = document.getElementById('saveBtn');
    const gLoader = document.getElementById('globalLoader'); 
    
    // 1. START: Globaler Loader an, Button in Lade-Zustand
    if (gLoader) gLoader.style.display = 'block';
    
    btn.classList.add('is-loading');
    btn.disabled = true;
    btn.innerText = "SAVE"; 

    try { 
        const response = await fetch(url, { 
            method: "POST", 
            body: JSON.stringify({ 
                date: document.getElementById('datePicker').value, 
                changes: pendingChanges, 
                pw: userPw,
                kuerzel: userKuerzel
            }) 
        }); 
        
        const result = await response.json();

        // 2. ERFOLG: Änderungen gespeichert
        if (result.status === "success") {
            
            // --- NEU: GEPARKTE BENACHRICHTIGUNGEN JETZT SENDEN ---
            if (typeof pendingNotifications !== 'undefined' && pendingNotifications.length > 0) {
                pendingNotifications.forEach(n => {
                    if (typeof createNotification === "function") {
                        createNotification(n.type, n.klasse, n.r, n.datum);
                    }
                });
                pendingNotifications = []; // Liste leeren
            }
            // ----------------------------------------------------

            pendingChanges = []; 
            if (gLoader) gLoader.style.display = 'none';
            
            // Zustände umschalten
            btn.classList.remove('is-loading');
            btn.classList.remove('needs-save'); 
            btn.classList.add('success'); 
            
            btn.innerText = ""; 

            // 3. RESET: Button nach 1,5 Sekunden ausblenden
            setTimeout(() => { 
                btn.style.display = 'none'; 
                btn.classList.remove('success'); 
                btn.innerText = "SAVE"; 
                btn.disabled = false;
            }, 1500); 

        } else { 
            throw new Error("Server Error"); 
        }

    } catch (e) { 
        // 4. FEHLER-HANDLING
        if (gLoader) gLoader.style.display = 'none';
        btn.classList.remove('is-loading');
        btn.disabled = false;
        btn.style.color = "#ff4757"; 
        btn.innerText = "Error"; 
        
        setTimeout(() => { 
            btn.innerText = "SAVE"; 
            btn.style.color = "#e67e22"; 
            if(pendingChanges.length > 0) {
                btn.classList.add('needs-save');
            }
        }, 2000);
    }
}

        function getExistingComment(r, c) {
            let val = (currentPlanData[r] && currentPlanData[r][c]) ? currentPlanData[r][c] : "";
            let teile = val.split(' | ');
            return (teile[2] && teile[2].startsWith("KOMMENTAR:")) ? teile[2] : "";
        }

function buildFinalValue(r, c, neueHalle, neuerKommentar) {
    const parent = document.querySelector(`.box[data-row="${r}"][data-col="${c}"]`);
    const klasse = parent.querySelector('.klasse').innerText.trim();
    
    let fullString = (currentPlanData[r] && currentPlanData[r][c]) ? currentPlanData[r][c] : "";
    let hasU21 = fullString.includes("U21");

    // Wenn die Halle gelöscht wird, fällt U21 weg
    if (neueHalle === "" || neueHalle === "---" || neueHalle === null) {
        hasU21 = false;
        neueHalle = ""; 
    }
    
    // Kommentar-Logik: Entweder der neue oder der bestehende
    let commentPart = neuerKommentar !== undefined ? neuerKommentar : getExistingComment(r, c);

    // WICHTIG: Die Reihenfolge muss exakt stimmen für die Anzeige-Logik
    // Teil 0: Klasse
    // Teil 1: Halle (evtl. mit U21)
    // Teil 2: Kommentar
    
    let hallenTeil = neueHalle;
    if (hasU21 && hallenTeil !== "") {
        hallenTeil += " | U21"; // U21 wird an die Halle geklebt
    } else if (hasU21 && hallenTeil === "") {
        // Sonderfall: U21 ohne Halle (sollte durch unsere neue Logik vermieden werden)
        hallenTeil = "U21"; 
    }

    let finalParts = [klasse];
    finalParts.push(hallenTeil || ""); // Muss existieren, auch wenn leer, damit Kommentar Index 2 bleibt
    if (commentPart && commentPart !== "") {
        finalParts.push(commentPart);
    }

    return finalParts.join(" | ");
}


        
window.addChange = (el, time, slot, klasse) => { 
    let res = el.value; 
    const parent = el.parentElement;
    const r = parent.getAttribute('data-row'), c = parent.getAttribute('data-col');
    
    parent.classList.remove('ausfall-mode');
    parent.querySelector('.res').innerText = (res === "" || res === "---") ? "" : res; 
    parent.style.backgroundColor = configFarben[res] || ""; 

    let finalVal = buildFinalValue(r, c, (res === "---" ? "" : res), undefined);

    if (!currentPlanData[r]) currentPlanData[r] = [];
    currentPlanData[r][c] = finalVal;
    pendingChanges.push({ time, slotIndex: slot, val: finalVal }); 

    // --- NEU: TRIGGER FÜR LEUCHTEN ---
    const saveBtn = document.getElementById('saveBtn');
    if (saveBtn) {
        saveBtn.style.display = 'block';
        void saveBtn.offsetWidth; // Force Reflow
        saveBtn.classList.add('needs-save');
    }
};





window.handleExtraAction = (el, time, slot) => {
    const action = el.value;
    const parent = el.parentElement;
    const dp = document.getElementById('datePicker'); 
    
    if (action === "" || action === "---") {
        const r = parent.getAttribute('data-row');
        const c = parent.getAttribute('data-col');
        
        parent.classList.remove('ausfall-mode');
        parent.style.backgroundColor = "";
        
        const resElem = parent.querySelector('.res');
        if (resElem) resElem.innerText = ""; 

        let fullString = (currentPlanData[r] && currentPlanData[r][c]) ? currentPlanData[r][c] : "";
        let parts = fullString.split('|').map(s => s.trim());
        let commentPart = parts.find(p => p.startsWith("KOMMENTAR:"));
        
        let finalVal = buildFinalValue(r, c, "", commentPart);
        
        if (!currentPlanData[r]) currentPlanData[r] = [];
        currentPlanData[r][c] = finalVal;
        pendingChanges.push({ time, slotIndex: slot, val: finalVal });
        document.getElementById('saveBtn').style.display = 'block';

        el.value = "";
        closeAllExtraMenus();
        return; 
    }

    const r = parent.getAttribute('data-row');
    const c = parent.getAttribute('data-col');
    const klasseElem = parent.querySelector('.klasse');
    const klasse = klasseElem ? klasseElem.innerText.trim() : "";
    
    let fullString = (currentPlanData[r] && currentPlanData[r][c]) ? currentPlanData[r][c] : "";
    let parts = fullString.split('|').map(s => s.trim());
    let commentPart = parts.find(p => p.startsWith("KOMMENTAR:"));
    let neueHalle = parent.querySelector('.res').innerText.trim();

    // --- LOGIK FÜR DIE AKTIONEN ---

    if (action === "perma_delete") {
        if (confirm(`Soll das Schuljahr für die Klasse "${klasse}" beendet werden?`)) {
            const modal = document.getElementById('pwModal');
            const input = document.getElementById('modalPwInput');
            const btn = document.getElementById('confirmPwBtn');

            if (modal && input && btn) {
                modal.style.display = 'flex';
                input.value = '';
                input.focus();

                // Auf async umgestellt, damit wir auf das Löschen warten können
                btn.onclick = async () => {
                    if (input.value === userPw) {
                        modal.style.display = 'none';
                        
                        // 1. VISUELLER LOCK: Tabelle leeren & Loader an
                        const gLoader = document.getElementById('globalLoader');
                        if (gLoader) gLoader.style.display = 'block';
                        const planContainer = document.getElementById('plan');
                        if (planContainer) planContainer.innerHTML = ""; 

                        // 2. Nachricht für Zentrale parken
                        pendingNotifications.push({ type: "Outdoor/Ende", klasse, r, datum: dp.value });

                        // 3. Löschvorgang starten und warten
                        if (typeof permaDeleteClass === "function") {
                            await permaDeleteClass(klasse, slot);
                        }
                        
                    } else {
                        alert("Falsches Passwort!");
                        input.value = '';
                        input.focus();
                    }
                };
            }
        }
        el.value = ""; 
        closeAllExtraMenus(); 
        return;
    } 
    
    else if (action === "ausfall") {
        neueHalle = "Ausfall";
        parent.classList.add('ausfall-mode');
        pendingNotifications.push({ type: "einen Ausfall", klasse, r, datum: dp.value });
    } 
    
    else if (action === "kommentar") {
        let existingText = commentPart ? commentPart.replace("KOMMENTAR:", "") : "";
        const text = prompt("Notiz eingeben:", existingText);
        if (text !== null) {
            let oldStift = parent.querySelector('.stift');
            if (oldStift) oldStift.remove();
            if (text.trim() !== "") {
                commentPart = "KOMMENTAR:" + text.trim();
                let span = document.createElement('span');
                span.className = 'stift';
                span.innerHTML = '<i class="fas fa-comment-dots"></i>';
                span.onclick = (e) => { e.stopPropagation(); alert('Notiz: ' + text.trim()); };
                parent.appendChild(span);
            } else { commentPart = undefined; }
        } else { 
            el.value = ""; closeAllExtraMenus(); return; 
        }
    } 
    
    else if (action === "delete_comment") {
        commentPart = ""; 
        let stift = parent.querySelector('.stift');
        if (stift) stift.remove();
    }

    // --- FINALES UPDATE ---

    if (neueHalle !== "" && neueHalle !== "Ausfall") {
        parent.style.backgroundColor = configFarben[neueHalle] || "";
    } else if (neueHalle === "Ausfall") {
        parent.style.backgroundColor = ""; 
    }
    
    const resElem = parent.querySelector('.res');
    if (resElem) resElem.innerText = neueHalle;

    let finalVal = buildFinalValue(r, c, neueHalle, commentPart);
    if (!currentPlanData[r]) currentPlanData[r] = [];
    currentPlanData[r][c] = finalVal;
    
    pendingChanges.push({ time, slotIndex: slot, val: finalVal });
    
    const saveBtn = document.getElementById('saveBtn');
    if (saveBtn) {
        saveBtn.style.display = 'block';
        void saveBtn.offsetWidth; 
        saveBtn.classList.add('needs-save');
    }

    el.value = ""; 
    closeAllExtraMenus();
};

// Erstellt die Nachricht und filtert betroffene Kollegen
function createNotification(typ, eigeneKlasse, slotIndex, datum) {
    const reihe = currentPlanData[slotIndex];
    let kollegen = [];

    // Checke alle 5 Hallen-Spalten in dieser Zeile
    for (let i = 1; i <= 5; i++) {
        let inhalt = (reihe[i] || "").split(' | ')[0].trim();
        if (inhalt !== "" && inhalt !== eigeneKlasse) {
            // Hole Lehrer-Kürzel aus deiner allClassTeachers Liste
            let lehrer = allClassTeachers[inhalt] || "Kollege";
            if (!kollegen.includes(lehrer)) kollegen.push(lehrer);
        }
    }

    if (kollegen.length === 0) return; // Keiner da, der benachrichtigt werden müsste

    const msg = {
        id: Date.now(),
        datum: datum,
        slot: slotIndex,
        text: `Halle frei! ${eigeneKlasse} hat ${typ}.`,
        info: `Betrifft: ${kollegen.join(', ')}`,
        zeit: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
    };

    renderNewsEntry(msg);
}

// Nachricht in Sidebar zeichnen
function renderNewsEntry(entry) {
    const container = document.getElementById('newsContent');
    const div = document.createElement('div');
    div.className = "news-item";
    div.style = "background: #1a1a1a; padding: 15px; border-radius: 10px; margin-bottom: 12px; border-left: 4px solid #e67e22; cursor: pointer;";
    
    div.onclick = () => goToDateAndHighlight(entry.datum, entry.slot);

    div.innerHTML = `
        <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
            <span style="color: #e67e22; font-size: 10px; font-weight: bold; text-transform: uppercase;">Meldung ${entry.zeit}</span>
            <span style="color: #444; font-size: 10px;">${entry.datum}</span>
        </div>
        <div style="font-size: 14px; color: #fff; margin-bottom: 5px;">${entry.text}</div>
        <div style="font-size: 11px; color: #666;">${entry.info}</div>
    `;
    
    container.prepend(div);
    document.getElementById('newsBadge').style.display = 'block';
}

// Der "Magic Jump" zum Feld
async function goToDateAndHighlight(targetDate, rowIdx) {
    const dp = document.getElementById('datePicker');
    if (dp.value !== targetDate) {
        dp.value = targetDate;
        await loadPlan(); // Warte bis der Plan geladen ist
    }
    
    closeNews();

    // Kleiner Delay, damit der Browser die neuen Elemente gerendert hat
    setTimeout(() => {
        const targetCells = document.querySelectorAll(`[data-row="${rowIdx}"]`);
        targetCells.forEach(cell => {
            cell.classList.add('blink-active');
            // Klasse nach Animation wieder entfernen
            setTimeout(() => cell.classList.remove('blink-active'), 3000);
        });
    }, 300);
}

    <div style="background: #121212; padding: 40px; border-radius: 12px; border: 1px solid #333; text-align: center; width: 350px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);">
        
        <h2 style="color: #fff; margin: 0 0 8px 0; font-size: 22px; font-weight: 500; letter-spacing: -0.5px;">Safety-Check</h2>
        <p style="color: #888; font-size: 14px; margin-bottom: 30px; line-height: 1.5;">Gib das Passwort ein, um die Klasse virtuell abzukleben:</p>
        
        <!-- Input mit Orange-Effekt beim Klicken -->
        <input type="password" id="modalPwInput" 
               placeholder="Passwort" 
               onfocus="this.style.borderColor='#e67e22'; this.style.boxShadow='0 0 0 2px rgba(230, 126, 34, 0.2)';"
               onblur="this.style.borderColor='#444'; this.style.boxShadow='none';"
               onkeydown="if(event.key === 'Enter') { event.preventDefault(); document.getElementById('confirmPwBtn').click(); }"
               style="width: 100%; padding: 12px 16px; margin-bottom: 24px; border-radius: 8px; border: 1px solid #444; background: #1a1a1a; color: #fff; font-size: 16px; outline: none; box-sizing: border-box; transition: all 0.2s ease;">
        
        <!-- Action Buttons -->
        <div style="display: flex; flex-direction: column; gap: 12px;">
            <button id="confirmPwBtn" 
                    style="width: 100%; background: #e67e22; color: #fff; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: 600; transition: background 0.2s, transform 0.1s;"
                    onmouseover="this.style.background='#d35400';" 
                    onmouseout="this.style.background='#e67e22';"
                    onmousedown="this.style.transform='scale(0.98)';"
                    onmouseup="this.style.transform='scale(1)';">
                Bestätigen
            </button>
            <button onclick="closePwModal()" 
                    style="width: 100%; background: transparent; color: #666; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: color 0.2s;"
                    onmouseover="this.style.color='#888';" 
                    onmouseout="this.style.color='#666';">
                Abbrechen
            </button>
        </div>
    </div>
</div>
    
</body>
</html>
