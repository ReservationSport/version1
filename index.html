<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservation Sport - BBZO1234</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&display=swap" rel="stylesheet">

 

<style>



/* 1. GLOBALE EINSTELLUNGEN & FONTS */
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;700&display=swap');

/* ============================================================
   1. BASIS & GRID-STRUKTUR (Bild 2 Look)
   ============================================================ */
body { 
    font-family: 'Segoe UI', 'Oswald', sans-serif; 
    background: #1a1a1a; 
    color: white; 
    padding: 20px; 
    margin: 0;
}

:root {
    --accent-color: #e67e22;
    --highlight-orange: #ff8c00;
    --bg-dark: #1a1a1a;
    --card-bg: #262626;
}

/* Das Haupt-Grid */
#plan-container, .grid { 
    display: grid; 
    grid-template-columns: 120px repeat(5, 1fr); 
    gap: 2px; 
    max-width: 1000px; 
    margin: auto; 
}

/* ============================================================
   2. NAVIGATION & STICKY CONTROLS
   ============================================================ */
.date-control {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 1000px;
    margin: 0 auto;
    padding: 10px 0;
    background: #1a1a1a;
    position: sticky;
    top: 0;
    z-index: 1100;
}

.nav-section { display: flex; align-items: center; gap: 10px; }
.nav-left { flex: 1; justify-content: flex-start; }
.nav-center { flex: 2; justify-content: center; gap: 8px; }
.nav-right { flex: 1; justify-content: flex-end; }

.nav-group { display: flex; gap: 5px; }

/* Buttons & Picker */
.nav-btn, .refresh-btn, #datePicker { 
    height: 40px; 
    background: #333; 
    border: 1px solid #444; 
    color: white; 
    border-radius: 4px; 
    box-sizing: border-box;
    display: flex;
    align-items: center;
    justify-content: center;
}

.nav-btn { width: 40px; cursor: pointer; }
.nav-btn:hover { background: #444; }
.nav-btn-hidden { visibility: hidden !important; pointer-events: none; }

#datePicker { padding: 0 10px; cursor: pointer; font-family: inherit; }

.refresh-btn { color: #e67e22; width: 40px; font-size: 18px; cursor: pointer; }
.refresh-btn:hover { color: #ff9f43; background: #444; }
.refresh-btn:active i { animation: spin-once 0.5s ease-in-out; }

/* News Button Premium Style */
.news-btn-premium {
    position: relative;
    display: flex;
    align-items: center;
    background: #2a2a2a;
    border: 1px solid #444;
    border-radius: 6px;
    padding: 6px 15px;
    cursor: pointer;
    height: 40px;
}
.news-btn-premium:hover { background: #333; border-color: #e67e22; }
.news-btn-premium .btn-text {
    color: #fff; font-size: 13px; letter-spacing: 2px; margin-right: 10px; font-weight: 300;
}
.news-btn-premium .badge {
    position: absolute; top: -3px; right: -3px; width: 9px; height: 9px;
    background: #e67e22; border-radius: 50%; border: 1px solid #1a1a1a;
    box-shadow: 0 0 8px rgba(230, 126, 34, 0.6);
}

/* ============================================================
   3. BOXEN & ZELLEN-DESIGN
   ============================================================ */
.box { 
    border: 1px solid #444; 
    padding: 5px; 
    background: #262626; 
    min-height: 50px; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    justify-content: center; 
    text-align: center; 
    font-size: 11px; 
    position: relative; 
    cursor: default; 
    overflow: hidden; 
}

.box.empty { pointer-events: none; opacity: 0.5; }
    
.zeit-box {
    background: #f8f9fa; /* Heller, sauberer Hintergrund */
    font-weight: bold;
    color: #e67e22;      /* Dein Orange für die Uhrzeiten */
    border-left: 4px solid #e67e22; /* Ein schicker oranger Akzent am Rand */
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
}

.header-row { 
    grid-column: span 6; 
    background: #333; 
    font-size: 14px; 
    font-weight: bold; 
    position: sticky; 
    top: 60px; 
    z-index: 1090; 
    height: 50px;
}

/* Deine Boxen (.is-mine) */
.box.is-mine { 
    border: 2px solid #e67e22 !important; 
    z-index: 10; 
    cursor: pointer; 
}
.box.is-mine:hover {
    background-color: rgba(230, 126, 34, 0.2) !important;
    box-shadow: inset 0 0 15px rgba(255, 159, 67, 0.4), 0 0 20px rgba(230, 126, 34, 0.3);
    transform: scale(1.03);
    z-index: 100;
}

/* Inhalt der Boxen */
.klasse { font-weight: bold; font-size: 13px; color: #fff; margin-bottom: 2px; text-transform: uppercase; }
.lehrer-info { font-size: 9px; color: #aaa; margin-top: 1px; text-transform: lowercase; }
.res { font-style: italic; font-size: 9px; margin-top: 2px; position: relative; z-index: 10; color: #888; }

.stift { 
    position: absolute; top: 2px; right: 4px; z-index: 50; color: #e67e22; 
    font-size: 22px; transition: transform 0.2s ease; 
}
.stift:hover { transform: scale(1.2); color: #ff9f43; }

/* ============================================================
   4. TRENNLINIEN, LOADER & SPEZIAL-MODI
   ============================================================ */
.divider-thin { grid-column: 1 / span 6; height: 1px; background: #444; margin: 2px 0; }
.divider-thick { grid-column: 1 / span 6; height: 4px; background: #444; margin: 5px 0; }

.box.ausfall-mode { 
    background-color: #000 !important; 
    color: #777 !important; 
    background-image: linear-gradient(to top right, transparent calc(50% - 1px), #444, transparent calc(50% + 1px)), 
                      linear-gradient(to top left, transparent calc(50% - 1px), #444, transparent calc(50% + 1px)); 
}

.info-box {
    grid-column: span 6; font-size: 20px !important; padding: 40px !important;
    text-align: center; line-height: 1.5; color: #888; font-style: italic;
}

.global-loader { 
    position: fixed; left: 15px; top: 15px; width: 25px; height: 25px; 
    border: 3px solid #444; border-top: 3px solid #e67e22; border-radius: 50%; 
    animation: spin 1s linear infinite; display: none; z-index: 9999; 
}

/* ============================================================
   5. LOGIN-OVERLAY & CARD-DESIGN (DEIN ORIGINAL)
   ============================================================ */
#loginOverlay { 
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
    background: radial-gradient(circle at center, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%), 
                url('https://raw.githubusercontent.com/ReservationSport/ReservationSport/refs/heads/main/Logo.png');
    background-size: cover; background-position: center; z-index: 20000; 
    display: flex; justify-content: center; align-items: center; 
    font-family: 'Inter', sans-serif; backdrop-filter: blur(18px); 
}

#loginOverlay.fade-out {
    opacity: 0;
    transition: opacity 0.5s ease;
    pointer-events: none;
}

.login-card {
    background: rgba(20, 20, 20, 0.7); padding: 50px 40px; border-radius: 28px;
    border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5); 
    width: 100%; max-width: 360px; text-align: center;
}

.login-card h2 { 
    color: #ffffff; font-size: 30px; margin-bottom: 35px; font-weight: 800; 
    letter-spacing: -1.5px; text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5); 
}

.login-card input { 
    padding: 16px 20px; margin: 10px 0; background: rgba(0, 0, 0, 0.4); 
    border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; border-radius: 14px; 
    width: 100%; font-size: 16px; outline: none; box-sizing: border-box; 
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.login-card input:focus { 
    border-color: #e67e22; background: rgba(0, 0, 0, 0.6); 
    box-shadow: 0 0 20px rgba(230, 126, 34, 0.2); 
}

/* ============================================================
   6. LOGIN-BUTTON MIT BLITZ-EFFEKT
   ============================================================ */
#loginBtn { 
    padding: 18px; margin-top: 25px; 
    background: linear-gradient(180deg, #ff9f43 0%, #e67e22 100%); 
    color: white; border: none; border-radius: 16px; cursor: pointer; width: 100%; 
    font-family: 'Oswald', sans-serif; font-size: 20px; font-weight: 700; 
    text-transform: uppercase; letter-spacing: 1.5px;
    box-shadow: 0 10px 20px -5px rgba(230, 126, 34, 0.5);
    transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
    position: relative; overflow: hidden; z-index: 1;
}

#loginBtn:hover { transform: translateY(-3px); filter: brightness(1.1); }

/* Verstecken wenn aktiv geladen wird */
#loginBtn.loading { display: none !important; }

/* Dynamischer Blitz */
#loginBtn::after {
    content: ''; position: absolute; top: 0; left: -150%; width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
    transform: skewX(-25deg); transition: 0.6s ease-in-out; z-index: 3;
}
#loginBtn:hover::after { left: 150%; }

/* ============================================================
   7. HÜPFENDER BASKETBALL (LOADER-EDITION)
   ============================================================ */
#loginBall {
    display: none; /* Erst beim Klick sichtbar */
    margin-top: 30px;
    font-size: 50px; /* Schön groß */
    filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
}

/* Wird von handleLogin() hinzugefügt */
#loginBall.active {
    display: inline-block !important;
    animation: bounceAndGrow 0.8s infinite alternate ease-in-out;
}

@keyframes bounceAndGrow {
    0% { 
        transform: translateY(0) scale(1); 
        animation-timing-function: ease-out;
    }
    100% { 
        transform: translateY(-45px) scale(1.5); /* Springt hoch und wird massiv größer */
        animation-timing-function: ease-in;
    }
}

/* Fehlertext Styling */
#loginError {
    color: #ff4757;
    font-size: 14px;
    margin-top: 15px;
    min-height: 20px;
    font-weight: 600;
}

/* ============================================================
   6. MODALS & SIDEBAR
   ============================================================ */
.modal-content {
    background: #111; border: 1px solid #333; padding: 24px; border-radius: 12px;
    width: 320px; text-align: center; color: #eee;
}

#newsSidebar {
    position: fixed; top: 0; left: 0; height: 100%; width: 300px;
    background: #1a1a1a; z-index: 12000; border-right: 1px solid #333;
    transform: translateX(-100%); transition: transform 0.3s ease-out;
}
.sidebar-open #newsSidebar { transform: translateX(0); }

/* Animationen */
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes spin-once { to { transform: rotate(360deg); } }

/* 8. NEWS-SIDEBAR (Von Links) */
#newsSidebar {
    position: fixed;
    top: 0;
    left: -350px; /* Startet außerhalb */
    width: 320px;
    height: 100%;
    background: #111;
    border-right: 1px solid #333;
    z-index: 12000;
    transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    padding: 20px;
    box-shadow: 10px 0 30px rgba(0,0,0,0.5);
}

#newsSidebar.active { left: 0; }

.news-item {
    background: #1a1a1a;
    border: 1px solid #333;
    padding: 12px;
    border-radius: 6px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.2s;
}
.news-item:hover { border-color: #e67e22; background: #222; }

/* Blinken bei News-Sprung */
@keyframes highlightBlink {
    0% { box-shadow: 0 0 0px #e67e22; border-color: #333; }
    50% { box-shadow: 0 0 20px #e67e22; border-color: #e67e22; }
    100% { box-shadow: 0 0 0px #e67e22; border-color: #333; }
}
.blink-active { animation: highlightBlink 0.6s ease-in-out 3; }



/* 9. EIGENES KONTEXT-MENÜ (Für Slot-Aktionen) */
.eigenesmenu-backdrop {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    z-index: 10000;
    display: flex;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(8px);
    padding: 15px;
}

.eigenesmenu-container {
    width: 100%;
    max-width: 380px;
    max-height: 90vh; 
    display: flex;
    flex-direction: column;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 16px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.8);
    overflow: hidden;
}

.eigenesmenu-header {
    padding: 20px;
    background: #1a1a1a;
    border-bottom: 1px solid #333;
}

.eigenesmenu-header h3 {
    color: #e67e22; /* Dein Brand-Orange */
    margin: 0;
    font-size: 1.1em;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.eigenesmenu-header p {
    color: #666;
    font-size: 12px;
    margin: 5px 0 0 0;
}

.eigenesmenu-liste {
    padding: 15px;
    overflow-y: auto;
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.eigenesmenu-item {
    width: 100%;
    background: #262626;
    color: #eee;
    border: 1px solid #333;
    padding: 14px 18px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    transition: all 0.2s ease;
}

.eigenesmenu-item:hover {
    border-color: #e67e22;
    background: #2d2d2d;
    transform: translateX(5px);
}

.eigenesmenu-icon {
    margin-right: 15px;
    font-size: 1.2em;
    color: #e67e22;
    width: 20px;
    text-align: center;
}

/* Status-Elemente im Button */
.eigenesmenu-loader {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: #e67e22;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: none;
    margin-left: auto;
}

.eigenesmenu-success-icon {
    color: #27ae60;
    display: none;
    margin-left: auto;
}

.eigenesmenu-cancel {
    width: 100%;
    background: #111;
    color: #555;
    border: none;
    border-top: 1px solid #222;
    padding: 15px;
    cursor: pointer;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
}


/* 10. MATERIAL-VISUALS & TOOLTIPS */
.material-icon {
    position: absolute; /* Absolut innerhalb der .box */
    top: 5px;
    right: 5px;
    color: #e67e22;
    font-size: 14px;
    z-index: 10;
    cursor: help;
}

.material-icon::after {
    content: attr(data-tooltip);
    position: absolute;
    bottom: 125%;
    right: 0; /* Rechtsbündig mit dem Icon, damit es nicht links rausragt */
    background: rgba(40, 40, 40, 0.95);
    color: #fff;
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 11px;
    white-space: pre-wrap; /* Erlaubt Zeilenumbrüche bei langen Kommentaren */
    width: max-content;
    max-width: 150px;
    display: none;
    z-index: 1000;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    border: 1px solid #e67e22;
    pointer-events: none; /* Verhindert Flackern beim Drüberfahren */
}

@media (hover: hover) {
    .material-icon:hover::after { 
        display: block; 
    }
}

/* Material Info-Fenster (für Mobile-Klick) */
.material-info-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    display: flex; justify-content: center; align-items: center;
    z-index: 15000;
    backdrop-filter: blur(5px);
}

.material-info-content {
    background: #1a1a1a;
    border: 1px solid #444;
    border-radius: 12px;
    padding: 25px;
    width: 85%; max-width: 320px;
    text-align: center;
}

/* 11. SPEZIAL-MODAL: ABKLEBEN / UNIVERSAL-PASSWORT */
#uniPwInput {
    width: 100%;
    max-width: 250px;
    padding: 12px;
    background: #000;
    border: 1px solid #e67e22;
    color: #fff;
    border-radius: 8px;
    text-align: center;
    font-size: 1.2rem;
    letter-spacing: 5px;
    margin: 20px 0;
    outline: none;
    box-shadow: inset 0 0 10px rgba(230, 126, 34, 0.2);
}

.mini-loader {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
}



</style>


</head>


<body>

    <div id="global-loader" class="global-loader" style="display:none;"></div>

<div id="loginOverlay">
    <div class="login-card">
        <h2>BBZO <span>Sport</span></h2>
        
        <input type="text" id="userKuerzel" placeholder="Kürzel" autocomplete="username"
               onfocus="document.getElementById('loginError').innerText=''"
               oninput="document.getElementById('loginError').innerText=''">
        
        <input type="password" id="pw" placeholder="Passwort" autocomplete="current-password"
               onfocus="document.getElementById('loginError').innerText=''"
               oninput="document.getElementById('loginError').innerText=''"
               onkeydown="if(event.key === 'Enter') { event.preventDefault(); handleLogin(); }">

        <button id="loginBtn" onclick="handleLogin()">ON YOUR MARKS...</button>
        
        <div id="loginBall" class="basketball-bounce">🏀</div>
        
        <p id="loginError"></p>
    </div>
</div>

   <div class="date-control">
    <div class="nav-section nav-left">
        <div id="news-btn-container" style="display: none;">
            <div class="news-btn-premium" onclick="showNews()">
                <span class="btn-text">NEWS</span>
                <i class="fas fa-bell bell-icon"></i>
                <div id="news-dot" class="badge" style="display: none;"></div>
            </div>
        </div>
    </div>

    <div class="nav-section nav-center">
        <div class="nav-group">
            <button class="nav-btn" onclick="changeDate(-7)" title="Woche zurück"><i class="fas fa-angle-double-left"></i></button>
            <button id="prev-day" class="nav-btn" onclick="changeDate(-1)"><i class="fas fa-angle-left"></i></button>
        </div>
        
        <button class="nav-btn" onclick="goToToday()" title="Heute"><i class="fas fa-home"></i></button>
        
        <input type="date" id="datePicker" onchange="loadPlan()">
        
        <div class="nav-group">
            <button id="next-day" class="nav-btn" onclick="changeDate(1)"><i class="fas fa-angle-right"></i></button>
            <button class="nav-btn" onclick="changeDate(7)" title="Woche vor"><i class="fas fa-angle-double-right"></i></button>
        </div>
    </div>

    <div class="nav-section nav-right">
        <button class="refresh-btn" onclick="loadPlan()" title="Aktualisieren">
            <i class="fas fa-sync-alt"></i>
        </button>
    </div>
</div>

    <div id="plan-container"></div>

    <div id="newsSidebar" style="display:none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding: 10px;">
            <h2 style="margin: 0; font-size: 1.2em; color: #e67e22;">NEUIGKEITEN</h2>
            <button onclick="closeNews()" style="background: none; border: none; color: #666; cursor: pointer; font-size: 1.5em;">&times;</button>
        </div>
        <div id="newsContent" style="padding: 0 15px;">
            </div>
    </div>

    <div id="customMenuBackdrop" class="eigenesmenu-backdrop" style="display: none;" onclick="closeCustomMenu()">
        <div class="eigenesmenu-container" onclick="event.stopPropagation()">
            <div class="eigenesmenu-header">
                <h3 id="menuTitle">Aktionen wählen</h3>
                <p id="menuSubtitle">Slot bearbeiten</p>
            </div>
            <div id="menuOptions" class="eigenesmenu-liste">
                </div>
            <button class="eigenesmenu-cancel" onclick="closeCustomMenu()">Abbrechen</button>
        </div>
    </div>

    <div id="materialInfoOverlay" class="material-info-overlay" style="display: none;" onclick="this.style.display='none'">
        <div class="material-info-content" onclick="event.stopPropagation()">
            <div id="materialInfoTitle" class="material-info-title">Gebuchtes Material</div>
            <div id="materialInfoText" class="material-info-text"></div>
            <button class="btn-cancel" onclick="document.getElementById('materialInfoOverlay').style.display='none'" style="width:100%; padding: 10px; margin-top: 10px; background: #333; border: none; border-radius: 4px; color: #fff;">Schliessen</button>
        </div>
    </div>

    <div id="universalModal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <div id="uniIcon" class="modal-header">⚠️</div>
            <h3 id="uniTitle">Bestätigung</h3>
            <p id="uniMessage">Möchtest du fortfahren?</p>
            
            <div id="uniPwContainer" style="display:none; margin-bottom: 20px;">
                <input type="password" id="uniPwInput" placeholder="Passwort" 
                       style="width: 100%; padding: 12px; background: #000; border: 1px solid #e67e22; color: #fff; border-radius: 8px; text-align: center; letter-spacing: 3px; outline: none;">
            </div>

            <div class="modal-buttons">
                <button id="uniCancelBtn" class="btn-cancel" onclick="closeModal()">Abbrechen</button>
                <button id="uniConfirmBtn" class="btn-confirm">Bestätigen</button>
            </div>
        </div>
    </div>

</body>


<script>



    /* ============================================================
       1. GLOBALE KONFIGURATION & VARIABLEN
       ============================================================ */
    const url = "https://script.google.com/macros/s/AKfycbzKI8FtEwGg4EYzmXDAdHbdTpjXW4duOHgGaBvtAtuYTV60ATvc0qAglJP2kB1fOm-L/exec"; 
    
    // Status-Variablen
    let userPw = "", userKuerzel = "";
    let currentPlanData = [];      // Speichert die 60 Slots vom Server
    let configFarben = {};         // Farben für Klassen aus dem Sheet
    let allClassTeachers = {};     // Zuordnung Klasse -> Kürzel
    let verfügbareMaterialien = []; // Liste der Materialien aus dem Sheet
    
    // UI-Variablen
    let pendingNews = [];
    let isSaving = false;          // Status für den Global Loader

    /* ============================================================
       2. INITIALISIERUNG
       ============================================================ */
    
    // Setzt das heutige Datum in den Picker beim Start
    document.addEventListener('DOMContentLoaded', () => {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('datePicker').value = today;
    });

  /* ============================================================
   3. LOGIN-LOGIK (Optimiert für Slot-Index)
   ============================================================ */

async function handleLogin() {
    const btn = document.getElementById('loginBtn');
    const ball = document.getElementById('loginBall');
    const errorDiv = document.getElementById('loginError');
    
    // IDs aus deinem verschmolzenen HTML
    const kuerzelVal = document.getElementById('userKuerzel').value.trim().toLowerCase();
    const pwVal = document.getElementById('pw').value;

    if (!kuerzelVal) { 
        errorDiv.innerText = "Kürzel fehlt!"; 
        return; 
    }

    // Visuelles Feedback: Button verstecken, Basketball hüpft
    btn.style.visibility = 'hidden'; 
    ball.classList.add('active'); 
    errorDiv.innerText = "";

    try {
        // Mode "login" prüft Passwort und Kürzel in der code.gs
        const response = await fetch(`${url}?mode=login&pw=${encodeURIComponent(pwVal)}&kuerzel=${encodeURIComponent(kuerzelVal)}`);
        const json = await response.json();

        if (json.error) {
            errorDiv.innerText = json.error === "Falsches Passwort" ? "Passwort inkorrekt!" : "Fehler: " + json.error;
            // Zurücksetzen bei Fehler
            btn.style.visibility = 'visible';
            ball.classList.remove('active');
        } else {
            // Erfolg: Daten lokal speichern
            userPw = pwVal;
            userKuerzel = kuerzelVal;
            
            // Login-Maske ausblenden (Fade-out Effekt)
            document.getElementById('loginOverlay').classList.add('fade-out');
            
            setTimeout(() => {
                document.getElementById('loginOverlay').style.display = 'none';
                
                // News-Button & Interface einblenden
                const newsContainer = document.getElementById('news-btn-container');
                if(newsContainer) newsContainer.style.display = 'block';
                
                // Plan laden
                loadPlan();
            }, 500);
        }
    } catch (e) {
        errorDiv.innerText = "Verbindung fehlgeschlagen.";
        btn.style.visibility = 'visible';
        ball.classList.remove('active');
        console.error("Login Error:", e);
    }
}


/* ============================================================
   HILFSFUNKTION: Slot-Index zu Daten-Mapping
   ============================================================ */
function getDataBySlotIndex(index) {
    // Wir ziehen 1 ab, damit wir intern mit 0-basiertem Index rechnen (1 -> 0)
    const korrigierterIndex = index - 1;

    // Da wir nur die 5 Wochentage zählen (ohne die Zeitspalte):
    const spaltenProWoche = 5; 
    
    // Berechne die Zeile (Stunde)
    // Wir addieren 1 bei der Zeile, falls currentPlanData[0] der Header ist
    const zeile = Math.floor(korrigierterIndex / spaltenProWoche) + 1;
    
    // Berechne die Spalte (Tag)
    // Wir addieren 1, um die Zeitspalte (Index 0) zu überspringen
    const spalte = (korrigierterIndex % spaltenProWoche) + 1;

    console.log(`Slot ${index} -> Suche in currentPlanData[Zeile ${zeile}][Spalte ${spalte}]`);

    if (currentPlanData[zeile] && currentPlanData[zeile][spalte]) {
        return currentPlanData[zeile][spalte];
    }
    return null;
}
    
    /* ============================================================
       4. SICHERHEITSABFRAGE (Falls doch mal was hängt)
       ============================================================ */
    
    window.addEventListener('beforeunload', (e) => {
        if (isSaving) { 
            e.preventDefault(); 
            e.returnValue = 'Änderungen werden noch gespeichert...';

    });

    }


/* ============================================================

        dp.valueAsDate = d;
        updateNavButtons(); // UI anpassen

    };

    /**

    window.goToToday = () => {
        const dp = document.getElementById('datePicker');
        const today = new Date();
        // Lokale Zeitkorrektur für ISO-String
        const offset = today.getTimezoneOffset();
        today.setMinutes(today.getMinutes() - offset);
        
        const dateStr = today.toISOString().split('T')[0];
        dp.value = dateStr;
        
        updateNavButtons();

    /**

        // IDs aus deinem HTML: prev-day und die Buttons für Wochen
        const prevDayBtn = document.getElementById('prev-day');
        // Falls du die Wochen-Buttons auch dynamisch verstecken willst:
        const allPrevBtns = document.querySelectorAll('.nav-group:first-child .nav-btn');

        // GESTERN-Button: Verstecken, wenn wir heute sind

/* ============================================================
   7. STUNDENPLAN LADEN & GRID-GENERIERUNG (DB-Version)
   ============================================================ */

window.loadPlan = async function() {
    const dp = document.getElementById('datePicker');
    const container = document.getElementById('plan-container'); 
    const loader = document.getElementById('global-loader'); 

    const dateVal = dp.value;
    if (!userPw || !dateVal) return;

    // UI Reset
    container.innerHTML = ""; 
    if (loader) loader.style.display = 'block'; 
    if (typeof updateNavButtons === 'function') updateNavButtons();

    const dateObj = new Date(dateVal.replace(/-/g, "/")); 
    
    // Wochenende abfangen
    if (dateObj.getDay() === 0 || dateObj.getDay() === 6) { 
        container.innerHTML = `<div class="box info-box" style="grid-column: span 6;">Mach mal Pause! Es ist Wochenende... 🏖️</div>`; 
        if (loader) loader.style.display = 'none'; 
        return; 
    }

    try {
        const res = await fetch(`${url}?date=${dateVal}&pw=${userPw}&kuerzel=${userKuerzel}`);
        const json = await res.json();
        
        if (json.status === "error") {
            container.innerHTML = `<div class="box info-box" style="grid-column: span 6;">${json.msg}</div>`;
            return;
        }

        const plan = json.plan; 
        myClasses = json.userClasses || [];
        allClassTeachers = json.allClassTeachers || {};
        window.materialOptionen = json.materialsList || []; 
        
        configFarben = {}; 
        if (json.options) {
            json.options.forEach(opt => configFarben[opt[0]] = opt[1]);
        }
        
        const wtArr = ["Sonntag", "Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag", "Samstag"];
        const [y, m, d] = dateVal.split('-').map(Number);
        
        // DEINE EXAKTEN LEKTIONSZEITEN
        const zeiten = [
            "07:15 - 08:00", "08:05 - 08:50", "08:55 - 09:40", // Lektion 1-3
            "10:00 - 10:45", "10:50 - 11:35", "11:40 - 12:25", // Lektion 4-6
            "12:50 - 13:35", "13:40 - 14:25", "14:30 - 15:15", // Lektion 7-9
            "15:35 - 16:20", "16:25 - 17:10", "17:15 - 18:00"  // Lektion 10-12
        ];

        let html = ""; 

        // HEADER (Datum & Wochentag)
        html += `<div class="box header-row" style="grid-column: span 6;">
                    <span>${wtArr[dateObj.getDay()]}, ${d}.${m}.${y}</span>
                 </div>`;

        // GRID GENERIERUNG
        zeiten.forEach((zeitStr, rowIndex) => {
            const lektionNum = rowIndex + 1; // 1 bis 12

            // TRENNSTRICH LOGIK
            // Nach Lektion 3 (rowIndex 2) und nach Lektion 9 (rowIndex 8) -> dünner Strich
            if (lektionNum === 4 || lektionNum === 10) {
                html += `<div class="divider-thin"></div>`;
            }
            // Nach Lektion 6 (rowIndex 5) -> dicker Strich (Mittagspause)
            if (lektionNum === 7) {
                html += `<div class="divider-thick"></div>`;
            }

            // 1. Zeit-Box (Spalte A)
            html += `<div class="box zeit-box">${zeitStr}</div>`;
            
            // 2. Die 5 Hallen-Slots (Spalten B bis F)
            for(let i = 1; i <= 5; i++) {
                const absoluteSlot = (rowIndex * 5) + i; // Slot 1 bis 60
                const slotData = plan[absoluteSlot] || {};

                const klasse = slotData.klasse || "";
                const halle = slotData.halle || "";
                const material = slotData.material || "";
                const matKommentar = slotData.kommentar || "";
                const lehrer = slotData.lehrer || allClassTeachers[klasse] || "";
                
                const isAusfall = (halle === "Ausfall");
                const canEdit = myClasses.some(c => 
                    klasse.trim().toLowerCase() === c.trim().toLowerCase() && 
                    klasse.trim() !== ""
                    );
                
                // Material-Icon mit Tooltip
                let materialHtml = "";
                if (material) {
                    const tooltipText = matKommentar ? `${material}: ${matKommentar}` : material;
                    materialHtml = `
                        <span class="material-icon" data-tooltip="${tooltipText}">
                            <i class="fas fa-box-open"></i>
                        </span>`;
                }

                const clickAction = canEdit ? `onclick="openEditor(this, '${zeitStr}', ${absoluteSlot}, '${klasse}')"` : "";

                html += `
                <div class="box ${klasse.trim() === "" ? 'empty' : ''} ${!canEdit ? 'not-mine' : 'is-mine'} ${isAusfall ? 'ausfall-mode' : ''}" 
                        data-slot="${absoluteSlot}"
                        data-time="${zeitStr}" 
                        ${clickAction}
                        style="background-color: ${isAusfall ? '' : (configFarben[halle] || '')}; cursor: ${canEdit ? 'pointer' : 'default'}">
                        
                        ${materialHtml}
                        <div class="klasse-label">${klasse}</div>
                        <div class="lehrer-info">${lehrer}</div>
                        <div class="halle-label">${halle}</div>
                </div>`;
            }
        });

        container.innerHTML = html;

    } catch(e) { 
        console.error("Fehler in loadPlan:", e); 
        container.innerHTML = `<div class="box info-box" style="color:red; grid-column: span 6;">Server-Verbindung unterbrochen!</div>`;
    } finally {
        if (loader) loader.style.display = 'none';
        updateNavButtons();
    }
};

function findBoxByTimeAndSlot(time, slot) {

/**
 * Baut den finalen String für das Google Sheet.
 * Format: "Klasse | Halle"
 */
function buildFinalValue(r, c, neueHalle, neueKlasse) {
    // 1. Bestehende Daten holen (um die Klasse zu behalten, falls nur Halle ändert)
    let aktuellerWert = (currentPlanData[r] && currentPlanData[r][c]) ? currentPlanData[r][c] : "";

    // 2. Zerlegen in Klasse und Halle
    let teile = aktuellerWert.split(' | ').map(t => t.trim());

    // 3. Neue Werte setzen oder alte beibehalten
    // Index 0: Klasse, Index 1: Halle
    let klasse = neueKlasse || teile[0] || "";
    let halle  = (neueHalle !== undefined) ? neueHalle : (teile[1] || "");

    // 4. String zusammensetzen
    // Falls die Halle leer ist, schreiben wir nur die Klasse (z.B. für "Halle löschen")
    let finalString = halle ? `${klasse} | ${halle}` : klasse;

    console.log(`🛠 String-Update [R:${r} C:${c}]: "${finalString}"`);
    return finalString;
}

    title.innerText = "KLASSE ABKLEBEN";
    msg.innerHTML = `Möchtest du die Klasse <strong>${klasse}</strong> ab diesem Datum für alle zukünftigen Wochen dauerhaft löschen?`;
    
    // Layout & Passwort-Feld einblenden
    pwContainer.style.display = "block"; 
    pwInput.value = "";
    pwInput.style.borderColor = "#333";

    confirmBtn.innerHTML = `

        </div>
    `;
    confirmBtn.disabled = false;
    confirmBtn.style.background = "linear-gradient(180deg, #e74c3c 0%, #c0392b 100%)"; // Warn-Rot
    
    modal.style.display = "flex";
    
    // Fokus auf Passwortfeld
    setTimeout(() => pwInput.focus(), 150);

    // Abbrechen-Logik
    cancelBtn.onclick = () => {
        modal.style.display = "none";
        pwContainer.style.display = "none";
    };

    // Ausführen-Logik (POST an Google Apps Script)
    confirmBtn.onclick = async () => {
        const eingabePw = pwInput.value;
        if (!eingabePw) {
            pwInput.style.borderColor = "#e74c3c";
            pwInput.focus();
            return;
        }

        // UI-Feedback: Laden starten
        const loader = document.getElementById('uniBtnLoader');
        const btnText = document.getElementById('uniBtnText');
        loader.style.display = "block";
        btnText.innerText = "LÖSCHE...";
        confirmBtn.disabled = true;

        // Slot-Informationen sammeln
        // Wir nutzen die global gespeicherte "currentEditBox" vom Editor-Aufruf
        const slotVal = window.currentEditBox ? window.currentEditBox.getAttribute('data-col') : "";
        const dateVal = document.getElementById('datePicker').value;

        try {
            // WICHTIG: Mode "permaDelete" muss in deiner code.gs vorhanden sein!
            const response = await fetch(url, {
                method: "POST",
                body: JSON.stringify({
                    mode: "permaDelete",
                    klasse: klasse,
                    slot: slotVal,
                    startDate: dateVal,
                    pw: eingabePw,
                    kuerzel: userKuerzel
                })
            });

            const result = await response.json();

            if (result.status === "success") {
                modal.style.display = 'none';
                pwContainer.style.display = "none";
                // Plan sofort neu laden um Änderungen zu zeigen
                await loadPlan(); 
            } else {
                alert("Fehler: " + (result.error || "Passwort falsch"));
                resetBtn();
            }
        } catch (e) {
            console.error("PermaDelete Error:", e);
            alert("Verbindungsfehler zum Server!");
            resetBtn();
        }

        // Hilfsfunktion zum Zurücksetzen
        function resetBtn() {
            loader.style.display = "none";
            btnText.innerText = "JETZT ABKLEBEN!";
            confirmBtn.disabled = false;
        }
    };
}

/**
 * Sucht alle Kollegen (Kürzel), die im gleichen Zeit-Slot 
 * in anderen Hallen unterrichten.
 * @param {number} slotIndex - Die Spalte der Halle (1-5)
 */
function getAffectedColleagues(slotIndex) {
    const colleagues = [];
    if (!currentPlanData) return "";
    
    // Wir prüfen alle 5 Hallen-Spalten
    for (let s = 1; s <= 5; s++) {
        if (parseInt(s) === parseInt(slotIndex)) continue; // Eigener Slot wird ignoriert

        // Wir gehen durch alle Zeit-Zeilen
        currentPlanData.forEach((row, rowIndex) => {
            if (rowIndex === 0) return; // Header ignorieren
            
            let cellContent = row[s] ? row[s].toString().trim() : "";
            
            if (cellContent !== "" && !cellContent.includes("U21")) {
                // Extrahiert die Klasse (erster Teil vor Leerzeichen oder Pipe)
                let klasse = cellContent.split(/[ |]/)[0].trim();
                let lehrerKuerzel = allClassTeachers[klasse];
                
                if (lehrerKuerzel && !colleagues.includes(lehrerKuerzel)) {
                    colleagues.push(lehrerKuerzel);
                }
            }
        });
    }
    return colleagues.join(",");
}

/**
 * Erzeugt eine News-Meldung und sendet sie SOFORT an das Google Sheet (news_db)

async function triggerNews(type, slotIndex, klasse) {
    const datePicker = document.getElementById('datePicker');
    if (!datePicker) return;
    const dateVal = datePicker.value;
    
    let newsText = "";
    if (type === "ausfall") newsText = `Halle frei: ${klasse} fällt aus.`;
    if (type === "outdoor") newsText = `Halle frei: ${klasse} ist Outdoor.`;
    if (type === "beendet") newsText = `Halle dauerhaft frei: ${klasse} hat Schuljahr beendet.`;

    if (!newsText) return;

    // Payload für die news_db
    const payload = {
        mode: "saveNews",
        id: "ID_" + Date.now() + "_" + Math.floor(Math.random() * 1000), 
        datum: dateVal,
        slot: slotIndex,
        tagIndex: new Date(dateVal).getDay(),
        klasse: klasse,
        verfasser: userKuerzel,
        empfaenger: getAffectedColleagues(slotIndex), 
        text: newsText,
        pw: userPw
    };

    // Globaler Loader an (Auto-Save Feedback)
    if (typeof toggleLoader === 'function') toggleLoader(true);

    try {
        const response = await fetch(url, {
            method: "POST",
            body: JSON.stringify(payload)
        });

        const result = await response.json();
        
        if (result.status === "success") {
            console.log("News-Flash gesendet:", newsText);
            // Optional: Kleiner Toast oder Hinweis, dass Kollegen informiert wurden
        }
    } catch (error) {
        console.error("News-Fehler:", error);
        alert("Kollegen konnten nicht automatisch informiert werden (Verbindung?).");
    } finally {
        if (typeof toggleLoader === 'function') toggleLoader(false);
    }
}

/**
 * Erlaubt das An- und Abwählen mehrerer Materialien im Menü
 */
function toggleMaterialSelection(mat, btn) {
    // Da das Menü dynamisch ist, suchen wir den Button innerhalb des Modals
    const root = document.getElementById('eigenesmenu-modal');
    const nextStep = root ? root.querySelector('#materialNextStep') : document.getElementById('materialNextStep');
    const check = btn.querySelector('.check-indicator');

    if (selectedMaterials.includes(mat)) {
        // Entfernen
        selectedMaterials = selectedMaterials.filter(m => m !== mat);
        btn.style.borderColor = "#333";
        btn.style.background = "transparent";
        if (check) check.innerText = "○";
    } else {
        // Hinzufügen
        selectedMaterials.push(mat);
        btn.style.borderColor = "#ff8c00";
        btn.style.background = "rgba(255, 140, 0, 0.1)";
        if (check) check.innerText = "●";
    }

    // "Weiter"-Button nur zeigen, wenn etwas gewählt wurde
    if (nextStep) {
        nextStep.style.display = selectedMaterials.length > 0 ? 'block' : 'none';
    }
}

    

/**
 * Finales Speichern im Backend
 */
async function saveMaterialSelection(mat, detail, time, slot, klasse, btn) {
    // 1. UI Feedback: Loader zeigen & Button sperren
    let loader, btnText;
    if (btn) {
        loader = btn.querySelector('.eigenesmenu-loader');
        btnText = btn.querySelector('.btn-text');
        if (loader) loader.style.display = 'block';
        if (btnText) btnText.style.opacity = '0.3';
        btn.disabled = true;
    }

    // 2. DATEN-AKQUISE: Absolute Slot-ID (1-60) sicherstellen
    // Wir nehmen den übergebenen Slot ODER den globalen Sicherheits-Anker
    const finalSlot = slot || window.currentEditSlot; 
    
    const datePicker = document.getElementById('datePicker');
    const dateVal = datePicker ? datePicker.value : "";

    // 3. VALIDIERUNG: Verhindert "undefined"-Einträge im Sheet
    if (!finalSlot || finalSlot === "undefined" || !dateVal) {
        console.error("Speichern abgebrochen: Fehlende Daten", { finalSlot, dateVal });
        alert("Fehler: Die Slot-ID (1-60) konnte nicht ermittelt werden. Bitte schließen und erneut versuchen.");
        
        // UI Reset im Fehlerfall
        if (btn) {
            btn.disabled = false;
            if (loader) loader.style.display = 'none';
            if (btnText) btnText.style.opacity = '1';
        }
        return;
    }

    // Eindeutige ID für das Sheet (z.B. 2026-05-12_42)
    const uniqueId = `${dateVal}_${finalSlot}`;

    const payload = {
        mode: "saveMaterial",
        id: uniqueId,
        date: dateVal,
        time: time || "",
        slot: finalSlot,
        klasse: klasse || "",
        material: mat,
        kommentar: detail || "",
        pw: typeof userPw !== 'undefined' ? userPw : "",
        kuerzel: typeof userKuerzel !== 'undefined' ? userKuerzel : ""
    };

    console.log("📤 Sende Material-Daten:", payload);

    try {
        // 'url' muss global definiert sein
        const response = await fetch(url, {
            method: "POST",
            body: JSON.stringify(payload)
        });

        if (!response.ok) throw new Error("Netzwerk-Antwort war nicht ok");

        const result = await response.json();

        if (result.status === "success") {
            console.log("✅ Speichern erfolgreich");
            if (typeof closeEditor === 'function') closeEditor();
            if (typeof loadPlan === 'function') await loadPlan();
        } else {
            throw new Error(result.msg || "Server hat einen Fehler gemeldet");
        }
    } catch (e) {
        console.error("❌ Material Save Error:", e);
        alert("Verbindung zum Google Sheet fehlgeschlagen: " + e.message);
        
        // Button wieder benutzbar machen
        if (btn) {
            btn.disabled = false;
            if (loader) loader.style.display = 'none';
            if (btnText) btnText.style.opacity = '1';
        }
    }
}

window.addChange = async function(el, time, slot, klasse) {
    const val = el.value; // Die gewählte Halle oder "Ausfall"
    const parent = el.closest ? el.closest('.box') : window.currentEditBox;
    if (!parent) return;

    // Wir brauchen den absoluten Slot (1-60)
    const absoluteSlot = parent.getAttribute('data-slot'); 
    const dateVal = document.getElementById('datePicker').value;

    // Visuelles Feedback
    if (val === "Ausfall") {
        parent.classList.add('ausfall-mode');
    } else {
        parent.classList.remove('ausfall-mode');
    }

    // Das Payload-Objekt für die Datenbank-Zeile
    const payload = {
        pw: userPw,
        id: `${dateVal}_${absoluteSlot}`,
        date: dateVal,
        slot: absoluteSlot,
        klasse: klasse,
        halle: (val === "---" ? "" : val) // Feld für Spalte E
    };

    // Sofort-Versand
    await saveImmediately(payload);
};

async function saveImmediately(payload) {
    try {
        const response = await fetch(url, {
            method: "POST",
            body: JSON.stringify(payload)
        });
        
        const result = await response.json();
        
        if (result.status === "success") {
            console.log("✅ DB-Update erfolgreich:", payload.id);
        } else {
            throw new Error(result.msg || "Server-Fehler");
        }
    } catch (e) {
        console.error("❌ Auto-Save Fehler:", e);
        alert("Speichern der Hallen-Reservation fehlgeschlagen!");
    }
}

/**

function handleMenuChoice(action, time, slot, klasse) {
    console.log("Aktion gewählt:", action); // Debug-Hilfe für die Handy-Konsole

    switch(action) {
        case 'reservation':
            // Prüfen, ob die Funktion existiert, dann UI umschalten
            if (typeof handleReservationUI === 'function') {
                handleReservationUI(time, slot, klasse);
            } else {
                console.error("handleReservationUI nicht gefunden!");
            }
            break;
            
        case 'material':
    // Wir suchen das aktive Modal direkt
    const activeModal = document.getElementById('eigenesmenu-modal');
    handleMaterialUI(time, slot, klasse, activeModal); // Modal mitgeben!
    break;

        case 'ausfall':
            // Sicherheits-Logik für Ausfall
            const istBereitsAusfall = window.currentEditBox ? window.currentEditBox.classList.contains('ausfall-mode') : false;
            handleAusfallClick(istBereitsAusfall ? 'LOESCHEN' : 'SETZEN', time, slot, klasse, null);
            break;

        case 'beendet':
            // Menü schließen und Jahr-Reset (Abkleben) starten
            closeEditor();
            if (typeof startYearReset === 'function') {
                startYearReset(klasse);
            }
            break;

        case 'nachricht':
            // Notiz-Funktion: Entweder Editor oder simpler Prompt
            if (typeof openCommentEditor === 'function') {
                closeEditor();
                openCommentEditor(time, slot, klasse);
            } else {
                const note = prompt("Notiz für " + klasse + " erfassen:", "");
                // Falls abgebrochen wurde (null), nichts tun. Sonst speichern.
                if (note !== null) {
                    // Wir nutzen hier direkt updateSelection oder eine Speicherfunktion deiner Wahl
                    if (typeof updateSelection === 'function') {
                        updateSelection(undefined, time, slot, klasse, null, note);
                    } else {
                        // Fallback: Falls du Material-Notizen meintest
                        saveMaterialSelection("Notiz", note, time, slot, klasse);
                    }
                }
            }
            break;
            
        default:
            console.warn("Unbekannte Aktion im Task Manager:", action);
    }
}

/* ============================================================
   15. DATEN-SYNCHRONISATION (addChange)
   ============================================================ */

window.addChange = async (el, time, slot, klasse) => { 
    let res = el.value; 
    
    // Parent Box finden
    const parent = el.closest('.box') || window.currentEditBox; 
    if (!parent) return;

    const r = parent.getAttribute('data-row');
    const c = slot; // Wir nutzen den übergebenen slot-Index

    // 1. VISUELLES UPDATE DER BOX
    if (res === "Ausfall") {
        parent.classList.add('ausfall-mode');
    } else {
        parent.classList.remove('ausfall-mode');
    }

    // Text in der Box aktualisieren (.res ist das Feld für die Halle)
    const resDisplay = parent.querySelector('.res');
    if (resDisplay) {
        resDisplay.innerText = (res === "" || res === "---") ? "" : res; 
    }
    
    // Farbe setzen (falls in configFarben definiert)
    parent.style.backgroundColor = (typeof configFarben !== 'undefined' && configFarben[res]) ? configFarben[res] : ""; 

    // 2. STRING FÜR GOOGLE SHEETS BAUEN
    // Formatiert den Wert zu "Klasse | Halle | Kommentar"
    let finalVal = buildFinalValue(r, c, (res === "---" ? "" : res), undefined);

    // 3. NEWS-LOGIK (Outdoor / Freigabe)
    if (typeof pendingNews !== "undefined") {
        pendingNews = pendingNews.filter(n => n.slot !== parseInt(slot));
    }

    if (res && res.toString().includes("Outdoor")) {
        if (typeof triggerNews === "function") {
            const newsKlasse = klasse || res.split('|')[0].trim();
            triggerNews("outdoor", parseInt(slot), newsKlasse);
        }
    }

    // 4. LOKALEN DATENSTAND AKTUALISIEREN
    if (!currentPlanData[r]) currentPlanData[r] = [];
    currentPlanData[r][c] = finalVal;
    
    // 5. IN DIE SPEICHERLISTE (Warteschlange)
    // Wir entfernen alte Änderungen für diesen Slot in der Warteschlange
    pendingChanges = pendingChanges.filter(ch => !(ch.slotIndex === slot)); 
    pendingChanges.push({ 
        row: parseInt(r), 
        col: parseInt(c), 
        time: time, 
        slotIndex: slot, 
        val: finalVal 
    }); 

    // 6. SOFORTIGER VERSAND (WICHTIG: await!)
    // Hier wartet das Skript, bis die Antwort vom Google Script kommt
    try {
        await saveImmediately();
    } catch (error) {
        console.error("Fehler beim Auto-Save in addChange:", error);
        throw error; // Re-throw damit updateSelection den Fehler merkt
    }
};
