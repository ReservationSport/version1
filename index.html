<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
     <title>Reservation Sport1234566</title>
<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<!-- Schriftart -->
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&display=swap" rel="stylesheet">


<style>
    
    /* ============================================================
       1. BASIS-STYLING & LAYOUT
       ============================================================ */
    body { 
        font-family: 'Segoe UI', sans-serif; 
        background: #1a1a1a; 
        color: white; 
        padding: 20px; 
    }

    /* 2. Das Grid/Die Tabelle wieder schmaler machen */
.grid { 
    display: grid; 
    grid-template-columns: 120px repeat(5, 1fr); 
    gap: 2px; 
    max-width: 1000px; /* Hier ebenfalls wieder 1000px */
    margin: auto; 
}

     .info-box {
    grid-column: span 6;
    font-size: 20px !important; /* Hier die gewünschte Größe */
    padding: 40px !important;   /* Mehr Abstand für eine bessere Optik */
    text-align: center;
    line-height: 1.5;           /* Angenehmerer Zeilenabstand */
    color: #888;                /* Dezentes Grau wie im Screenshot */
    font-style: italic;         /* Kursiv wie gewünscht */
}



    /* ============================================================
       2. NAVIGATION & DATUMSKONTROLLE & News
       ============================================================ */

    
 /* 1. Die Navigationsleiste wieder schmaler machen */
.date-control {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 1000px; /* Zurück auf den Originalwert deiner Tabelle */
    margin: 0 auto;
    padding: 10px 0;
    background: #1a1a1a;
    position: sticky;
    top: 0;
    z-index: 1100;
}

.nav-section {
    display: flex;
    align-items: center;
    gap: 10px;
}

/* Linke Sektion (News) */
.nav-left {
    flex: 1;
    justify-content: flex-start;
}

/* Mittlere Sektion (Datum & alle Pfeile) */
.nav-center {
    flex: 2; /* Nimmt mehr Platz ein, um sich perfekt zu zentrieren */
    justify-content: center;
    gap: 8px;
}

/* Rechte Sektion (Save & Refresh) */
.nav-right {
    flex: 1;
    justify-content: flex-end;
}

/* Spezifisches Styling für das Datum im Zentrum */
#datePicker {
    padding: 8px;
    background: #2a2a2a;
    border: 1px solid #444;
    color: white;
    border-radius: 4px;
    font-family: sans-serif;
}
    
/* Der News-Button bleibt im Premium-Style */
.news-btn-premium {
    position: relative;
    display: flex;
    align-items: center;
    background: #2a2a2a;
    border: 1px solid #444;
    border-radius: 6px;
    padding: 6px 15px;
    cursor: pointer;
    height: 40px;
}

.news-btn-premium:hover {
    background: #333;
    border-color: #e67e22;
}

.news-btn-premium .btn-text {
    color: #fff;
    font-family: 'Segoe UI', sans-serif;
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 2px;
    margin-right: 10px;
}

    
.news-btn-premium .bell-icon {
    font-size: 14px; opacity: 0.7;
}

/* Badge Punkt (Orange) */
.news-btn-premium .badge {
    position: absolute;
    top: -3px;
    right: -3px;
    width: 9px;
    height: 9px;
    background: #e67e22;
    border-radius: 50%;
    border: 1px solid #1a1a1a;
    box-shadow: 0 0 8px rgba(230, 126, 34, 0.6);
}



    
    .nav-group { display: flex; gap: 5px; }

   #datePicker { padding: 0 10px; /* Oben/Unten 0, damit die 40px fix bleiben */ background: #333; color: white; border: 1px solid #444; height: 40px; border-radius: 4px; cursor: pointer; box-sizing: border-box; /* Erzwingt, dass Rahmen/Padding in den 40px enthalten sind */ font-family: inherit; /* Verhindert Schrift-Größen-Sprünge */ } 

   .nav-btn, .refresh-btn { height: 40px; width: 40px; background: #333; border: 1px solid #444; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 4px; box-sizing: border-box; /* Auch hier für absolute Symmetrie */ } 

     .nav-btn:hover { background: #444; }


    .refresh-btn { color: #e67e22; margin-left: 10px; font-size: 18px; }
    .refresh-btn:hover { color: #ff9f43; background: #444; }
 .refresh-btn:active i { animation: spin-once 0.5s ease-in-out; }
        @keyframes spin-once { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }


    /* Diese Klasse blendet die Buttons radikal aus */
.nav-btn-hidden {
    /* Sichtbarkeit auf hidden statt display auf none */
    visibility: hidden !important;
    /* optional: verhindert, dass man den unsichtbaren Button noch klicken kann */
    pointer-events: none; 
}

    /* ============================================================
       3. ZELLEN-STYLING (BOXES)
       ============================================================ */
    /* Grundzustand: Kein Zeigefinger für alle Boxen */
.box { 
    border: 1px solid #444; 
    padding: 5px; 
    background: #262626; 
    min-height: 50px; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    justify-content: center; 
    text-align: center; 
    font-size: 11px; 
    position: relative; 
    cursor: default; /* Zeigefinger entfernt */
    overflow: hidden; 
}

/* Leere Zellen: Keine Interaktion möglich */
.box.empty { 
    pointer-events: none; 
    opacity: 0.5; 
    cursor: default; 
}

/* Zeit-Spalte und Header: Neutraler Cursor */
.zeit-box { 
    background: #333; 
    font-weight: bold; 
    cursor: default; 
}

.header-row { 
    grid-column: span 6; 
    background: #333; 
    font-size: 14px; 
    font-weight: bold; 
    position: sticky; 
    top: 60px; 
    z-index: 1090; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    height: 50px; 
    cursor: default;
}

/* NUR DEINE ZELLEN: Hier erscheint der Zeigefinger */
.box.is-mine { 
    border: 2px solid #e67e22 !important; 
    z-index: 10; 
    cursor: pointer; /* Zeigefinger nur hier */
}

.box.is-mine:hover {
    background-color: rgba(230, 126, 34, 0.2) !important;
    box-shadow: inset 0 0 15px rgba(255, 159, 67, 0.4), 0 0 20px rgba(230, 126, 34, 0.3);
    transform: scale(1.03);
    z-index: 100;
}

/* Fremde Zellen: Sicherstellen, dass kein Finger erscheint */
.box.not-mine {
    cursor: default !important;
}


    /* ============================================================
       4. SPEZIAL-MODI (AUSFALL) und Beendet
       ============================================================ */
    .box.ausfall-mode { 
        background-color: #000000 !important; 
        color: #777777 !important; 
        background-image: linear-gradient(to top right, transparent calc(50% - 1px), #444, transparent calc(50% + 1px)), 
                          linear-gradient(to top left, transparent calc(50% - 1px), #444, transparent calc(50% + 1px)); 
    }

/* Overlay: Dunkler & fokussierter */
.modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(5px);
    z-index: 10000;
    justify-content: center;
    align-items: center;
}

/* Modal: Schmaler (320px statt 400px) & Kantiger */
.modal-content {
    background: #111; /* Echtes Schwarz-Grau */
    border: 1px solid #333;
    padding: 24px;
    border-radius: 12px;
    width: 320px; 
    text-align: center;
    color: #eee;
    box-shadow: 0 15px 40px rgba(0,0,0,0.8);
}

/* Icon & Titel Bereich */
.modal-header {
    color: #ff8c00; /* Dein Orange */
    font-size: 28px;
    margin-bottom: 12px;
}

.modal-content h3 {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #fff;
}

.modal-content p {
    font-size: 0.9rem;
    color: #888;
    margin-bottom: 24px;
    line-height: 1.4;
}

/* Buttons: Kompakt & Industrial */
.modal-buttons {
    display: flex;
    gap: 8px;
}

.modal-buttons button {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 4px;
    font-size: 0.8rem;
    font-weight: 800;
    cursor: pointer;
    text-transform: uppercase;
    transition: 0.2s;
}

.btn-confirm {
    background: #ff8c00;
    color: #000;
}

.btn-confirm:hover {
    background: #ffa500;
    box-shadow: 0 0 15px rgba(255, 140, 0, 0.4);
}

.btn-cancel {
    background: #222;
    color: #666;
    border: 1px solid #333 !important;
}

.btn-cancel:hover {
    background: #333;
    color: #fff;
}
    
    /* ============================================================
       5. LOGIN-OVERLAY & CARD-DESIGN (PROFI-LOOK)
       ============================================================ */
    #loginOverlay { 
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
        background: radial-gradient(circle at center, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%), 
                    url('https://raw.githubusercontent.com/ReservationSport/ReservationSport/refs/heads/main/Logo.png');
        background-size: cover; background-position: center; z-index: 20000; 
        display: flex; justify-content: center; align-items: center; font-family: 'Inter', sans-serif; backdrop-filter: blur(18px); 
    }

    .login-card {
        background: rgba(20, 20, 20, 0.7); padding: 50px 40px; border-radius: 28px;
        border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5); 
        width: 100%; max-width: 360px; text-align: center;
    }

    .login-card h2 { color: #ffffff; font-size: 30px; margin-bottom: 35px; font-weight: 800; letter-spacing: -1.5px; text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5); }

.login-card h2 span {
    background: none;
    -webkit-text-fill-color: #ffffff;
    color: #ffffff;
}

    .login-card input { 
        padding: 16px 20px; margin: 10px 0; background: rgba(0, 0, 0, 0.4); 
        border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; border-radius: 14px; 
        width: 100%; font-size: 16px; outline: none; box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .login-card input:focus { border-color: #e67e22; background: rgba(0, 0, 0, 0.6); box-shadow: 0 0 20px rgba(230, 126, 34, 0.2); }

    /* ============================================================
       6. BUTTONS (LOGIN & SPEICHERN) MIT BLITZ-EFFEKT
       ============================================================ */
  
  #loginBtn { 
    padding: 18px; 
    margin-top: 25px; 
    background: linear-gradient(180deg, #ff9f43 0%, #e67e22 100%); 
    color: white; 
    border: none; 
    border-radius: 16px; 
    cursor: pointer; 
    width: 100%; 
    
    /* Schrift-Styling: Oswald & Sport-Vibe */
    font-family: 'Oswald', sans-serif;
    font-size: 20px; 
    font-weight: 700;
    text-transform: uppercase; 
    letter-spacing: 1.5px;
    
    /* Tiefe & Interaktion */
    box-shadow: 0 10px 20px -5px rgba(230, 126, 34, 0.5);
    transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
    
    /* Der "Käfig" für die Effekte */
    position: relative;
    overflow: hidden; 
    z-index: 1;
}

#loginBtn:hover { 
    transform: translateY(-3px);
    box-shadow: 0 15px 30px -5px rgba(230, 126, 34, 0.6);
    filter: brightness(1.1);
}

#loginBtn:active { 
    transform: translateY(-1px);
    box-shadow: 0 5px 10px -2px rgba(230, 126, 34, 0.5);
}

/* 1. Statischer Glanz-Effekt (Obere Hälfte des Buttons) */
#loginBtn::before {
    content: '';
    position: absolute;
    top: 0; 
    left: 0; 
    width: 100%; 
    height: 50%;
    background: linear-gradient(rgba(255,255,255,0.2), rgba(255,255,255,0));
    pointer-events: none;
    z-index: 2;
}

/* 2. Dynamischer Blitz (Speed-Line) */
#loginBtn::after {
    content: '';
    position: absolute;
    top: 0;
    left: -150%; /* Start weit links außen */
    width: 60%;
    height: 100%;
    background: linear-gradient(
        90deg, 
        transparent, 
        rgba(255, 255, 255, 0.4), 
        transparent
    );
    transform: skewX(-25deg); 
    transition: 0.6s ease-in-out;
    z-index: 3;
}

/* Blitz-Animation bei Hover */
#loginBtn:hover::after {
    left: 150%; /* Jagt durch den Button nach rechts außen */
}

/* Wir nutzen die ID zur Sicherheit für die Layout-Stabilität */
#saveBtn {
    display: none; /* Steuerung via JS (style.display) */
    position: relative;
    padding: 0 15px !important;
    background: #333 !important;
    color: #e67e22 !important;
    border: 1px solid transparent; 
    border-radius: 4px;
    font-family: 'Oswald', sans-serif;
    font-size: 12px !important;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    
    /* FIX: Feste Dimensionen verhindern das Springen */
    height: 34px !important; 
    min-width: 85px; /* Breite fixiert auf den "SAVE"-Text */
    
    /* Zentrierung für den Inhalt (Spinner & Haken) */
    display: inline-flex; 
    align-items: center;
    justify-content: center;
    
    transition: all 0.2s ease;
    overflow: hidden;
}

#saveBtn:disabled {
    cursor: default !important; /* Entfernt das "Gesperrt"-Zeichen */
}

/* Optional: Wenn du willst, dass er im Erfolg-Zustand 
   auch keinen "Klick-Finger" mehr zeigt */
#saveBtn.success {
    cursor: default !important;
    border: 2px solid #27ae60 !important;
}
    
/* Hover-Effekt */
#saveBtn:hover:not(:disabled) {
    background: #3d3d3d !important;
    color: #ff9f43 !important;
}

/* Aktives Leuchten bei Änderungen */
#saveBtn.needs-save {
    display: inline-flex !important;
    animation: pulse-glow 1.5s infinite ease-in-out !important;
    border: 1px solid #e67e22 !important;
}

/* Lade-Zustand (während fetch läuft) */
#saveBtn.is-loading {
    display: inline-flex !important;
    color: transparent !important; /* Versteckt Text, hält Platz */
    cursor: wait;
    animation: none !important;
}

#saveBtn.is-loading::after {
    content: "";
    position: absolute;
    width: 16px; height: 16px;
    border: 2px solid rgba(230, 126, 34, 0.3);
    border-top-color: #e67e22;
    border-radius: 50%;
    animation: button-spin 0.6s linear infinite;
}

#saveBtn.success {
    background-color: transparent !important; /* Hintergrund weg für den Haken-Effekt */
    border: 2px solid #27ae60 !important;    /* Kräftiger grüner Rand */
    box-shadow: none !important;             /* Glühen entfernen */
    cursor: default;
    color: transparent !important;
}

/* Der Haken selbst (falls noch nicht so definiert) */
#saveBtn.success::before {
    content: '✔';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 18px;
    color: #27ae60;
    font-weight: bold;
}

/* Animationen */
@keyframes button-spin {
    to { transform: rotate(360deg); }
}

@keyframes pulse-glow {
    0% {
        box-shadow: inset 0 0 2px rgba(230, 126, 34, 0.4);
    }
    50% {
        box-shadow: inset 0 0 20px rgba(230, 126, 34, 1);
        border-color: #ff9f43 !important;
    }
    100% {
        box-shadow: inset 0 0 2px rgba(230, 126, 34, 0.4);
    }
}

#saveBtn:disabled {
    animation: none !important;
    cursor: not-allowed;
}

    
#loginError {
    color: #ff4757;
    margin-top: 15px;
    font-size: 14px;
    font-weight: 600;
    min-height: 20px;
    transition: opacity 0.3s ease; /* Macht das Verschwinden geschmeidiger */
}

    /* ============================================================
       7. ELEMENTE INNERHALB DER BOXEN & LOADER
       ============================================================ */
    .klasse { font-weight: bold; }
    .lehrer-info { font-size: 9px; color: #aaa; margin-top: 1px; }
    .res { font-style: italic; font-size: 9px; margin-top: 2px; position: relative; z-index: 10; }
    
select { width: 100%; height: 100%; position: absolute; top: 0; left: 0; opacity: 0; cursor: pointer; z-index: 5; }

        .save-container { position: absolute; right: 10px; z-index: 10; display: flex; align-items: center; height: 40px; }
        
    .stift { 
        position: absolute; top: 2px; right: 4px; z-index: 50; color: #e67e22; 
        font-size: 22px; transition: transform 0.2s ease; 
    }
    .stift:hover { transform: scale(1.2); color: #ff9f43; }

   .global-loader { 
    position: fixed; /* WICHTIG: Bezieht sich auf den Bildschirm, nicht auf die Leiste */
    left: 15px;      /* Abstand vom linken Rand */
    top: 15px;       /* Abstand vom oberen Rand */
    width: 25px; 
    height: 25px; 
    border: 3px solid #444; 
    border-top: 3px solid #e67e22; 
    border-radius: 50%; 
    animation: spin 1s linear infinite; 
    display: none;   /* Standardmäßig aus */
    z-index: 9999;   /* Höchster Wert, damit er über ALLEM liegt */
}

@keyframes spin { 
    0% { transform: rotate(0deg); } 
    100% { transform: rotate(360deg); } 
}
    
.sport-loader { font-size: 20px; visibility: hidden; animation: bounce 0.6s infinite alternate; }
        .sport-loader.active { visibility: visible; }
        @keyframes bounce { 0% { transform: translateY(0); } 100% { transform: translateY(-10px); } }


    .divider-thin { grid-column: 1 / span 6; height: 1px; background: #444; margin: 2px 0; }
    .divider-thick { grid-column: 1 / span 6; height: 4px; background: #444; margin: 5px 0; }

.extra-select { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; z-index: -1; pointer-events: none; }


  /* ============================================================
       8. Sidebar mit Nachrichtenzentrale
       ============================================================ */
    

#newsSidebar {
    left: 0 !important;
    right: auto !important;
    animation: slideIn 0.3s ease-out !important; /* slideIn von links */
}

@keyframes slideIn {
    from { transform: translateX(-100%); }
    to { transform: translateX(0); }
}


    /* Hover-Effekt für die Nachrichten-Items */
.news-item { transition: background 0.2s; }
.news-item:hover { background: #222 !important; }

/* Das Blinken für die Ziel-Zelle */
@keyframes highlightBlink {
    0% { box-shadow: 0 0 0px #e67e22; border-color: #444; }
    50% { box-shadow: 0 0 20px #e67e22; border-color: #e67e22; }
    100% { box-shadow: 0 0 0px #e67e22; border-color: #444; }
}
.blink-active {
    animation: highlightBlink 0.8s ease-in-out 3; /* 3 mal blinken */
}


    /* ============================================================
      9. Eigenes Menu
       ============================================================ */

    
/* Hintergrund-Overlay */
.eigenesmenu-backdrop {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    z-index: 10000;
    display: flex;
    justify-content: center;
    align-items: flex-start; /* Startet oben für bessere Kontrolle im Querformat */
    backdrop-filter: blur(8px);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    padding: 10px; /* Puffer zum Bildschirmrand */
}

/* Das Fenster */
.eigenesmenu-container {
    position: relative;
    /* Zentrierung im Querformat optimiert */
    margin-top: auto;
    margin-bottom: auto;
    
    width: 100%;
    max-width: 400px;
    /* Nutzt max 95% der verfügbaren Höhe */
    max-height: 95vh; 
    
    display: flex;
    flex-direction: column;
    background: #1a1a1a;
    border-radius: 12px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.7);
    z-index: 10001;
    overflow: hidden; /* Header bleibt oben, Liste scrollt innen */
}

/* Fixierter Headerbereich */
.eigenesmenu-header {
    padding: 18px 18px 10px 18px;
    background: #1a1a1a;
    flex-shrink: 0; /* Verhindert, dass der Titel weggeschoben wird */
    border-bottom: 1px solid #333;
}

.eigenesmenu-header h3 {
    color: #fff;
    margin: 0;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.5px;
}

.eigenesmenu-header p {
    color: #888;
    font-size: 13px;
    margin: 4px 0 0 0;
    line-height: 1.4;
}

/* Scrollbarer Bereich für Buttons */
.eigenesmenu-liste {
    padding: 10px 18px;
    overflow-y: auto; /* Hier passiert das Scrollen */
    flex-grow: 1;
    -webkit-overflow-scrolling: touch;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

/* Die Buttons */
.eigenesmenu-item {
    width: 100%;
    background: #262626; /* Etwas heller für bessere Sichtbarkeit */
    color: #fff;
    border: 1px solid #444;
    padding: 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 500;
    text-align: left;
    display: flex;
    align-items: center;
    transition: all 0.2s ease;
    outline: none;
    flex-shrink: 0; /* Verhindert das Quetschen des Buttons */
}

.eigenesmenu-item:hover, .eigenesmenu-item:focus {
    border-color: #e67e22;
    background: #2d2d2d;
    box-shadow: 0 0 0 2px rgba(230, 126, 34, 0.2);
}

.eigenesmenu-icon {
    margin-right: 12px;
    font-size: 18px;
    width: 24px;
    text-align: center;
}

/* Der Abbrechen/Zurück-Button unten fixiert */
.eigenesmenu-cancel {
    width: 100%;
    background: #1a1a1a;
    color: #888;
    border: none;
    border-top: 1px solid #333;
    padding: 12px;
    cursor: pointer;
    font-size: 14px;
    flex-shrink: 0;
}

.eigenesmenu-cancel:hover {
    color: #fff;
    background: #222;
}

/* Scrollbar-Styling */
.eigenesmenu-liste::-webkit-scrollbar {
    width: 6px;
}
.eigenesmenu-liste::-webkit-scrollbar-track {
    background: #1a1a1a;
}
.eigenesmenu-liste::-webkit-scrollbar-thumb {
    background: #444;
    border-radius: 10px;
}
.eigenesmenu-liste::-webkit-scrollbar-thumb:hover {
    background: #e67e22;
}

/* Spezielle Anpassung für sehr kleine Bildschirme (Handy Querformat) */
@media (max-height: 450px) {
    .eigenesmenu-container {
        max-height: 100vh;
        border-radius: 0; /* Nutzt den ganzen Platz */
    }
    .eigenesmenu-header {

<script>
        const url = "https://script.google.com/macros/s/AKfycbwL4wS4DI305NkAa7p-jiXeqG3_7qhQkmcyI0R0WpSEK0pnXpynqfWuSQEHnmPgRORT/exec"; 
        let pendingChanges = [], configFarben = {}, userPw = "", userKuerzel = "", pressTimer;
        let currentPlanData = [], lastStableDate = "", myClasses = [], allClassTeachers = {};
        let pendingNews = [];
        let allOptions = [];
        let verfügbareMaterialien = [];
        let selectedMaterials = []; // Speichert nur, was der User gerade angeklickt hat

 // ------------LOGIN RESERVATION------------
        
  async function checkLogin() {
            const btn = document.getElementById('loginBtn'), ball = document.getElementById('loginBall');
            const pwVal = document.getElementById('passwordInput').value;
            const kuerzelVal = document.getElementById('kuerzelInput').value.trim().toLowerCase();
            if(!kuerzelVal) { document.getElementById('loginError').innerText = "Kürzel fehlt!"; return; }
            btn.style.display = 'none'; ball.classList.add('active');
            try {
                const res = await fetch(`${url}?mode=login&pw=${pwVal}&kuerzel=${kuerzelVal}`);
                const json = await res.json();
                if (json.error === "Falsches Passwort") {
                    document.getElementById('loginError').innerText = "Falsches Passwort!";
                    btn.style.display = 'block'; ball.classList.remove('active');
                } else {
                    userPw = pwVal;
                    userKuerzel = kuerzelVal;
                    document.getElementById('loginOverlay').style.display = 'none';
                    loadPlan();
                }
            } catch(e) { document.getElementById('loginError').innerText = "Fehler."; btn.style.display = 'block'; ball.classList.remove('active'); }
        }

 // ------------SICHERHEITSABFRAGE ÄNDERUNGEN------------
        
        window.addEventListener('beforeunload', (e) => {
            if (pendingChanges.length > 0) { e.preventDefault(); e.returnValue = ''; }
        });


 // ------------STEUERUNG DER TAGES-BUTTONS------------
        
        function updateNavButtons() {
    const dp = document.getElementById('datePicker');
    if (!dp || !dp.value) return;

    const pickerDate = new Date(dp.value);
    pickerDate.setHours(0, 0, 0, 0);

    const heute = new Date();
    heute.setHours(0, 0, 0, 0);

    const prevDayBtn = document.getElementById('btnPrevDay');
    const prevWeekBtn = document.getElementById('btnPrevWeek');

    // TAG ZURÜCK: Verstecken, wenn wir am heutigen Tag sind
    if (prevDayBtn) {
        if (pickerDate <= heute) {
            prevDayBtn.classList.add('nav-btn-hidden');
        } else {
            prevDayBtn.classList.remove('nav-btn-hidden');
        }
    }

    // WOCHE ZURÜCK: Verstecken, wenn ein Sprung zurück in die Vergangenheit führen würde
    if (prevWeekBtn) {
        const limitWoche = new Date(heute);
        limitWoche.setDate(heute.getDate() + 7); // Erst ab Tag 7 in der Zukunft sichtbar

        if (pickerDate < limitWoche) {
            prevWeekBtn.classList.add('nav-btn-hidden');
        } else {
            prevWeekBtn.classList.remove('nav-btn-hidden');
        }
    }
}    

    window.changeDate = (days) => { const dp = document.getElementById('datePicker'); let d = new Date(dp.value); d.setDate(d.getDate() + days); dp.valueAsDate = d; loadPlan(); };
        window.goToToday = () => {
            const dp = document.getElementById('datePicker');
            const today = new Date();
            const offset = today.getTimezoneOffset();
            today.setMinutes(today.getMinutes() - offset);
            const dateStr = today.toISOString().split('T')[0];
            dp.value = dateStr;
            loadPlan();
        };

// ------------AKTUELLER TAG------------
  
        document.addEventListener('DOMContentLoaded', () => { 
            const today = new Date(); const offset = today.getTimezoneOffset(); today.setMinutes(today.getMinutes() - offset); 
            const dateStr = today.toISOString().split('T')[0];
            document.getElementById('datePicker').value = dateStr;
            lastStableDate = dateStr;
        });

    
// ------------STUNDENPLAN LADEN------------

window.loadPlan = async function() {
    const dp = document.getElementById('datePicker');
    const container = document.getElementById('plan');
    const loader = document.getElementById('globalLoader');
    const sBtn = document.getElementById('saveBtn');

    // 1. Prüfung auf ungespeicherte Änderungen
    if (typeof pendingChanges !== 'undefined' && pendingChanges.length > 0) {
        if (!confirm("Du hast ungespeicherte Änderungen. Diese gehen beim Aktualisieren verloren! Trotzdem fortfahren?")) {
            dp.value = lastStableDate; 
            return;
        }
    }

    const dateVal = dp.value;
    if (!userPw || !dateVal) return;

    // 2. RESET: UI und Datenzustand
    if (sBtn) {
        sBtn.style.display = 'none';
        sBtn.classList.remove('needs-save', 'success', 'is-loading');
        sBtn.innerText = "SAVE"; 
    }
    pendingChanges = []; 
    lastStableDate = dateVal; 
    
    container.innerHTML = ""; 
    if (loader) loader.style.display = 'block'; 
    if (typeof updateNavButtons === 'function') updateNavButtons();

    // 3. Zeit-Validierung
    const dateObj = new Date(dateVal); dateObj.setHours(12,0,0,0);
    const heute = new Date(); heute.setHours(12,0,0,0);
    const vierWochen = new Date(); vierWochen.setDate(heute.getDate() + 28);
    
    if (dateObj < heute) { 
        container.innerHTML = `<div class="box info-box">Lebst du in der Vergangenheit?</div>`; 
        if (loader) loader.style.display = 'none'; 
        return; 
    }
    if (dateObj > vierWochen) { 
        container.innerHTML = `<div class="box info-box">Die Zukunft ist noch nicht bereit...</div>`; 
        if (loader) loader.style.display = 'none'; 
        return; 
    }
    if (dateObj.getDay() === 0 || dateObj.getDay() === 6) { 
        container.innerHTML = `<div class="box info-box">Mach mal Pause! Es ist Wochenende...</div>`; 
        if (loader) loader.style.display = 'none'; 
        return; 
    }
    
    try {
        const res = await fetch(`${url}?date=${dateVal}&pw=${userPw}&kuerzel=${userKuerzel}`);
        const json = await res.json();
        allOptions = json.options; 
        
        if (json.error === "SPERRE") {
            container.innerHTML = `<div class="box info-box">${json.msg}</div>`;
            return;
        }

        // 4. Daten-Verarbeitung
        currentPlanData = json.data; 
        myClasses = json.userClasses || [];
        allClassTeachers = json.allClassTeachers || {};
        
        // --- NEU: Material-Optionen aus Spalte D für den Editor speichern ---
        // Hier ziehen wir die Liste aus dem Paket und machen sie global verfügbar
        window.materialOptionen = json.materialsList || []; 
        console.log("Material-Optionen für Menü geladen:", window.materialOptionen);
        // --------------------------------------------------------------------
        
        const data = json.data;
        const options = json.options; 
        configFarben = {}; 
        options.forEach(opt => configFarben[opt[0]] = opt[1]);
        
        const wtArr = ["Sonntag", "Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag", "Samstag"];
        const [y, m, d] = dateVal.split('-').map(Number);
        
        let html = ""; 

        // 5. Plan-Generierung
        data.forEach((row, rowIndex) => {
            if (rowIndex === 0) {
                html += `<div class="box header-row"><span>${wtArr[dateObj.getDay()]}, ${d}.${m}.${y}</span></div>`;
            } else {
                if (rowIndex === 4 || rowIndex === 10) html += `<div class="divider-thin"></div>`;
                if (rowIndex === 7) html += `<div class="divider-thick"></div>`;
                
                html += `<div class="box zeit-box">${row[0]}</div>`;
                
                for(let i = 1; i <= 5; i++) {
                    let val = row[i] || "", teile = val.split(' | ');
                    let klasse = teile[0], res = teile[1] || "", kommentar = teile[2] || "";
                    let isAusfall = (res === "Ausfall");
                    let canEdit = myClasses.some(c => klasse.trim() === c.trim());
                    
                    let stiftHtml = (kommentar.startsWith("KOMMENTAR:")) 
                        ? `<span class="stift" onclick="event.stopPropagation(); alert('Notiz: ${kommentar.replace('KOMMENTAR:', '')}')"><i class="fas fa-comment-dots"></i></span>` 
                        : "";
                    
                    let teacher = klasse.split('/').map(k => allClassTeachers[k.trim()] || "").filter(t => t !== "").join(" / ");
                    const clickAction = canEdit ? `onclick="openEditor(this, '${row[0]}', ${i}, '${klasse}')"` : "";

                    html += `
                    <div class="box ${klasse.trim() === "" ? 'empty' : ''} ${!canEdit ? 'not-mine' : 'is-mine'} ${isAusfall ? 'ausfall-mode' : ''}" 
                            data-row="${rowIndex}" data-col="${i}"
                            data-time="${row[0]}" data-slot="${i}"
                            ${clickAction}
                            style="background-color: ${isAusfall ? '' : configFarben[res] || ''}; cursor: ${canEdit ? 'pointer' : 'default'}">
                            ${stiftHtml}
                            <div class="klasse">${klasse}</div>
                            <div class="lehrer-info">${teacher}</div>
                            <div class="res">${res}</div>
                    </div>`;
                }
            }
        });
        container.innerHTML = html;

        // 6. MATERIALIEN SETZEN (Icons im Plan markieren)
        if (json.materials && json.materials.length > 0) {
            json.materials.forEach(item => {
                const parts = item.id.split("_");
                if (parts.length >= 3) {
                    const time = parts[1];
                    const slot = parts[2];
                    const box = document.querySelector(`.box[data-time="${time}"][data-slot="${slot}"]`);
                    if (box && typeof markBoxWithMaterialIcon === 'function') {
                        markBoxWithMaterialIcon(box, item.material, item.kommentar);
                    }
                }
            });
        }

    } catch(e) { 
        console.error("Fehler in loadPlan:", e); 
        container.innerHTML = `<div class="box info-box" style="color:red;">Server-Fehler beim Laden!</div>`;
    } finally {
        if (loader) loader.style.display = 'none';
        if (typeof updateNavButtons === 'function') updateNavButtons();
    }
};



    
/**
 * Sucht die Box im Plan basierend auf der Uhrzeit und der Spalte (Slot).
 * @param {string} time - Die Uhrzeit (z.B. "08:00 - 08:45")
 * @param {number|string} slot - Der Spaltenindex (1 bis 5)
 * @returns {HTMLElement|null} - Die gefundene Box oder null
 */
function findBoxByTimeAndSlot(time, slot) {
    // Wir nutzen den CSS-Attribut-Selektor, um die Box direkt anzusprechen
    // Wichtig: slot wird in einen String umgewandelt, da HTML-Attribute Strings sind
    const selector = `.box[data-time="${time}"][data-slot="${slot}"]`;
    const box = document.querySelector(selector);
    
    if (!box) {
        console.warn(`Box nicht gefunden für Zeit: ${time}, Slot: ${slot}`);
    }
    
    return box;
}

    
// ------------TEXTSTRING BILDEN------------    
    
function buildFinalValue(r, c, neueHalle, neuerKommentar) {
    const parent = document.querySelector(`.box[data-row="${r}"][data-col="${c}"]`);
    const klasse = parent.querySelector('.klasse').innerText.trim();
    
    let fullString = (currentPlanData[r] && currentPlanData[r][c]) ? currentPlanData[r][c] : "";
    let hasU21 = fullString.includes("U21");

    // Wenn die Halle gelöscht wird, fällt U21 weg
    if (neueHalle === "" || neueHalle === "---" || neueHalle === null) {
        hasU21 = false;
        neueHalle = ""; 
    }
    
    // Kommentar-Logik: Entweder der neue oder der bestehende
    let commentPart = neuerKommentar !== undefined ? neuerKommentar : getExistingComment(r, c);

    // WICHTIG: Die Reihenfolge muss exakt stimmen für die Anzeige-Logik
    // Teil 0: Klasse
    // Teil 1: Halle (evtl. mit U21)
    // Teil 2: Kommentar
    
    let hallenTeil = neueHalle;
    if (hasU21 && hallenTeil !== "") {
        hallenTeil += " | U21"; // U21 wird an die Halle geklebt
    } else if (hasU21 && hallenTeil === "") {
        // Sonderfall: U21 ohne Halle (sollte durch unsere neue Logik vermieden werden)
        hallenTeil = "U21"; 
    }

    let finalParts = [klasse];
    finalParts.push(hallenTeil || ""); // Muss existieren, auch wenn leer, damit Kommentar Index 2 bleibt
    if (commentPart && commentPart !== "") {
        finalParts.push(commentPart);
    }

    return finalParts.join(" | ");
}

    

// ------------EXTRAMENU------------    
  
window.startTimer = (el) => { pressTimer = setTimeout(() => { openExtraMenu(el); }, 500); };
window.clearTimer = () => clearTimeout(pressTimer);
window.handleContextMenu = (e, el) => { e.preventDefault(); e.stopPropagation(); openExtraMenu(el); };

    
function openExtraMenu(el) { 
    closeAllExtraMenus();
    const sel = el.querySelector('.extra-select'); 
    const hatStift = el.querySelector('.stift') !== null;
    const delOpt = sel.querySelector('.del-opt');
    
    // Notiz-Löschen Option einblenden, wenn Stift vorhanden
    if(delOpt) delOpt.style.display = hatStift ? "block" : "none";

    const aktuelleRes = el.querySelector('.res').innerText.trim();
    
    if (aktuelleRes === "Ausfall") {
        sel.value = "ausfall";
    } else {
        sel.value = ""; 
    }

    sel.style.zIndex = "100"; 
    sel.style.pointerEvents = "all"; 
    sel.style.opacity = "1"; 
    
    // Picker öffnen (Standard-Browser-Verhalten)
    setTimeout(() => { 
        if (sel.showPicker) { sel.showPicker(); } else { sel.click(); } 
    }, 50); 
}

    
// ------------ÄNDERUNGEN PER EXTRAMENU------------    

window.handleExtraAction = async (el, time, slot) => {
    const action = el.value;
    const parent = el.closest('.box'); 
    const r = parent.getAttribute('data-row');
    const c = parent.getAttribute('data-col');
    const klasseElem = parent.querySelector('.klasse');
    const klasse = klasseElem ? klasseElem.innerText.trim() : "";

    // --- 1. NEWS-WARTESCHLANGE BEREINIGEN (RESET) ---
    // Wir entfernen bei jeder Aktion im Extra-Menü vorsorglich alte News-Einträge für diesen Slot
    if (typeof pendingNews !== "undefined") {
        pendingNews = pendingNews.filter(n => n.slot !== parseInt(c));
    }

    // --- 2. LOGIK FÜR RESET (---) ---
    if (action === "" || action === "---") {
        // Optik komplett zurücksetzen
        parent.classList.remove('ausfall-mode');
        parent.style.backgroundColor = "";
        
        const resElem = parent.querySelector('.res');
        if (resElem) resElem.innerText = ""; // Halle/Zusatz leeren

        // Kommentar-Icon entfernen
        let stift = parent.querySelector('.stift');
        if (stift) stift.remove();

        // Daten auf reine Klasse zurücksetzen
        let finalVal = klasse; 
        if (!currentPlanData[r]) currentPlanData[r] = [];
        currentPlanData[r][c] = finalVal;

        // In pendingChanges speichern
        pendingChanges = pendingChanges.filter(ch => !(ch.slotIndex === slot));
        pendingChanges.push({ time, slotIndex: slot, val: finalVal });

        // Speicher-Button triggern
        const saveBtn = document.getElementById('saveBtn');
        if (saveBtn) {
            saveBtn.style.display = 'inline-flex';
            saveBtn.classList.add('needs-save');
        }

        el.value = "";
        closeAllExtraMenus();
        return; 
    }

    // --- 3. ÜBRIGE VARIABLEN VORBEREITEN ---
    let fullString = (currentPlanData[r] && currentPlanData[r][c]) ? currentPlanData[r][c] : "";
    let parts = fullString.split('|').map(s => s.trim());
    let commentPart = parts.find(p => p.startsWith("KOMMENTAR:"));
    let neueHalle = parent.querySelector('.res').innerText.trim();

    // --- 4. AKTIONEN LOGIK ---

    if (action === "perma_delete") {
        const confirmed = await showCustomConfirm(
            "Schuljahr beendet", 
            `Soll das Schuljahr für die Klasse "${klasse}" wirklich beendet werden?`
        );

        if (confirmed) {
            const modal = document.getElementById('pwModal');
            const input = document.getElementById('modalPwInput');
            const btn = document.getElementById('confirmPwBtn');

            if (modal && input && btn) {
                modal.style.display = 'flex';
                input.value = '';
                input.focus();

                btn.onclick = async () => {
                    if (input.value === userPw) {
                        modal.style.display = 'none';
                        
                        const dateVal = document.getElementById('datePicker').value;
                        const recipients = getAffectedColleagues(parseInt(c));
                        
                        if (recipients) {
                            const directNewsPayload = {
                                mode: "saveNews",
                                id: "ID_" + Date.now() + "_PERMA",
                                datum: dateVal,
                                slot: parseInt(c),
                                tagIndex: new Date(dateVal).getDay(),
                                klasse: klasse,
                                verfasser: userKuerzel,
                                empfaenger: recipients,
                                text: `Halle dauerhaft frei: ${klasse} hat Schuljahr beendet.`,
                                pw: userPw
                            };

                            fetch(url, {
                                method: "POST",
                                body: JSON.stringify(directNewsPayload)
                            }).then(() => console.log("Perma-News direkt versendet"));
                        }

                        const gLoader = document.getElementById('globalLoader');
                        if (gLoader) gLoader.style.display = 'block';
                        const planContainer = document.getElementById('plan');
                        if (planContainer) planContainer.innerHTML = ""; 

                        if (typeof permaDeleteClass === "function") {
                            await permaDeleteClass(klasse, slot);
                        }
                        
                    } else {
                        alert("Falsches Passwort!");
                        input.value = '';
                        input.focus();
                    }
                };
            }
        }
        el.value = ""; 
        closeAllExtraMenus(); 
        return;
    } 
    
    else if (action === "ausfall") {
        neueHalle = "Ausfall";
        parent.classList.add('ausfall-mode');
        
        if (typeof triggerNews === "function") {
            triggerNews("ausfall", parseInt(c), klasse);
        }
    } 
    
    else if (action === "kommentar") {
        let existingText = commentPart ? commentPart.replace("KOMMENTAR:", "") : "";
        const text = prompt("Notiz eingeben:", existingText);
        if (text !== null) {
            let oldStift = parent.querySelector('.stift');
            if (oldStift) oldStift.remove();
            if (text.trim() !== "") {
                commentPart = "KOMMENTAR:" + text.trim();
                let span = document.createElement('span');
                span.className = 'stift';
                span.innerHTML = '<i class="fas fa-comment-dots"></i>';
                span.onclick = (e) => { e.stopPropagation(); alert('Notiz: ' + text.trim()); };
                parent.appendChild(span);
            } else { 
                commentPart = ""; 
            }
        } else { 
            el.value = ""; closeAllExtraMenus(); return; 
        }
    } 
    
    else if (action === "delete_comment") {
        commentPart = ""; 
        let stift = parent.querySelector('.stift');
        if (stift) stift.remove();
    }

    // --- 5. FINALES UPDATE (Optik & Daten) ---
    if (neueHalle === "Ausfall") {
        parent.style.backgroundColor = ""; 
    } else {
        parent.style.backgroundColor = configFarben[neueHalle] || "";
    }
    
    const resElem = parent.querySelector('.res');
    if (resElem) resElem.innerText = neueHalle;

    let finalVal = buildFinalValue(r, c, neueHalle, commentPart);
    if (!currentPlanData[r]) currentPlanData[r] = [];
    currentPlanData[r][c] = finalVal;
    
    pendingChanges = pendingChanges.filter(ch => !(ch.slotIndex === slot));
    pendingChanges.push({ time, slotIndex: slot, val: finalVal });
    
    const saveBtn = document.getElementById('saveBtn');
    if (saveBtn) {
        saveBtn.style.display = 'inline-flex'; 
        void saveBtn.offsetWidth; 
        saveBtn.classList.add('needs-save');
    }
    el.value = ""; 
    closeAllExtraMenus();
};

// Betroffene Kollegen suchen
   function getAffectedColleagues(slotIndex) {
    const colleagues = [];
    
    // Wir nutzen currentPlanData (dein globales Daten-Objekt)
    // r = Zeile (Zeit), s = Spalte (Halle/Slot)
    
    for (let s = 1; s <= 5; s++) {
        if (s === slotIndex) continue; // Den eigenen Slot ignorieren

        // Wir loopen durch alle Zeilen in currentPlanData
        for (let r in currentPlanData) {
            let row = currentPlanData[r];
            let cellContent = row[s] ? row[s].toString().trim() : "";
            
            if (cellContent !== "" && !cellContent.includes("U21")) {
                // Klasse isolieren (Teil vor dem ersten Leerzeichen oder Pipe)
                let klasse = cellContent.split(" ")[0].split("|")[0].trim();
                let lehrerKuerzel = allClassTeachers[klasse];
                
                if (lehrerKuerzel && !colleagues.includes(lehrerKuerzel)) {
                    colleagues.push(lehrerKuerzel);
                }
            }
        }
    }
    return colleagues.join(",");
}

// News erstellen
    function triggerNews(type, slotIndex, klasse) {
    const dateVal = document.getElementById('datePicker').value;
    
    // Bestehende News für diesen Slot in der Warteschlange löschen (Korrektur-Schutz)
    pendingNews = pendingNews.filter(n => n.slot !== slotIndex);

    let newsText = "";
    if (type === "ausfall") newsText = `Halle frei: ${klasse} fällt aus.`;
    if (type === "outdoor") newsText = `Halle frei: ${klasse} ist Outdoor.`;
    if (type === "beendet") newsText = `Halle dauerhaft frei: ${klasse} hat Schuljahr beendet.`;

    // Das News-Objekt vorbereiten
    pendingNews.push({
        mode: "saveNews",
        id: "ID_" + Date.now() + "_" + Math.floor(Math.random() * 1000), 
        datum: dateVal,
        slot: slotIndex,
        tagIndex: new Date(dateVal).getDay(),
        klasse: klasse,
        verfasser: userKuerzel,
        empfaenger: getAffectedColleagues(slotIndex), // Empfänger jetzt schon ermitteln
        text: newsText,
        pw: userPw
    });
    
    console.log("News in Warteschlange: ", newsText);
}

async function saveImmediately() {
    if (pendingChanges.length === 0) return;

    const payload = {
        pw: userPw,
        kuerzel: userKuerzel,
        date: document.getElementById('datePicker').value,
        changes: [...pendingChanges], 
        news: (typeof pendingNews !== "undefined") ? [...pendingNews] : []
    };

    // Listen sofort leeren, damit bei schnellen Klicks nichts doppelt gesendet wird
    pendingChanges = [];
    if (typeof pendingNews !== "undefined") pendingNews = [];

    try {
        const response = await fetch(url, {
            method: "POST",
            body: JSON.stringify(payload)
        });
        const result = await response.json();
        if (result.status !== "success") throw new Error("Server Fehler");
        console.log("Auto-Save erfolgreich");
    } catch (e) {
        console.error("Auto-Save Fehler:", e);
        alert("Konnte nicht speichern. Bitte Seite neu laden!");
    }
}

// HINZUGEFÜGT: async, damit await darin funktioniert
window.addChange = async (el, time, slot, klasse) => { 
    let res = el.value; 
    
    const parent = el.closest('.box'); 
    const r = parent.getAttribute('data-row');
    const c = parent.getAttribute('data-col');
    
    // Optik-Update
    // Korrektur: Wir setzen die Klasse basierend auf dem Wert
    if (res === "Ausfall") {
        parent.classList.add('ausfall-mode');
    } else {
        parent.classList.remove('ausfall-mode');
    }

    const resDisplay = parent.querySelector('.res');
    if(resDisplay) resDisplay.innerText = (res === "" || res === "---") ? "" : res; 
    parent.style.backgroundColor = configFarben[res] || ""; 

    // String bauen
    let finalVal = buildFinalValue(r, c, (res === "---" ? "" : res), undefined);

    // --- NEWS-WARTESCHLANGE ---
    if (typeof pendingNews !== "undefined") {
        pendingNews = pendingNews.filter(n => n.slot !== parseInt(slot));
    }

    if (res && res.toString().includes("Outdoor")) {
        if (typeof triggerNews === "function") {
            const newsKlasse = klasse || res.split('|')[0].trim();
            triggerNews("outdoor", parseInt(slot), newsKlasse);
        }
    }

    // Datenstand aktualisieren
    if (!currentPlanData[r]) currentPlanData[r] = [];
    currentPlanData[r][c] = finalVal;
    
    // In die Speicherliste
    pendingChanges = pendingChanges.filter(ch => !(ch.slotIndex === slot)); 
    pendingChanges.push({ time, slotIndex: slot, val: finalVal }); 

    // WICHTIG: await benutzen, damit updateSelection weiß, wann der Server fertig ist
    await saveImmediately();
};

async function saveMaterialSelection(material, kommentar, time, slot, klasse, clickedBtn) {
    const loader = clickedBtn.querySelector('.eigenesmenu-loader');
    const successIcon = clickedBtn.querySelector('.eigenesmenu-success-icon');
    const btnText = clickedBtn.querySelector('.btn-text');

    if (loader) loader.style.display = 'block';
    if (btnText) btnText.style.opacity = '0.3';

    const dp = document.getElementById('datePicker');
    let displayDate = dp ? dp.value : (window.lastStableDate || ""); 

    const payload = {
        mode: "saveMaterial", 
        pw: userPw,           
        material: material,
        kommentar: kommentar,
        time: time,
        slot: slot,
        klasse: klasse,
        date: displayDate     
    };

    try {
        const response = await fetch(url, {
            method: "POST",
            body: JSON.stringify(payload)
        });

        const result = await response.json();

       if (result.status === "success") {
            if (loader) loader.style.display = 'none';
            if (successIcon) successIcon.style.display = 'block';
            clickedBtn.classList.add('success');
            
            const box = findBoxByTimeAndSlot(time, slot);
            if (box) {
                // Falls 'kommentar' als Parameter leer war, nehmen wir den Inhalt des Textfelds
                const finalKommentar = kommentar || (document.getElementById('material-kommentar-input') ? document.getElementById('material-kommentar-input').value : "");
                markBoxWithMaterialIcon(box, material, finalKommentar);
            }

            setTimeout(() => {
                if (typeof closeEditor === 'function') closeEditor();
            }, 1000);
        } else {
            throw new Error(result.msg || "Server meldet Fehler");
        }
    } catch (error) {
        alert("Fehler: " + error.message);
        if (loader) loader.style.display = 'none';
        if (btnText) btnText.style.opacity = '1';
    }
}



    
function markBoxWithMaterialIcon(box, material, kommentar) {
    if (!box) return;

    // Altes Icon entfernen, falls vorhanden
    const oldIcon = box.querySelector('.material-indicator');
    if (oldIcon) oldIcon.remove();

    if (!material || material.trim() === "") return;

    // Badge erstellen
    const badge = document.createElement('div');
    badge.className = 'material-indicator';
    badge.innerHTML = '📦';

    // Styling (wie gehabt)
    Object.assign(badge.style, {
        position: 'absolute',
        top: '0',
        right: '0',
        background: '#333',
        color: 'white',
        padding: '2px 6px',
        borderBottomLeftRadius: '8px',
        fontSize: '20px',
        zIndex: '10',
        cursor: 'pointer',
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'center'
    });

    // Klick-Event: Hier MUSS der kommentar rein
    badge.onclick = (e) => {
        e.stopPropagation();
        // Wir stellen sicher, dass 'kommentar' nicht undefined ist
        showMaterialDetailPopup(material, kommentar || "");
    };

    box.appendChild(badge);
}


    
function showMaterialDetailPopup(material, kommentar) {
    const overlay = document.createElement('div');
    overlay.className = 'material-info-overlay';
    overlay.onclick = () => overlay.remove(); 

    // Liste formatieren
    const materialList = material.split(', ').map(item => `• ${item}`).join('<br>');

    overlay.innerHTML = `
        <div class="material-info-content" onclick="event.stopPropagation()" style="max-width: 400px; padding: 25px;">
            <div class="material-info-title" style="margin-bottom: 20px; font-size: 1.4rem;">
                📦 Material-Reservierung
            </div>
            
            <div style="color:#ff8c00; margin-bottom: 20px; font-weight:bold; line-height: 1.5; font-size: 1.1rem; text-align: left; padding-left: 10px;">
                ${materialList}
            </div>

            <!-- Der Kommentar-Kasten -->
            <div class="kommentar-kasten" style="
                background: #1a1a1a; 
                border-left: 4px solid #ff8c00; 
                padding: 15px; 
                border-radius: 4px; 
                margin-bottom: 25px;
                text-align: left;
                box-shadow: inset 0 0 10px rgba(0,0,0,0.5);">
                
                <div style="color: #666; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px;">
                    Zusatz-Details:
                </div>
                
                <div style="color: #eee; line-height: 1.4; font-style: italic;">
                    ${kommentar ? kommentar : "Keine Notizen hinterlegt."}
                </div>
            </div>

            <button class="eigenesmenu-cancel" style="width:100%; margin:0; background: #333; color: #ccc;" 
                onclick="this.closest('.material-info-overlay').remove()">Schließen</button>
        </div>
    `;
    document.body.appendChild(overlay);
}


    
    
function toggleMaterialSelection(mat, btn) {
    const indicator = btn.querySelector('.check-indicator');
    const nextStep = document.getElementById('materialNextStep');

    if (selectedMaterials.includes(mat)) {
        selectedMaterials = selectedMaterials.filter(item => item !== mat);
        btn.style.background = ""; 
        indicator.innerText = "○";
        indicator.style.color = "#444";
    } else {
        selectedMaterials.push(mat);
        btn.style.background = "rgba(255, 140, 0, 0.2)"; 
        indicator.innerText = "●";
        indicator.style.color = "#ff8c00";
    }

    if (nextStep) {
        nextStep.style.display = selectedMaterials.length > 0 ? "block" : "none";
    }
}


    

window.saveChanges = async function() {
    const btn = document.getElementById('saveBtn');
    const gLoader = document.getElementById('globalLoader'); 
    
    if (gLoader) gLoader.style.display = 'block';
    if (btn) {
        btn.classList.remove('needs-save', 'success');
        btn.classList.add('is-loading');
        btn.disabled = true;
    }

    try { 
        const dateVal = document.getElementById('datePicker').value;
        const response = await fetch(url, { 
            method: "POST", 
            body: JSON.stringify({ 
                date: dateVal, 
                changes: pendingChanges, 
                pw: userPw,
                kuerzel: userKuerzel
            }) 
        }); 
        
        const result = await response.json();

        if (result.status === "success") {
            pendingChanges = []; 
            if (gLoader) gLoader.style.display = 'none';
            if (btn) {
                btn.classList.remove('is-loading');
                btn.classList.add('success'); 
                setTimeout(() => { 
                    btn.style.display = 'none'; 
                    btn.classList.remove('success'); 
                    btn.disabled = false;
                }, 1500); 
            }
        } else { 
            throw new Error(result.msg || "Server Error"); 
        }

    } catch (e) { 
        console.error("Speicherfehler:", e);
        if (gLoader) gLoader.style.display = 'none';
        if (btn) {
            btn.classList.remove('is-loading');
            btn.disabled = false;
            btn.classList.add('needs-save');
        }
        alert("Fehler beim Speichern: " + e.message);
    }
};


    
    
    
</script>
